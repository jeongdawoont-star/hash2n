<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 활동 트래커</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF9F0;
  --card: #FFFFFF;
  --accent: #FF6B35;
  --accent2: #4ECDC4;
  --accent3: #FFE66D;
  --purple: #A855F7;
  --green: #22C55E;
  --text: #1A1A2E;
  --text-dim: #6B7280;
  --border: #E5E7EB;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --radius: 20px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* 물결 배경 */
.bg-wave {
  position: fixed; top: 0; left: 0; right: 0;
  height: 220px;
  background: linear-gradient(135deg, #FF6B35 0%, #FF8E53 50%, #FFA07A 100%);
  z-index: 0;
  clip-path: ellipse(120% 100% at 50% 0%);
}
.bg-dots {
  position: fixed; inset: 0; z-index: 0;
  background-image: radial-gradient(circle, rgba(255,107,53,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
}

.container {
  position: relative; z-index: 1;
  max-width: 480px; margin: 0 auto;
  padding: 0 16px 100px;
  min-height: 100vh;
}

@media (min-width: 768px) {
  .container {
    max-width: 1100px;
    padding: 0 24px 120px;
  }
}

/* 헤더 */
.header {
  padding: 52px 0 28px;
  text-align: center;
}
.header-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-actions-left {
  display: flex;
  align-items: center;
  gap: 6px;
}
.header-title-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.header-project-id {
  display: inline-block;
  margin-left: 6px;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.62);
  letter-spacing: 0.2px;
  max-width: 180px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-student-count {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 52px;
  height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.9);
  color: #92400E;
  font-size: 12px;
  font-weight: 800;
}
.header .emoji-row {
  font-size: 52px;
  display: block;
  margin-bottom: 10px;
  animation: bounce 2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0) rotate(-3deg); }
  50% { transform: translateY(-10px) rotate(3deg); }
}
.header h1 {
  font-family: 'Gaegu', cursive;
  font-size: 34px; font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.15);
  letter-spacing: -0.5px;
}
.header p {
  color: rgba(255,255,255,0.85);
  font-size: 14px; margin-top: 4px;
}
.header-menu-btn {
  background: rgba(255,255,255,0.92);
  border: 1px solid rgba(255,255,255,0.95);
  border-radius: 10px;
  padding: 7px 9px;
  font-size: 11px;
  font-weight: 800;
  color: #C2410C;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  white-space: nowrap;
}
.header-menu-btn:active { transform: scale(0.96); }
.header-icon-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.connection-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #22C55E;
  box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.18);
}
.fullscreen-corner {
  position: fixed;
  top: 8px;
  right: 8px;
  z-index: 90;
}

/* 설정 카드 */
.setup-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
  border: 2px solid var(--border);
}
.setup-card h2 {
  font-size: 15px; font-weight: 700;
  margin-bottom: 16px; color: var(--text);
  display: flex; align-items: center; gap: 8px;
}
.input-group { margin-bottom: 14px; }
.input-group label {
  display: block; font-size: 11px; font-weight: 700;
  color: var(--accent); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 6px;
}
.input-group input {
  width: 100%; background: #F9FAFB;
  border: 2px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
  font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
  color: var(--text); outline: none;
  transition: border-color 0.2s;
}
.input-group input:focus { border-color: var(--accent); }
.input-group .hint { font-size: 11px; color: var(--text-dim); margin-top: 5px; }

.connect-btn {
  width: 100%; background: linear-gradient(135deg, var(--accent), #FF8E53);
  border: none; border-radius: 14px;
  padding: 16px; color: white;
  font-size: 16px; font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 6px 20px rgba(255,107,53,0.35);
}
.connect-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,53,0.45); }
.connect-btn:active { transform: scale(0.97); }
.connect-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* 상태 바 */
.status-bar {
  background: var(--card); border-radius: 14px;
  padding: 12px 16px; margin-bottom: 20px;
  display: flex; align-items: center; justify-content: flex-start;
  box-shadow: var(--shadow); border: 1px solid var(--border);
}
.status-left { display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.status-text { font-size: 13px; font-weight: 600; color: var(--text); }
.sync-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; font-size: 12px; font-weight: 600;
  color: var(--accent); cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.sync-btn:active { background: rgba(255,107,53,0.08); transform: scale(0.95); }
.header-menu-btn.sync-btn {
  background: rgba(255,255,255,0.92);
  border-color: rgba(255,255,255,0.95);
  color: #C2410C;
}
.status-actions { display: flex; align-items: center; gap: 8px; }

.muted-btn {
  background: #F9FAFB; border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 12px; font-size: 12px; font-weight: 600;
  color: var(--text-dim); cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.muted-btn:active { transform: scale(0.95); }

.muted-btn.active-inspector {
  background: #FFF3E8;
  border-color: #FDBA74;
  color: #C2410C;
}

/* 섹션 헤더 */
.sec-title {
  font-size: 13px; font-weight: 700; color: var(--text-dim);
  letter-spacing: 1.5px; text-transform: uppercase;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.sec-title .badge {
  background: var(--accent3); color: var(--text);
  border-radius: 6px; padding: 2px 8px; font-size: 11px;
}

/* 학생 그리드 */
.students-grid {
  display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px;
}
@media (min-width: 768px) {
  .students-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }
}
@media (min-width: 1024px) {
  .students-grid {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
}
.student-card {
  background: var(--card); border-radius: var(--radius);
  padding: 10px; text-align: left;
  transition: all 0.2s;
  box-shadow: var(--shadow); border: 2px solid #F1F5F9;
  position: relative; overflow: hidden;
  min-height: 210px;
  display: flex; flex-direction: column; gap: 8px;
  aspect-ratio: 1 / 1;
}
.student-card:hover { transform: translateY(-2px); }

.student-card.inspector-mode {
  cursor: pointer;
}

.student-card.inspector-mode .mission-tile {
  cursor: default;
}

.student-top {
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
}
.s-name {
  font-size: clamp(15px, 1.5vw, 21px);
  font-weight: 800; color: var(--text); line-height: 1.05;
  letter-spacing: -0.4px;
  word-break: keep-all;
  text-align: center;
}
.student-count-pill {
  flex-shrink: 0;
  min-width: 28px;
  height: 28px;
  border-radius: 999px;
  background: #FFF1CC;
  color: #A16207;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 900;
}

.mission-board {
  flex: 1;
  display: grid;
  gap: 4px;
  min-height: 0;
}
.mission-board.board-1 {
  grid-template-columns: 1fr;
}
.mission-board.board-2 {
  grid-template-columns: repeat(var(--board-columns, 2), minmax(0, 1fr));
}
.mission-board.board-3 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-template-rows: repeat(2, minmax(0, 1fr));
}
.mission-board.board-3 .mission-tile:nth-child(3) {
  grid-column: 1 / span 2;
}
.mission-board.board-4 {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}
.mission-board.board-many {
  grid-template-columns: repeat(3, minmax(0, 1fr));
  grid-auto-rows: 1fr;
}
.mission-tile {
  border: 2px solid #E5E7EB;
  border-radius: 12px;
  background: #FFFFFF;
  color: #111827;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 4px;
  min-height: 0;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, background 0.15s, color 0.15s, border-color 0.15s;
}
.mission-tile:active {
  transform: scale(0.97);
}
.mission-tile.done {
  background: #22C55E;
  border-color: #16A34A;
  color: #FFFFFF;
}
.mission-tile.inspected {
  background: #FB923C;
  border-color: #EA580C;
  color: #FFFFFF;
}
.mission-tile.pending {
  background: #FFFFFF;
  color: #111827;
  border-color: #D1D5DB;
}
.mission-tile.locked {
  background: #E5E7EB;
  color: #6B7280;
  border-color: #CBD5E1;
  cursor: not-allowed;
}
.mission-tile.saving {
  opacity: 0.7;
}
.mission-tile-label {
  font-size: clamp(10px, 1.25vw, 16px);
  font-weight: 900;
  line-height: 1.15;
  word-break: keep-all;
  white-space: normal;
  overflow-wrap: anywhere;
}
.mission-tile.square .mission-tile-label.break-2x2 {
  line-height: 1.05;
}

@media (min-width: 768px) {
  .student-card {
    min-height: 250px;
    padding: 10px;
  }
}

/* 관리자 버튼 */
.admin-fab {
  position: fixed; bottom: 24px; right: 20px;
  background: var(--text); color: white;
  border: none; border-radius: 50%;
  width: 52px; height: 52px;
  font-size: 22px; cursor: pointer;
  box-shadow: 0 6px 20px rgba(0,0,0,0.2);
  transition: all 0.2s; z-index: 50;
}
.admin-fab:hover { transform: scale(1.1); background: var(--purple); }
.admin-fab:active { transform: scale(0.95); }

/* 로딩 */
.loading-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 20px; gap: 14px; color: var(--text-dim);
}
.spin {
  width: 36px; height: 36px;
  border: 3px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 에러 */
.error-box {
  background: #FEF2F2; border: 2px solid #FECACA;
  border-radius: 12px; padding: 16px; color: #EF4444;
  font-size: 13px; text-align: center; margin-bottom: 16px;
}

/* 스탠드얼론 입장 애니 */
@keyframes fadeSlideUp {
  from { opacity:0; transform: translateY(20px); }
  to { opacity:1; transform: translateY(0); }
}
.student-card { animation: fadeSlideUp 0.4s ease both; }
.student-card:nth-child(1){animation-delay:0.05s}
.student-card:nth-child(2){animation-delay:0.1s}
.student-card:nth-child(3){animation-delay:0.15s}
.student-card:nth-child(4){animation-delay:0.2s}
.student-card:nth-child(5){animation-delay:0.25s}
.student-card:nth-child(6){animation-delay:0.3s}
.student-card:nth-child(7){animation-delay:0.35s}
.student-card:nth-child(8){animation-delay:0.4s}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   태블릿 가로 모드 — Galaxy Tab S6 Lite 기준 (스크롤 없는 전체 화면)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (min-width: 900px) and (orientation: landscape) {
  html, body { height: 100%; overflow: hidden; }
  body { height: 100dvh; }
  .bg-wave { height: 80px; }
  .container {
    max-width: 100%;
    padding: 0 14px 4px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .header {
    flex-shrink: 0;
    padding: 4px 0 2px;
  }
  .header .emoji-row { font-size: 24px; margin: 0; display: inline; animation: none; }
  .header h1 { font-size: 19px; }
  .header p { display: none; }
  .header-toolbar { gap: 6px; }
  .header-actions-left { gap: 4px; }
  .header-menu-btn {
    padding: 5px 7px;
    font-size: 10px;
  }
  .header-project-id { font-size: 10px; max-width: 120px; }
  .header-student-count {
    min-width: 46px;
    height: 24px;
    padding: 0 8px;
    font-size: 11px;
  }
  .header-icon-btn {
    width: 30px;
    height: 30px;
    font-size: 15px;
  }
  #mainContent {
    flex: 1;
    min-height: 0;
    display: flex !important;
    flex-direction: column;
    overflow: hidden;
  }
  .status-bar { display: none; }
  .sec-title { display: none; }
  .students-grid {
    flex: 1;
    min-height: 0;
    grid-template-columns: repeat(var(--student-cols, 4), minmax(0, 1fr)) !important;
    grid-auto-rows: 1fr;
    align-content: stretch;
    gap: 8px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .student-card {
    aspect-ratio: unset !important;
    min-height: 0 !important;
    padding: 6px;
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 6px;
    align-items: stretch;
  }
  .student-top {
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
    min-width: 0;
    height: 100%;
    padding: 2px 0;
    border-right: 1px dashed #D1D5DB;
  }
  .s-name {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: clamp(12px, 1.2vw, 16px);
    letter-spacing: 0;
    line-height: 1;
    max-height: 100%;
  }
  .student-count-pill {
    display: none;
  }
  .mission-board {
    height: 100%;
    gap: 5px;
  }
  .mission-tile {
    border-radius: 10px;
    padding: 6px;
  }
  .mission-tile-label {
    font-size: clamp(11px, 1.35vw, 17px);
    line-height: 1.1;
  }
  .mission-board.board-3 .mission-tile-label {
    font-size: clamp(10px, 1.25vw, 16px);
  }
  .fullscreen-corner {
    top: 4px;
    right: 4px;
  }
  .admin-fab { bottom: 10px; right: 12px; width: 42px; height: 42px; font-size: 17px; }
}
</style>
</head>
<body>
<div class="bg-wave"></div>
<div class="bg-dots"></div>

<div class="container">
  <div class="header">
    <div class="header-toolbar">
      <div class="header-actions-left">
        <span class="connection-dot" title="연결됨"></span>
        <button class="header-menu-btn sync-btn" onclick="syncFromSheets()">🔄 동기화</button>
        <button class="header-menu-btn" id="inspectorBtn" onclick="toggleInspectorMode()">🧪 OFF</button>
        <button class="header-menu-btn" onclick="openConfigEditor()">✏️ 설정</button>
        <span class="header-student-count" id="studentCount">-명</span>
      </div>
      <div class="header-title-wrap">
        <span class="emoji-row">🎯</span>
        <h1>활동 트래커</h1>
        <span class="header-project-id" id="headerProjectId">연결대기</span>
      </div>
    </div>
    <p>오늘도 열심히 해보자!</p>
  </div>

  <!-- 초기 설정 -->
  <div id="setupSection">
    <div class="setup-card">
      <h2>⚙️ Firebase 연결 설정</h2>
      <div class="input-group">
        <label>프로젝트 ID</label>
        <input type="text" id="projectId" placeholder="your-project-id">
        <div class="hint">Firebase 콘솔 > 프로젝트 설정</div>
      </div>
      <div class="input-group">
        <label>Web API Key</label>
        <input type="text" id="apiKey" placeholder="AIzaSy...">
      </div>
      <div class="input-group">
        <label>Google Sheets ID</label>
        <input type="text" id="sheetsId" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms">
        <div class="hint">스프레드시트 URL의 /d/ 다음 부분</div>
      </div>
      <div class="input-group">
        <label>Apps Script URL (점수 기록용)</label>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <div class="hint">apps-script.js 배포 후 생성 (없으면 비워도 됨)</div>
      </div>
    </div>
    <button class="connect-btn" id="connectBtn" onclick="connectApp()">🚀 시작하기</button>
    <button class="muted-btn" id="cancelEditBtn" onclick="cancelConfigEdit()" style="width:100%;margin-top:10px;display:none;">취소</button>
  </div>

  <!-- 메인 콘텐츠 -->
  <div id="mainContent" style="display:none;">
    <div class="sec-title">👥 학생 선택</div>
    <div id="studentsGrid" class="students-grid"></div>
    <div id="errorBox" class="error-box" style="display:none;"></div>
  </div>

  <div id="loadingSection" style="display:none;" class="loading-wrap">
    <div class="spin"></div>
    <span>불러오는 중...</span>
  </div>
</div>

<button class="header-menu-btn header-icon-btn fullscreen-corner" id="fullscreenBtn" onclick="toggleFullscreen()" aria-label="전체화면">⤢</button>

<!-- 관리자 버튼 -->
<button class="admin-fab" onclick="goAdmin()" title="관리자">⚙️</button>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let db, missions = [], students = [], currentScores = {}, inspectionMap = {};
let isEditingConfig = false;
let isInspectorMode = false;
const INSPECTOR_PIN = '3393';
const pendingTiles = new Set();
let scoreUnsub = null;
let inspectionUnsub = null;
let autoSyncTimer = null;
let autoSyncFocusHandler = null;
let lastSyncSignature = '';

function setupAutoSync(cfg) {
  if (autoSyncTimer) {
    clearInterval(autoSyncTimer);
    autoSyncTimer = null;
  }
  if (!cfg || !cfg.sheetsId) return;

  // 미션 시트를 컨트롤 타워로 사용: 빠른 주기로 변경 반영
  autoSyncTimer = setInterval(() => {
    syncFromSheets(true).catch(console.warn);
  }, 10000);

  // 탭으로 다시 돌아오면 즉시 1회 반영
  if (autoSyncFocusHandler) {
    window.removeEventListener('focus', autoSyncFocusHandler);
  }
  autoSyncFocusHandler = () => {
    syncFromSheets(true).catch(console.warn);
  };
  window.addEventListener('focus', autoSyncFocusHandler);
}

function normalizeSheetsId(value) {
  const raw = (value || '').trim();
  if (!raw) return '';
  const match = raw.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return match ? match[1] : raw.replace(/[#?].*$/, '').trim();
}

function loadConfigFromUrl() {
  const p = new URLSearchParams(location.search);
  const cfg = {
    projectId: (p.get('pid') || '').trim(),
    apiKey: (p.get('akey') || '').trim(),
    sheetsId: normalizeSheetsId(p.get('sheets') || ''),
    scriptUrl: (p.get('script') || '').trim(),
  };
  if (!cfg.projectId || !cfg.apiKey) return {};
  return cfg;
}

function pickNameCell(row) {
  if (!Array.isArray(row)) return '';
  const cleaned = row.map(v => (v || '').toString().trim()).filter(Boolean);
  if (!cleaned.length) return '';
  if (cleaned.length >= 2 && /^\d+$/.test(cleaned[0])) return cleaned[1];
  return cleaned[0];
}

// ── Google Sheets CSV 파싱 ───────────────────────────────────
async function fetchSheet(sheetsId, sheetName) {
  const text = await fetchSheetText(sheetsId, sheetName);
  return parseCSV(text);
}

async function fetchSheetText(sheetsId, sheetName) {
  const normalizedId = normalizeSheetsId(sheetsId);
  const url = `https://docs.google.com/spreadsheets/d/${normalizedId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`시트 로드 실패: ${sheetName}`);
  const text = await res.text();
  if (/<!doctype html|<html/i.test(text)) throw new Error(`시트 ID 또는 공유 설정을 확인하세요: ${sheetName}`);
  return text;
}

function parseCSVLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
    cur += ch;
  }
  cols.push(cur.trim());
  return cols;
}

async function fetchScoreMissionNames(sheetsId) {
  try {
    const text = await fetchSheetText(sheetsId, 'scores');
    const firstLine = (text || '').split('\n')[0] || '';
    const headers = parseCSVLine(firstLine).map(v => (v || '').toString().trim());
    const reserved = new Set(['학생이름', '합계', '마지막 업데이트']);
    return headers.filter(h => h && !reserved.has(h));
  } catch {
    return [];
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const rows = lines.map(line => {
    const cols = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; continue; }
      if (line[i] === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += line[i];
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r => r.some(cell => (cell || '').trim()));

  if (!rows.length) return [];

  const firstRow = rows[0].map(cell => (cell || '').toString().trim().toLowerCase());
  const hasHeader = firstRow.some(cell =>
    cell.includes('학생') || cell.includes('이름') || cell.includes('미션') ||
    cell.includes('과제') || cell.includes('lock') || cell.includes('description')
  );

  return hasHeader ? rows.slice(1) : rows;
}

function migrateScoresByMissionName(oldMissions, newMissions, allScores) {
  const oldIdToName = {};
  (oldMissions || []).forEach(m => {
    if (!m || !m.id) return;
    oldIdToName[m.id] = (m.name || '').toString().trim();
  });

  const newNameToId = {};
  (newMissions || []).forEach(m => {
    const key = (m.name || '').toString().trim();
    if (!key || newNameToId[key]) return;
    newNameToId[key] = m.id;
  });

  const migrated = {};

  Object.entries(allScores || {}).forEach(([sid, scoreObj]) => {
    const src = scoreObj || {};
    const dst = {};

    Object.entries(src).forEach(([mid, value]) => {
      const n = Number(value) || 0;
      if (!n) return;

      let targetId = null;
      const oldName = oldIdToName[mid];
      if (oldName && newNameToId[oldName]) {
        targetId = newNameToId[oldName];
      }

      if (targetId) dst[targetId] = Math.max(Number(dst[targetId]) || 0, n);
    });

    migrated[sid] = dst;
  });

  return migrated;
}

function migrateInspectionByMissionName(oldMissions, newMissions, allInspection) {
  const oldIdToName = {};
  (oldMissions || []).forEach(m => {
    if (!m || !m.id) return;
    oldIdToName[m.id] = (m.name || '').toString().trim();
  });

  const newNameToId = {};
  (newMissions || []).forEach(m => {
    const key = (m.name || '').toString().trim();
    if (!key || newNameToId[key]) return;
    newNameToId[key] = m.id;
  });

  const migrated = {};
  Object.entries(allInspection || {}).forEach(([sid, row]) => {
    const src = row || {};
    const dst = {};
    Object.entries(src).forEach(([mid, value]) => {
      if (!value) return;
      const oldName = oldIdToName[mid];
      const newId = oldName ? newNameToId[oldName] : null;
      if (newId) dst[newId] = true;
    });
    migrated[sid] = dst;
  });

  return migrated;
}

function missionNameList(missions) {
  return (missions || [])
    .map(function(m) { return (m && m.name ? m.name : '').toString().trim(); })
    .filter(Boolean);
}

function isBooleanLikeMissionName(name) {
  const n = (name || '').toString().trim().toLowerCase();
  return n === 'true' || n === 'false';
}

// ── Sheets → Firestore 동기화 ────────────────────────────────
window.syncFromSheets = async function(silent = false) {
  const cfg = window._cfg || loadConfig();
  if (!cfg.sheetsId) { if (!silent) alert('Sheets ID가 설정되지 않았습니다.'); return; }

  if (!silent) {
    const btn = document.querySelector('.sync-btn');
    if (btn) { btn.textContent = '⏳ 동기화 중...'; btn.disabled = true; }
  }

  try {
    const [mRows, sRows] = await Promise.all([
      fetchSheet(cfg.sheetsId, 'missions'),
      fetchSheet(cfg.sheetsId, 'students')
    ]);

    const usesCheckboxColumn = (mRows || []).some(r => {
      const c0 = (r[0] || '').toString().trim().toLowerCase();
      const c1 = (r[1] || '').toString().trim();
      return c1 || c0 === 'true' || c0 === 'false' || c0 === '1' || c0 === '0' || c0 === '완료' || c0 === 'x';
    });

    const missionList = [];
    mRows.forEach(r => {
      const col0 = (r[0] || '').toString().trim();
      const col1 = (r[1] || '').toString().trim();
      const name = usesCheckboxColumn ? col1 : col0;
      if (!name) return;
      if (isBooleanLikeMissionName(name)) return;

      const completed = usesCheckboxColumn && (col0.toLowerCase() === 'true' || col0 === '1' || col0 === '완료' || col0.toLowerCase() === 'x');
      const lockRaw = usesCheckboxColumn ? r[2] : r[1];
      const descRaw = usesCheckboxColumn ? r[3] : r[2];

      missionList.push({
        id: `m${missionList.length + 1}`,
        name,
        completed,
        lockTime: lockRaw ? parseKorDate(lockRaw) : null,
        description: descRaw || '',
        order: missionList.length + 1
      });
    });

    const missionMetaByName = new Map(missionList.map(m => [m.name, m]));
    const seenMissionNames = new Set();
    const sourceNames = missionList.map(m => (m.name || '').toString().trim()).filter(Boolean);

    seenMissionNames.clear();
    const normalizedMissionList = [];
    sourceNames.forEach((name) => {
      const n = (name || '').toString().trim();
      if (!n || seenMissionNames.has(n)) return;
      seenMissionNames.add(n);
      const prev = missionMetaByName.get(n);
      normalizedMissionList.push({
        id: `m${normalizedMissionList.length + 1}`,
        name: n,
        completed: prev ? !!prev.completed : false,
        lockTime: prev ? prev.lockTime : null,
        description: prev ? (prev.description || '') : '',
        order: normalizedMissionList.length + 1
      });
    });

    // missions 시트가 비어 있으면 트래커에서도 미션이 없도록 그대로 반영

    const studentNames = sRows.map(pickNameCell).filter(Boolean);
    const studentList = studentNames.map((name, i) => ({
      id: `s${i+1}`, name, order: i+1
    }));

    const nextSignature = JSON.stringify({
      m: normalizedMissionList.map(m => ({ name: m.name, completed: !!m.completed, lockTime: m.lockTime || null, description: m.description || '' })),
      s: studentList.map(s => s.name)
    });
    const unchanged = nextSignature === lastSyncSignature;
    if (silent && unchanged) {
      return;
    }

    const [oldMissionSnap, scoreSnap, inspectionSnap] = await Promise.all([
      getDoc(doc(db, 'config', 'missions')),
      getDoc(doc(db, 'scores', 'current')),
      getDoc(doc(db, 'scores', 'inspection'))
    ]);
    const oldMissions = oldMissionSnap.exists() ? (oldMissionSnap.data().list || []) : [];
    const oldScores = scoreSnap.exists() ? scoreSnap.data() : {};
    const oldInspection = inspectionSnap.exists() ? (inspectionSnap.data() || {}) : {};

    const beforeNames = missionNameList(oldMissions);
    const afterNames = missionNameList(normalizedMissionList);
    const missionChanged = JSON.stringify(beforeNames) !== JSON.stringify(afterNames);
    const hasScoreData = Object.keys(oldScores || {}).length > 0;

    if (missionChanged && hasScoreData) {
      const archiveId = 'sync_' + Date.now();
      await setDoc(doc(db, 'backups', archiveId), {
        type: 'mission_sync_archive',
        createdAt: new Date().toISOString(),
        fromMissions: beforeNames,
        toMissions: afterNames,
        missions: oldMissions,
        scores: oldScores
      });
    }

    const migratedScores = migrateScoresByMissionName(oldMissions, normalizedMissionList, oldScores);
    const migratedInspection = migrateInspectionByMissionName(oldMissions, normalizedMissionList, oldInspection);

    await Promise.all([
      setDoc(doc(db, 'config', 'missions'), { list: normalizedMissionList, updatedAt: new Date().toISOString() }),
      setDoc(doc(db, 'config', 'students'), { list: studentList, updatedAt: new Date().toISOString() }),
      setDoc(doc(db, 'scores', 'current'), migratedScores),
      setDoc(doc(db, 'scores', 'inspection'), migratedInspection)
    ]);

    lastSyncSignature = nextSignature;

    await loadStudents();
    if (!silent) showToast('✅ 동기화 완료!');

  } catch (err) {
    if (!silent) showError('동기화 실패: ' + err.message);
    else console.warn(err);
  } finally {
    if (!silent) {
      const btn = document.querySelector('.sync-btn');
      if (btn) { btn.textContent = '🔄 시트 동기화'; btn.disabled = false; }
    }
  }
};

function parseKorDate(str) {
  if (!str) return null;
  const d = new Date(str.replace(' ', 'T'));
  return isNaN(d) ? null : d.toISOString();
}

// ── 학생 로드 + 실시간 점수 구독 ────────────────────────────
async function loadStudents() {
  const [mSnap, sSnap] = await Promise.all([
    getDoc(doc(db, 'config', 'missions')),
    getDoc(doc(db, 'config', 'students'))
  ]);

  missions = mSnap.exists() ? (mSnap.data().list || []) : [];
  students = sSnap.exists() ? (sSnap.data().list || []) : [];
  document.getElementById('studentCount').textContent = `${students.length}명`;

  // 실시간 점수 구독
  if (scoreUnsub) scoreUnsub();
  scoreUnsub = onSnapshot(doc(db, 'scores', 'current'), snap => {
    currentScores = snap.exists() ? snap.data() : {};
    renderStudents(currentScores);
  });

  if (inspectionUnsub) inspectionUnsub();
  inspectionUnsub = onSnapshot(doc(db, 'scores', 'inspection'), snap => {
    inspectionMap = snap.exists() ? (snap.data() || {}) : {};
    renderStudents(currentScores);
  });
}

function getMissionBoardClass(count) {
  if (count <= 1) return 'board-1';
  if (count === 2) return 'board-2';
  if (count === 3) return 'board-3';
  if (count === 4) return 'board-4';
  return 'board-many';
}

function formatMissionName(name, layoutClass) {
  const text = (name || '').trim();
  if (!text) return '';
  const plain = text.replace(/\s+/g, '');
  if ((layoutClass === 'board-1' || layoutClass === 'board-4') && plain.length === 4 && plain === text) {
    return { html: `${plain.slice(0, 2)}<br>${plain.slice(2)}`, breakClass: 'break-2x2' };
  }
  return { html: text, breakClass: '' };
}

async function writeToSheets(allScores, inspection) {

  await fetch(cfg.scriptUrl, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ type: 'scores', data: allScores, inspection: inspection || {} })
  });
}

async function toggleInspection(studentId, missionId, done) {
  if (!done) {
    showToast('제출(초록)된 과제만 검사완료 처리할 수 있어요');
    return;
  }

  const student = students.find(s => s.id === studentId);
  const mission = missions.find(m => m.id === missionId);
  if (!student || !mission) return;

  const next = Object.assign({}, inspectionMap);
  const row = Object.assign({}, next[studentId] || {});
  const was = !!row[missionId];
  row[missionId] = !was;
  next[studentId] = row;

  try {
    await setDoc(doc(db, 'scores', 'inspection'), next);
    inspectionMap = next;
    renderStudents(currentScores);
    writeToSheets(currentScores, inspectionMap).catch(console.warn);
    showToast(`${student.name} · ${mission.name} 검사 ${was ? '해제' : '완료'}`);
  } catch (err) {
    showError('검사 저장 실패: ' + err.message);
  }
}

async function toggleMission(studentId, missionId) {
  const key = `${studentId}:${missionId}`;
  if (pendingTiles.has(key)) return;

  const mission = missions.find(m => m.id === missionId);
  const student = students.find(s => s.id === studentId);
  if (!mission || !student) return;

  const now = new Date();
  if (mission.lockTime && new Date(mission.lockTime) < now) {
    showToast(`⏰ ${mission.name} 과제는 마감됨`);
    return;
  }

  pendingTiles.add(key);
  renderStudents(currentScores);

  try {
    const ref = doc(db, 'scores', 'current');
    const snap = await getDoc(ref);
    const all = snap.exists() ? snap.data() : {};
    if (!all[studentId]) all[studentId] = {};

    const wasDone = Number(all[studentId][missionId]) > 0;
    all[studentId][missionId] = wasDone ? 0 : 1;

    await setDoc(ref, all);
    currentScores = all;
    renderStudents(currentScores);
    writeToSheets(all, inspectionMap).catch(console.warn);
    showToast(`${student.name} · ${mission.name} ${wasDone ? '취소' : '제출 완료'}`);
  } catch (err) {
    showError('저장 실패: ' + err.message);
  } finally {
    pendingTiles.delete(key);
    renderStudents(currentScores);
  }
}

function renderStudents(scores) {
  const grid = document.getElementById('studentsGrid');
  const activeMissions = missions.filter(m => !m.completed && !isBooleanLikeMissionName(m.name));
  if (!students.length) {
    grid.innerHTML = '<p style="grid-column:span 2;text-align:center;color:var(--text-dim);padding:30px;">학생 데이터 없음<br><small>Google Sheets를 동기화하세요</small></p>';
    return;
  }
  grid.innerHTML = '';
  students.forEach(s => {
    const sc = scores[s.id] || {};
    const boardClass = getMissionBoardClass(activeMissions.length);

    const card = document.createElement('div');
    card.className = `student-card${isInspectorMode ? ' inspector-mode' : ''}`;

    const top = document.createElement('div');
    top.className = 'student-top';

    const nameEl = document.createElement('div');
    nameEl.className = 's-name';
    nameEl.textContent = s.name;

    top.appendChild(nameEl);

    const board = document.createElement('div');
    board.className = `mission-board ${boardClass}`;
    if (boardClass === 'board-2' || boardClass === 'board-3') {
      board.style.setProperty('--board-columns', String(activeMissions.length));
    }

    if (!activeMissions.length) {
      const emptyTile = document.createElement('div');
      emptyTile.className = 'mission-tile locked';
      emptyTile.innerHTML = '<div class="mission-tile-label">과제 없음</div>';
      board.appendChild(emptyTile);
    } else {
      activeMissions.forEach((m, idx) => {
        const done = Number(sc[m.id]) > 0;
        const inspected = !!(inspectionMap[s.id] && inspectionMap[s.id][m.id]);
        const locked = m.lockTime && new Date(m.lockTime) < new Date();
        const pendingKey = `${s.id}:${m.id}`;
        const shapeClass = boardClass === 'board-1' || boardClass === 'board-4'
          ? 'square'
          : (boardClass === 'board-3' ? (idx < 2 ? 'square' : 'rect') : 'rect');
        const tile = document.createElement('div');
        tile.className = `mission-tile ${done ? (inspected ? 'inspected' : 'done') : 'pending'}${locked ? ' locked' : ''}${pendingTiles.has(pendingKey) ? ' saving' : ''} ${shapeClass}`;

        const label = document.createElement('div');
        const formatted = formatMissionName(m.name, boardClass);
        label.className = `mission-tile-label${formatted.breakClass ? ' ' + formatted.breakClass : ''}`;
        label.innerHTML = formatted.html;
        tile.appendChild(label);

        if (isInspectorMode) {
          tile.addEventListener('click', (ev) => {
            ev.stopPropagation();
            toggleInspection(s.id, m.id, done);
          });
        } else if (!locked) {
          tile.addEventListener('click', () => toggleMission(s.id, m.id));
        }

        board.appendChild(tile);
      });
    }

    card.appendChild(top);
    card.appendChild(board);

    grid.appendChild(card);
  });

  // 태블릿 가로 모드: 학생 수에 맞게 열 수 자동 조정
  const count = students.length;
  let landscapeCols;
  if (count <= 3) landscapeCols = count || 1;
  else if (count <= 6) landscapeCols = 3;
  else landscapeCols = 4;
  grid.style.setProperty('--student-cols', landscapeCols);
}

window.goAdmin = function() {
  const cfg = loadConfig();
  const p = new URLSearchParams({ pid: cfg.projectId || '', akey: cfg.apiKey || '' });
  location.href = `admin.html?${p}`;
};

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = msg; b.style.display = 'block';
  setTimeout(()=> b.style.display='none', 5000);
}

let _toastT;
window.showToast = function(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:#fff;padding:10px 20px;border-radius:100px;font-size:14px;font-weight:700;z-index:999;transition:opacity 0.3s;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = '1';
  clearTimeout(_toastT);
  _toastT = setTimeout(()=>{ t.style.opacity='0'; }, 2500);
};

// 자동 로드
(async function boot() {
  const urlCfg = loadConfigFromUrl();
  const saved = loadConfig();
  const hosted = await loadHostedConfig();
  const bootCfg = (urlCfg.projectId && urlCfg.apiKey)
    ? urlCfg
    : ((hosted.projectId && hosted.apiKey) ? hosted : saved);

  if (bootCfg.projectId && bootCfg.apiKey) {
    document.getElementById('projectId').value = bootCfg.projectId;
    document.getElementById('apiKey').value = bootCfg.apiKey;
    if (bootCfg.sheetsId) document.getElementById('sheetsId').value = bootCfg.sheetsId;
    if (bootCfg.scriptUrl) document.getElementById('scriptUrl').value = bootCfg.scriptUrl;
    saveConfig(bootCfg);
    initApp(bootCfg);
  } else {
    document.getElementById('setupSection').style.display = 'block';
  }
})();
</script>
