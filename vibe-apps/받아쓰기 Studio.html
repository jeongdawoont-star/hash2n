<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>받아쓰기 · Google TTS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f0f13; --surface:#18181f; --surface2:#22222c; --border:#2e2e3d;
    --text:#e8e6f0; --muted:#6b6880; --accent:#4f8ef7; --accent-glow:rgba(79,142,247,0.15);
    --green:#3ecf8e; --green-glow:rgba(62,207,142,0.12); --red:#f75f5f; --yellow:#f7c94f;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;padding:40px 20px 80px;}
  body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(79,142,247,0.07) 0%,transparent 70%);pointer-events:none;}
  .container{max-width:700px;margin:0 auto;}
  .header{text-align:center;margin-bottom:48px;}
  .header h1{font-family:'DM Serif Display',serif;font-size:2.8rem;font-weight:400;letter-spacing:-0.02em;line-height:1;margin-bottom:10px;background:linear-gradient(135deg,#e8e6f0 0%,#4f8ef7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .header p{font-size:0.8rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;}
  .card-title{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;font-weight:500;}
  .api-key-wrap{display:flex;gap:10px;}
  .api-key-wrap input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;outline:none;transition:border-color 0.2s;}
  .api-key-wrap input:focus{border-color:var(--accent);}
  .api-key-wrap input::placeholder{color:var(--muted);}
  .key-status{font-size:0.72rem;margin-top:8px;padding:6px 10px;border-radius:6px;display:none;}
  .key-status.ok{display:block;background:var(--green-glow);color:var(--green);}
  .key-status.err{display:block;background:rgba(247,95,95,0.1);color:var(--red);}
  .guide{font-size:0.75rem;color:var(--muted);line-height:1.6;margin-top:8px;}
  .guide a{color:var(--accent);text-decoration:none;}
  .guide a:hover{text-decoration:underline;}
  .voice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .play-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .field label{display:block;font-size:0.68rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px;}
  .field select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.82rem;padding:8px 12px;outline:none;cursor:pointer;appearance:none;}
  .field select option{background:var(--surface2);}
  .range-row{display:flex;align-items:center;gap:8px;}
  .range-row input[type=range]{flex:1;height:4px;accent-color:var(--accent);}
  .range-val{font-size:0.75rem;color:var(--accent);min-width:36px;text-align:right;}
  .upload-zone{border:1.5px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px;}
  .upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-glow);}
  .upload-zone input{display:none;}
  .upload-zone p{font-size:0.8rem;color:var(--muted);line-height:1.6;}
  .upload-zone strong{color:var(--accent);}
  textarea{width:100%;min-height:120px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:0.88rem;line-height:1.8;outline:none;resize:vertical;transition:border-color 0.2s;}
  textarea:focus{border-color:var(--accent);}
  textarea::placeholder{color:var(--muted);}
  .btn-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
  .btn{padding:11px 22px;border:none;border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:0.83rem;font-weight:500;cursor:pointer;transition:all 0.15s;letter-spacing:0.02em;}
  .btn-primary{background:var(--accent);color:white;box-shadow:0 0 20px rgba(79,142,247,0.3);}
  .btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);}
  .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
  .btn-outline:hover{border-color:var(--text);}
  .btn-green{background:transparent;color:var(--green);border:1px solid rgba(62,207,142,0.3);}
  .btn-green:hover{background:var(--green-glow);}
  .btn-purple{background:transparent;color:#b98ff7;border:1px solid rgba(185,143,247,0.3);}
  .btn-purple:hover{background:rgba(185,143,247,0.08);}
  .btn-red{background:transparent;color:var(--red);border:1px solid rgba(247,95,95,0.2);}
  .btn-red:hover{background:rgba(247,95,95,0.08);}
  .btn-yellow{background:transparent;color:var(--yellow);border:1px solid rgba(247,199,79,0.3);}
  .btn-yellow:hover{background:rgba(247,199,79,0.06);}
  .btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;filter:none;}
  .progress-wrap{margin-bottom:16px;display:none;}
  .progress-wrap.show{display:block;}
  .progress-info{display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted);margin-bottom:8px;}
  .progress-info span:last-child{color:var(--accent);}
  .progress-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;transition:width 0.4s ease;}
  .status-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:0.75rem;color:var(--muted);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:background 0.3s;flex-shrink:0;}
  .dot.playing{background:var(--green);animation:blink 1s infinite;}
  .dot.loading{background:var(--yellow);animation:blink 0.5s infinite;}
  .dot.paused{background:var(--yellow);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  .sent-list{display:flex;flex-direction:column;gap:4px;}
  .sent-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid transparent;transition:all 0.2s;}
  .sent-item.active{background:var(--accent-glow);border-color:rgba(79,142,247,0.25);}
  .sent-item.done{opacity:0.3;}
  .sent-num{font-family:'DM Serif Display',serif;font-size:0.8rem;color:var(--muted);min-width:22px;padding-top:1px;}
  .sent-text{font-size:0.88rem;flex:1;line-height:1.6;}
  .sent-badge{font-size:0.65rem;padding:2px 7px;border-radius:20px;white-space:nowrap;}
  .sent-item.active .sent-badge{background:rgba(79,142,247,0.2);color:var(--accent);}
  .dl-list{display:flex;flex-direction:column;gap:6px;margin-top:4px;}
  .dl-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:8px;font-size:0.8rem;}
  .dl-item span{color:var(--muted);}
  .dl-item a{color:var(--green);text-decoration:none;font-size:0.75rem;padding:4px 10px;border:1px solid rgba(62,207,142,0.3);border-radius:6px;transition:all 0.15s;}
  .dl-item a:hover{background:var(--green-glow);}
  .info-box{font-size:0.75rem;padding:10px 14px;border-radius:8px;margin-top:10px;line-height:1.6;display:none;}
  .info-box.show{display:block;}
  .info-box.processing{background:rgba(247,199,79,0.08);color:var(--yellow);}
  .info-box.success{background:var(--green-glow);color:var(--green);}
  .info-box.error{background:rgba(247,95,95,0.08);color:var(--red);}
  /* 속도 단계 표시 */
  .speed-stages{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .speed-tag{font-size:0.7rem;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
  .speed-tag.active-stage{background:rgba(79,142,247,0.15);color:var(--accent);border-color:rgba(79,142,247,0.3);}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>받아쓰기 Studio</h1>
    <p>Google Cloud TTS · Neural2 / Chirp3 HD · WAV 통합 저장</p>
  </div>

  <!-- API Key - 자동저장 -->
  <div class="card">
    <div class="card-title">🔑 Google Cloud TTS API Key</div>
    <div class="api-key-wrap">
      <input type="password" id="apiKey" placeholder="AIza...로 시작하는 API 키 입력">
      <button class="btn btn-outline" onclick="testApiKey()">확인</button>
    </div>
    <div class="key-status" id="keyStatus"></div>
    <div class="guide">
      API 키는 브라우저에 자동 저장됩니다. 한 번만 입력하면 됩니다. ·
      <a href="https://console.cloud.google.com/apis/library/texttospeech.googleapis.com" target="_blank">API 키 발급</a>
    </div>
  </div>

  <!-- 음성 설정 -->
  <div class="card">
    <div class="card-title">🎙 음성 설정</div>
    <div class="voice-grid">
      <div class="field">
        <label>음성 모델</label>
        <select id="voiceName">
          <optgroup label="✨ Chirp3 HD (최고 품질)">
            <option value="ko-KR-Chirp3-HD-Aoede">Chirp3 HD - Aoede (여성)</option>
            <option value="ko-KR-Chirp3-HD-Charon">Chirp3 HD - Charon (남성)</option>
            <option value="ko-KR-Chirp3-HD-Fenrir">Chirp3 HD - Fenrir (남성, 굵음)</option>
            <option value="ko-KR-Chirp3-HD-Kore">Chirp3 HD - Kore (여성, 차분)</option>
            <option value="ko-KR-Chirp3-HD-Puck">Chirp3 HD - Puck (남성, 밝음)</option>
          </optgroup>
          <optgroup label="Neural2">
            <option value="ko-KR-Neural2-A">Neural2-A (여성)</option>
            <option value="ko-KR-Neural2-B">Neural2-B (여성, 밝음)</option>
            <option value="ko-KR-Neural2-C" selected>Neural2-C (남성, 차분)</option>
            <option value="ko-KR-Neural2-D">Neural2-D (여성, 또렷함)</option>
          </optgroup>
          <optgroup label="WaveNet">
            <option value="ko-KR-Wavenet-A">WaveNet-A (여성)</option>
            <option value="ko-KR-Wavenet-B">WaveNet-B (여성)</option>
            <option value="ko-KR-Wavenet-C">WaveNet-C (남성)</option>
            <option value="ko-KR-Wavenet-D">WaveNet-D (여성)</option>
          </optgroup>
        </select>
      </div>
      <div class="field">
        <label>반복 횟수</label>
        <select id="repeatCount">
          <option value="1">1회</option>
          <option value="2">2회</option>
          <option value="3" selected>3회</option>
        </select>
      </div>
    </div>
    <div class="play-grid">
      <div class="field">
        <label>읽기 속도</label>
        <select id="speedMode" style="margin-bottom:8px;">
          <option value="fixed" selected>고정 (모든 회차 동일)</option>
          <option value="auto">회차별 자동 증가</option>
        </select>
        <div class="range-row" style="margin-bottom:8px;">
          <input type="range" id="baseSpeed" min="0.50" max="1.30" step="0.05" value="0.90">
          <span class="range-val" id="baseSpeedVal">0.90×</span>
        </div>
        <div class="speed-stages" id="speedStages">
          <span class="speed-tag" id="stg0">1회: 0.90×</span>
          <span class="speed-tag" id="stg1">2회: 0.90×</span>
          <span class="speed-tag" id="stg2">3회: 0.90×</span>
        </div>
      </div>
      <div class="field">
        <label>문장 간격</label>
        <div class="range-row">
          <input type="range" id="sentPause" min="1" max="10" step="0.5" value="7">
          <span class="range-val" id="sentPauseVal">7.0s</span>
        </div>
      </div>
      <div class="field">
        <label>반복 간격</label>
        <div class="range-row">
          <input type="range" id="repPause" min="0.5" max="5" step="0.5" value="3">
          <span class="range-val" id="repPauseVal">3.0s</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 문장 입력 -->
  <div class="card">
    <div class="card-title">📝 문장 입력</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".txt,.csv">
      <p><strong>파일 드래그 or 클릭</strong> · .txt / .csv</p>
    </div>
    <textarea id="textInput" placeholder="문장을 줄바꿈으로 구분하여 입력하세요&#10;예) 나는 학교에 갑니다.&#10;오늘 날씨가 맑습니다."></textarea>
    <div style="margin-top:8px;display:flex;justify-content:flex-end;">
      <button class="btn btn-yellow" style="padding:6px 14px;font-size:0.75rem;" onclick="resetSentences()">↺ 문장 초기화</button>
    </div>
  </div>

  <!-- 재생 -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btnPlay" onclick="startPlayback()">▶ 재생 시작</button>
    <button class="btn btn-outline" id="btnPause" onclick="togglePause()" disabled>⏸ 일시정지</button>
    <button class="btn btn-red" id="btnStop" onclick="stopPlayback()" disabled>■ 정지</button>
  </div>

  <!-- MP3 -->
  <div class="btn-row">
    <button class="btn btn-purple" id="btnBuildOnly" onclick="buildOnly()">🎵 MP3만 만들기</button>
    <button class="btn btn-green" id="btnDownloadAll" onclick="downloadMerged()" disabled>⬇ 전체 WAV 저장 (1파일)</button>
  </div>

  <div class="status-row">
    <div class="dot" id="dot"></div>
    <span id="statusText">대기 중</span>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-info">
      <span id="progressLabel">준비 중...</span>
      <span id="progressCount">0 / 0</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0"></div></div>
  </div>
  <div class="info-box" id="infoBox"></div>

  <div class="card" id="sentCard" style="display:none">
    <div class="card-title">문장 목록</div>
    <div class="sent-list" id="sentList"></div>
  </div>

  <div class="card" id="dlCard" style="display:none">
    <div class="card-title">💾 문장별 MP3 (개별 저장)</div>
    <div class="dl-list" id="dlList"></div>
  </div>
</div>

<script>
  // 자동 증가 모드에서 마지막 회차가 기본 속도보다 얼마나 빨라질지
  const AUTO_SPEED_DELTA = 0.30;

  let sentences = [];
  let audioCache = {}; // "idx_rate" -> base64 mp3  (속도별로 따로 캐싱)
  let currentIdx = 0, currentRep = 0;
  let isPaused = false, stopReq = false;
  let currentAudio = null;

  // ── localStorage: API 키 & 설정 자동 저장 ──
  function saveSettings() {
    const key = document.getElementById('apiKey').value;
    if (key) localStorage.setItem('tts_apikey', key);
    localStorage.setItem('tts_voice', document.getElementById('voiceName').value);
    localStorage.setItem('tts_repeat', document.getElementById('repeatCount').value);
    localStorage.setItem('tts_speedmode', document.getElementById('speedMode').value);
    localStorage.setItem('tts_basespeed', document.getElementById('baseSpeed').value);
    localStorage.setItem('tts_sentpause', document.getElementById('sentPause').value);
    localStorage.setItem('tts_reppause', document.getElementById('repPause').value);
    localStorage.setItem('tts_text', document.getElementById('textInput').value);
  }

  function loadSettings() {
    const key = localStorage.getItem('tts_apikey');
    if (key) document.getElementById('apiKey').value = key;

    const voice = localStorage.getItem('tts_voice');
    if (voice) document.getElementById('voiceName').value = voice;

    const repeat = localStorage.getItem('tts_repeat');
    if (repeat) document.getElementById('repeatCount').value = repeat;

    const speedMode = localStorage.getItem('tts_speedmode');
    if (speedMode) document.getElementById('speedMode').value = speedMode;

    const baseSpeed = localStorage.getItem('tts_basespeed');
    if (baseSpeed) {
      document.getElementById('baseSpeed').value = baseSpeed;
      document.getElementById('baseSpeedVal').textContent = parseFloat(baseSpeed).toFixed(2) + '×';
    }

    const sent = localStorage.getItem('tts_sentpause');
    if (sent) { document.getElementById('sentPause').value = sent; document.getElementById('sentPauseVal').textContent = parseFloat(sent).toFixed(1)+'s'; }

    const rep = localStorage.getItem('tts_reppause');
    if (rep) { document.getElementById('repPause').value = rep; document.getElementById('repPauseVal').textContent = parseFloat(rep).toFixed(1)+'s'; }

    const text = localStorage.getItem('tts_text');
    if (text) document.getElementById('textInput').value = text;
  }

  // 설정 변경시 자동 저장
  ['voiceName','repeatCount','speedMode','baseSpeed','sentPause','repPause'].forEach(id => {
    document.getElementById(id).addEventListener('change', saveSettings);
    document.getElementById(id).addEventListener('input', saveSettings);
  });
  document.getElementById('textInput').addEventListener('input', saveSettings);
  document.getElementById('apiKey').addEventListener('input', saveSettings);

  // Sliders
  document.getElementById('sentPause').addEventListener('input', function(){ document.getElementById('sentPauseVal').textContent = parseFloat(this.value).toFixed(1)+'s'; });
  document.getElementById('repPause').addEventListener('input', function(){ document.getElementById('repPauseVal').textContent = parseFloat(this.value).toFixed(1)+'s'; });
  document.getElementById('baseSpeed').addEventListener('input', function(){
    document.getElementById('baseSpeedVal').textContent = parseFloat(this.value).toFixed(2) + '×';
    updateSpeedTags(currentRep);
  });

  function getRateForRep(repIndex, repeats) {
    const baseSpeed = parseFloat(document.getElementById('baseSpeed').value);
    const speedMode = document.getElementById('speedMode').value;

    if (speedMode === 'fixed' || repeats <= 1) {
      return baseSpeed;
    }

    const maxSpeed = Math.min(baseSpeed + AUTO_SPEED_DELTA, 2.0);
    const step = (maxSpeed - baseSpeed) / (repeats - 1);
    return baseSpeed + (step * repIndex);
  }

  // 속도 단계 표시 업데이트
  function updateSpeedTags(activeRep) {
    const repeats = parseInt(document.getElementById('repeatCount').value);
    const container = document.getElementById('speedStages');
    container.innerHTML = '';
    for (let r=0; r<repeats; r++) {
      const rate = getRateForRep(r, repeats);
      const tag = document.createElement('span');
      tag.className = 'speed-tag' + (r === activeRep ? ' active-stage' : '');
      tag.textContent = `${r+1}회: ${rate.toFixed(2)}×`;
      container.appendChild(tag);
    }
  }

  // repeatCount 변경시 속도 태그 갱신
  document.getElementById('repeatCount').addEventListener('change', () => updateSpeedTags(-1));
  document.getElementById('speedMode').addEventListener('change', () => updateSpeedTags(-1));

  // 문장 초기화 (캐시 포함)
  function resetSentences() {
    if (!confirm('문장과 캐시를 초기화할까요?')) return;
    document.getElementById('textInput').value = '';
    document.getElementById('dlList').innerHTML = '';
    document.getElementById('dlCard').style.display = 'none';
    document.getElementById('sentCard').style.display = 'none';
    document.getElementById('infoBox').className = 'info-box';
    document.getElementById('progressWrap').classList.remove('show');
    document.getElementById('btnDownloadAll').disabled = true;
    audioCache = {};
    sentences = [];
    localStorage.removeItem('tts_text');
    setStatus('', '초기화 완료');
  }

  // File upload
  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

  function handleFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      let text = e.target.result;
      if (file.name.endsWith('.csv')) text = text.split('\n').map(l=>l.split(',')[0].replace(/^"|"$/g,'').trim()).filter(Boolean).join('\n');
      // 새 파일 로드시 캐시 초기화
      audioCache = {};
      document.getElementById('dlList').innerHTML = '';
      document.getElementById('dlCard').style.display = 'none';
      document.getElementById('btnDownloadAll').disabled = true;
      document.getElementById('textInput').value = text;
      saveSettings();
      setStatus('', `파일 로드 완료 · ${text.split('\n').filter(s=>s.trim()).length}개 문장`);
    };
    reader.readAsText(file, 'UTF-8');
  }

  async function testApiKey() {
    const key = document.getElementById('apiKey').value.trim();
    const el = document.getElementById('keyStatus');
    if (!key) { el.className='key-status err'; el.textContent='API 키를 입력해주세요.'; return; }
    el.style.display='block'; el.className='key-status'; el.textContent='확인 중...';
    try {
      await callTTS('안녕', key, document.getElementById('voiceName').value, 1.0);
      el.className='key-status ok'; el.textContent='✓ API 키 유효 · 저장됨';
      saveSettings();
    } catch(e) {
      el.className='key-status err'; el.textContent='✗ '+(e.message||'API 키 오류');
    }
  }

  async function callTTS(text, apiKey, voice, rate) {
    const isChirp = voice.includes('Chirp3');
    const endpoint = isChirp
      ? `https://texttospeech.googleapis.com/v1beta1/text:synthesize?key=${apiKey}`
      : `https://texttospeech.googleapis.com/v1/text:synthesize?key=${apiKey}`;
    const res = await fetch(endpoint, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        input:{text},
        voice:{languageCode:'ko-KR', name:voice},
        audioConfig:{audioEncoding:'MP3', speakingRate:rate}
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    return data.audioContent;
  }

  function b64ToArrayBuffer(b64) {
    const bin = atob(b64); const arr = new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    return arr.buffer;
  }
  function b64ToBlob(b64) { return new Blob([b64ToArrayBuffer(b64)], {type:'audio/mp3'}); }

  async function decodeAudio(b64) {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const buf = await ctx.decodeAudioData(b64ToArrayBuffer(b64));
    ctx.close(); return buf;
  }

  function makeSilence(sampleRate, channels, seconds) {
    const len = Math.ceil(sampleRate * seconds);
    const ctx = new OfflineAudioContext(channels, len, sampleRate);
    return ctx.createBuffer(channels, len, sampleRate);
  }

  function audioBuffersToWav(buffers) {
    if (!buffers.length) return null;
    const sampleRate = buffers[0].sampleRate;
    const channels = buffers[0].numberOfChannels;
    const totalSamples = buffers.reduce((s,b)=>s+b.length,0);
    const interleaved = new Float32Array(totalSamples * channels);
    let offset = 0;
    for (const buf of buffers) {
      for (let i=0;i<buf.length;i++)
        for (let ch=0;ch<channels;ch++)
          interleaved[offset++] = buf.getChannelData(ch)[i];
    }
    const pcm = new Int16Array(interleaved.length);
    for (let i=0;i<interleaved.length;i++) {
      const s = Math.max(-1,Math.min(1,interleaved[i]));
      pcm[i] = s<0 ? s*0x8000 : s*0x7FFF;
    }
    const dataLen = pcm.byteLength;
    const wavBuf = new ArrayBuffer(44+dataLen);
    const view = new DataView(wavBuf);
    function ws(o,s){for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));}
    ws(0,'RIFF'); view.setUint32(4,36+dataLen,true); ws(8,'WAVE'); ws(12,'fmt ');
    view.setUint32(16,16,true); view.setUint16(20,1,true); view.setUint16(22,channels,true);
    view.setUint32(24,sampleRate,true); view.setUint32(28,sampleRate*channels*2,true);
    view.setUint16(32,channels*2,true); view.setUint16(34,16,true); ws(36,'data');
    view.setUint32(40,dataLen,true); new Int16Array(wavBuf,44).set(pcm);
    return new Blob([wavBuf],{type:'audio/wav'});
  }

  // 캐시 키: 문장idx + 속도 (속도별로 별도 합성)
  function cacheKey(idx, rate) { return `${idx}_${rate}`; }

  async function buildMergedWav() {
    const repeats = parseInt(document.getElementById('repeatCount').value);
    const sentSec = parseFloat(document.getElementById('sentPause').value);
    const repSec = parseFloat(document.getElementById('repPause').value);
    const keys = Object.keys(audioCache);
    if (!keys.length) return null;

    // 합성된 문장 인덱스 목록 (중복 제거, 정렬)
    const idxSet = [...new Set(keys.map(k=>parseInt(k.split('_')[0])))].sort((a,b)=>a-b);

    showInfo('processing', `🔄 오디오 디코딩 중... (0/${idxSet.length * repeats})`);

    const decoded = {}; // cacheKey -> AudioBuffer
    let count = 0;
    for (const idx of idxSet) {
      for (let r=0; r<repeats; r++) {
        const rate = getRateForRep(r, repeats);
        const ck = cacheKey(idx, rate);
        if (audioCache[ck]) {
          decoded[ck] = await decodeAudio(audioCache[ck]);
          count++;
          showInfo('processing', `🔄 디코딩 중... (${count}/${idxSet.length * repeats})`);
        }
      }
    }

    const firstKey = Object.keys(decoded)[0];
    if (!firstKey) return null;
    const sampleRate = decoded[firstKey].sampleRate;
    const channels = decoded[firstKey].numberOfChannels;
    const silSent = makeSilence(sampleRate, channels, sentSec);
    const silRep = makeSilence(sampleRate, channels, repSec);

    const sequence = [];
    for (let k=0; k<idxSet.length; k++) {
      const idx = idxSet[k];
      for (let r=0; r<repeats; r++) {
        const rate = getRateForRep(r, repeats);
        const ck = cacheKey(idx, rate);
        if (decoded[ck]) {
          sequence.push(decoded[ck]);
          if (r < repeats-1) sequence.push(silRep);
        }
      }
      if (k < idxSet.length-1) sequence.push(silSent);
    }

    showInfo('processing', '🔄 WAV 파일 생성 중...');
    return audioBuffersToWav(sequence);
  }

  async function buildOnly() {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) { alert('API 키를 먼저 입력해주세요.'); return; }
    const text = document.getElementById('textInput').value;
    sentences = text.split('\n').map(s=>s.trim()).filter(Boolean);
    if (!sentences.length) { alert('문장을 입력해주세요.'); return; }

    // 새 문장 감지: 이전 캐시와 다르면 초기화
    const newHash = sentences.join('||');
    if (window._lastSentHash && window._lastSentHash !== newHash) {
      audioCache = {};
      document.getElementById('dlList').innerHTML = '';
      document.getElementById('dlCard').style.display = 'none';
    }
    window._lastSentHash = newHash;

    document.getElementById('btnBuildOnly').disabled = true;
    document.getElementById('btnDownloadAll').disabled = true;
    document.getElementById('progressWrap').classList.add('show');

    const voice = document.getElementById('voiceName').value;
    const repeats = parseInt(document.getElementById('repeatCount').value);
    const total = sentences.length;

    try {
      for (let i=0; i<total; i++) {
        for (let r=0; r<repeats; r++) {
          const rate = getRateForRep(r, repeats);
          const ck = cacheKey(i, rate);
          if (!audioCache[ck]) {
            setStatus('loading', `${i+1}/${total} 문장 · ${r+1}회차(${rate}×) 합성 중...`);
            document.getElementById('progressLabel').textContent = `${i+1}번 문장 ${r+1}회차 합성`;
            document.getElementById('progressCount').textContent = `${i*repeats+r+1} / ${total*repeats}`;
            document.getElementById('progressFill').style.width = ((i*repeats+r)/(total*repeats)*100)+'%';
            audioCache[ck] = await callTTS(sentences[i], key, voice, rate);
            // 1회차만 개별 MP3 다운로드 링크 표시
            if (r === 0) addDlItem(i, audioCache[ck]);
          }
        }
      }

      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressLabel').textContent = '합성 완료! WAV 생성 중...';
      setStatus('loading', 'WAV 파일 생성 중...');

      const wav = await buildMergedWav();
      if (wav) {
        const url = URL.createObjectURL(wav);
        const a = document.createElement('a'); a.href=url; a.download='dictation_all.wav'; a.click();
        setTimeout(()=>URL.revokeObjectURL(url),2000);
        const mb = (wav.size/1024/1024).toFixed(1);
        showInfo('success', `✓ dictation_all.wav 저장 완료 · ${total}문장 × ${repeats}회 · ${mb}MB`);
        setStatus('', '완료 ✓');
        document.getElementById('btnDownloadAll').disabled = false;
      }
    } catch(e) {
      showInfo('error', '✗ 오류: '+(e.message||'알 수 없는 오류'));
      setStatus('', '오류 발생');
    }
    document.getElementById('btnBuildOnly').disabled = false;
  }

  async function downloadMerged() {
    if (!Object.keys(audioCache).length) { alert('먼저 재생하거나 MP3 만들기를 실행해주세요.'); return; }
    document.getElementById('btnDownloadAll').disabled = true;
    try {
      const wav = await buildMergedWav();
      if (wav) {
        const url = URL.createObjectURL(wav); const a = document.createElement('a');
        a.href=url; a.download='dictation_all.wav'; a.click();
        setTimeout(()=>URL.revokeObjectURL(url),2000);
        showInfo('success', `✓ dictation_all.wav 저장 완료 · ${(wav.size/1024/1024).toFixed(1)}MB`);
      }
    } catch(e) { showInfo('error','✗ '+e.message); }
    document.getElementById('btnDownloadAll').disabled = false;
  }

  function showInfo(type, msg) {
    const el = document.getElementById('infoBox');
    el.className = 'info-box show '+type; el.textContent = msg;
  }
  function setStatus(state, text) {
    document.getElementById('dot').className='dot '+state;
    document.getElementById('statusText').textContent=text;
  }

  function renderList(activeIdx) {
    const sentCard=document.getElementById('sentCard');
    const list=document.getElementById('sentList');
    if(!sentences.length){sentCard.style.display='none';return;}
    sentCard.style.display='block';
    const repeats=parseInt(document.getElementById('repeatCount').value);
    list.innerHTML=sentences.map((s,i)=>{
      const cls=i===activeIdx?'active':i<activeIdx?'done':'';
      const currentRate = activeIdx===i ? getRateForRep(currentRep, repeats) : 0;
      const badge=i===activeIdx?`<span class="sent-badge">${currentRep+1}/${repeats}회 · ${currentRate.toFixed(2)}×</span>`:'';
      return `<div class="sent-item ${cls}" id="si-${i}"><span class="sent-num">${i+1}</span><span class="sent-text">${s}</span>${badge}</div>`;
    }).join('');
    if(activeIdx>=0){const el=document.getElementById(`si-${activeIdx}`);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});}
  }

  function addDlItem(idx, b64) {
    document.getElementById('dlCard').style.display='block';
    const blob=b64ToBlob(b64); const url=URL.createObjectURL(blob);
    const div=document.createElement('div'); div.className='dl-item';
    const label=sentences[idx].slice(0,28)+(sentences[idx].length>28?'…':'');
    div.innerHTML=`<span>${idx+1}. ${label}</span><a href="${url}" download="dictation_${String(idx+1).padStart(2,'0')}.mp3">MP3</a>`;
    document.getElementById('dlList').appendChild(div);
    document.getElementById('btnDownloadAll').disabled=false;
  }

  function playAudio(b64) {
    return new Promise((resolve,reject)=>{
      if(stopReq){reject();return;}
      const blob=b64ToBlob(b64); const url=URL.createObjectURL(blob);
      currentAudio=new Audio(url);
      currentAudio.onended=()=>{URL.revokeObjectURL(url);resolve();};
      currentAudio.onerror=reject; currentAudio.play();
    });
  }
  function wait(ms){return new Promise(r=>setTimeout(r,ms));}

  async function startPlayback() {
    const key=document.getElementById('apiKey').value.trim();
    if(!key){alert('API 키를 먼저 입력해주세요.');return;}

    const newText = document.getElementById('textInput').value;
    const newSentences = newText.split('\n').map(s=>s.trim()).filter(Boolean);
    if(!newSentences.length){alert('문장을 입력해주세요.');return;}

    // 문장이 바뀌면 캐시 초기화
    const newHash = newSentences.join('||');
    if (window._lastSentHash && window._lastSentHash !== newHash) {
      audioCache = {};
      document.getElementById('dlList').innerHTML='';
      document.getElementById('dlCard').style.display='none';
      document.getElementById('btnDownloadAll').disabled=true;
    }
    window._lastSentHash = newHash;
    sentences = newSentences;

    stopReq=false; isPaused=false;
    document.getElementById('btnPlay').disabled=true;
    document.getElementById('btnPause').disabled=false;
    document.getElementById('btnStop').disabled=false;
    document.getElementById('progressWrap').classList.add('show');

    const repeats=parseInt(document.getElementById('repeatCount').value);
    const sentMs=parseFloat(document.getElementById('sentPause').value)*1000;
    const repMs=parseFloat(document.getElementById('repPause').value)*1000;
    const voice=document.getElementById('voiceName').value;
    const total=sentences.length;

    try {
      for(let i=0;i<total;i++){
        if(stopReq) break;
        currentIdx=i;
        for(let r=0;r<repeats;r++){
          if(stopReq) break;
          currentRep=r;
          const rate = getRateForRep(r, repeats);
          const ck = cacheKey(i, rate);

          if(!audioCache[ck]){
            setStatus('loading',`${i+1}번 합성 중 (${r+1}회차 · ${rate}×)...`);
            document.getElementById('progressLabel').textContent=`${i+1}번 ${r+1}회차 합성`;
            document.getElementById('progressCount').textContent=`${i+1} / ${total}`;
            document.getElementById('progressFill').style.width=((i*repeats+r)/(total*repeats)*100)+'%';
            audioCache[ck]=await callTTS(sentences[i],key,voice,rate);
            if(r===0) addDlItem(i,audioCache[ck]);
          }

          updateSpeedTags(r);
          renderList(i);
          document.getElementById('progressLabel').textContent=`${i+1}번 (${r+1}/${repeats}회 · ${rate}×)`;
          document.getElementById('progressCount').textContent=`${i+1} / ${total}`;
          document.getElementById('progressFill').style.width=((i*repeats+r)/(total*repeats)*100)+'%';
          setStatus('playing',`${i+1}번 문장 · ${r+1}/${repeats}회 · ${rate}×`);

          while(isPaused&&!stopReq) await wait(100);
          if(stopReq) break;
          await playAudio(audioCache[ck]);

          if(r<repeats-1&&!stopReq){
            setStatus('paused','반복 대기 중...');
            let e=0; while(e<repMs&&!stopReq){if(!isPaused)e+=100;await wait(100);}
          }
        }
        if(!stopReq&&i<total-1){
          setStatus('paused','다음 문장 대기 중...');
          let e=0; while(e<sentMs&&!stopReq){if(!isPaused)e+=100;await wait(100);}
        }
      }
    } catch(err) {
      if(!stopReq) setStatus('','오류: '+(err.message||'알 수 없는 오류'));
    }

    if(!stopReq){
      document.getElementById('progressFill').style.width='100%';
      document.getElementById('progressCount').textContent=`${total} / ${total}`;
      document.getElementById('progressLabel').textContent='재생 완료!';
      setStatus('','재생 완료 ✓');
      renderList(-1); updateSpeedTags(-1);
    } else {
      setStatus('','정지됨');
    }
    document.getElementById('btnPlay').disabled=false;
    document.getElementById('btnPause').disabled=true;
    document.getElementById('btnStop').disabled=true;
    document.getElementById('btnPause').textContent='⏸ 일시정지';
    isPaused=false;
  }

  function togglePause(){
    const btn=document.getElementById('btnPause');
    if(!isPaused){
      isPaused=true; if(currentAudio)currentAudio.pause();
      setStatus('paused','일시정지'); btn.textContent='▶ 재개';
    } else {
      isPaused=false; if(currentAudio)currentAudio.play();
      setStatus('playing','재생 중...'); btn.textContent='⏸ 일시정지';
    }
  }

  function stopPlayback(){
    stopReq=true; isPaused=false;
    if(currentAudio){currentAudio.pause();currentAudio=null;}
    document.getElementById('btnPlay').disabled=false;
    document.getElementById('btnPause').disabled=true;
    document.getElementById('btnStop').disabled=true;
    document.getElementById('btnPause').textContent='⏸ 일시정지';
    setStatus('','정지됨');
  }

  // 초기화
  loadSettings();
  updateSpeedTags(-1);
</script>
</body>
</html>
