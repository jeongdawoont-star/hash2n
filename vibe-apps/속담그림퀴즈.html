<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>속담 그림 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&family=Do+Hyeon&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF5FA;--paper:#FFFFFF;
  --pink:#FF8FAB;--pink-light:#FFD6E8;--pink-xlight:#FFF0F7;--pink-dark:#CC6080;
  --blue:#85BEFF;--blue-light:#D8EDFF;
  --yellow:#FFD25C;--yellow-light:#FFF8D0;
  --green:#72D4A0;--green-light:#C8F5E2;
  --red:#FF7A8A;--red-light:#FFD8DC;
  --lavender:#C0AEFF;--lavender-light:#EDE8FF;
  --text:#3C2048;--text-muted:#9B7AAA;--border:#F0C0D8;
  --r-sm:14px;--r-md:20px;--r-lg:28px;--r-pill:100px;
  --ink:#3C2048;--accent:#FF8FAB;--accent2:#85BEFF;
  --shadow:0 4px 20px rgba(240,192,216,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Gaegu,cursive;background:var(--bg);background-image:radial-gradient(circle at 15% 20%,rgba(255,143,171,.12) 0,transparent 45%),radial-gradient(circle at 85% 80%,rgba(192,174,255,.1) 0,transparent 45%);color:var(--text);min-height:100vh;padding:12px;overflow-x:hidden}
body.play-active{height:100dvh;overflow:hidden}
.wrap{max-width:1120px;margin:0 auto;width:100%}
body.play-active .wrap{height:calc(100dvh - 24px);display:flex;flex-direction:column;gap:8px;min-height:0}
header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;position:relative}
body.play-active header{margin-bottom:0;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
h1{font-family:Jua,sans-serif;font-size:clamp(20px,3vw,30px);color:var(--text);display:inline-block;background:var(--pink-light);padding:6px 22px;border:2px solid var(--pink);border-radius:var(--r-pill);box-shadow:0 4px 16px rgba(255,143,171,.3);white-space:nowrap}
.subtitle{font-size:15px;color:var(--text-muted);font-family:'Do Hyeon',sans-serif;white-space:nowrap}
.header-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.icon-btn{font-family:'Do Hyeon',sans-serif;font-size:13px;padding:7px 16px;background:var(--paper);border:2px solid var(--border);border-radius:var(--r-pill);cursor:pointer;box-shadow:0 2px 8px rgba(240,192,216,.3);color:var(--text);white-space:nowrap;transition:all .15s}
.icon-btn:hover{background:var(--pink-light);border-color:var(--pink);transform:translateY(-1px)}
.icon-btn:active{transform:translateY(1px)}
.top-panel{display:grid;grid-template-columns:minmax(220px,1fr) auto;gap:10px;align-items:center;margin-bottom:12px}
body.play-active .top-panel{margin-bottom:0;flex-shrink:0}
.modes{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.mode-btn{font-family:'Do Hyeon',sans-serif;font-size:14px;padding:8px 18px;background:var(--paper);border:2px solid var(--border);border-radius:var(--r-pill);cursor:pointer;transition:all .15s;box-shadow:0 2px 8px rgba(240,192,216,.25);color:var(--text)}
.mode-btn:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(255,143,171,.35);border-color:var(--pink);background:var(--pink-xlight)}
.mode-btn:active{transform:translateY(0)}
.mode-btn.active{background:var(--pink);color:white;border-color:var(--pink-dark);box-shadow:0 4px 16px rgba(255,143,171,.45)}
.stats{display:flex;justify-content:space-around;background:var(--paper);border:2px solid var(--border);border-radius:var(--r-md);padding:8px 14px;box-shadow:0 2px 10px rgba(240,192,216,.2);font-family:'Do Hyeon',sans-serif;gap:8px}
.stat-item{text-align:center;padding:2px 10px}
.stat-num{font-size:24px;color:var(--pink);display:block;line-height:1;font-family:Jua,sans-serif}
.stat-label{font-size:11px;color:var(--text-muted);white-space:nowrap}
.card{background:var(--paper);border:2px solid var(--border);border-radius:var(--r-lg);padding:20px;box-shadow:0 4px 20px rgba(240,192,216,.22);margin-bottom:14px}
body.play-active #playMode{flex:1;min-height:0;display:flex;flex-direction:column}
body.play-active #playCard{flex:1;min-height:0;margin-bottom:0;padding:clamp(7px,1.4vmin,14px);overflow:hidden}
body.play-active #playMode>.action-row{flex-shrink:0;margin-top:8px}
.play-layout{height:100%;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) minmax(190px,260px);gap:clamp(7px,1.4vmin,14px);align-items:stretch}
.canvas-panel,.side-panel{min-height:0;display:flex;flex-direction:column}
.canvas-panel{align-items:center;justify-content:center;gap:clamp(6px,1.1vmin,10px)}
.side-panel{gap:clamp(7px,1.2vmin,12px);justify-content:center;overflow:hidden}
.proverb-strip{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;min-height:0}
.proverb-text{font-family:Jua,sans-serif;font-size:clamp(17px,2.8vmin,26px);text-align:center;padding:5px 12px;line-height:1.3;color:var(--text);background:var(--yellow-light);border:2px solid var(--yellow);border-radius:var(--r-sm);overflow-wrap:anywhere}
.proverb-number{display:inline-flex;align-items:center;justify-content:center;background:var(--blue);color:white;border-radius:50%;width:32px;height:32px;font-size:14px;font-family:'Do Hyeon',sans-serif;flex-shrink:0;box-shadow:0 2px 8px rgba(133,190,255,.4)}
.draw-guide{margin:0;padding:10px 14px;background:var(--lavender-light);border:2px solid var(--lavender);border-radius:var(--r-md);font-family:'Do Hyeon',sans-serif;font-size:clamp(12px,1.85vmin,14px);line-height:1.4;overflow:hidden}
.draw-guide div+div{margin-top:6px}
body.play-active .draw-guide div{display:-webkit-box;-webkit-line-clamp:3;line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.draw-guide .info-label{display:inline-block;margin-right:6px;padding:2px 8px;background:var(--lavender);color:white;border-radius:var(--r-pill);font-size:12px;line-height:1.3}
.canvas-area{position:relative;background:#fff;border:2px solid var(--border);border-radius:var(--r-md);overflow:hidden;aspect-ratio:1;width:var(--canvas-fit-size,min(100%,500px));height:var(--canvas-fit-size,min(100%,500px));flex:0 0 auto;margin:0 auto;touch-action:none;box-shadow:0 4px 20px rgba(240,192,216,.3)}
canvas{display:block;width:100%;height:100%;cursor:crosshair;background:linear-gradient(rgba(200,150,200,.04) 1px,transparent 1px) 0 0/20px 20px,linear-gradient(90deg,rgba(200,150,200,.04) 1px,transparent 1px) 0 0/20px 20px,#fff}
.tools{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center}
.color-dot{width:34px;height:34px;border-radius:50%;border:3px solid white;cursor:pointer;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.color-dot:hover{transform:scale(1.12)}
.color-dot.active{transform:scale(1.2);box-shadow:0 0 0 3px var(--pink),0 4px 12px rgba(255,143,171,.4)}
.size-slider{-webkit-appearance:none;appearance:none;width:85px;height:8px;border-radius:4px;background:var(--pink-light);outline:0}
.size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--pink);border:3px solid white;cursor:pointer;box-shadow:0 2px 8px rgba(255,143,171,.5)}
.tool-btn{font-family:'Do Hyeon',sans-serif;font-size:clamp(11px,1.8vmin,13px);padding:6px 14px;background:var(--paper);border:2px solid var(--border);border-radius:var(--r-pill);cursor:pointer;box-shadow:0 2px 6px rgba(240,192,216,.3);color:var(--text);transition:all .15s}
.tool-btn:hover{background:var(--pink-light);border-color:var(--pink);transform:translateY(-1px)}
.tool-btn:active{transform:translateY(1px)}
.tool-btn.danger{background:var(--red-light);border-color:var(--red);color:var(--pink-dark)}
.tool-btn.danger:hover{background:var(--red);color:white}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:0}
.option-btn{font-family:Jua,sans-serif;font-size:clamp(12px,2vmin,15px);padding:10px 8px;background:var(--paper);border:2px solid var(--border);border-radius:var(--r-md);cursor:pointer;box-shadow:0 2px 8px rgba(240,192,216,.25);text-align:center;line-height:1.3;transition:all .15s;min-height:42px;overflow-wrap:anywhere;color:var(--text)}
.option-btn:hover{background:var(--pink-xlight);border-color:var(--pink);transform:translateY(-2px);box-shadow:0 4px 14px rgba(255,143,171,.3)}
.option-btn:active{transform:translateY(0)}
.option-btn.correct{background:var(--green-light);border-color:var(--green);animation:pop .4s}
.option-btn.wrong{background:var(--red-light);border-color:var(--red);color:var(--pink-dark);animation:shake .4s}
.option-btn:disabled{cursor:not-allowed}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.hint-area{background:var(--yellow-light);border:2px solid var(--yellow);border-radius:var(--r-md);padding:8px 12px;font-family:'Do Hyeon',sans-serif;font-size:clamp(12px,1.9vmin,15px);min-height:40px;text-align:center;line-height:1.4;overflow:hidden}
.hint-area.empty{opacity:.55;font-style:italic}
.action-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.big-btn{font-family:Jua,sans-serif;font-size:clamp(14px,2.2vmin,17px);padding:11px 22px;background:var(--pink);color:white;border:2px solid var(--pink-dark);border-radius:var(--r-pill);cursor:pointer;box-shadow:0 4px 16px rgba(255,143,171,.4);transition:all .15s}
.big-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,143,171,.5)}
.big-btn:active{transform:translateY(1px);box-shadow:0 2px 8px rgba(255,143,171,.3)}
.big-btn.secondary{background:var(--blue);color:white;border-color:#5090C8;box-shadow:0 4px 16px rgba(133,190,255,.4)}
.big-btn.secondary:hover{background:#5090C8}
.big-btn.success{background:var(--green);color:white;border-color:#45A875;box-shadow:0 4px 16px rgba(114,212,160,.4)}
.big-btn.success:hover{background:#45A875}
.empty-state{text-align:center;padding:40px 20px;font-family:'Do Hyeon',sans-serif;font-size:17px;color:var(--text-muted)}
body.play-active #playCard>.empty-state{height:100%;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px}
.empty-state .emoji{font-size:64px;display:block;margin-bottom:12px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;max-height:400px;overflow-y:auto;padding:6px}
.gallery-item{background:#fff;border:2px solid var(--border);border-radius:var(--r-md);aspect-ratio:1;position:relative;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(240,192,216,.2);transition:all .15s}
.gallery-item:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(255,143,171,.3);border-color:var(--pink)}
.gallery-item img{width:100%;height:100%;object-fit:contain}
.gallery-item .label{position:absolute;bottom:0;left:0;right:0;background:rgba(60,32,72,.82);color:#fff;font-family:'Do Hyeon',sans-serif;font-size:11px;padding:4px;text-align:center;line-height:1.2}
.result-banner{text-align:center;padding:12px;border-radius:var(--r-md);font-family:Jua,sans-serif;font-size:clamp(14px,2.2vmin,18px);border:2px solid transparent;box-shadow:0 4px 20px rgba(240,192,216,.3);animation:pop .4s;line-height:1.4;overflow:hidden}
.result-banner.win{background:var(--green-light);border-color:var(--green)}
.result-banner.lose{background:var(--red-light);border-color:var(--red)}
#resultBox{min-height:0;overflow:hidden}
.hidden{display:none!important}
.deco{position:fixed;pointer-events:none;opacity:.1;font-size:80px}
.deco-1{top:5%;left:-10px;transform:rotate(-15deg)}
.deco-2{bottom:10%;right:-10px;transform:rotate(20deg)}
.backup-status{width:100%;text-align:center;font-family:'Do Hyeon',sans-serif;font-size:13px;color:var(--text-muted);padding:4px 8px}
@media(min-width:760px){
  .side-panel .tools{justify-content:flex-start;align-content:flex-start}
  .side-panel .color-dot{width:36px;height:36px}
  .side-panel .size-slider{width:100%;max-width:210px;margin:2px 0}
  .side-panel .action-row{justify-content:stretch}
  .side-panel .big-btn,.side-panel .tool-btn{flex:1 1 auto}
}
@media(max-width:840px){
  .brand{gap:6px}.subtitle{display:none}
  .top-panel{grid-template-columns:1fr;gap:7px}
  .stats{padding:6px 8px}
  .mode-btn{font-size:13px;padding:7px 12px}
}
@media(max-width:740px),(orientation:portrait){
  body.play-active{padding:7px}
  body.play-active .wrap{height:calc(100dvh - 14px);gap:6px}
  .side-panel{overflow-y:auto}
  header{gap:6px}
  h1{font-size:clamp(17px,5.2vw,24px);padding:5px 14px}
  .icon-btn{font-size:12px;padding:6px 9px}
  .top-panel{gap:6px}
  .stat-num{font-size:18px}
  .stat-label{font-size:11px}
  .modes{gap:6px}
  .mode-btn{flex:1 1 0;min-width:0;padding:6px 5px;font-size:12px}
  .play-layout{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) auto;gap:6px}
  .canvas-panel{gap:5px}
  .side-panel{justify-content:flex-end;gap:6px}
  .proverb-strip{gap:5px}
  .proverb-number{width:28px;height:28px;font-size:12px}
  .proverb-text{font-size:clamp(14px,4.3vw,20px);padding:3px 8px;line-height:1.2}
  .draw-guide{font-size:clamp(11px,3vw,13px);padding:7px 9px;line-height:1.25}
  body.play-active .draw-guide div{-webkit-line-clamp:2;line-clamp:2}
  .tools{gap:6px}
  .color-dot{width:28px;height:28px;border-width:2px}
  .size-slider{width:70px}
  .tool-btn{padding:5px 9px}
  .big-btn{padding:8px 14px}
  .options{gap:6px}
  .option-btn{padding:7px 5px;min-height:38px;font-size:clamp(11px,3.5vw,13px)}
  .hint-area{padding:6px 8px;min-height:34px}
  .result-banner{padding:8px}
}
@media(max-width:480px){
  body:not(.play-active) .options{grid-template-columns:1fr}
  .stat-num{font-size:20px}
  .deco{display:none}
}

/* ===== play-active 모드 공통 스타일 축소 ===== */
body.play-active header {
  margin-bottom: 4px;
  gap: 6px;
}
body.play-active h1 {
  font-size: clamp(16px, 2.5vw, 22px);
  padding: 4px 14px;
  border-width: 1.5px;
  box-shadow: none;
}
body.play-active .subtitle {
  display: none;
}
body.play-active .icon-btn {
  padding: 5px 12px;
  font-size: 12px;
}

/* 도구 픽커 그룹화 스타일 */
.color-picker {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}
.size-picker {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}
.btn-group {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: center;
}
.btn-text {
  display: inline;
}

/* 화면이 좁거나 가로 모드일 때 버튼 안의 텍스트 감춤 */
@media (max-width: 600px) {
  .btn-text {
    display: none;
  }
}
@media (orientation: landscape) {
  body.play-active .btn-text {
    display: none;
  }
}

/* 세로/가로 화면 높이가 낮을 때(<=760px) 전체적인 요소 크기 및 간격 축소 */
@media (max-height: 760px) {
  body.play-active {
    padding: 4px !important;
  }
  body.play-active .wrap {
    height: calc(100dvh - 8px) !important;
    gap: 4px !important;
  }
  body.play-active header {
    margin-bottom: 2px !important;
  }
  body.play-active .top-panel {
    margin-bottom: 2px !important;
    gap: 4px !important;
  }
  body.play-active #playCard {
    padding: 6px 8px !important;
  }
  body.play-active .draw-guide {
    padding: 4px 6px !important;
    font-size: 11px !important;
  }
  body.play-active #playCard .draw-guide div+div {
    display: none !important;
  }
  body.play-active .tools {
    gap: 4px !important;
  }
  body.play-active .color-dot {
    width: 24px !important;
    height: 24px !important;
  }
  body.play-active .color-dot.active {
    transform: scale(1.15) !important;
  }
  body.play-active .tool-btn {
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
  body.play-active .btn-text {
    display: none !important;
  }
  body.play-active .big-btn {
    padding: 6px 14px !important;
    font-size: 12px !important;
  }
  body.play-active .action-row {
    gap: 4px !important;
  }
}

@media(min-width:760px){
  .side-panel .tools {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 100%;
    gap: 8px;
  }
  .side-panel .color-picker {
    justify-content: flex-start;
  }
  .side-panel .size-picker {
    justify-content: flex-start;
    width: 100%;
  }
  .side-panel .size-slider {
    width: 100%;
    max-width: 210px;
  }
  .side-panel .btn-group {
    justify-content: flex-start;
  }
}

/* ===== 가로 모드 2단 레이아웃 ===== */
.ls-left{display:none}
.ls-right{display:contents}
@media(orientation:landscape){
  body.play-active{padding:0!important;overflow:hidden}
  body.play-active .deco{display:none}
  body.play-active .wrap{
    height:100dvh!important;display:grid!important;
    grid-template-columns:53% 47%;
    padding:0!important;max-width:none;margin:0;gap:0;overflow:hidden;
  }
  body.play-active .ls-left{
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:8px;background:var(--bg);
    border-right:2px solid var(--border);
    overflow:hidden;min-height:0;
    gap:6px;
  }
  body.play-active .ls-right{
    display:flex!important;flex-direction:column;
    overflow-y:auto;padding:8px 10px;
    gap:6px;min-height:0;
  }
  body.play-active header{margin-bottom:4px;flex-shrink:0;gap:6px}
  body.play-active header h1{font-size:18px;padding:3px 12px}
  body.play-active header .subtitle{display:none}
  
  /* 가로 모드 통계/모드 기본: 단일 행 배치 */
  body.play-active .top-panel{
    display:flex!important;
    flex-direction:row!important;
    justify-content:space-between!important;
    align-items:center!important;
    margin-bottom:4px;
    flex-shrink:0;
    gap:8px!important;
  }
  body.play-active .stats{
    flex:1;
    padding:4px 8px;
    gap:4px;
    border-radius:var(--r-sm);
  }
  body.play-active .stat-item{
    padding:0 2px;
  }
  body.play-active .stat-num{
    font-size:18px;
  }
  body.play-active .stat-label{
    font-size:9px;
  }
  body.play-active .modes{
    flex:1.2;
    gap:4px;
    flex-wrap:nowrap;
  }
  body.play-active .mode-btn{
    flex:1;
    font-size:11px;
    padding:5px 2px;
    min-width:0;
    white-space:nowrap;
    border-radius:var(--r-sm);
  }

  /* 좁은 가로 화면(<=700px)에서 통계/모드 세로 배치 및 추가 축소 */
  @media (max-width: 700px) {
    body.play-active .top-panel {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 4px !important;
    }
    body.play-active .stats {
      padding: 3px 6px;
      gap: 2px;
    }
    body.play-active .stat-num {
      font-size: 16px;
    }
    body.play-active .stat-label {
      font-size: 8px;
    }
    body.play-active .modes {
      flex-wrap: nowrap !important;
    }
    body.play-active .mode-btn {
      padding: 4px 2px;
      font-size: 10px;
    }
  }

  body.play-active #playMode{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;gap:6px}
  body.play-active #playCard{
    flex:1;min-height:0;margin-bottom:0;
    padding:8px 10px;
    overflow-y:auto;display:flex;flex-direction:column;gap:6px;
  }
  body.play-active #playMode>.action-row{flex-shrink:0}
  body.play-active .ls-left .canvas-area{flex-shrink:0}
  
  /* 가로 모드 드로잉 툴바 가로배치 */
  .landscape-tools {
    width: 100%;
    max-width: var(--canvas-fit-size, 500px);
    margin: 0 auto;
    flex-shrink: 0;
  }
  .landscape-tools .tools {
    display: flex!important;

function getProverbExplanation(proverb){

}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[ch]);
}

// ============ Storage helpers ============
const STORAGE_PREFIX = "proverb_drawing:";
const SCORE_KEY = "proverb_score";
const DB_NAME = "proverb-picture-quiz";
const DB_STORE = "items";
const SAMPLE_BACKUP_URL = "./속담그림퀴즈_백업데이터.json";

function createAppStorage(){
  let dbPromise = null;
  function getLocalStorage(){ try { return window.localStorage; } catch(e) { return null; } }
  function openDb(){
    if (!("indexedDB" in window)) return Promise.reject(new Error("IndexedDB를 사용할 수 없습니다."));
    if (!dbPromise) {
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = () => { const db = req.result; if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE); };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error || new Error("IndexedDB 열기에 실패했습니다."));
        req.onblocked = () => reject(new Error("IndexedDB가 다른 탭에서 사용 중입니다."));
      }).catch(err => { dbPromise = null; throw err; });
    }
    return dbPromise;
  }
  async function idbRequest(mode, action){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, mode);
      const store = tx.objectStore(DB_STORE);
      let req;
      tx.oncomplete = () => resolve(req ? req.result : undefined);
      tx.onerror = () => reject(tx.error || (req && req.error) || new Error("IndexedDB 작업에 실패했습니다."));
      tx.onabort = () => reject(tx.error || new Error("IndexedDB 작업이 중단되었습니다."));
      req = action(store);
    });
  }
  async function idbList(prefix){
    const db = await openDb();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(DB_STORE, "readonly");
      const store = tx.objectStore(DB_STORE);
      const keys = [];
      const req = store.openKeyCursor();
      req.onsuccess = () => { const cursor = req.result; if (!cursor) return; const key = String(cursor.key); if (key.startsWith(prefix)) keys.push(key); cursor.continue(); };
      tx.oncomplete = () => resolve(keys);
      tx.onerror = () => reject(tx.error || req.error || new Error("IndexedDB 목록 읽기에 실패했습니다."));
      tx.onabort = () => reject(tx.error || new Error("IndexedDB 목록 읽기가 중단되었습니다."));
    });
  }
  function localGet(key){ const storage = getLocalStorage(); if (!storage) return null; const value = storage.getItem(key); return value === null ? null : { value }; }
  function localList(prefix){ const storage = getLocalStorage(); const keys = []; if (!storage) return keys; for (let i = 0; i < storage.length; i++) { const key = storage.key(i); if (key && key.startsWith(prefix)) keys.push(key); } return keys; }
  return {
    async set(key, value) {
      try { await idbRequest("readwrite", store => store.put(value, key)); const storage = getLocalStorage(); if (storage) storage.removeItem(key); return true; }
      catch(idbError) { const storage = getLocalStorage(); if (!storage) throw idbError; storage.setItem(key, value); return true; }
    },
    async get(key) {
      try { const value = await idbRequest("readonly", store => store.get(key)); if (value !== undefined) return { value }; } catch(e) {}
      return localGet(key);
    },
    async list(prefix) {
      const keys = new Set();
      try { (await idbList(prefix)).forEach(key => keys.add(key)); } catch(e) {}
      localList(prefix).forEach(key => keys.add(key));
      return { keys: [...keys] };
    },
    async delete(key) {
      try { await idbRequest("readwrite", store => store.delete(key)); } catch(e) {}
      const storage = getLocalStorage(); if (storage) storage.removeItem(key);
      return true;
    }
  };
}

const appStorage = createAppStorage();

function encodeCanvasForStorage(sourceCanvas){
  const webp = sourceCanvas.toDataURL("image/webp", 0.82);
  if (webp.startsWith("data:image/webp")) return webp;
  const jpeg = sourceCanvas.toDataURL("image/jpeg", 0.88);
  if (jpeg.startsWith("data:image/jpeg")) return jpeg;
  return sourceCanvas.toDataURL("image/png");
}

function canvasToStorageDataUrl(){
  const maxSide = 720;
  const scale = Math.min(1, maxSide / Math.max(canvas.width, canvas.height));
  const out = document.createElement("canvas");
  out.width = Math.max(1, Math.round(canvas.width * scale));
  out.height = Math.max(1, Math.round(canvas.height * scale));
  const outCtx = out.getContext("2d");
  outCtx.fillStyle = "#ffffff";
  outCtx.fillRect(0, 0, out.width, out.height);
  outCtx.drawImage(canvas, 0, 0, out.width, out.height);
  return encodeCanvasForStorage(out);
}

function compactImageDataUrl(dataUrl){
  return new Promise(resolve => {
    if (typeof dataUrl !== "string" || !dataUrl.startsWith("data:image/")) { resolve(dataUrl); return; }
    if (dataUrl.length < 250000) { resolve(dataUrl); return; }
    const img = new Image();
    img.onload = () => {
      const maxSide = 720;
      const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
      const out = document.createElement("canvas");
      out.width = Math.max(1, Math.round(img.naturalWidth * scale));
      out.height = Math.max(1, Math.round(img.naturalHeight * scale));
      const outCtx = out.getContext("2d");
      outCtx.fillStyle = "#ffffff";
      outCtx.fillRect(0, 0, out.width, out.height);
      outCtx.drawImage(img, 0, 0, out.width, out.height);
      resolve(encodeCanvasForStorage(out));
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function saveDrawing(idx, dataUrl){
  try { const compactDataUrl = await compactImageDataUrl(dataUrl); await appStorage.set(STORAGE_PREFIX + idx, compactDataUrl); scheduleLinkedBackup(); return true; }
  catch(e) { console.error("save fail", e); return false; }
}

async function getDrawing(idx){
  try { const r = await appStorage.get(STORAGE_PREFIX + idx); return r ? r.value : null; } catch(e){ return null; }
}

async function getAllDrawingIndices(){
  try { const r = await appStorage.list(STORAGE_PREFIX); if (!r || !r.keys) return []; return r.keys.map(k => parseInt(k.replace(STORAGE_PREFIX, ""))).filter(n => !isNaN(n)); }
  catch(e){ return []; }
}

async function deleteDrawing(idx){
  try { await appStorage.delete(STORAGE_PREFIX + idx); scheduleLinkedBackup(); return true; } catch(e){ return false; }
}

async function getScore(){
  try { const r = await appStorage.get(SCORE_KEY); return r ? parseInt(r.value) || 0 : 0; } catch(e){ return 0; }
}

async function setScore(n){
  try { await appStorage.set(SCORE_KEY, String(n)); scheduleLinkedBackup(); } catch(e){}
}

// ============ State ============
let state = {
  mode: "play", currentIdx: -1, currentMode: null,
  hintLevel: 0, hintTimer: null, answered: false,
  drawing: false, brushColor: "#001858", brushSize: 4, lastX: 0, lastY: 0,
  undoStack: [], redoStack: [],
  backupFileHandle: null, backupFileName: "",
  autoBackupTimer: null, autoBackupWriting: false, autoBackupPending: false, suspendAutoBackup: false
};

// ============ Canvas ============
let canvas, ctx;
const DRAW_CANVAS_SIZE = 720;

function fitPlayView(){
  const canvasArea = document.querySelector(".canvas-area");
  if (!canvasArea) return;
  
  const playLayout = document.querySelector(".play-layout");
  const lsLeft = document.getElementById("lsLeft");
  let size = 300;
  
  if (isLandscape()) {
    if (lsLeft) {
      const rect = lsLeft.getBoundingClientRect();
      const tools = lsLeft.querySelector(".landscape-tools");
      const toolsH = tools ? tools.getBoundingClientRect().height : 0;
      
      const padTop = parseFloat(getComputedStyle(lsLeft).paddingTop) || 0;
      const padBottom = parseFloat(getComputedStyle(lsLeft).paddingBottom) || 0;
      const padLeft = parseFloat(getComputedStyle(lsLeft).paddingLeft) || 0;
      const padRight = parseFloat(getComputedStyle(lsLeft).paddingRight) || 0;
      
      const gap = 6;
      
      const availableH = rect.height - padTop - padBottom - toolsH - (toolsH ? gap : 0);
      const availableW = rect.width - padLeft - padRight;
      size = Math.max(120, Math.floor(Math.min(availableW, availableH)));
    }
  } else {
    if (playLayout) {
      const layoutRect = playLayout.getBoundingClientRect();
      const sidePanel = playLayout.querySelector(".side-panel");
      const canvasPanel = playLayout.querySelector(".canvas-panel");
      
      const sidePanelH = sidePanel ? sidePanel.getBoundingClientRect().height : 0;
      const playLayoutStyle = getComputedStyle(playLayout);
      const layoutGap = parseFloat(playLayoutStyle.rowGap || playLayoutStyle.gap) || 0;
      
      const canvasPanelMaxH = layoutRect.height - sidePanelH - layoutGap;
      
      const strip = canvasPanel ? canvasPanel.querySelector(".proverb-strip") : null;
      const stripH = strip ? strip.getBoundingClientRect().height : 0;
      
      const canvasPanelStyle = canvasPanel ? getComputedStyle(canvasPanel) : null;
      const panelGap = canvasPanelStyle ? (parseFloat(canvasPanelStyle.rowGap || canvasPanelStyle.gap) || 0) : 0;
      
      const availableH = canvasPanelMaxH - stripH - panelGap;
      const availableW = layoutRect.width;
      size = Math.max(120, Math.floor(Math.min(availableW, availableH)));
    }
  }
  canvasArea.style.setProperty("--canvas-fit-size", `${size}px`);
}

function saveCanvasState(){
  if (!canvas) return;
  state.undoStack.push(canvas.toDataURL());
  state.redoStack = [];
  updateUndoRedoButtons();
}

function undo(){
  if (state.undoStack.length === 0) return;
  state.redoStack.push(canvas.toDataURL());
  const prevState = state.undoStack.pop();
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); updateUndoRedoButtons(); };
  img.src = prevState;
}

function redo(){
  if (state.redoStack.length === 0) return;
  state.undoStack.push(canvas.toDataURL());
  const nextState = state.redoStack.pop();
  const img = new Image();
  img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); updateUndoRedoButtons(); };
  img.src = nextState;
}

function updateUndoRedoButtons(){
  const undoBtn = document.getElementById("undoBtn");
  const redoBtn = document.getElementById("redoBtn");
  if (undoBtn) undoBtn.disabled = state.undoStack.length === 0;
  if (redoBtn) redoBtn.disabled = state.redoStack.length === 0;
}

function initCanvas(){
  canvas = document.getElementById("drawCanvas");
  if (!canvas) return;
  ctx = canvas.getContext("2d");
  canvas.width = DRAW_CANVAS_SIZE;
  canvas.height = DRAW_CANVAS_SIZE;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  state.undoStack = [];
  state.redoStack = [];

  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const pointer = e.touches ? e.touches[0] : e;
    const scaleX = canvas.width / r.width;
    const scaleY = canvas.height / r.height;
    return {x:(pointer.clientX-r.left)*scaleX, y:(pointer.clientY-r.top)*scaleY, scale:(scaleX+scaleY)/2};
  };
  const start = (e) => {
    e.preventDefault();
    saveCanvasState();
    state.drawing = true;
    const p = getPos(e);
    state.lastX = p.x; state.lastY = p.y;
    ctx.beginPath();
    ctx.arc(p.x,p.y,(state.brushSize*p.scale)/2,0,Math.PI*2);
    ctx.fillStyle = state.brushColor;
    ctx.fill();
  };
  const move = (e) => {
    if (!state.drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.strokeStyle = state.brushColor;
    ctx.lineWidth = state.brushSize * p.scale;
    ctx.beginPath();
    ctx.moveTo(state.lastX, state.lastY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    state.lastX = p.x; state.lastY = p.y;
  };
  const end = () => { state.drawing = false; };

  canvas.addEventListener("mousedown", start);
  canvas.addEventListener("mousemove", move);
  canvas.addEventListener("mouseup", end);
  canvas.addEventListener("mouseleave", end);
  canvas.addEventListener("touchstart", start);
  canvas.addEventListener("touchmove", move);
  canvas.addEventListener("touchend", end);
}

function clearCanvas(){
  if (!ctx) return;
  saveCanvasState();
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

// ============ 방향 감지 ============
function isLandscape(){ return window.innerWidth > window.innerHeight; }

let _prevLandscape = isLandscape();
let _orientTimer = null;
function handleOrientationChange(){
  clearTimeout(_orientTimer);
  _orientTimer = setTimeout(() => {
    const nowLandscape = isLandscape();
    fitPlayView();
    if (nowLandscape === _prevLandscape) return;
    _prevLandscape = nowLandscape;
    if (state.currentMode === "draw" && canvas) {
      const saved = canvas.toDataURL();
      const savedBrushColor = state.brushColor;
      const savedBrushSize = state.brushSize;
      renderDraw(state.currentIdx, saved, savedBrushColor, savedBrushSize);
    } else if (state.currentMode === "quiz" && state.currentIdx >= 0) {
      renderQuiz(state.currentIdx);
    }
  }, 300);
}

// ============ Mode switching ============
document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    state.mode = btn.dataset.mode;
    showMode(state.mode);
  });
});

function showMode(m){
  if (m !== "play") document.getElementById("lsLeft").innerHTML = "";
  document.body.classList.toggle("play-active", m === "play");
  document.getElementById("playMode").classList.toggle("hidden", m !== "play");
  document.getElementById("galleryMode").classList.toggle("hidden", m !== "gallery");
  document.getElementById("listMode").classList.toggle("hidden", m !== "list");
  
  const startBtnRow = document.getElementById("startBtnRow");
  if (startBtnRow) {
    startBtnRow.classList.toggle("hidden", m !== "play" || state.currentIdx >= 0);
  }
  
  fitPlayView();
  if (m === "gallery") renderGallery();
  if (m === "list") renderList();
}

window.addEventListener("resize", handleOrientationChange);
window.addEventListener("orientationchange", handleOrientationChange);

// ============ Pick random proverb ============
async function pickRandom(){
  clearHintTimer();
  state.hintLevel = 0;
  state.answered = false;
  const drawn = await getAllDrawingIndices();
  const undrawnIndices = [];
  for (let i = 0; i < PROVERBS.length; i++) if (!drawn.includes(i)) undrawnIndices.push(i);

  let mode, idx;
  if (drawn.length === 0){ mode = "draw"; idx = Math.floor(Math.random()*PROVERBS.length); }
  else if (undrawnIndices.length === 0){ mode = "quiz"; idx = drawn[Math.floor(Math.random()*drawn.length)]; }
  else {
    if (Math.random() < 0.5){ mode = "draw"; idx = undrawnIndices[Math.floor(Math.random()*undrawnIndices.length)]; }
    else { mode = "quiz"; idx = drawn[Math.floor(Math.random()*drawn.length)]; }
  }
  state.currentIdx = idx;
  state.currentMode = mode;
  
  const startBtnRow = document.getElementById("startBtnRow");
  if (startBtnRow) startBtnRow.classList.add("hidden");
  
  if (mode === "draw") renderDraw(idx);
  else renderQuiz(idx);
}

async function renderQuiz(idx){
  const correct = PROVERBS[idx];
  const dataUrl = await getDrawing(idx);
  const wrongs = [];
  const used = new Set([idx]);
  while (wrongs.length < 3){ const r = Math.floor(Math.random()*PROVERBS.length); if (!used.has(r)){ used.add(r); wrongs.push(PROVERBS[r]); } }
  const options = [...wrongs, correct].sort(() => Math.random() - 0.5);

  const card = document.getElementById("playCard");
  const lsLeft = document.getElementById("lsLeft");

  const optionsHtml = `
    <div class="hint-area empty" id="hintArea">💡 힌트는 잠시 후 또는 힌트 버튼을 누르면 나와요</div>
    <div class="action-row">
      <button class="tool-btn" id="hintBtn">💡 힌트 보기</button>
    </div>
    <div class="options" id="optionsBox">
      ${options.map(o => `<button class="option-btn" data-correct="${o.t===correct.t?'1':'0'}" data-text="${escapeAttr(o.t)}">${escapeHtml(o.t)}</button>`).join("")}
    </div>
    <div id="resultBox"></div>`;

  const quizImgHtml = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:contain;" alt="속담 그림">`;

  if (isLandscape()) {
    lsLeft.innerHTML = `<div class="canvas-area" style="background:#fff;">${quizImgHtml}</div>`;
    card.innerHTML = `
      <div class="proverb-strip">
        <span class="proverb-number">?</span>
        <div class="proverb-text">이 그림은 어떤 속담일까요?</div>
      </div>
      ${optionsHtml}`;
  } else {
    lsLeft.innerHTML = "";
    card.innerHTML = `
      <div class="play-layout quiz-layout">
        <section class="canvas-panel">
          <div class="proverb-strip">
            <span class="proverb-number">?</span>
            <div class="proverb-text">이 그림은 어떤 속담일까요?</div>
          </div>
          <div class="canvas-area" style="background:#fff;">${quizImgHtml}</div>
        </section>
        <aside class="side-panel">
          ${optionsHtml}
        </aside>
      </div>`;
  }

  fitPlayView();
  document.querySelectorAll(".option-btn").forEach(b => b.addEventListener("click", () => handleAnswer(b, correct)));
  document.getElementById("hintBtn").addEventListener("click", () => showHint(correct));
  state.hintLevel = 0;
  scheduleAutoHint(correct);
}

function escapeAttr(s){ return s.replace(/"/g, "&quot;"); }

function scheduleAutoHint(correct){
  clearHintTimer();
  state.hintTimer = setTimeout(() => { if (state.answered) return; showHint(correct); scheduleAutoHint(correct); }, 10000);
}

function clearHintTimer(){
  if (state.hintTimer){ clearTimeout(state.hintTimer); state.hintTimer = null; }
}

function showHint(correct){
  if (state.answered) return;
  state.hintLevel++;
  const hintArea = document.getElementById("hintArea");
  hintArea.classList.remove("empty");
  const t = correct.t;
  const len = t.replace(/\s/g,"").length;
  const explanation = getProverbExplanation(correct);
  if (state.hintLevel === 1){ hintArea.innerHTML = `💡 <b>힌트 1</b> · 뜻: "${escapeHtml(correct.m)}"`; }
  else if (state.hintLevel === 2){ hintArea.innerHTML = `💡 <b>힌트 2</b> · 왜 이런 말? "${escapeHtml(explanation)}"`; }
  else if (state.hintLevel === 3){ hintArea.innerHTML = `💡 <b>힌트 3</b> · 첫 글자는 <b style="color:var(--red);font-size:22px;">"${escapeHtml(t.charAt(0))}"</b>로 시작해요`; }
  else {
    const masked = t.split("").map(ch => ch===" " ? " " : Math.random()<0.4 ? ch : "○").join("");
    hintArea.innerHTML = `💡 <b>힌트 4</b> · 글자 수: <b>${len}자</b> · <span style="font-family:'Jua';font-size:20px;letter-spacing:2px;">${escapeHtml(masked)}</span>`;
    document.getElementById("hintBtn").disabled = true;
    document.getElementById("hintBtn").style.opacity = 0.5;
  }
}

async function handleAnswer(btn, correct){
  if (state.answered) return;
  state.answered = true;
  clearHintTimer();
  
  const hintArea = document.getElementById("hintArea");
  const hintBtn = document.getElementById("hintBtn");
  if (hintArea) hintArea.classList.add("hidden");
  if (hintBtn) {
    const hintBtnRow = hintBtn.parentElement;
    if (hintBtnRow) hintBtnRow.classList.add("hidden");
  }
  
  const isRight = btn.dataset.correct === "1";
  const explanation = getProverbExplanation(correct);
  document.querySelectorAll(".option-btn").forEach(b => {
    b.disabled = true;
    if (b.dataset.correct === "1") b.classList.add("correct");
    else if (b === btn) b.classList.add("wrong");
  });
  const result = document.getElementById("resultBox");
  if (isRight){
    const points = Math.max(10, 50 - state.hintLevel * 10);
    let s = await getScore(); s += points; await setScore(s); await updateStats();
    result.innerHTML = `
      <div class="result-banner win">
        🎉 정답이에요! +${points}점<br>
        <small style="font-size:15px;">뜻: ${escapeHtml(correct.m)}</small><br>
        <small style="font-size:15px;">${escapeHtml(explanation)}</small>
      </div>
      <div class="action-row"><button class="big-btn" id="nextBtn">➡️ 다음 문제</button></div>
    `;
  } else {
    result.innerHTML = `
      <div class="result-banner lose">
        😢 아쉬워요! 정답은:<br>
        <b style="color:var(--red);">"${escapeHtml(correct.t)}"</b><br>
        <small style="font-size:15px;">뜻: ${escapeHtml(correct.m)}</small><br>
        <small style="font-size:15px;">${escapeHtml(explanation)}</small>
      </div>
      <div class="action-row"><button class="big-btn" id="nextBtn">➡️ 다음 문제</button></div>
    `;
  }
  document.getElementById("nextBtn").addEventListener("click", pickRandom);
}

async function renderGallery(){
  const grid = document.getElementById("galleryGrid");

  if (drawn.length === 0){ grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="emoji">🖼️</span><div>아직 그린 그림이 없어요</div></div>`; return; }

  grid.innerHTML = items.map(it => `
    <div class="gallery-item" data-idx="${it.idx}">
      <img src="${it.url}" alt="">
      <div class="label">${PROVERBS[it.idx].t.length>14?PROVERBS[it.idx].t.substring(0,13)+"…":PROVERBS[it.idx].t}</div>

document.getElementById("exportBtn").addEventListener("click", async () => {
  const drawn = await getAllDrawingIndices();
  if (drawn.length === 0){ showToast("그림이 없어요!"); return; }
  const cols = Math.min(4, drawn.length);
  const rows = Math.ceil(drawn.length / cols);
  const cell = 200; const labelH = 24;
  const c = document.createElement("canvas");
  c.width = cols * cell; c.height = rows * (cell + labelH);
  const cx = c.getContext("2d");
  cx.fillStyle = "#FFF5FA"; cx.fillRect(0,0,c.width,c.height);
  for (let i = 0; i < drawn.length; i++){
    const idx = drawn[i];
    const url = await getDrawing(idx);
    await new Promise(res => {
      const img = new Image();
      img.onload = () => {
        const col = i%cols; const row = Math.floor(i/cols);
        const x = col*cell; const y = row*(cell+labelH);
        cx.fillStyle = "#fff"; cx.fillRect(x+2,y+2,cell-4,cell-4);
        cx.drawImage(img,x+2,y+2,cell-4,cell-4);
        cx.fillStyle = "#3C2048"; cx.font = "bold 12px sans-serif"; cx.textAlign = "center";
        const txt = PROVERBS[idx].t.length>18?PROVERBS[idx].t.substring(0,17)+"…":PROVERBS[idx].t;
        cx.fillText(txt, x+cell/2, y+cell+16);
        res();
      };
      img.src = url;
    });
  }
  const a = document.createElement("a"); a.href = c.toDataURL("image/png"); a.download = "내_속담_그림첩.png"; a.click();
  showToast("💾 내보내기 완료!");
});

async function toggleFullscreen(){
  const root = document.documentElement;
  try {
    const activeFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
    if (!activeFullscreen) {
      const request = root.requestFullscreen || root.webkitRequestFullscreen;
      if (!request){ showToast("이 브라우저는 전체화면을 지원하지 않아요"); return; }
      await request.call(root);
    } else {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (exit) await exit.call(document);
    }
  } catch(e) { console.error(e); showToast("전체화면 전환에 실패했어요"); }
}

// ============ 백업 & 불러오기 ============
function supportsFileBackupLink(){ return "showSaveFilePicker" in window; }

async function createBackupData(){
  const drawn = await getAllDrawingIndices();
  const backupData = { app:"proverb-picture-quiz", version:2, updatedAt:new Date().toISOString(), score:await getScore(), drawings:{} };
  for (const idx of drawn) backupData.drawings[idx] = await getDrawing(idx);
  return backupData;
}

function downloadBackupData(backupData){
  const dataStr = JSON.stringify(backupData);
  const blob = new Blob([dataStr], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = "속담그림퀴즈_백업데이터.json"; a.click();
  URL.revokeObjectURL(url);
}

async function writeBackupToHandle(handle){
  const backupData = await createBackupData();
  const dataStr = JSON.stringify(backupData);
  const writable = await handle.createWritable();
  await writable.write(new Blob([dataStr], {type:"application/json"}));
  await writable.close();
}

function updateBackupStatus(text){ const el = document.getElementById("backupStatus"); if (el) el.textContent = text; }

function scheduleLinkedBackup(){
  if (typeof state === "undefined" || state.suspendAutoBackup || !state.backupFileHandle) return;
  clearTimeout(state.autoBackupTimer);
  state.autoBackupTimer = setTimeout(writeLinkedBackupNow, 700);
  updateBackupStatus(`자동저장 대기 중: ${state.backupFileName}`);
}

async function writeLinkedBackupNow(){
  if (state.suspendAutoBackup){ state.autoBackupPending = true; return; }
  if (!state.backupFileHandle) return;
  if (state.autoBackupWriting){ state.autoBackupPending = true; return; }
  state.autoBackupWriting = true;
  try {
    await writeBackupToHandle(state.backupFileHandle);
    updateBackupStatus(`자동저장 연결됨: ${state.backupFileName}`);
  } catch(e) {
    console.error(e);
    updateBackupStatus("자동저장 실패: 브라우저 권한을 다시 확인해주세요.");
    showToast("❌ JSON 자동저장 실패");
  } finally {
    state.autoBackupWriting = false;
    if (state.autoBackupPending){ state.autoBackupPending = false; scheduleLinkedBackup(); }
  }
}

document.getElementById("backupBtn").addEventListener("click", async () => {
  if (!supportsFileBackupLink()){ downloadBackupData(await createBackupData()); updateBackupStatus("이 브라우저는 파일 자동연결을 지원하지 않아 다운로드로 저장했어요."); showToast("📦 백업 파일이 다운로드되었습니다!"); return; }
  try {
    const handle = await window.showSaveFilePicker({ suggestedName:"속담그림퀴즈_백업데이터.json", types:[{description:"속담 그림 퀴즈 JSON", accept:{"application/json":[".json"]}}] });
    state.backupFileHandle = handle;
    state.backupFileName = handle.name || "속담그림퀴즈_백업데이터.json";
    await writeLinkedBackupNow();
    showToast("🔗 JSON 자동저장이 연결됐어요!");
  } catch(e) {
    if (e && e.name === "AbortError") return;
    console.error(e);
    downloadBackupData(await createBackupData());
    updateBackupStatus("파일 연결에 실패해서 다운로드로 저장했어요.");
    showToast("📦 백업 파일이 다운로드되었습니다!");
  }
});

async function requestBackupWritePermission(handle){
  if (!handle || !handle.queryPermission || !handle.requestPermission) return true;
  const options = {mode:"readwrite"};
  if (await handle.queryPermission(options) === "granted") return true;
  return await handle.requestPermission(options) === "granted";
}

async function openLinkedBackupFile(){
  if (!("showOpenFilePicker" in window)){ document.getElementById("importFile").click(); return; }
  try {
    const [handle] = await window.showOpenFilePicker({ multiple:false, types:[{description:"속담 그림 퀴즈 JSON", accept:{"application/json":[".json"]}}] });
    const file = await handle.getFile();
    const parsedData = JSON.parse(await file.text());
    const canWrite = await requestBackupWritePermission(handle);
    let linkedHandleInfo = null;
    if (canWrite && handle.createWritable) linkedHandleInfo = {handle, name:handle.name||file.name||"속담그림퀴즈_백업데이터.json"};
    else updateBackupStatus("파일은 불러왔지만 쓰기 권한이 없어 자동저장은 꺼져 있어요.");
    await handleLoadedBackupData(parsedData, linkedHandleInfo?"✅ 백업 파일을 불러오고 자동저장을 연결했어요!":"✅ 백업 파일을 불러왔어요!", linkedHandleInfo);
  } catch(e) {
    if (e && e.name === "AbortError") return;
    console.error(e);
    document.getElementById("importFile").click();
  }
}

document.getElementById("restoreBtn").addEventListener("click", openLinkedBackupFile);
document.getElementById("importFile").addEventListener("click", () => { updateBackupStatus("일반 파일 선택으로 불러오면 파일 자동저장은 연결되지 않아요."); });
document.getElementById("importFile").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (event) => {
    try { const parsedData = JSON.parse(event.target.result); await handleLoadedBackupData(parsedData, "✅ 백업 데이터를 불러왔어요!"); }
    catch (err) { console.error(err); showToast("❌ 파일 읽기에 실패했습니다. 올바른 백업 파일인지 확인해주세요."); }
    e.target.value = "";
  };
  reader.readAsText(file);
});

function activateBackupHandle(linkedHandleInfo){
  if (!linkedHandleInfo) return;
  state.backupFileHandle = linkedHandleInfo.handle;
  state.backupFileName = linkedHandleInfo.name;
  updateBackupStatus(`자동저장 연결됨: ${state.backupFileName}`);
  scheduleLinkedBackup();
}

function syncBackupAfterRestore(linkedHandleInfo){
  if (linkedHandleInfo) activateBackupHandle(linkedHandleInfo);
  else scheduleLinkedBackup();
}

async function handleLoadedBackupData(parsedData, successMessage, linkedHandleInfo = null){
  const existingDrawings = await getAllDrawingIndices();
  const hasExisting = existingDrawings.length > 0;
  if (hasExisting) showRestoreChoiceModal(parsedData, linkedHandleInfo);
  else { const result = await applyBackupData(parsedData); syncBackupAfterRestore(linkedHandleInfo); showRestoreResult(result, successMessage); }
}

  const modalHTML = `
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,32,72,0.45);display:flex;align-items:center;justify-content:center;z-index:2000;">

      </div>

  `;
  const modal = document.createElement("div");
  modal.innerHTML = modalHTML;
  document.body.appendChild(modal);

  document.getElementById("overwriteBtn").addEventListener("click", async () => {
    modal.remove();
    const drawn = await getAllDrawingIndices();
    const wasSuspended = state.suspendAutoBackup;
    state.suspendAutoBackup = true;
    try { for (const idx of drawn) await deleteDrawing(idx); await setScore(0); }
    finally { state.suspendAutoBackup = wasSuspended; }
    const result = await applyBackupData(backupData);
    syncBackupAfterRestore(linkedHandleInfo);
    showRestoreResult(result, "✅ 덮어씌워서 불러왔어요!");
  });
  document.getElementById("mergeBtn").addEventListener("click", async () => {
    modal.remove();
    const result = await applyBackupData(backupData, true);
    syncBackupAfterRestore(linkedHandleInfo);
    showRestoreResult(result, "✅ 추가해서 불러왔어요!");
  });
  document.getElementById("cancelRestoreBtn").addEventListener("click", () => { modal.remove(); });
}

function showRestoreResult(result, successMessage){
  if (result.failed > 0){ showToast(`⚠️ ${result.failed}개 그림 저장 실패`); return; }
  showToast(successMessage);
}

async function applyBackupData(backupData, isMerge = false){
  const wasSuspended = state.suspendAutoBackup;
  state.suspendAutoBackup = true;
  let saved = 0, failed = 0;
  try {
    if (backupData.score !== undefined){
      if (isMerge){ const currentScore = await getScore(); await setScore(currentScore + backupData.score); }
      else { await setScore(backupData.score); }
    }
    if (backupData.drawings){
      for (const [idx, dataUrl] of Object.entries(backupData.drawings)){
        if (await saveDrawing(idx, dataUrl)) saved++;
        else failed++;
      }
    }
  } finally { state.suspendAutoBackup = wasSuspended; }
  await updateStats();
  renderGallery();
  return { saved, failed };
}
</script>
