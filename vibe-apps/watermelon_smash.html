<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍉 수박깨기</title>
<style>
  :root{ --coral:#FF5A5F; --ink:#0B2436; --gold:#FFD23F; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000;
    font-family:'Segoe UI','Pretendard','Apple SD Gothic Neo',sans-serif; touch-action:none; user-select:none; }
  #canvas-wrap{position:fixed; inset:0;}
  canvas{display:block; width:100%; height:100%;}

  .overlay{position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; pointer-events:none;}
  .overlay.interactive{pointer-events:auto;}
  .hidden{display:none !important;}

  /* ---------- TITLE ---------- */
  #start-screen{ background:#000; }
  #title-img{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  /* fallback geometry so the button is usable even before/without JS layout */
  #title-start{ position:absolute; appearance:none; background:transparent; border:none; cursor:pointer;
    left:50%; bottom:7%; transform:translateX(-50%); width:min(64vw,340px); height:60px; border-radius:999px;
    animation:btnpulse 1.7s ease-out infinite; }
  #title-start:active{ filter:brightness(1.25); transform:scale(.97); }
  @keyframes btnpulse{ 0%{box-shadow:0 0 0 0 rgba(255,255,255,.75);} 70%{box-shadow:0 0 0 16px rgba(255,255,255,0);} 100%{box-shadow:0 0 0 0 rgba(255,255,255,0);} }
  #title-best{ position:absolute; display:flex; flex-direction:column; align-items:center; justify-content:center;
    left:50%; top:60%; transform:translateX(-50%); width:min(60vw,300px); height:72px;
    pointer-events:none; color:#5C3A1E; font-weight:900; line-height:1.12; text-align:center; }
  #best-score{ font-size:26px; }
  #best-fruit{ opacity:.85; font-size:15px; }

  /* ---------- HUD ---------- */
  #hud{position:fixed; inset:0; z-index:15; pointer-events:none;}
  #crosshair{ position:absolute; top:50%; left:50%; width:26px; height:26px; margin:-13px 0 0 -13px;
    border:2px solid rgba(255,255,255,.85); border-radius:50%; box-shadow:0 0 0 2px rgba(0,0,0,.25) inset;
    transition:transform .1s ease, border-color .1s ease; }
  #crosshair.near{border-color:var(--gold); transform:scale(1.3);}
  #crosshair.lock{border-color:#7CFF6B; transform:scale(1.5);}

  #top-bar{ position:absolute; top:0; left:0; right:0; padding:14px 16px; display:flex; justify-content:space-between; align-items:flex-start;
    background:linear-gradient(180deg, rgba(0,0,0,.32), transparent); }
  .pill{ background:rgba(11,36,54,.5); backdrop-filter:blur(4px); color:#fff; border-radius:14px; padding:7px 12px; font-size:14px; font-weight:800;
    display:flex; align-items:center; gap:5px; border:1px solid rgba(255,255,255,.15); }
  #timer-pill{ min-width:70px; justify-content:center; transition:background .2s; }
  #timer-pill.low{ background:rgba(200,30,40,.8); animation:tpulse .5s infinite; }
  @keyframes tpulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }
  #ladder-hud{ display:flex; align-items:center; gap:4px; background:rgba(11,36,54,.5); border-radius:14px; padding:7px 10px; border:1px solid rgba(255,255,255,.15); }
  #ladder-hud span.fr{ font-size:14px; opacity:.35; transition:all .25s; }
  #ladder-hud span.fr.done{opacity:1; transform:scale(1.05);}
  #ladder-hud span.fr.cur{opacity:1; transform:scale(1.3); filter:drop-shadow(0 0 5px var(--gold));}
  #loop-badge{ color:var(--gold); font-weight:900; font-size:13px; margin-left:3px; }

  #healthbar-wrap{ position:absolute; top:60px; left:50%; transform:translateX(-50%); width:min(70vw,280px); }
  #healthbar-track{ height:12px; border-radius:999px; background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.25); overflow:hidden; }
  #healthbar-fill{ height:100%; width:100%; background:linear-gradient(90deg,#FF5A5F,#FFD23F); transition:width .15s ease; }

  #power-meter{ position:absolute; bottom:24px; left:50%; transform:translateX(-50%); width:min(60vw,240px); display:flex; align-items:center; gap:8px; }
  #power-meter .ic{font-size:16px;}
  #power-track{ flex:1; height:9px; border-radius:999px; background:rgba(0,0,0,.35); border:1px solid rgba(255,255,255,.25); overflow:hidden; }
  #power-fill{ height:100%; width:0%; background:linear-gradient(90deg,#38B6E8,#FFD23F,#FF5A5F); }

  /* ---------- SWING / IMPACT FX (vector, no emoji popups) ---------- */
  #impact-fx{ position:absolute; top:50%; left:50%; width:0; height:0; pointer-events:none; }
  #impact-ring{ position:absolute; top:0; left:0; width:76px; height:76px; margin:-38px 0 0 -38px; border-radius:50%;
    border:5px solid rgba(255,255,255,.9); opacity:0; }
  #impact-ring.show{ animation:ringout .38s cubic-bezier(.17,.84,.44,1) forwards; }
  @keyframes ringout{ 0%{opacity:.95; transform:scale(.25); border-width:11px;} 100%{opacity:0; transform:scale(3.4); border-width:1px;} }
  #impact-burst{ position:absolute; top:0; left:0; width:135vmin; height:135vmin; margin:-67.5vmin 0 0 -67.5vmin; opacity:0; }
  #impact-burst.show{ animation:burstout .34s ease-out forwards; }
  @keyframes burstout{ 0%{opacity:var(--o,.32); transform:scale(.5) rotate(var(--rot,0deg));}
    100%{opacity:0; transform:scale(var(--s,1.15)) rotate(var(--rot,0deg));} }
  #whoosh{ position:absolute; top:50%; left:50%; width:150vmax; height:24vmin; margin:-12vmin 0 0 -75vmax;
    background:linear-gradient(90deg, transparent 12%, rgba(255,255,255,.5) 50%, transparent 88%);
    border-radius:50%; filter:blur(7px); opacity:0; pointer-events:none; }
  #whoosh.show{ animation:whooshsweep .28s ease-out forwards; }
  @keyframes whooshsweep{ 0%{opacity:0; transform:translateX(calc(var(--dir,1) * -26vw)) rotate(var(--tilt,-8deg)) scaleY(.45);}
    25%{opacity:.55;}
    100%{opacity:0; transform:translateX(calc(var(--dir,1) * 26vw)) rotate(var(--tilt,-8deg)) scaleY(1);} }

  #score-pop{ position:absolute; top:36%; left:50%; transform:translate(-50%,0); opacity:0; font-size:32px; font-weight:900;
    color:var(--gold); text-shadow:0 2px 0 rgba(0,0,0,.35), 0 4px 12px rgba(0,0,0,.3); pointer-events:none; }
  #score-pop.show{animation:scorefloat .9s ease-out;}
  @keyframes scorefloat{ 0%{opacity:0; transform:translate(-50%,0) scale(.6);} 25%{opacity:1; transform:translate(-50%,-16px) scale(1.15);}
    100%{opacity:0; transform:translate(-50%,-52px) scale(1);} }

  #dmg-pop{ position:absolute; top:46%; left:50%; transform:translate(-50%,0); opacity:0; font-weight:900;
    color:#FFF6D8; text-shadow:0 2px 0 rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.35); pointer-events:none; }
  #dmg-pop.crit{ color:#FF7A2A; }
  #dmg-pop.show{ animation:dmgfloat .7s ease-out; }
  @keyframes dmgfloat{ 0%{opacity:0; transform:translate(-50%,6px) scale(.5) rotate(var(--tw,0deg));}
    22%{opacity:1; transform:translate(-50%,-18px) scale(1.18) rotate(var(--tw,0deg));}
    100%{opacity:0; transform:translate(-50%,-58px) scale(1) rotate(var(--tw,0deg));} }

  #time-pop{ position:absolute; top:86px; left:50%; transform:translate(-50%,0); opacity:0; font-size:17px; font-weight:900;
    color:#8CF7A8; text-shadow:0 2px 4px rgba(0,0,0,.4); pointer-events:none; }
  #time-pop.show{animation:timefloat 1.1s ease-out;}
  @keyframes timefloat{ 0%{opacity:0; transform:translate(-50%,-8px);} 30%{opacity:1;} 100%{opacity:0; transform:translate(-50%,16px);} }

  #hit-flash{ position:fixed; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:23; mix-blend-mode:screen; }

  /* ---------- COUNTDOWN ---------- */
  #countdown-screen{background:transparent; z-index:26;} /* above the closed eyelids */
  #countdown-num{ font-size:clamp(90px,34vw,170px); font-weight:900; color:#fff; text-shadow:0 6px 0 rgba(0,0,0,.25), 0 10px 30px rgba(0,0,0,.4); }
  #countdown-num.pulse{animation:cdpulse .8s ease-out;}
  @keyframes cdpulse{0%{transform:scale(1.7); opacity:0;}25%{opacity:1;}100%{transform:scale(1); opacity:1;}}
  #next-badge{ font-size:64px; opacity:0; }
  #next-badge.show{ animation:nextpop .55s ease-out; }
  @keyframes nextpop{0%{opacity:0; transform:scale(.5);}40%{opacity:1; transform:scale(1.2);}100%{opacity:0; transform:scale(1) translateY(-40px);}}

  /* eyelid-style blackout: lids slide in from top & bottom */
  #blackout{position:fixed; inset:0; z-index:25; pointer-events:none; overflow:hidden;}
  .lid{position:absolute; left:0; width:100%; height:60%; transition:transform 1.15s cubic-bezier(.65,.05,.35,.95);}
  #lid-top{top:0; transform:translateY(-101%);
    background:linear-gradient(to bottom, #000 0%, #000 90%, rgba(0,0,0,0) 100%);}
  #lid-bottom{bottom:0; transform:translateY(101%);
    background:linear-gradient(to top, #000 0%, #000 90%, rgba(0,0,0,0) 100%);}
  #blackout.closed #lid-top, #blackout.closed #lid-bottom{transform:translateY(0);}
  #blackout.fast .lid{transition-duration:.3s;}

  /* ---------- CCTV REPLAY ---------- */
  #cctv-overlay{ position:fixed; inset:0; z-index:22; pointer-events:none; opacity:0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0px, rgba(255,255,255,.05) 1px, transparent 2px, transparent 4px),
      radial-gradient(ellipse at center, rgba(0,0,0,0) 42%, rgba(0,0,0,.6) 100%);
    filter:contrast(1.12) saturate(.62) brightness(1.03); transition:opacity .3s ease; }
  #cctv-overlay.show{opacity:1;}
  #cctv-rec{ position:absolute; top:16px; left:16px; display:flex; align-items:center; gap:6px; color:#fff; font-family:monospace; font-size:12px; letter-spacing:1px; }
  #cctv-dot{ width:8px; height:8px; border-radius:50%; background:#ff3b3b; animation:blink 1s infinite; }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.15;}}
  #cctv-time{ position:absolute; bottom:14px; right:16px; color:#fff; font-family:monospace; font-size:11px; opacity:.85; }
  .cctv-corner{ position:absolute; width:20px; height:20px; border:2px solid rgba(255,255,255,.65); }
  #cc-tl{top:34px; left:34px; border-right:none; border-bottom:none;}
  #cc-tr{top:34px; right:34px; border-left:none; border-bottom:none;}
  #cc-bl{bottom:34px; left:34px; border-right:none; border-top:none;}
  #cc-br{bottom:34px; right:34px; border-left:none; border-top:none;}

  /* ---------- GAME OVER ---------- */
  #result-screen{ background:rgba(4,16,26,.55); backdrop-filter:blur(2px); justify-content:flex-end; padding-bottom:44px; }
  #result-card{ background:rgba(255,255,255,.95); border-radius:24px; padding:26px 24px; text-align:center; width:min(84vw,320px); box-shadow:0 20px 40px rgba(0,0,0,.35); }
  #result-emoji{font-size:52px; display:block; margin-bottom:4px;}
  #result-score{ font-size:42px; font-weight:900; color:var(--coral); }
  #result-fruit{ font-size:20px; font-weight:800; margin-top:2px; color:var(--ink); }
  #result-best{ font-size:14px; font-weight:700; color:#8a6d3b; margin-top:10px; }
  .btn-row{ display:flex; gap:14px; justify-content:center; margin-top:18px; }
  .icon-btn{ appearance:none; border:none; border-radius:999px; width:74px; height:74px; font-size:30px;
    background:var(--coral); color:#fff; box-shadow:0 7px 0 #C6363A, 0 12px 20px rgba(0,0,0,.25);
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition:transform .08s ease; }
  .icon-btn:active{ transform:translateY(5px); box-shadow:0 2px 0 #C6363A, 0 4px 10px rgba(0,0,0,.2); }
  .icon-btn.home{ background:#38B6E8; box-shadow:0 7px 0 #1E7FA8, 0 12px 20px rgba(0,0,0,.25); }
  .icon-btn.home:active{ box-shadow:0 2px 0 #1E7FA8, 0 4px 10px rgba(0,0,0,.2); }

  .fade-in{animation:fadeIn .5s ease forwards;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);}to{opacity:1; transform:translateY(0);}}
</style>
</head>
<body>

<div id="canvas-wrap"></div>
<div id="blackout"><div class="lid" id="lid-top"></div><div class="lid" id="lid-bottom"></div></div>
<div id="hit-flash"></div>
<div id="dbg-replay" style="position:fixed;top:64px;left:8px;z-index:60;font:12px monospace;color:#4f4;text-shadow:0 1px 2px #000;display:none;pointer-events:none;"></div>
<div id="cctv-overlay">
  <div id="cctv-rec"><span id="cctv-dot"></span>REC</div>
  <div id="cctv-time">00:00</div>
  <div class="cctv-corner" id="cc-tl"></div><div class="cctv-corner" id="cc-tr"></div>
  <div class="cctv-corner" id="cc-bl"></div><div class="cctv-corner" id="cc-br"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="crosshair"></div>
  <div id="top-bar">
    <div class="pill">⭐<span id="score-num">0</span></div>
    <div class="pill" id="timer-pill">⏱<span id="time-num">--</span></div>
    <div id="ladder-hud"></div>
  </div>
  <div id="healthbar-wrap" class="hidden"><div id="healthbar-track"><div id="healthbar-fill"></div></div></div>
  <div id="power-meter" class="hidden"><span class="ic">⚡</span><div id="power-track"><div id="power-fill"></div></div></div>
  <div id="impact-fx">
    <div id="impact-ring"></div>
    <svg id="impact-burst" viewBox="-100 -100 200 200"><path id="impact-path" fill="#FFFFFF"/></svg>
  </div>
  <div id="whoosh"></div>
  <div id="score-pop"></div>
  <div id="dmg-pop"></div>
  <div id="time-pop"></div>
</div>

<!-- Title -->
<div class="overlay interactive" id="start-screen">
  <img id="title-img" alt="수박깨기">
  <div id="title-best">
    <div id="best-score">0</div>
    <div id="best-fruit"></div>
  </div>
  <button id="title-start" aria-label="게임 시작"></button>
  <div id="build-tag" style="position:absolute;bottom:8px;right:12px;font:11px monospace;color:#fff;opacity:0.55;text-shadow:0 1px 2px #0008;">build 12</div>
</div>

<!-- Countdown -->
<div class="overlay" id="countdown-screen" style="display:none;">
  <div id="countdown-num">3</div>
</div>
<div class="overlay" id="next-screen" style="display:none;">
  <div id="next-badge">🍈</div>
</div>

<!-- Game over -->
<div class="overlay interactive hidden" id="result-screen">
  <div id="result-card" class="fade-in">
    <span id="result-emoji">⏰</span>
    <div id="result-score">0</div>
    <div id="result-fruit">🍉 LV.1</div>
    <div id="result-best">👑 0</div>
    <div class="btn-row">
      <button class="icon-btn" id="btn-again">🔁</button>
      <button class="icon-btn home" id="btn-home">🏠</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
(function(){
"use strict";

/* =========================================================

   ========================================================= */
let actx = null, master = null;
function ensureAudio(){
  if(!actx){
    actx = new (window.AudioContext||window.webkitAudioContext)();
    master = actx.createGain();
    master.gain.value = 1;
    master.connect(actx.destination);
  }
  if(actx.state === "suspended"){ actx.resume(); }
}
/* ramp overall volume (used to dim sound during the replay) */
function duckAudio(level, ramp){
  if(!master) return;
  const t = actx.currentTime;
  master.gain.cancelScheduledValues(t);
  master.gain.setValueAtTime(master.gain.value, t);
  master.gain.linearRampToValueAtTime(level, t+(ramp||0.3));
}

function playThud(){
  ensureAudio();
  const t = actx.currentTime;
  const osc = actx.createOscillator(); const gain = actx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(140, t);
  osc.frequency.exponentialRampToValueAtTime(38, t+0.28);
  gain.gain.setValueAtTime(0.001, t);
  gain.gain.exponentialRampToValueAtTime(0.9, t+0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.35);
  osc.connect(gain); gain.connect(master);
  osc.start(t); osc.stop(t+0.4);
  playNoiseBurst(0.15, 800, 0.25);
}
function playNoiseBurst(duration, cutoff, volume){
  ensureAudio();
  const t = actx.currentTime;
  const bufferSize = actx.sampleRate * duration;
  const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1) * (1 - i/bufferSize); }
  const src = actx.createBufferSource(); src.buffer = buffer;
  const filter = actx.createBiquadFilter(); filter.type="lowpass"; filter.frequency.value=cutoff;
  const gain = actx.createGain();
  gain.gain.setValueAtTime(volume, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+duration);
  src.connect(filter); filter.connect(gain); gain.connect(master);
  src.start(t);
}
function playSplash(){
  ensureAudio();
  const t = actx.currentTime; const dur = 0.3;
  const bufferSize = actx.sampleRate * dur;
  const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i]=(Math.random()*2-1)*(1-i/bufferSize); }
  const src = actx.createBufferSource(); src.buffer=buffer;
  const filter = actx.createBiquadFilter(); filter.type="bandpass";
  filter.frequency.setValueAtTime(1600,t);
  filter.frequency.exponentialRampToValueAtTime(500,t+dur);
  filter.Q.value=0.8;
  const gain = actx.createGain();
  gain.gain.setValueAtTime(0.5,t);
  gain.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(filter); filter.connect(gain); gain.connect(master);
  src.start(t);
}
function playSwingWhoosh(power){
  ensureAudio();
  const t = actx.currentTime; const dur = 0.18;
  const bufferSize = actx.sampleRate * dur;
  const buffer = actx.createBuffer(1, bufferSize, actx.sampleRate);
  const data = buffer.getChannelData(0);
  for(let i=0;i<bufferSize;i++){ data[i]=(Math.random()*2-1); }
  const src = actx.createBufferSource(); src.buffer = buffer;
  const filter = actx.createBiquadFilter(); filter.type="bandpass";
  filter.frequency.setValueAtTime(600+power*1800, t);
  filter.frequency.exponentialRampToValueAtTime(200, t+dur);
  filter.Q.value = 0.7;
  const gain = actx.createGain();
  gain.gain.setValueAtTime(0.25+power*0.35, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+dur);
  src.connect(filter); filter.connect(gain); gain.connect(master);
  src.start(t);
}
function playCrack(big){
  ensureAudio();
  playNoiseBurst(big?0.34:0.16, big?2600:1900, big?1.15:0.6);
  const t = actx.currentTime;
  const osc = actx.createOscillator(); const gain = actx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(big?280:340, t);
  osc.frequency.exponentialRampToValueAtTime(55, t+0.2);
  gain.gain.setValueAtTime(big?0.7:0.38, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+0.22);
  osc.connect(gain); gain.connect(master);
  osc.start(t); osc.stop(t+0.24);
  const sub = actx.createOscillator(); const subGain = actx.createGain();
  sub.type = "sine"; sub.frequency.setValueAtTime(big?90:70,t);
  sub.frequency.exponentialRampToValueAtTime(30,t+0.18);
  subGain.gain.setValueAtTime(big?0.6:0.3,t);
  subGain.gain.exponentialRampToValueAtTime(0.001,t+0.22);
  sub.connect(subGain); subGain.connect(master);
  sub.start(t); sub.stop(t+0.24);
}
function playChime(){
  ensureAudio();
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f,i)=>{
    const t = actx.currentTime + i*0.09;
    const osc = actx.createOscillator(); const gain = actx.createGain();
    osc.type = "sine"; osc.frequency.value = f;
    gain.gain.setValueAtTime(0.001,t);
    gain.gain.exponentialRampToValueAtTime(0.28,t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,t+0.35);
    osc.connect(gain); gain.connect(master);
    osc.start(t); osc.stop(t+0.4);

}
/* game over: sagging "wah-wah" descent + final low thud */
function playFail(){
  ensureAudio();
  const notes = [440, 392, 349, 262];
  notes.forEach((f,i)=>{
    const last = i === notes.length-1;
    const t = actx.currentTime + i*0.24;
    const osc = actx.createOscillator(); const gain = actx.createGain();
    osc.type = "triangle"; osc.frequency.setValueAtTime(f,t);
    osc.frequency.exponentialRampToValueAtTime(f*0.94, t+(last?0.55:0.2));
    gain.gain.setValueAtTime(0.001,t);
    gain.gain.exponentialRampToValueAtTime(0.32,t+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001,t+(last?0.6:0.24));
    osc.connect(gain); gain.connect(master);
    osc.start(t); osc.stop(t+(last?0.65:0.28));
  });
  const t2 = actx.currentTime + 1.1;
  const sub = actx.createOscillator(); const sg = actx.createGain();
  sub.type="sine"; sub.frequency.setValueAtTime(70,t2);
  sub.frequency.exponentialRampToValueAtTime(30,t2+0.4);
  sg.gain.setValueAtTime(0.5,t2); sg.gain.exponentialRampToValueAtTime(0.001,t2+0.45);
  sub.connect(sg); sg.connect(master); sub.start(t2); sub.stop(t2+0.5);
}
/* alternating tick-tock + low pulse for last-seconds tension */
function playTickTock(sec){
  ensureAudio();
  const t = actx.currentTime;
  const hi = sec % 2 === 0;
  const osc = actx.createOscillator();
  osc.type = "square"; osc.frequency.value = hi?1250:840;
  const f = actx.createBiquadFilter(); f.type="bandpass"; f.frequency.value = hi?1250:840; f.Q.value = 6;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.55,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  osc.connect(f); f.connect(g); g.connect(master);
  osc.start(t); osc.stop(t+0.08);
  const o2 = actx.createOscillator(); const g2 = actx.createGain();
  o2.type="sine"; o2.frequency.value=68;
  g2.gain.setValueAtTime(0.14,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.13);
  o2.connect(g2); g2.connect(master); o2.start(t); o2.stop(t+0.15);
}
/* referee whistle: warbled square burst */
function playWhistle(){
  ensureAudio();
  const t = actx.currentTime;
  const osc = actx.createOscillator(); osc.type = "square";
  osc.frequency.setValueAtTime(2100, t);
  const vib = actx.createOscillator(); vib.frequency.value = 38;
  const vibGain = actx.createGain(); vibGain.gain.value = 150;
  vib.connect(vibGain); vibGain.connect(osc.frequency);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.32, t+0.03);
  g.gain.setValueAtTime(0.32, t+0.5);
  g.gain.exponentialRampToValueAtTime(0.001, t+0.65);
  osc.connect(g); g.connect(master);
  osc.start(t); osc.stop(t+0.7); vib.start(t); vib.stop(t+0.7);

/* short brass-ish fanfare on every successful break */
function playFanfare(){
  ensureAudio();
  const seq = [[523.25,0,0.12],[659.25,0.12,0.12],[783.99,0.24,0.12],[1046.5,0.36,0.45]];
  seq.forEach(([f,dt,dur])=>{
    const t = actx.currentTime + dt;
    ["square","sawtooth"].forEach((type,i)=>{
      const o = actx.createOscillator(); o.type = type; o.frequency.value = f*(i?0.5:1);
      const g = actx.createGain();
      g.gain.setValueAtTime(0.001, t);
      g.gain.exponentialRampToValueAtTime(i?0.07:0.15, t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t+dur);
      o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.05);

  });

function playHitSound(accuracy, power, crit){
  ensureAudio();
  const t = actx.currentTime;
  const vol = 0.25 + 0.45*accuracy + 0.25*power;
  playNoiseBurst(crit?0.22:0.13, crit?2400:(1200+accuracy*900), Math.min(1.1, vol));
  const osc = actx.createOscillator(); const gain = actx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(crit?240:(300+(1-accuracy)*120), t);
  osc.frequency.exponentialRampToValueAtTime(crit?45:70, t+(crit?0.24:0.15));
  gain.gain.setValueAtTime(Math.min(0.9, vol*(crit?1.15:0.75)), t);
  gain.gain.exponentialRampToValueAtTime(0.001, t+(crit?0.26:0.17));
  osc.connect(gain); gain.connect(master);
  osc.start(t); osc.stop(t+0.3);
  if(crit){
    const sub = actx.createOscillator(); const sg = actx.createGain();
    sub.type="sine"; sub.frequency.setValueAtTime(85,t);
    sub.frequency.exponentialRampToValueAtTime(28,t+0.22);
    sg.gain.setValueAtTime(0.55,t); sg.gain.exponentialRampToValueAtTime(0.001,t+0.24);
    sub.connect(sg); sg.connect(master); sub.start(t); sub.stop(t+0.26);
  }
}

/* =========================================================
   TITLE BGM — cheerful plucky loop, synthesized
   ========================================================= */
let bgm = null;
const BGM_TEMPO = 132;
const BGM_MELODY = [ // [beat, midi, beats]
  [0,72,.5],[0.5,76,.5],[1,79,.5],[1.5,76,.5],[2,72,.5],[2.5,79,.5],[3,81,1],
  [4,79,.5],[4.5,76,.5],[5,72,.5],[5.5,76,.5],[6,74,1.5],[7.5,67,.5]
];
const BGM_BASS = [[0,48],[1,55],[2,48],[3,55],[4,53],[5,60],[6,50],[7,55]];
const BGM_BEATS = 8;
function midiHz(m){ return 440*Math.pow(2,(m-69)/12); }
function scheduleBgmLoop(startT){
  const spb = 60/BGM_TEMPO;
  BGM_MELODY.forEach(([b,m,len])=>{
    const t = startT + b*spb;
    const o = actx.createOscillator(); o.type = "triangle"; o.frequency.value = midiHz(m);
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.09,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+len*spb*0.9);
    o.connect(g); g.connect(bgm.gain); o.start(t); o.stop(t+len*spb);
  });
  BGM_BASS.forEach(([b,m])=>{
    const t = startT + b*spb;
    const o = actx.createOscillator(); o.type = "sine"; o.frequency.value = midiHz(m);
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.07,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+spb*0.85);
    o.connect(g); g.connect(bgm.gain); o.start(t); o.stop(t+spb);
  });
}
function startTitleBgm(){
  ensureAudio();
  if(bgm) return;
  if(actx.state !== "running"){
    actx.resume().then(()=>{ if(!bgm) startTitleBgm(); }).catch(()=>{});
    return;
  }
  bgm = { gain:actx.createGain(), next:actx.currentTime+0.05, timer:null };
  bgm.gain.gain.value = 0.9;
  bgm.gain.connect(master);
  const loopLen = BGM_BEATS * 60/BGM_TEMPO;
  const tick = ()=>{
    while(bgm && bgm.next < actx.currentTime + 1.2){ scheduleBgmLoop(bgm.next); bgm.next += loopLen; }
  };
  tick();
  bgm.timer = setInterval(tick, 400);
}
function stopTitleBgm(){
  if(!bgm) return;
  clearInterval(bgm.timer);
  const g = bgm.gain;
  const t = actx.currentTime;
  g.gain.setValueAtTime(g.gain.value, t);
  g.gain.linearRampToValueAtTime(0.0001, t+0.4);
  setTimeout(()=>g.disconnect(), 600);
  bgm = null;
}

let yaw=0, pitch=0, useDeviceOrientation=false, deviceYawOffset=0, lastAlpha=null;
/* replays own the camera: while locked, gyro/pointer look-events must NOT
   stomp camera.rotation (they fire between frames and win the race) */
let camLocked=false;
function applyLook(){ if(camLocked) return; camera.rotation.order="YXZ"; camera.rotation.y=yaw; camera.rotation.x=pitch; }

const pointer = { active:false, lastX:0, lastY:0, lastT:0, path:[] };
const LOOK_SENS = 0.0028;
function pointerDown(x,y){ pointer.active=true; pointer.lastX=x; pointer.lastY=y; pointer.lastT=performance.now(); pointer.path=[{x,y,t:pointer.lastT}]; }
function pointerMove(x,y){
  if(!pointer.active) return;
  const now=performance.now();
  const dx=x-pointer.lastX, dy=y-pointer.lastY;
  if(!useDeviceOrientation){
    yaw -= dx*LOOK_SENS; pitch -= dy*LOOK_SENS;
    pitch = Math.max(-1.15, Math.min(1.15, pitch));
    applyLook();
  }
  pointer.path.push({x,y,t:now}); if(pointer.path.length>8) pointer.path.shift();
  pointer.lastX=x; pointer.lastY=y; pointer.lastT=now;
}
function pointerUp(){ pointer.active=false; onDragEnd(); }

/* device orientation, gimbal-safe: the upright-portrait play posture sits
   right on the beta≈90° euler singularity, where raw alpha JUMPS by up to
   180° (the "view teleports sideways" bug). Build the full rotation as a
   quaternion (stable everywhere) and extract a continuous look direction. */
const _oE = new THREE.Euler();
const _oQ = new THREE.Quaternion();
const _oQ1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90° about X
const _oQS = new THREE.Quaternion();
const _oZ = new THREE.Vector3(0,0,1);
const _oF = new THREE.Vector3();
function handleOrientation(e){
  if(e.alpha===null||e.alpha===undefined||e.beta===null||e.gamma===null) return;
  useDeviceOrientation = true;
  _oE.set(THREE.MathUtils.degToRad(e.beta),
          THREE.MathUtils.degToRad(e.alpha),
          -THREE.MathUtils.degToRad(e.gamma), "YXZ");
  _oQ.setFromEuler(_oE);
  _oQ.multiply(_oQ1); // camera looks out of the back of the device
  const so = (screen.orientation && typeof screen.orientation.angle === "number")
    ? screen.orientation.angle : (window.orientation || 0);
  _oQ.multiply(_oQS.setFromAxisAngle(_oZ, -THREE.MathUtils.degToRad(so)));
  _oF.set(0,0,-1).applyQuaternion(_oQ);
  const rawYaw = Math.atan2(-_oF.x, -_oF.z);
  if(lastAlpha===null){ deviceYawOffset = rawYaw; }
  lastAlpha = rawYaw;
  let ny = rawYaw - deviceYawOffset;
  while(ny - yaw >  Math.PI) ny -= 2*Math.PI; // stay continuous across the ±180° seam
  while(ny - yaw < -Math.PI) ny += 2*Math.PI;
  yaw = ny;
  pitch = THREE.MathUtils.clamp(Math.asin(THREE.MathUtils.clamp(_oF.y,-1,1)), -1.15, 1.15);
  applyLook();
}
function recalibrateOrientation(){ lastAlpha=null; }

/* auto-requested on the start tap (a user gesture, so the iOS permission
   dialog is allowed); no separate button needed */
let motionRequested = false;
function requestMotionPermission(){
  if(motionRequested) return;
  motionRequested = true;
  const needsPermission = typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function";
  if(needsPermission){
    Promise.all([
      DeviceOrientationEvent.requestPermission().catch(()=>"denied"),
      (typeof DeviceMotionEvent !== "undefined" && typeof DeviceMotionEvent.requestPermission === "function") ? DeviceMotionEvent.requestPermission().catch(()=>"denied") : Promise.resolve("granted")
    ]).then(([oriRes, motRes])=>{
      if(oriRes==="granted"){ window.addEventListener("deviceorientation", handleOrientation); }
      if(motRes==="granted"){ window.addEventListener("devicemotion", handleMotion); }
      if(oriRes!=="granted"){ motionRequested=false; }
    });
  } else if(typeof DeviceOrientationEvent !== "undefined"){
    window.addEventListener("deviceorientation", handleOrientation);
    window.addEventListener("devicemotion", handleMotion);
  }
}

let lastMotionPeakT = 0;
function handleMotion(e){
  const a = e.accelerationIncludingGravity || e.acceleration;
  if(!a) return;
  const mag = Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2);
  const now = performance.now();
  if(mag>22 && now-lastMotionPeakT>260 && gameState==="playing"){
    lastMotionPeakT = now;
    triggerSwing(Math.min(1,(mag-12)/26), "motion");
  }
}

let swingAnim = { active:false, t:0, dur:0.4, power:0.5 };
function startClubSwingAnim(power){ swingAnim.active=true; swingAnim.t=0; swingAnim.power=power; swingAnim.dur=0.46-power*0.14; }
function updateClubSwingAnim(dt){
  if(!swingAnim.active){
    clubGroup.rotation.copy(CLUB_REST_ROT);
    clubGroup.position.z = -0.46;
    swingTrail.material.opacity = 0;
    return;
  }
  swingAnim.t += dt;
  const p = Math.min(1, swingAnim.t/swingAnim.dur);
  const amp = 1 + swingAnim.power*0.35;
  if(p < 0.3){
    /* anticipation: raise the bat tip high above the crosshair */
    const e = 1 - Math.pow(1-p/0.3, 2);
    clubGroup.rotation.x = CLUB_REST_ROT.x + e*0.62;
    clubGroup.rotation.z = e*0.18;
  } else {
    /* strike: whip down through the vanishing point with a lunge */
    const w = (p-0.3)/0.7;
    const e = 1 - Math.pow(1-w, 3);
    clubGroup.rotation.x = CLUB_REST_ROT.x + 0.62 - e*1.75*amp;
    clubGroup.rotation.z = 0.18 - e*0.5;
    clubGroup.position.z = -0.46 - Math.sin(w*Math.PI)*0.16;
    swingTrail.material.opacity = Math.sin(w*Math.PI)*0.3;
  }
  if(p>=1){ swingAnim.active=false; swingTrail.material.opacity=0; }
}

  armL.position.set(-0.24,0.62,0.03); armL.rotation.z=0.5; armL.castShadow=true; g.add(armL);

}
/* --- cute 8-direction billboard avatar (baked from character_sheet.png) ---
   frame order: 0 front, 1 front-left, 2 left, 3 back-left, 4 back,
                5 back-right, 6 right, 7 front-right  (45° steps CCW) */
const AVATAR_FRAMES = 8;
const AVATAR_H      = 1.32;    // world height of the sprite
const AVATAR_FEET   = 0.0199;  // transparent padding below the feet in each frame
const AVATAR_ASPECT = 1.0833;  // frame width / height

function buildAvatarSprite(){
  const g = new THREE.Group();
  const tex = new THREE.TextureLoader().load(AVATAR_SHEET_B64);
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.generateMipmaps = false;
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  /* frame selection is done by rewriting the plane's UVs directly — some
     mobile GPUs mangled the texture offset/repeat matrix (frames came out
     halved-shifted => the avatar faced the wrong way on phones only) */

  const holder = new THREE.Group();
  const plane = new THREE.Mesh(
    new THREE.PlaneGeometry(AVATAR_H*AVATAR_ASPECT, AVATAR_H),
    new THREE.MeshBasicMaterial({ map:tex, transparent:true, alphaTest:0.08, side:THREE.DoubleSide }));
  plane.position.y = AVATAR_H*(0.5 - AVATAR_FEET);
  holder.add(plane);
  g.add(holder);

  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.34, 24),
    new THREE.MeshBasicMaterial({ color:0x000000, transparent:true, opacity:0.22, depthWrite:false }));
  shadow.rotation.x = -Math.PI/2; shadow.position.y = 0.02;
  g.add(shadow);

  const armPivot = new THREE.Group(); // dummy — the replay drives its rotation.x
  g.add(armPivot);
  g.userData.armPivot = armPivot;
  g.userData.sprite = { holder, tex, uv:plane.geometry.attributes.uv, frame:-1, k:0, settle:0 };
  return g;
}

function setAvatarFrame(sp, frame){
  const u0 = frame/AVATAR_FRAMES, u1 = (frame+1)/AVATAR_FRAMES;
  sp.uv.setX(0, u0); sp.uv.setX(1, u1);   // top-left, top-right
  sp.uv.setX(2, u0); sp.uv.setX(3, u1);   // bottom-left, bottom-right
  sp.uv.needsUpdate = true;
}

const avatar = (typeof AVATAR_SHEET_B64 !== "undefined") ? buildAvatarSprite() : buildAvatar();
avatar.visible = false;
scene.add(avatar);
const AVATAR_ARM_REST = -2.3;

/* billboard the sprite at the camera, pick the direction frame from the
   camera angle, and turn the arm-pivot swing into a body lunge */
const _av = { f:new THREE.Vector3(), toCam:new THREE.Vector3(), axis:new THREE.Vector3(),
              up:new THREE.Vector3(0,1,0), qYaw:new THREE.Quaternion(), qLean:new THREE.Quaternion() };
const dbgReplay = document.getElementById("dbg-replay");
function updateAvatarSprite(dt){
  const sp = avatar.userData.sprite;
  if(!sp || !avatar.visible){ if(dbgReplay.style.display!=="none") dbgReplay.style.display="none"; return; }

  /* facing, in XZ. During the winning replay derive it STRAIGHT from the
     geometry (fruit − avatar) so no rotation state can ever poison it. */
  if(gameState==="replay" && replayData){
    _av.f.copy(replayData.origin).sub(avatar.position);
  } else {
    _av.f.set(0,0,1).applyQuaternion(avatar.quaternion);
  }
  _av.f.y = 0; _av.f.normalize();
  _av.toCam.copy(camera.position).sub(avatar.position); _av.toCam.y = 0;
  if(_av.toCam.lengthSq() < 1e-6) return;
  _av.toCam.normalize();

  /* signed angle facing→camera, in 45° frame units. NEGATED: the source
     turnaround's left/right is mirrored (its "RIGHT SIDE" art faces right
     on screen), so the sheet columns run clockwise, not counter-clockwise —
     confirmed on-device: with +a the muzzle pointed away from the fruit. */
  const s = _av.f.z*_av.toCam.x - _av.f.x*_av.toCam.z;
  const c = _av.f.x*_av.toCam.x + _av.f.z*_av.toCam.z;
  const a = -Math.atan2(s, c) / (Math.PI/4);
  let d = a - sp.k; d = ((d % 8) + 8) % 8; if(d > 4) d -= 8;
  if(Math.abs(d) > 0.62) sp.k = Math.round(a); // hysteresis against boundary flicker
  const frame = ((sp.k % 8) + 8) % 8;
  if(frame !== sp.frame){ sp.frame = frame; setAvatarFrame(sp, frame); }

  /* diagnostic readout — hidden unless the page is opened with #debug */
  if(location.hash.indexOf("debug") !== -1){
    dbgReplay.style.display = "block";
    dbgReplay.textContent = "b12 F" + frame + " a" + a.toFixed(2) + " L" + (camLocked?1:0) + " " + gameState;
  }

  /* swing: replay animates armPivot.rotation.x from AVATAR_ARM_REST (rest)
     to AVATAR_ARM_REST+3 (hit) — map it onto a lean + squash & stretch */
  const dev = avatar.userData.armPivot.rotation.x - AVATAR_ARM_REST;
  const sT = THREE.MathUtils.clamp(dev/3, 0, 1);
  if(sT >= 0.999) sp.settle = Math.min(1, sp.settle + dt*2.2); // pop back up after the hit
  else sp.settle = 0;
  const relax = 1 - 0.75*sp.settle;
  const idle = sT < 0.05 ? dev*0.8 : 0;                        // windup bob → gentle sway
  const lean = (-0.14 + sT*0.85)*relax + idle;

  _av.qYaw.setFromAxisAngle(_av.up, Math.atan2(_av.toCam.x, _av.toCam.z));
  _av.axis.crossVectors(_av.up, _av.f).normalize();
  _av.qLean.setFromAxisAngle(_av.axis, lean);
  sp.holder.quaternion.copy(avatar.quaternion).invert().multiply(_av.qLean).multiply(_av.qYaw);

  const sq = sT*relax;
  const breathe = sT < 0.05 ? dev*0.5 : 0;
  sp.holder.scale.set(1 + sq*0.12, 1 - sq*0.10 + breathe, 1);
}

   FRUIT TEXTURES
   ========================================================= */
function makeStripedTexture(bg,stripe,lineWidth,count){
  const c=document.createElement("canvas"); c.width=512; c.height=256;
  const ctx=c.getContext("2d");
  ctx.fillStyle=bg; ctx.fillRect(0,0,512,256);
  ctx.strokeStyle=stripe; ctx.lineWidth=lineWidth;
  const step=512/count;
  for(let i=-1;i<count+1;i++){
    ctx.beginPath();
    const x=i*step+Math.sin(i)*step*0.12;
    ctx.moveTo(x,-10); ctx.quadraticCurveTo(x+step*0.35,128,x,266); ctx.stroke();
  }
  for(let i=0;i<80;i++){
    ctx.fillStyle=`rgba(255,255,255,${0.03+Math.random()*0.06})`;
    ctx.beginPath();
    ctx.ellipse(Math.random()*512,Math.random()*256,14+Math.random()*10,6+Math.random()*5,Math.random()*Math.PI,0,Math.PI*2);
    ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}
function makeMottledTexture(base,dark,light){
  const c=document.createElement("canvas"); c.width=256; c.height=256;
  const ctx=c.getContext("2d");
  ctx.fillStyle=base; ctx.fillRect(0,0,256,256);
  for(let i=0;i<60;i++){
    ctx.fillStyle=dark; ctx.globalAlpha=0.06+Math.random()*0.1;
    ctx.beginPath(); ctx.ellipse(Math.random()*256,Math.random()*256,10+Math.random()*18,8+Math.random()*14,Math.random()*Math.PI,0,Math.PI*2); ctx.fill();
  }
  for(let i=0;i<10;i++){
    ctx.fillStyle=light; ctx.globalAlpha=0.15+Math.random()*0.2;
    ctx.beginPath(); ctx.ellipse(Math.random()*256,Math.random()*256,6+Math.random()*10,4+Math.random()*8,Math.random()*Math.PI,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  return new THREE.CanvasTexture(c);
}
function makeRadialTexture(color){
  const c=document.createElement("canvas"); c.width=64; c.height=64;
  const ctx=c.getContext("2d");
  const g=ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,color); g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=g; ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

function coverRect(natW, natH, vw, vh, r){
  const s = Math.max(vw/natW, vh/natH);
  const w = natW*s, h = natH*s, ox = (vw-w)/2, oy = (vh-h)/2;
  return { x: ox + r.x0*w, y: oy + r.y0*h, w: (r.x1-r.x0)*w, h: (r.y1-r.y0)*h };
}
function layoutTitle(){
  const startScreen = document.getElementById("start-screen");
  if(startScreen.style.display === "none") return;
  const vw = window.innerWidth, vh = window.innerHeight;
  const cfg = TITLES[vw >= vh ? "landscape" : "portrait"];
  const imgEl = document.getElementById("title-img");
  if(imgEl.dataset.src !== cfg.src){ imgEl.src = cfg.src; imgEl.dataset.src = cfg.src; }
  if(!cfg.img.complete || !cfg.img.naturalWidth) return;
  const natW = cfg.img.naturalWidth, natH = cfg.img.naturalHeight;

  const b = coverRect(natW, natH, vw, vh, cfg.btn);
  const btn = document.getElementById("title-start");
  btn.style.transform = "none"; btn.style.bottom = "auto";
  btn.style.left = b.x+"px"; btn.style.top = b.y+"px";
  btn.style.width = b.w+"px"; btn.style.height = b.h+"px";
  btn.style.borderRadius = (b.h/2)+"px";

  const p = coverRect(natW, natH, vw, vh, cfg.panel);
  const panel = document.getElementById("title-best");
  panel.style.transform = "none";
  panel.style.left = p.x+"px"; panel.style.top = p.y+"px";
  panel.style.width = p.w+"px"; panel.style.height = p.h+"px";
  document.getElementById("best-score").style.fontSize = (p.h*0.40)+"px";
  document.getElementById("best-fruit").style.fontSize = (p.h*0.26)+"px";
}
function refreshBestDisplay(){
  document.getElementById("best-score").textContent = best.score>0 ? best.score.toLocaleString() : "0";
  document.getElementById("best-fruit").textContent = best.score>0 ? best.fruit+" LV."+best.level : "";
}
refreshBestDisplay();
layoutTitle();

/* =========================================================
   FRUIT INSTANCE
   ========================================================= */
let fruitMesh = null;
let fruitState = null;
const debrisGroup = new THREE.Group(); scene.add(debrisGroup);
const juiceGroup = new THREE.Group(); scene.add(juiceGroup);

function clearParticles(){
  debrisGroup.children.slice().forEach(m=>debrisGroup.remove(m));
  juiceGroup.children.slice().forEach(m=>juiceGroup.remove(m));
}

function buildFruitMesh(tier, radius, glowColor){
  const mat = new THREE.MeshStandardMaterial({map:tier.getTexture(), roughness:0.55});
  if(glowColor){
    mat.emissive = new THREE.Color(glowColor);
    mat.emissiveIntensity = 0.25;
  }
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius,22,16), mat);
  mesh.castShadow = true; mesh.receiveShadow = true;
  if(glowColor){
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({
      map:getGlowTexture(glowColor), transparent:true, opacity:0.5,
      depthWrite:false, blending:THREE.AdditiveBlending }));
    spr.scale.set(radius*4.5, radius*4.5, 1);
    mesh.add(spr);
    mesh.userData.glowSpr = spr;
    mesh.userData.glowBase = radius*4.5;
  }
  return mesh;
}

let lastDropPos = null; // where the previous fruit landed — the next one keeps clear of it

function spawnFruit(){
  clearParticles();
  const stage = stageOf(levelIndex), loop = loopOf(levelIndex);
  const tier = LEVELS[stage];
  const variance = 0.85 + Math.random()*0.3;
  const radius = tier.radius * variance;
  const glowColor = loop>0 ? GLOW_COLORS[Math.min(loop-1, GLOW_COLORS.length-1)] : null;
  const mesh = buildFruitMesh(tier, radius, glowColor);
  if(glowColor) mesh.material.emissiveIntensity = Math.min(0.7, 0.2+0.12*loop);

  /* resample until we're far from the last drop; if all tries fail, keep the farthest */
  const MIN_DROP_GAP = 2.0;
  let px = 0, pz = 0, bestD = -1;
  for(let i=0;i<40;i++){
    const angle = (Math.random()-0.5)*Math.PI*0.9;
    const dist = 1.6 + Math.random()*1.4;
    const x = Math.sin(angle)*dist, z = -Math.cos(angle)*dist;
    const d = lastDropPos ? Math.hypot(x-lastDropPos.x, z-lastDropPos.z) : Infinity;
    if(d > bestD){ bestD = d; px = x; pz = z; }
    if(d >= MIN_DROP_GAP) break;
  }
  lastDropPos = { x:px, z:pz };
  mesh.position.set(px, 8+Math.random()*2, pz);
  scene.add(mesh);

  fruitMesh = mesh;
  const maxHealth = tier.healthBase * variance * (1 + loop*0.65);
  fruitState = {
    tier, stage, loop, sizeFactor:variance, radius, landed:false, vy:0,
    landY: radius*0.55, health:maxHealth, maxHealth,
    baseDamage: tier.healthBase * variance,
    requiredPower: Math.min(0.88, tier.powerBase*(0.85+variance*0.3)*(1+loop*0.06)),
    hitTolerance: tier.tolBase*(0.9+(variance-1)*0.5),
    glowColor, squash:0, broken:false
  };

  timeLeft = roundTimeFor(levelIndex) + carryBonus;
  if(carryBonus > 0.05) popTimeBonus(carryBonus);
  carryBonus = 0;
  lastTickSec = 99;
  updateTimerHud();
  refreshLadderHud();
}

function updateFruitPhysics(dt){
  if(!fruitMesh || !fruitState || fruitState.broken) return;
  if(!fruitState.landed){
    fruitState.vy -= 14*dt;
    fruitMesh.position.y += fruitState.vy*dt;
    fruitMesh.rotation.x += dt*2.2; fruitMesh.rotation.z += dt*1.3;
    if(fruitMesh.position.y <= fruitState.landY){
      fruitMesh.position.y = fruitState.landY;
      if(Math.abs(fruitState.vy)>3){ fruitState.vy *= -0.28; }
      else{
        fruitState.vy=0; fruitState.landed=true;
        fruitMesh.rotation.set(0,fruitMesh.rotation.y,0);
        playThud(); cameraShake(0.18,0.22);
        document.getElementById("healthbar-wrap").classList.remove("hidden");
        updateHealthBar();
      }
    }
  }
}
function updateHealthBar(){
  document.getElementById("healthbar-fill").style.width = Math.max(0, fruitState.health/fruitState.maxHealth*100)+"%";
}

/* =========================================================
   IMPACT FX — shared by live break and replay re-enactment
   ========================================================= */
let hitStopUntil = 0;
let slowMoUntil = 0;
const shockwaves = [];

function flashScreen(op, color){
  const f = document.getElementById("hit-flash");
  f.style.background = color || "#fff";
  f.style.transition = "none"; f.style.opacity = String(op);
  requestAnimationFrame(()=>{
    f.style.transition = "opacity .28s ease"; f.style.opacity = "0";
  });
}

/* screen-space impact FX — irregular starburst + juice-tinted ring + whoosh streak */
(function buildImpactBurst(){
  const spikes = 14; let d = "";
  for(let i=0;i<spikes;i++){
    const a = (i/spikes)*Math.PI*2;
    const outer = 52 + Math.random()*42;
    const inner = 16 + Math.random()*9;
    const w = 0.035 + Math.random()*0.03;
    d += "M"+(Math.cos(a-w)*inner).toFixed(1)+","+(Math.sin(a-w)*inner).toFixed(1)
       + " L"+(Math.cos(a)*outer).toFixed(1)+","+(Math.sin(a)*outer).toFixed(1)
       + " L"+(Math.cos(a+w)*inner).toFixed(1)+","+(Math.sin(a+w)*inner).toFixed(1)+" Z ";
  }
  document.getElementById("impact-path").setAttribute("d", d);
})();
function fxImpact(big, color){
  const ring = document.getElementById("impact-ring");
  ring.style.borderColor = color || "rgba(255,255,255,.9)";
  ring.classList.remove("show"); void ring.offsetWidth; ring.classList.add("show");
  const b = document.getElementById("impact-burst");
  b.style.setProperty("--rot", Math.floor(Math.random()*360)+"deg");
  b.style.setProperty("--o", big ? "0.55" : "0.32");
  b.style.setProperty("--s", big ? "1.45" : "1.12");
  b.classList.remove("show"); void b.offsetWidth; b.classList.add("show");
}
function fxWhoosh(dirSign){
  const w = document.getElementById("whoosh");
  const s = dirSign>=0 ? 1 : -1;
  w.style.setProperty("--dir", String(s));
  w.style.setProperty("--tilt", (-s*(4+Math.random()*10)).toFixed(1)+"deg");
  w.classList.remove("show"); void w.offsetWidth; w.classList.add("show");
}
function fovPunch(amount, ms){
  camera.fov = BASE_FOV - amount;
  camera.updateProjectionMatrix();
  setTimeout(()=>{ camera.fov = BASE_FOV; camera.updateProjectionMatrix(); }, ms);
}

function spawnShockwave(pos, big){
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.05,0.14,28),
    new THREE.MeshBasicMaterial({ color:0xFFE9A0, transparent:true, opacity:0.9, side:THREE.DoubleSide, blending:THREE.AdditiveBlending })
  );
  ring.position.copy(pos); ring.position.y = 0.03; ring.rotation.x = -Math.PI/2;
  scene.add(ring);
  shockwaves.push({ mesh:ring, t:0, dur: big?0.55:0.4, maxScale: big?7:4.5 });
}
function updateShockwaves(dt){
  for(let i=shockwaves.length-1;i>=0;i--){
    const s = shockwaves[i]; s.t += dt;
    const p = Math.min(1, s.t/s.dur);
    const scale = 0.3 + p*s.maxScale;
    s.mesh.scale.set(scale,scale,scale);
    s.mesh.material.opacity = 0.9*(1-p);
    if(p>=1){ scene.remove(s.mesh); shockwaves.splice(i,1); }
  }
}
function clearShockwaves(){
  shockwaves.forEach(s=>scene.remove(s.mesh));
  shockwaves.length = 0;
}

function spawnJuiceBurst(origin, tier, radius, count, power, hitDir){
  if(!tier.juiceTexA) tier.juiceTexA = makeRadialTexture(tier.juiceA);
  for(let i=0;i<count;i++){
    const mat = new THREE.SpriteMaterial({ map:tier.juiceTexA, transparent:true, opacity:0.9, depthWrite:false, blending:THREE.AdditiveBlending });
    const spr = new THREE.Sprite(mat);
    const s = radius*(0.5+Math.random()*0.9);
    spr.scale.set(s,s,1);
    spr.position.copy(origin);
    const dir = new THREE.Vector3((Math.random()-0.5)+hitDir.x*0.8, Math.random()*0.7+0.15, (Math.random()-0.5)+hitDir.z*0.8).normalize();
    spr.userData.vel = dir.multiplyScalar(3+Math.random()*5+power*4);
    spr.userData.life = 0.5+Math.random()*0.4;
    spr.userData.t = 0;
    juiceGroup.add(spr);
  }
}

function explodeFruitFX(origin, tier, radius, powerRatio, hitDir){
  const big = powerRatio > 0.85 || radius > 0.3;
  playCrack(big);
  playSplash();

  const chunkColorA = new THREE.MeshStandardMaterial({ color: new THREE.Color(tier.juiceA), roughness:0.55 });
  const chunkColorB = new THREE.MeshStandardMaterial({ color: new THREE.Color(tier.juiceB), roughness:0.7 });
  const seedMat = new THREE.MeshStandardMaterial({ color:0x1a1a1a, roughness:0.4 });

  const count = 18 + Math.floor(powerRatio*18);
  for(let i=0;i<count;i++){
    const useB = Math.random() < 0.35;
    const s = radius*(0.2+Math.random()*0.3);
    const mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(s,0), useB?chunkColorB:chunkColorA);
    mesh.position.copy(origin); mesh.castShadow = true;
    const dir = new THREE.Vector3((Math.random()-0.5)+hitDir.x*0.7, Math.random()*1.0+0.5, (Math.random()-0.5)+hitDir.z*0.7).normalize();
    const speed = 4 + Math.random()*4 + powerRatio*4.5;
    mesh.userData.vel = dir.multiplyScalar(speed);
    mesh.userData.spin = new THREE.Vector3((Math.random()-0.5)*10,(Math.random()-0.5)*10,(Math.random()-0.5)*10);
    debrisGroup.add(mesh);
  }
  for(let i=0;i<14;i++){
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(radius*0.045,4,4), seedMat);
    mesh.position.copy(origin);
    const dir = new THREE.Vector3((Math.random()-0.5)*2,Math.random()*1.2,(Math.random()-0.5)*2).normalize();
    mesh.userData.vel = dir.multiplyScalar(2.5+Math.random()*3.5);
    mesh.userData.spin = new THREE.Vector3(0,0,0);
    debrisGroup.add(mesh);
  }
  spawnJuiceBurst(origin, tier, radius, 26+Math.floor(powerRatio*20), powerRatio, hitDir);
  spawnShockwave(origin, big);
}

function breakFruit(hitDir, powerRatio){
  if(!fruitMesh || fruitState.broken) return;
  fruitState.broken = true;
  const big = powerRatio > 0.85;
  cameraShake(big?0.42:0.26, 0.34);
  stopHaptics();
  burstHaptic(powerRatio);

  const now = performance.now();
  hitStopUntil = now + (big?150:95);
  slowMoUntil = now + (big?480:340);
  flashScreen(big ? 0.95 : 0.6);
  fovPunch(big?13:7, 180);
  fxImpact(true, fruitState.tier.juiceA);
  playFanfare();

  const origin = fruitMesh.position.clone();
  const st = fruitState;
  explodeFruitFX(origin, st.tier, st.radius, powerRatio, hitDir);

  /* score: smaller fruit + deeper loop = more points, power adds up to +50% */
  const gained = Math.round(st.tier.score * (st.loop+1) * (1 + 0.5*Math.min(1,powerRatio)));
  score += gained;
  updateScoreHud();
  popScore(gained);
  carryBonus = Math.max(0, timeLeft*0.1);

  scene.remove(fruitMesh);
  fruitMesh = null;
  document.getElementById("healthbar-wrap").classList.add("hidden");
  document.getElementById("power-meter").classList.add("hidden");

  replayData = {
    origin, tier:st.tier, radius:st.radius, power:Math.min(1,powerRatio),
    glowColor:st.glowColor,
    dir: new THREE.Vector3(origin.x,0,origin.z).normalize()
  };
  levelIndex++;
  refreshLadderHud();
  setTimeout(()=> enterReplay(), 520);
}

const gravity = -9.8;
function updateDebris(dt){
  debrisGroup.children.forEach(mesh=>{
    const v = mesh.userData.vel; v.y += gravity*dt;
    mesh.position.addScaledVector(v, dt);
    if(mesh.position.y<0.02){ mesh.position.y=0.02; v.y*=-0.35; v.x*=0.85; v.z*=0.85; }
    mesh.rotation.x += mesh.userData.spin.x*dt; mesh.rotation.y += mesh.userData.spin.y*dt; mesh.rotation.z += mesh.userData.spin.z*dt;
  });
  for(let i=juiceGroup.children.length-1;i>=0;i--){
    const spr = juiceGroup.children[i];
    spr.userData.t += dt;
    const v = spr.userData.vel; v.y += gravity*0.6*dt;
    spr.position.addScaledVector(v, dt);
    const p = spr.userData.t/spr.userData.life;
    spr.material.opacity = Math.max(0, 0.9*(1-p));
    if(p>=1){ juiceGroup.remove(spr); }
  }
}

/* =========================================================
   CAMERA SHAKE
   ========================================================= */
let shake = { t:0, dur:0, amp:0 };
function cameraShake(amp,dur){ shake = { t:0, dur, amp }; }
function updateShake(dt){
  if(gameState==="replay" || gameState==="failreplay") return; // replays drive their own camera
  if(shake.t < shake.dur){
    shake.t += dt;
    const decay = 1 - shake.t/shake.dur;
    camera.position.x = (Math.random()-0.5)*shake.amp*decay;
    camera.position.y = 1.6 + (Math.random()-0.5)*shake.amp*decay;
  } else if(gameState==="playing" || gameState==="falling"){
    camera.position.set(0,1.6,0);
  }
}

/* =========================================================
   GAME STATE
   ========================================================= */
let gameState = "idle";
let levelIndex = 0;
let swingCount = 0;

function onDragEnd(){
  if(gameState !== "playing") return;
  if(pointer.path.length<2) return;
  const first = pointer.path[0], last = pointer.path[pointer.path.length-1];
  const dt = Math.max(30, last.t-first.t);
  const dist = Math.sqrt((last.x-first.x)**2+(last.y-first.y)**2);
  if(dist>24){ triggerSwing(Math.min(1,(dist/dt)/1.6), "touch", (last.x-first.x)>=0?1:-1); }
}

function triggerSwing(power, source, dirSign){
  if(gameState !== "playing") return;
  swingCount++;
  document.getElementById("power-fill").style.width = Math.round(power*100)+"%";
  startClubSwingAnim(power);

  let aimRatio = null;
  if(fruitMesh && fruitState && fruitState.landed && !fruitState.broken){
    aimRatio = worldToScreenAngleDist(fruitMesh.position).dist / fruitState.hitTolerance;
  }
  if(aimRatio !== null && aimRatio < 1){
    playSwingWhoosh(power);
    resolveHit(power, aimRatio);
  } else {
    playMissSwish(power);
    fxWhoosh(dirSign===undefined ? (Math.random()<0.5?-1:1) : dirSign);
  }
}

function worldToScreenAngleDist(worldPos){
  const toTarget = worldPos.clone().sub(camera.position).normalize();
  const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).normalize();
  return { dist: Math.acos(THREE.MathUtils.clamp(toTarget.dot(forward),-1,1)) };
}

function resolveHit(power, aimRatio){
  const req = fruitState.requiredPower;
  const effectiveness = Math.min(1.4, power/req);
  const crit = aimRatio < 0.35; // dead-center strike
  /* damage keyed to unscaled base health so loop durability actually needs more hits */
  let dmg = fruitState.baseDamage * (effectiveness>=1 ? 0.55+0.35*Math.min(1,effectiveness-1) : 0.16*effectiveness*effectiveness*4);
  if(crit) dmg *= 1.6;
  dmg = Math.max(6, dmg);
  fruitState.health -= dmg;
  updateHealthBar();
  popDamage(dmg, crit);
  document.getElementById("crosshair").classList.add("lock");
  setTimeout(()=>document.getElementById("crosshair").classList.remove("lock"), 150);
  fruitMesh.position.y += 0.04;
  const hitDir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);

  if(fruitState.health <= 0){
    breakFruit(hitDir, Math.min(1,power));
  } else {
    /* meaty non-breaking hit: micro hit-stop, flash, shake, squash, juice spurt */
    fxImpact(crit, crit ? "#FFD23F" : fruitState.tier.juiceA);
    playHitSound(1-Math.min(1,aimRatio), power, crit);
    spawnShockwave(fruitMesh.position, crit);
    spawnJuiceBurst(fruitMesh.position, fruitState.tier, fruitState.radius, crit?12:8, power*0.6, hitDir);
    fruitState.squash = 1;
    hitStopUntil = performance.now() + (crit?80:50);
    flashScreen(crit?0.35:0.22);
    cameraShake((crit?0.18:0.12)+power*0.08, 0.18);
    if("vibrate" in navigator) navigator.vibrate(crit?[30,20,40]:22);
  }
}

/* =========================================================
   THIRD-PERSON REPLAY — the avatar re-enacts the winning
   swing while a fixed observer camera frames both.
   ========================================================= */
let replay = null;
let replayData = null;

function enterReplay(){
  if(!replayData) { quickNextRound(); return; }
  gameState = "replay";
  camLocked = true;
  clubPivot.visible = false;
  document.getElementById("crosshair").style.display = "none";

  clearParticles(); // wipe the live-break debris; the replay re-explodes fresh

  const rd = replayData;
  const fruit = buildFruitMesh(rd.tier, rd.radius, rd.glowColor);
  fruit.position.copy(rd.origin);
  scene.add(fruit);

  /* the avatar steps right up to the fruit — smaller fruit = tighter two-shot */
  const dir = rd.dir.clone();
  const standDist = THREE.MathUtils.clamp(rd.radius*2.6 + 0.55, 0.6, 1.5);
  const avatarPos = rd.origin.clone().addScaledVector(dir, -standDist); avatarPos.y = 0;
  avatar.visible = true;
  avatar.position.copy(avatarPos);
  avatar.lookAt(rd.origin.x, 0, rd.origin.z);
  avatar.userData.armPivot.rotation.x = AVATAR_ARM_REST;

  const playerAnchor = avatarPos.clone().setY(0.85);
  const fruitAnchor = new THREE.Vector3(rd.origin.x, Math.max(rd.origin.y,0.3), rd.origin.z);
  const mid = playerAnchor.clone().add(fruitAnchor).multiplyScalar(0.5);
  const perp = new THREE.Vector3(-dir.z, 0, dir.x); // avatar's right, perpendicular to the swing line
  const camDist = THREE.MathUtils.clamp(standDist*1.1 + rd.radius*5 + 1.7, 2.2, 9);
  const camY = THREE.MathUtils.clamp(0.95 + rd.radius*1.2 + standDist*0.2, 1.0, 2.6);

  /* five cinematic angles — every replay draws a different one, and the
     8-direction sprite turns with the camera. phi 0 = right flank,
     +phi sweeps toward the fruit (front), ±π = left flank. Paths keep a
     ~40° margin from the swing axis so the on-screen fruit side and the
     45°-quantised sprite nose can never contradict each other. */
  const shots = [
    { phi0:-0.12, sweep: 0.24, ym:1.0  },  // right-flank two-shot
    { phi0: 3.02, sweep: 0.24, ym:1.0  },  // left-flank two-shot
    { phi0:-2.18, sweep: 0.66, ym:1.15 },  // over-the-shoulder from behind
    { phi0: 0.85, sweep:-0.45, ym:0.75 },  // low hero angle, front-right quarter
    { phi0: 2.30, sweep: 0.45, ym:0.85 },  // front-left quarter, drifting to the flank
  ];
  let shot = shots[Math.floor(Math.random()*shots.length)];

  /* palms / parasols / the flag can sit between a flank camera and the
     action — sample the whole camera path (sweep + dolly + a little slack
     sideways, thin poles slip between single rays) and fall back to the
     mirrored flank if anything blocks the view */
  /* "is the SUBJECT visible from here": cast camera→avatar-head, →avatar-body
     and →fruit; any prop in between (parasol, palm, flag) blocks the shot */
  const viewBlocked = (camPos, target)=>{
    const rd2 = target.clone().sub(camPos);
    const far = Math.max(0.3, rd2.length() - 0.25);
    const rc = new THREE.Raycaster(camPos.clone(), rd2.normalize(), 0.05, far);
    rc.camera = camera; // REQUIRED: raycasting a THREE.Sprite (fruit glow) throws without it
    return rc.intersectObjects(scene.children, true).some(h=>{
      let o = h.object;
      while(o){ if(o===fruit || o===avatar || o===debrisGroup || o===juiceGroup) return false; o = o.parent; }
      return true;
    });
  };
  const headA = avatarPos.clone().setY(1.0);
  const bodyA = avatarPos.clone().setY(0.45);
  /* palms/parasols right next to the lens split the frame even when the
     subjects peek past them — treat "prop within 1.2m of the camera" as
     blocked too, not just line-of-sight hits */
  const propBoxes = scene.children
    .filter(o => o.isGroup && o!==avatar && o!==debrisGroup && o!==juiceGroup)
    .map(g => new THREE.Box3().setFromObject(g));
  const shotBlocked = (s)=>{
    for(const f of [0, 0.5, 1]){
      const phi = s.phi0 + s.sweep*f;
      const d2 = camDist*(1 - 0.1*Math.min(1, f*2)); // dolly-in over the shot
      const p = new THREE.Vector3(
        mid.x + (perp.x*Math.cos(phi) + dir.x*Math.sin(phi))*d2,
        camY*s.ym,
        mid.z + (perp.z*Math.cos(phi) + dir.z*Math.sin(phi))*d2);
      if(propBoxes.some(b => b.distanceToPoint(p) < 1.0)) return true;
      if(viewBlocked(p, headA) || viewBlocked(p, bodyA) || viewBlocked(p, fruitAnchor)) return true;
    }
    return false;
  };
  /* keep the random pick unless something blocks it — then try the other
     angles in RANDOM order (all blocked: keep the original pick). Wrapped
     so no exception here can ever brick the replay entry. */
  const blk = [];
  try{
    const order = shots.map((_,i)=>i).filter(i=>i!==shots.indexOf(shot));
    for(let i = order.length-1; i > 0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [order[i], order[j]] = [order[j], order[i]];
    }
    order.unshift(shots.indexOf(shot));
    for(const idx of order){
      const b = shotBlocked(shots[idx]);
      blk.push(b);
      if(!b){ shot = shots[idx]; break; }
    }
  }catch(err){ /* keep the random pick */ }

  replay = {
    t:0, dur:3.1, swingStart:1.05, exploded:false,
    fruit, mid, perp, dir:dir.clone(), camDist, camY:camY*shot.ym,
    phi0:shot.phi0, sweep:shot.sweep, blk,
    recStart: performance.now(), shakeUntil:0
  };
  document.getElementById("cctv-overlay").classList.add("show");
  duckAudio(0.35, 0.4); // sound dips for the replay, comes back near its end
}

function updateReplay(dt){
  if(!replay){ finishReplay(); return; } // self-heal if entry ever failed mid-way
  const r = replay;
  r.t += dt;

  /* orbiting observer camera with a slow dolly-in and CCTV micro-jitter */
  const dollyP = Math.min(1, r.t/1.1);
  const easedDolly = 1 - Math.pow(1-dollyP, 2);
  const dist = r.camDist * (1 - 0.1*easedDolly);
  const sp01 = Math.min(1, r.t/r.dur);
  const phi = r.phi0 + r.sweep*(sp01*sp01*(3-2*sp01)); // smoothstep orbit
  const odx = r.perp.x*Math.cos(phi) + r.dir.x*Math.sin(phi);
  const odz = r.perp.z*Math.cos(phi) + r.dir.z*Math.sin(phi);
  const now = performance.now();
  const jt = now*0.004;
  camera.position.set(
    r.mid.x + odx*dist + Math.sin(jt*1.3)*0.014,
    r.camY + Math.cos(jt*1.7)*0.011,
    r.mid.z + odz*dist + Math.sin(jt*0.9)*0.014
  );
  if(now < r.shakeUntil){
    camera.position.x += (Math.random()-0.5)*0.07;
    camera.position.y += (Math.random()-0.5)*0.07;
  }
  camera.up.set(0,1,0);
  camera.lookAt(r.mid.x, r.mid.y, r.mid.z);

  /* avatar: always face the fruit (guards against any stale orientation),
     idle windup bob, then the swing that re-breaks the fruit */
  avatar.lookAt(replayData.origin.x, 0, replayData.origin.z);
  const ap = avatar.userData.armPivot;
  if(r.t < r.swingStart){
    ap.rotation.x = AVATAR_ARM_REST + Math.sin(r.t*3)*0.07;
  } else {
    const sp = Math.min(1, (r.t-r.swingStart)/0.22);
    const e = 1 - Math.pow(1-sp, 3);
    ap.rotation.x = AVATAR_ARM_REST + e*3.0;
    if(!r.exploded && sp>=0.8){
      r.exploded = true;
      if(r.fruit){ scene.remove(r.fruit); r.fruit=null; }
      explodeFruitFX(replayData.origin, replayData.tier, replayData.radius, replayData.power, replayData.dir);
      flashScreen(0.5);
      r.shakeUntil = now + 320;
      slowMoUntil = now + 550;
    }
  }

  const secs = Math.floor((now-r.recStart)/1000);
  document.getElementById("cctv-time").textContent = "00:" + String(secs).padStart(2,"0");

  if(!r.unducked && r.t >= r.dur-0.7){ r.unducked = true; duckAudio(1, 0.6); }
  if(r.t >= r.dur) finishReplay();
}

function finishReplay(){
  if(replay && replay.fruit){ scene.remove(replay.fruit); }
  replay = null; replayData = null;
  duckAudio(1, 0.2);
  document.getElementById("cctv-overlay").classList.remove("show");
  avatar.visible = false;
  clubPivot.visible = true;
  document.getElementById("crosshair").style.display = "block";
  camera.position.set(0,1.6,0); camera.up.set(0,1,0);
  camLocked = false;
  applyLook();
  gameState = "next";
  quickNextRound();
}

/* =========================================================
   FRUIT-POV FAIL REPLAY — the surviving fruit watches the
   player swing at the wrong spot, then the results show.
   ========================================================= */
let failReplay = null;

function enterFailReplay(onDone){
  gameState = "failreplay";
  camLocked = true;
  clubPivot.visible = false;
  document.getElementById("crosshair").style.display = "none";

  /* reconstruct the player's REAL final moment: they stood at the origin,
     looking wherever the camera was pointed when time ran out. The avatar
     re-enacts a swing at THAT spot, so the fruit-POV camera sees their back,
     side or face — whatever the fruit actually saw. */
  const lookDir = new THREE.Vector3();
  camera.getWorldDirection(lookDir);   // capture BEFORE the replay moves the camera
  lookDir.y = 0;
  const fp = fruitMesh.position.clone();
  if(lookDir.lengthSq() < 1e-4){       // was looking straight up/down: face away from the fruit
    lookDir.set(-fp.x, 0, -fp.z);
  }
  lookDir.normalize();
  const standDist = THREE.MathUtils.clamp(fruitState.radius*2.6 + 0.55, 0.6, 1.5);

  const avatarPos = new THREE.Vector3(0, 0, 0); // where the player really stood
  const missDir = lookDir;
  const wrongSpot = avatarPos.clone().addScaledVector(missDir, standDist);
  wrongSpot.y = 0;

  avatar.visible = true;
  avatar.position.copy(avatarPos);
  avatar.lookAt(wrongSpot.x, 0, wrongSpot.z);
  avatar.userData.armPivot.rotation.x = AVATAR_ARM_REST;

  /* fruit-POV: hovering just over the fruit's crown, looking UP at the
     player, with the crown bulging into the bottom third of the frame */
  const toAvatar = avatarPos.clone().sub(fp).setY(0).normalize();
  const camPos = fp.clone().addScaledVector(toAvatar, -fruitState.radius*0.9);
  camPos.y = fp.y + fruitState.radius*1.25;

  failReplay = {
    t:0, dur:3.7, swingStart:1.15, swung:false, hit:false,
    camPos, avatarPos, wrongSpot, missDir, baseRotY:avatar.rotation.y,
    onDone, recStart:performance.now(), shakeUntil:0,
    sandTier:{ juiceA:"#EAD5A0", juiceTexA:null }
  };
  document.getElementById("cctv-overlay").classList.add("show");
  duckAudio(0.35, 0.4);
}

function updateFailReplay(dt){
  if(!failReplay){ finishFailReplay(); return; } // self-heal if entry ever failed mid-way
  const r = failReplay;
  r.t += dt;

  const now = performance.now();
  const jt = now*0.004;
  camera.position.set(
    r.camPos.x + Math.sin(jt*1.3)*0.012,
    r.camPos.y + Math.cos(jt*1.7)*0.01,
    r.camPos.z + Math.sin(jt*0.9)*0.012
  );
  if(now < r.shakeUntil){
    camera.position.x += (Math.random()-0.5)*0.05;
    camera.position.y += (Math.random()-0.5)*0.05;
  }
  camera.up.set(0,1,0);
  camera.lookAt(r.avatarPos.x, 1.15, r.avatarPos.z); // tilt up at the player's face

  /* avatar: windup bob, one big whiff into the sand, then a confused look around */
  const ap = avatar.userData.armPivot;
  if(r.t < r.swingStart){
    ap.rotation.x = AVATAR_ARM_REST + Math.sin(r.t*3)*0.07;
  } else {
    const sp = Math.min(1, (r.t-r.swingStart)/0.22);
    const e = 1 - Math.pow(1-sp, 3);
    ap.rotation.x = AVATAR_ARM_REST + e*3.0;
    if(!r.swung){ r.swung = true; playMissSwish(0.85); }
    if(!r.hit && sp >= 0.8){
      r.hit = true;
      playThud();
      spawnJuiceBurst(r.wrongSpot.clone().setY(0.05), r.sandTier, 0.22, 10, 0.4, r.missDir);
      r.shakeUntil = now + 260;
    }
    if(r.t > r.swingStart + 0.9){
      avatar.rotation.y = r.baseRotY + Math.sin((r.t - r.swingStart - 0.9)*3)*0.25;
    }
  }

  const secs = Math.floor((now-r.recStart)/1000);
  document.getElementById("cctv-time").textContent = "00:" + String(secs).padStart(2,"0");

  if(!r.unducked && r.t >= r.dur-0.7){ r.unducked = true; duckAudio(1, 0.6); }
  if(r.t >= r.dur) finishFailReplay();
}

function finishFailReplay(){
  const onDone = failReplay && failReplay.onDone;
  failReplay = null;
  duckAudio(1, 0.2);
  document.getElementById("cctv-overlay").classList.remove("show");
  avatar.visible = false;
  clubPivot.visible = true;
  document.getElementById("crosshair").style.display = "block";
  camera.position.set(0,1.6,0); camera.up.set(0,1,0);
  camLocked = false;
  applyLook();
  gameState = "gameover";
  if(onDone) onDone();
}

/* =========================================================
   GAME OVER
   ========================================================= */
function gameOver(){
  gameState = "gameover";
  timeLeft = 0;
  updateTimerHud();
  stopHaptics();
  if("vibrate" in navigator) navigator.vibrate([90,60,140]);
  playFail();
  flashScreen(0.4, "#ff4646");
  document.getElementById("healthbar-wrap").classList.add("hidden");
  document.getElementById("power-meter").classList.add("hidden");

  const stage = stageOf(levelIndex);
  const reached = LEVELS[stage].emoji;
  const level = levelIndex + 1;
  const isNew = score > best.score;
  if(isNew){
    best = { score, fruit:reached, level };
    try{ localStorage.setItem(BEST_KEY, JSON.stringify(best)); }catch(err){}
    refreshBestDisplay();
  }

  const showResult = ()=>{
    document.getElementById("result-emoji").textContent = isNew ? "👑" : "⏰";
    document.getElementById("result-score").textContent = score.toLocaleString();
    document.getElementById("result-fruit").textContent = reached + " LV." + level;
    document.getElementById("result-best").textContent = "👑 " + best.score.toLocaleString();
    document.getElementById("result-screen").classList.remove("hidden");
    if(isNew) playChime();
  };

  /* the fruit survived — replay the whiff from the fruit's point of view */
  if(fruitMesh && fruitState && fruitState.landed && !fruitState.broken){
    setTimeout(()=>enterFailReplay(showResult), 900);
  } else {
    setTimeout(showResult, 750);
  }
}

/* =========================================================
   RESET / NAVIGATION
   ========================================================= */
function cleanupWorld(){
  clearParticles();
  clearShockwaves();
  if(fruitMesh){ scene.remove(fruitMesh); fruitMesh=null; }
  fruitState = null;
  if(replay && replay.fruit){ scene.remove(replay.fruit); }
  replay = null; replayData = null;
  failReplay = null;
  avatar.visible = false;
  document.getElementById("cctv-overlay").classList.remove("show");
  clubPivot.visible = true;
  document.getElementById("healthbar-fill").style.width = "100%";
  document.getElementById("healthbar-wrap").classList.add("hidden");
  document.getElementById("power-fill").style.width = "0%";
  document.getElementById("power-meter").classList.add("hidden");
  document.getElementById("crosshair").style.display = "block";
  document.getElementById("result-screen").classList.add("hidden");
  document.getElementById("blackout").classList.remove("closed","fast");
  duckAudio(1, 0.1);
  hitStopUntil = 0; slowMoUntil = 0;
  camera.position.set(0,1.6,0); camera.up.set(0,1,0);
  camera.fov = BASE_FOV; camera.updateProjectionMatrix();
  camLocked = false;
  applyLook();
  gameState = "idle";
}

document.getElementById("title-start").addEventListener("click", ()=>{
  ensureAudio();
  startWaves();
  goFullscreen();            // auto fullscreen on launch
  requestMotionPermission(); // auto gyro/motion permission (same tap gesture)
  beginRun();
});
document.getElementById("btn-again").addEventListener("click", ()=>{
  ensureAudio();
  goFullscreen();
  requestMotionPermission();
  cleanupWorld();
  beginRun();
});
document.getElementById("btn-home").addEventListener("click", ()=>{
  cleanupWorld();
  refreshBestDisplay();
  const s = document.getElementById("start-screen");
  s.style.display = "flex";
  layoutTitle();
  ensureAudio();
  startTitleBgm();
});

/* title BGM can only start after a user gesture (browser autoplay policy) —
   hook the very first tap/click anywhere on the title screen */
["pointerdown","touchstart","keydown"].forEach(ev=>{
  document.addEventListener(ev, ()=>{
    if(document.getElementById("start-screen").style.display !== "none"){
      ensureAudio();
      startTitleBgm();
    }
  }, {once:true, capture:true});
});

/* =========================================================
   MAIN LOOP
   ========================================================= */
let lastT = performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now = performance.now();
  const rawDt = Math.min(0.05, (now-lastT)/1000);
  lastT = now;
  let dtScale = 1;
  if(now < hitStopUntil) dtScale = 0.05;
  else if(now < slowMoUntil) dtScale = 0.3;
  const dt = rawDt * dtScale;

  const arr = oceanPos.array; const time = now*0.001;
  for(let i=0;i<arr.length;i+=3){
    const bx=oceanBase[i], bz=oceanBase[i+2];
    arr[i+1] = Math.sin(bx*0.35+time*1.1)*0.12 + Math.cos(bz*0.28+time*0.8)*0.1;
  }
  oceanPos.needsUpdate = true;
  foam.position.z = -10 + Math.sin(time*1.4)*0.6;

  updateFruitPhysics(dt);
  updateDebris(dt);
  updateShockwaves(dt);
  updateClubSwingAnim(dt);
  updateShake(dt);
  if(gameState==="replay") updateReplay(dt);
  if(gameState==="failreplay") updateFailReplay(dt);
  updateAvatarSprite(dt);
  updateHaptics(now);

  /* squash & glow pulse on the live fruit */
  if(fruitMesh && fruitState && !fruitState.broken){
    if(fruitState.squash > 0.01){
      fruitState.squash *= Math.exp(-dt*9);
      fruitMesh.scale.set(1+0.18*fruitState.squash, 1-0.28*fruitState.squash, 1+0.18*fruitState.squash);
    } else if(fruitMesh.scale.y !== 1){
      fruitMesh.scale.set(1,1,1);
    }
    const spr = fruitMesh.userData.glowSpr;
    if(spr){
      spr.material.opacity = 0.38 + 0.18*Math.sin(now*0.005);
      const gs = fruitMesh.userData.glowBase * (1 + 0.06*Math.sin(now*0.004));
      spr.scale.set(gs,gs,1);
    }
  }

  /* round timer — real time, unaffected by hit-stop slow-mo */
  if(gameState==="playing" && fruitState && fruitState.landed && !fruitState.broken){
    timeLeft -= rawDt;
    updateTimerHud();
    if(timeLeft <= 5.2){
      const s = Math.ceil(timeLeft);
      if(s !== lastTickSec && s > 0){ lastTickSec = s; playTickTock(s); }
    }
    if(timeLeft <= 0){ gameOver(); }
  }

  if(gameState==="playing" && fruitMesh && fruitState && fruitState.landed && !fruitState.broken){
    const d = worldToScreenAngleDist(fruitMesh.position).dist;
    document.getElementById("crosshair").classList.toggle("near", d < fruitState.hitTolerance*1.6);
  } else {
    document.getElementById("crosshair").classList.remove("near");
  }

  renderer.render(scene, camera);
}
animate();

})();
</script>
