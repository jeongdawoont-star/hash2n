<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>사연 보내기 📻</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap');

  :root {
    --cream:#FBF1DE; --cream2:#FFF9EF; --card:#FFFDF8;
    --wood:#B98A5C; --wood-dk:#8C5E36; --line:#ECD9BC;
    --coral:#FF7A59; --coral-dk:#F2613F; --mint:#8FBF8A;
    --text:#5A4327; --muted:#A98E6F;
    --round:'Jua',sans-serif; --body:'Gowun Dodum',sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:
      radial-gradient(60vw 30vh at 50% -8%, #FFE6C7, transparent 62%),
      radial-gradient(50vw 32vh at 100% 112%, rgba(143,191,138,0.18), transparent 55%),
      var(--cream);
    color:var(--text); font-family:var(--body);
    height:100vh; height:100dvh; width:100vw; overflow:hidden;
  }

  /* ── 공통 페이지 프레임 ── */
  .page { height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }

  header { text-align:center; flex-shrink:0; }
  .on-air {
    display:inline-flex; align-items:center; gap:8px; background:#FFEAD6; border:2.5px solid #FFD3B5;
    padding:5px 16px; border-radius:999px; font-family:var(--round); color:var(--coral-dk);
  }
  .on-air-dot { width:9px; height:9px; background:var(--coral); border-radius:50%; animation:blink 1.2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.25;} }
  header h1 { font-family:var(--round); color:var(--wood-dk); }
  header p { color:var(--muted); }

  .card { background:var(--card); border:2.5px solid var(--line); border-radius:22px; box-shadow:0 7px 0 rgba(184,138,92,0.10); display:flex; flex-direction:column; }
  .section-label { font-family:var(--round); color:var(--wood-dk); display:flex; align-items:center; gap:9px; flex-shrink:0; }
  .section-label .chip { border-radius:11px; background:#FFEAD6; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }

  label { display:block; font-family:var(--round); color:var(--wood); }
  input, textarea {
    width:100%; background:var(--cream2); border:2.5px solid var(--line); border-radius:14px;
    color:var(--text); font-family:var(--body); outline:none; transition:border-color .2s, background .2s;
    -webkit-appearance:none;
  }
  input:focus, textarea:focus { border-color:var(--coral); background:#FFF6EC; }
  input::placeholder, textarea::placeholder { color:var(--muted); opacity:.7; }
  textarea { resize:none; line-height:1.6; flex:1; min-height:0; }

  .yt-hint { color:var(--muted); line-height:1.5; }
  .yt-hint a { color:var(--coral-dk); text-decoration:none; font-family:var(--round); }
  .char-count { text-align:right; color:var(--muted); font-family:var(--round); flex-shrink:0; }
  .char-count.warn { color:var(--coral-dk); }

  .btn-submit {
    width:100%; background:var(--coral); color:#fff; border:none; border-radius:18px;
    font-family:var(--round); cursor:pointer; transition:all .15s; box-shadow:0 6px 0 var(--coral-dk); flex-shrink:0;
  }
  .btn-submit:hover:not(:disabled) { background:#FF8C6E; transform:translateY(-2px); box-shadow:0 8px 0 var(--coral-dk); }
  .btn-submit:active:not(:disabled) { transform:translateY(4px); box-shadow:0 2px 0 var(--coral-dk); }
  .btn-submit:disabled { opacity:.6; cursor:not-allowed; box-shadow:0 4px 0 var(--coral-dk); }

  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .form-left, .form-right { display:flex; flex-direction:column; min-height:0; }

  /* 이름 칸은 한 줄로 슬림하게 */
  .card.name-card { flex-direction:row; align-items:center; gap:14px; padding-top:1.5vh; padding-bottom:1.5vh; }
  .card.name-card .section-label { margin-bottom:0; flex-shrink:0; }
  .card.name-card input { flex:1; }

  /* ─────────── 세로(PORTRAIT) 전용 ─────────── */
  @media (orientation: portrait) {
    .page { padding: 1.4vh 4vw; gap: 1vh; }
    header { margin-bottom: 0; }
    .on-air { font-size: clamp(11px,1.3vh,13px); margin-bottom: 0.5vh; }
    header h1 { font-size: clamp(22px,3.2vh,32px); margin-bottom:0.2vh; }
    header p { font-size: clamp(12px,1.5vh,15px); }

    /* 세로에선 래퍼를 없애 카드들이 한 흐름으로 균등 배치되게 */
    .form { flex:1; min-height:0; display:flex; flex-direction:column; gap: 1vh; }
    .form-left, .form-right { display:contents; }

    .card { padding: 1.4vh 4vw; }
    .section-label { font-size: clamp(14px,1.9vh,18px); margin-bottom: 0.8vh; }
    .section-label .chip { width: clamp(26px,3.2vh,34px); height: clamp(26px,3.2vh,34px); font-size: clamp(14px,1.8vh,17px); }
    label { font-size: clamp(12px,1.5vh,14px); margin-bottom:4px; }
    input { padding: 1.2vh 14px; font-size: clamp(15px,1.9vh,17px); }
    textarea { padding: 1.2vh 14px; font-size: clamp(15px,1.9vh,17px); min-height: calc(5 * 1.6 * clamp(15px,1.9vh,17px) + 2.4vh); }
    .name-card { flex-shrink:0; }
    .story-card { flex:1; min-height:0; }
    .song-card { flex-shrink:0; }
    .char-count { font-size: clamp(11px,1.4vh,14px); margin-top:3px; }
    .row2 { margin-bottom: 1vh; }
    .yt-hint { font-size: clamp(10px,1.3vh,13px); margin-top:4px; }
    .btn-submit { padding: 1.5vh; font-size: clamp(16px,2.3vh,20px); }
  }

  /* ─────────── 가로(LANDSCAPE) 전용 ─────────── */
  @media (orientation: landscape) {
    .page { padding: 3vh 3.5vw; gap: 2vh; }
    header { display:flex; align-items:center; justify-content:center; gap: 1.5vw; margin-bottom: 0.5vh; }
    .on-air { font-size: clamp(12px,2.2vh,16px); margin-bottom:0; }
    header h1 { font-size: clamp(22px,4.5vh,38px); margin-bottom:0; }
    header p { font-size: clamp(13px,2.3vh,17px); }

    .form { flex:1; min-height:0; display:flex; flex-direction:row; gap: 2vw; }
    .form-left { flex:1; gap: 2vh; }
    .form-right { flex:1; gap: 2vh; }

    .card { padding: 2.4vh 1.8vw; }
    .section-label { font-size: clamp(16px,3vh,21px); margin-bottom: 1.6vh; }
    .section-label .chip { width: clamp(30px,5vh,38px); height: clamp(30px,5vh,38px); font-size: clamp(16px,2.8vh,19px); }
    label { font-size: clamp(13px,2.2vh,16px); margin-bottom:6px; }
    input, textarea { padding: 1.4vh 16px; font-size: clamp(15px,2.5vh,18px); }
    .name-card { flex-shrink:0; }
    .story-card { flex:1; min-height:0; }
    .song-card { flex:1; }
    .char-count { font-size: clamp(12px,2vh,15px); margin-top:5px; }
    .row2 { margin-bottom: 1.6vh; }
    .yt-hint { font-size: clamp(12px,2vh,14px); margin-top:6px; }
    .btn-submit { padding: 1.8vh; font-size: clamp(17px,3.2vh,22px); }
  }

  /* 완료 / 에러 / 설정없음 */
  .success-screen { display:none; height:100vh; height:100dvh; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding: 5vh 6vw; }
  .success-icon { font-size: clamp(60px,11vh,90px); margin-bottom:2vh; animation:pop .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop { from{transform:scale(0);opacity:0;} to{transform:scale(1);opacity:1;} }
  .success-screen h2 { font-family:var(--round); font-size: clamp(24px,4.5vh,32px); color:var(--wood-dk); margin-bottom:1.2vh; }
  .success-screen p { color:var(--muted); font-size: clamp(15px,2.3vh,18px); line-height:1.8; }
  .success-detail { background:var(--cream2); border:2.5px solid var(--line); border-radius:20px; padding:2.2vh 26px; margin:2.5vh 0; text-align:left; min-width:min(420px,80vw); }
  .success-detail .row { display:flex; justify-content:space-between; align-items:baseline; padding:1vh 0; border-bottom:2px dashed var(--line); font-size: clamp(15px,2.2vh,18px); }
  .success-detail .row:last-child { border-bottom:none; }
  .success-detail .key { color:var(--wood); font-family:var(--round); font-size: clamp(13px,1.9vh,15px); }
  .success-detail .val { font-family:var(--round); color:var(--wood-dk); }
  .btn-again { padding:1.6vh 30px; background:#FFF3E4; border:none; border-radius:16px; color:var(--wood-dk); font-family:var(--round); font-size: clamp(15px,2.2vh,17px); cursor:pointer; transition:all .15s; box-shadow:0 5px 0 #E7CBA3; }
  .btn-again:hover { background:#FFEAD2; transform:translateY(-2px); box-shadow:0 7px 0 #E7CBA3; }
  .btn-again:active { box-shadow:0 2px 0 #E7CBA3; }

  .spinner { display:inline-block; width:18px; height:18px; border:3px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to{transform:rotate(360deg);} }

  .error-banner { position:absolute; top:1.5vh; left:50%; transform:translateX(-50%); background:#FFE3DC; border:2.5px solid #FFB9A6; border-radius:16px; padding:12px 20px; font-size:14px; line-height:1.5; color:var(--coral-dk); font-family:var(--round); display:none; z-index:50; max-width:92vw; text-align:center; }

  .no-config { display:none; height:100vh; height:100dvh; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:6vh 8vw; }
  .no-config .icon { font-size: clamp(48px,9vh,64px); margin-bottom:2vh; }
  .no-config h2 { font-family:var(--round); font-size: clamp(20px,3.5vh,26px); color:var(--wood-dk); margin-bottom:1.2vh; }
  .no-config p { font-size: clamp(14px,2.2vh,17px); color:var(--muted); line-height:1.8; }
  .no-config a { color:var(--coral-dk); text-decoration:none; font-family:var(--round); }

  /* 유튜브 검색 버튼 및 결과 스타일 */
  .btn-sm { padding: 4px 10px; font-size: 13px; border-radius: 8px; cursor: pointer; border: none; font-family: var(--round); transition: all 0.15s; }
  .btn-sm-secondary { background: #FFF3E4; color: var(--wood-dk); box-shadow: 0 3px 0 #E7CBA3; }
  .btn-sm-secondary:hover { background: #FFEAD2; transform: translateY(-1px); box-shadow: 0 4px 0 #E7CBA3; }
  .btn-sm-secondary:active { transform: translateY(1px); box-shadow: 0 1px 0 #E7CBA3; }

  .search-suggestions {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: var(--card);
    border: 2.5px solid var(--line);
    border-radius: 14px;
    margin-top: 6px;
    max-height: 240px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 10px 25px rgba(184, 138, 92, 0.18);
    padding: 4px;
  }
  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    border-bottom: 1.5px solid var(--cream2);
  }
  .suggestion-item:last-child {
    border-bottom: none;
  }
  .suggestion-item:hover {
    background: #FFF3E4;
  }
  .suggestion-thumb {
    width: 50px;
    height: 38px;
    object-fit: cover;
    border-radius: 6px;
    background: #000;
    border: 1px solid var(--line);
    flex-shrink: 0;
  }
  .suggestion-info {
    flex: 1;
    min-width: 0;
  }
  .suggestion-title {
    font-size: 13px;
    font-family: var(--round);
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .suggestion-artist {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .suggestion-loading {
    padding: 12px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .suggestion-error {
    padding: 12px;
    text-align: center;
    color: var(--coral-dk);
    font-size: 13px;
  }
</style>
</head>
<body>

<!-- 설정 없을 때 -->
<div class="no-config" id="noConfig">
  <div class="icon">⚙️</div>
  <h2>설정이 필요해요</h2>
  <p>선생님께 <a href="index.html">설정 페이지</a>에서<br>연결을 먼저 해달라고 부탁하세요 😊</p>
</div>

<!-- 에러 배너 -->
<div class="error-banner" id="errorBanner"></div>

<!-- 메인 폼 -->
<div class="page" id="mainForm">
  <header>
    <div class="on-air"><div class="on-air-dot"></div> ON AIR</div>
    <h1 id="sessionTitle">우리 반 라디오</h1>
    <p>나의 사연을 적어서 방송에 보내보아요 🎵</p>
  </header>

  <div class="form">
    <div class="form-left">
      <div class="card name-card">
        <div class="section-label"><span class="chip">🙋</span>내 이름</div>
        <input id="name" type="text" placeholder="내 이름을 적어요" maxlength="10">
      </div>

      <div class="card story-card">
        <div class="section-label"><span class="chip">💌</span>하고 싶은 말</div>
        <textarea id="story" placeholder="예) 우리 반 친구들아 안녕? 요즘 날씨가 더워졌는데 다들 감기 조심해! 다음 주 체육대회 같이 열심히 준비하자. 그리고 늘 따뜻하게 챙겨주시는 선생님, 정말 감사합니다. 오늘도 모두 행복한 하루 보내요! 🎵" minlength="30" maxlength="300"></textarea>
        <div class="char-count warn" id="charCount">0 / 300 · 최소 30자</div>
      </div>
    </div>

    <div class="form-right">
      <div class="card song-card" style="position: relative;">
        <div class="section-label"><span class="chip">🎵</span>신청곡</div>
        
        <!-- 유튜브 검색창 추가 -->
        <div style="margin-bottom: 12px; position: relative;">
          <label>🔍 유튜브 곡 검색</label>
          <div style="display: flex; gap: 8px;">
            <input id="ytSearchQuery" type="text" placeholder="제목이나 가수를 입력하고 검색해 보세요" onkeydown="if(event.key === 'Enter') { event.preventDefault(); searchYoutube(); }">
            <button class="btn-sm btn-sm-secondary" style="width: auto; padding: 0 16px; flex-shrink: 0; box-shadow: 0 3px 0 #E7CBA3;" onclick="searchYoutube()" type="button">검색</button>
          </div>
          <div id="searchSuggestions" class="search-suggestions" style="display: none;"></div>
        </div>

        <div class="row2">
          <div><label>곡 제목</label><input id="songTitle" type="text" placeholder="노래 제목"></div>
          <div><label>가수 이름</label><input id="artist" type="text" placeholder="가수"></div>
        </div>
        <div>
          <label>유튜브 링크</label>
          <input id="ytUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." oninput="autoFetchMetaFromYtUrl()" onblur="autoFetchMetaFromYtUrl()">
          <div class="yt-hint">유튜브에서 곡을 검색한 뒤 주소창의 링크를 붙여넣어요. <a href="https://youtube.com" target="_blank">유튜브 열기 →</a></div>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitStory()">📮 사연 보내기</button>
</div>

<!-- 성공 화면 -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">🎉</div>
  <h2>사연이 접수됐어요!</h2>
  <p>곧 라디오에서 읽어드릴게요.<br>방송 시작을 기다려주세요 🎵</p>
  <div class="success-detail" id="successDetail"></div>
  <button class="btn-again" onclick="resetForm()">+ 다른 사연 보내기</button>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, initializeFirestore, collection, doc, getDoc, runTransaction, serverTimestamp, query, orderBy, getDocs }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  let db;
  const MIN_STORY_LENGTH = 30;

  function applySharedConfig() {
    const m = location.hash.match(/[#&]s=([^&]+)/);
    if (!m) return;
    try {
      const data = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(m[1])))));
      if (data.firebase) localStorage.setItem('radioFirebaseConfig', JSON.stringify(data.firebase));
      if (data.broadcast) localStorage.setItem('radioBroadcast', JSON.stringify(data.broadcast));
    } catch (e) { console.warn('설정 링크 해석 실패:', e); }
  }
  applySharedConfig();

  // 공개 Piped/Invidious 인스턴스는 수시로 죽거나 바뀌므로, 하드코딩 목록은 최소한의 비상용으로만 두고
  // 페이지 로드 시 각 서비스의 공개 레지스트리에서 살아있는 인스턴스 목록을 새로 받아온다.
  let activePipedInstances = [
    'https://api.piped.private.coffee'
  ];

  let activeInvidiousInstances = [
    'https://invidious.f5.si',
    'https://inv.zoomerville.com',
    'https://invidious.privacydev.net',
    'https://inv.nadeko.net',
    'https://yewtu.be',
    'https://invidious.nerdvpn.de',
    'https://inv.tux.im'
  ];

  async function loadInvidiousInstances() {
    try {
      const res = await fetch('https://api.invidious.io/instances.json');
      if (res.ok) {
        const data = await res.json();
        const list = data
          .filter(item => {
            const m = item[1];
            return m.type === 'https' && m.monitor && !m.monitor.down && m.monitor.uptime > 90;
          })
          .map(item => item[1].uri)
          .filter(Boolean);
        if (list.length > 0) {
          activeInvidiousInstances = [...new Set([...list, ...activeInvidiousInstances])];
        }
      }
    } catch (e) {
      console.warn('Invidious 목록 업데이트 생략, 기본 인스턴스를 사용합니다.', e);
    }
  }
  loadInvidiousInstances();

  async function loadPipedInstances() {
    try {
      const res = await fetch('https://piped-instances.kavin.rocks/');
      if (res.ok) {
        const data = await res.json();
        const list = data
          .filter(item => item.api_url && item.api_url.startsWith('https://') && (item.uptime_24h == null || item.uptime_24h > 80))
          .map(item => item.api_url)
          .filter(Boolean);
        if (list.length > 0) {
          activePipedInstances = [...new Set([...list, ...activePipedInstances])];
        }
      }
    } catch (e) {
      console.warn('Piped 목록 업데이트 생략, 기본 인스턴스를 사용합니다.', e);
    }
  }
  loadPipedInstances();

  function ytVideoId(url) {
    if (!url) return '';
    try {
      const trimmed = url.trim();
      if (/^[a-zA-Z0-9_-]{11}$/.test(trimmed)) return trimmed;
      const u = new URL(trimmed.includes('://') ? trimmed : 'https://' + trimmed);
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1);
      if (u.pathname.includes('/shorts/') || u.pathname.includes('/embed/')) {
        return u.pathname.split('/').filter(Boolean).pop();
      }
      return u.searchParams.get('v') || '';
    } catch { return ''; }
  }

  async function fetchVideoMetaNoembed(vid) {
    try {
      const target = `https://www.youtube.com/watch?v=${vid}`;
      const res = await fetch(`https://noembed.com/embed?url=${encodeURIComponent(target)}`);
      if (res.ok) {
        const data = await res.json();
        if (data && data.title) {
          return { title: data.title, author: data.author_name || '' };
        }
      }
    } catch (e) {}
    return null;
  }

  window.autoFetchMetaFromYtUrl = async function() {
    const ytUrl = document.getElementById('ytUrl').value.trim();
    if (!ytUrl) return;
    const vid = ytVideoId(ytUrl);
    if (!vid) return;

    const currentTitle = document.getElementById('songTitle').value.trim();
    const currentArtist = document.getElementById('artist').value.trim();
    if (currentTitle && currentArtist) return;

    try {
      const meta = await fetchVideoMetaNoembed(vid);
      if (meta) {
        const parsed = parseVideoTitle(meta.title, meta.author);
        if (!currentTitle) document.getElementById('songTitle').value = parsed.song;
        if (!currentArtist) document.getElementById('artist').value = parsed.artist;
      }
    } catch(e) {}
  };

  window.searchYoutube = async function() {
    const query = document.getElementById('ytSearchQuery').value.trim();
    const suggestions = document.getElementById('searchSuggestions');
    if (!query) {
      alert('검색어나 유튜브 링크를 입력해 주세요.');
      return;
    }

    suggestions.style.display = 'block';
    suggestions.innerHTML = '<div class="suggestion-loading"><span class="spinner"></span>검색 중...</div>';

    // 0. 유튜브 URL 또는 Video ID 직입력 감지
    const directVid = ytVideoId(query);
    if (directVid && (query.includes('youtube') || query.includes('youtu.be') || directVid.length === 11)) {
      try {
        const info = await fetchVideoMetaNoembed(directVid);
        if (info) {
          selectSuggestion(info.title, info.author, directVid);
          return;
        }
      } catch (e) {}
    }

    // 1. YouTube Data API v3 시도 (Firebase API Key 사용)
    const cfg = JSON.parse(localStorage.getItem('radioFirebaseConfig') || '{}');
    if (cfg.apiKey) {
      try {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), 3000);
        const ytUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoEmbeddable=true&q=${encodeURIComponent(query)}&key=${cfg.apiKey}&maxResults=5`;
        const res = await fetch(ytUrl, { signal: controller.signal });
        clearTimeout(id);
        if (res.ok) {
          const data = await res.json();
          if (data && data.items && data.items.length > 0) {
            const formattedVideos = data.items.map(item => ({
              videoId: item.id.videoId,
              title: item.snippet.title,
              author: item.snippet.channelTitle
            }));
            renderSuggestions(formattedVideos);
            return;
          }
        }
      } catch (e) {
        console.warn('YouTube Data API 호출 실패, 대체 파이프라인으로 전환합니다.', e);
      }
    }

    // 2. Piped API 시도
    for (let i = 0; i < activePipedInstances.length; i++) {
      const base = activePipedInstances[i];
      try {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), 2500);
        const res = await fetch(`${base}/search?q=${encodeURIComponent(query)}&filter=videos`, {
          signal: controller.signal
        });
        clearTimeout(id);
        if (res.ok) {
          const data = await res.json();
          if (data && Array.isArray(data.items) && data.items.length > 0) {
            const formattedVideos = data.items.map(item => ({
              videoId: (item.url || '').replace('/watch?v=', ''),
              title: item.title,
              author: item.uploaderName || ''
            })).filter(v => v.videoId);
            if (formattedVideos.length > 0) {
              activePipedInstances.unshift(activePipedInstances.splice(i, 1)[0]);
              renderSuggestions(formattedVideos);
              return;
            }
          }
        }
      } catch (e) {
        console.warn(`Piped instance ${base} failed:`, e);
      }
    }

    // 3. Invidious API 시도
    for (let i = 0; i < activeInvidiousInstances.length; i++) {
      const base = activeInvidiousInstances[i];
      try {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), 2500);
        const res = await fetch(`${base}/api/v1/search?q=${encodeURIComponent(query)}&type=video`, {
          signal: controller.signal
        });
        clearTimeout(id);
        if (res.ok) {
          const data = await res.json();
          if (Array.isArray(data) && data.length > 0) {
            activeInvidiousInstances.unshift(activeInvidiousInstances.splice(i, 1)[0]);
            renderSuggestions(data);
            return;
          }
        }
      } catch (e) {
        console.warn(`Invidious instance ${base} failed:`, e);
      }
    }

    // 4. iTunes Music API Fallback (음원 기반 정보 제공)
    try {
      const controller = new AbortController();
      const id = setTimeout(() => controller.abort(), 3000);
      const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=5&country=KR`, {
        signal: controller.signal
      });
      clearTimeout(id);
      if (res.ok) {
        const data = await res.json();
        if (data && data.results && data.results.length > 0) {
          renderItunesSuggestions(data.results, query);
          return;
        }
      }
    } catch (e) {
      console.warn('iTunes API fallback 에러:', e);
    }

    // 5. 모든 API 연결 원활하지 않을 때: 직접 유튜브 검색 버튼 제공
    renderDirectSearchFallback(query);
  };

  function renderSuggestions(videos) {
    const suggestions = document.getElementById('searchSuggestions');
    suggestions.innerHTML = '';
    // Show top 5 results
    const top5 = videos.slice(0, 5);
    top5.forEach(v => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';
      
      const thumbUrl = `https://img.youtube.com/vi/${v.videoId}/default.jpg`;
      
      item.innerHTML = `
        <img class="suggestion-thumb" src="${thumbUrl}" alt="thumbnail" onerror="this.src='https://via.placeholder.com/120x90?text=No+Image'">
        <div class="suggestion-info">
          <div class="suggestion-title" title="${escapeHtml(v.title)}">${escapeHtml(v.title)}</div>
          <div class="suggestion-artist">${escapeHtml(v.author)}</div>
        </div>
      `;
      item.onclick = () => selectSuggestion(v.title, v.author, v.videoId);
      suggestions.appendChild(item);
    });
  }

  function renderItunesSuggestions(results, query) {
    const suggestions = document.getElementById('searchSuggestions');
    suggestions.innerHTML = '<div style="padding:6px 10px; font-size:11px; color:var(--muted); font-family:var(--round); border-bottom: 1px solid var(--cream2);">🎵 음원 검색 결과 (선택 시 곡 정보 자동입력)</div>';
    
    results.forEach(item => {
      const el = document.createElement('div');
      el.className = 'suggestion-item';
      const thumb = item.artworkUrl100 || item.artworkUrl60 || '';
      el.innerHTML = `
        <img class="suggestion-thumb" src="${thumb}" alt="thumb" onerror="this.style.display='none'">
        <div class="suggestion-info">
          <div class="suggestion-title">${escapeHtml(item.trackName)}</div>
          <div class="suggestion-artist">${escapeHtml(item.artistName)}</div>
        </div>
      `;
      el.onclick = () => {
        document.getElementById('songTitle').value = item.trackName;
        document.getElementById('artist').value = item.artistName;
        const searchYtUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(item.artistName + ' ' + item.trackName)}`;
        window.open(searchYtUrl, '_blank');
        suggestions.innerHTML = `
          <div style="padding:12px; text-align:center; font-size:12px; color:var(--text); line-height:1.5;">
            ✅ <b>${escapeHtml(item.trackName)}</b> 정보가 입력되었습니다!<br>
            열린 유튜브 창에서 영상 링크를 복사하여 <b>[유튜브 링크]</b>에 붙여넣어 주세요.
          </div>
        `;
      };
      suggestions.appendChild(el);
    });
  }

  function renderDirectSearchFallback(query) {
    const suggestions = document.getElementById('searchSuggestions');
    const ytSearchUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
    suggestions.innerHTML = `
      <div style="padding: 14px 12px; text-align: center;">
        <div style="font-size: 13px; color: var(--wood-dk); margin-bottom: 10px; font-family: var(--round); line-height: 1.4;">
          💡 유튜브에서 <b>'${escapeHtml(query)}'</b> 곡 검색하기
        </div>
        <a href="${ytSearchUrl}" target="_blank" style="display: inline-block; background: var(--coral); color: white; padding: 8px 16px; border-radius: 12px; text-decoration: none; font-size: 13px; font-family: var(--round); box-shadow: 0 4px 0 var(--coral-dk); margin-bottom: 8px; transition: transform 0.15s;">
          🔍 YouTube에서 직접 검색하기 ↗
        </a>
        <div style="font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4;">
          검색 후 영상의 주소창 링크(URL)를 복사하여 아래 <b>[유튜브 링크]</b> 칸에 붙여넣으면 곡 정보가 자동으로 완성됩니다!
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function selectSuggestion(title, author, videoId) {
    const parsed = parseVideoTitle(title, author);
    
    document.getElementById('songTitle').value = parsed.song;
    document.getElementById('artist').value = parsed.artist;
    document.getElementById('ytUrl').value = `https://www.youtube.com/watch?v=${videoId}`;
    document.getElementById('ytSearchQuery').value = '';
    
    document.getElementById('searchSuggestions').style.display = 'none';
  }

  function parseVideoTitle(title, author) {
    let cleanTitle = title
      .replace(/\[[^\]]+\]/g, '')  // [MV], [Official] 등 제거
      .replace(/\([^)]+\)/g, '')   // (Official MV), (M/V) 등 제거
      .replace(/【[^】]+】/g, '')  // 일본어식 괄호 제거
      .replace(/\s+/g, ' ')
      .trim();

    const separators = [' - ', '-', ' | ', '|', ' : ', ':'];
    let artist = author || '';
    let song = cleanTitle;

    for (const sep of separators) {
      if (cleanTitle.includes(sep)) {
        const parts = cleanTitle.split(sep);
        artist = parts[0].trim();
        song = parts.slice(1).join(sep).trim();
        break;
      }
    }

    if (!song) song = cleanTitle;
    if (!artist) artist = author || '가수 미상';

    if (artist.endsWith(' - Topic')) {
      artist = artist.replace(' - Topic', '');
    }

    return { artist, song };
  }

  // 바깥 영역 클릭 시 결과창 닫기
  document.addEventListener('click', function(e) {
    const suggestions = document.getElementById('searchSuggestions');
    const searchInput = document.getElementById('ytSearchQuery');
    const searchBtn = e.target.closest('button');
    if (suggestions && e.target !== searchInput && !e.target.closest('#searchSuggestions')) {
      if (!searchBtn || !searchBtn.onclick || !searchBtn.onclick.toString().includes('searchYoutube')) {
        suggestions.style.display = 'none';
      }
    }
  });

  async function initFirebase() {
    const cfg = JSON.parse(localStorage.getItem('radioFirebaseConfig') || '{}');
    if (!cfg.apiKey) {
      document.getElementById('mainForm').style.display = 'none';
      document.getElementById('noConfig').style.display = 'flex';
      return false;
    }
    const app = initializeApp(cfg);
    // 학교망·방화벽·확장프로그램이 실시간 연결을 막아도 동작하도록 long-polling 자동감지
    try { db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true }); }
    catch (e) { db = getFirestore(app); }

    const bcast = JSON.parse(localStorage.getItem('radioBroadcast') || '{}');
    if (bcast.sessionName) document.getElementById('sessionTitle').textContent = bcast.sessionName;
    return true;
  }

  // 여러 학생이 거의 동시에 제출해도 순서 번호가 겹치지 않도록 트랜잭션으로 원자적 증가시킨다.
  // (기존 방식: 최댓값을 읽어서 +1 하는 방식은 동시 제출 시 같은 순서 번호가 부여될 수 있었음)
  async function addStoryAtomic(data) {
    const counterRef = doc(db, 'meta', 'storyOrderCounter');
    const newDocRef = doc(collection(db, 'stories'));
    const order = await runTransaction(db, async (tx) => {
      const counterSnap = await tx.get(counterRef);
      let base;
      if (counterSnap.exists()) {
        base = counterSnap.data().value;
      } else {
        // 카운터 문서가 아직 없는 첫 실행 시점: 기존 사연들의 최댓값에서 이어간다.
        // (동시에 여러 명이 처음 제출하더라도 아래 tx.set(counterRef, ...)가
        //  트랜잭션 충돌 검사 대상이라 자동 재시도되어 안전하다.)
        const q = query(collection(db, 'stories'), orderBy('order', 'desc'));
        const maxSnap = await getDocs(q);
        base = maxSnap.empty ? 0 : maxSnap.docs[0].data().order;
      }
      const nextOrder = base + 1;
      tx.set(counterRef, { value: nextOrder });
      tx.set(newDocRef, { ...data, order: nextOrder, createdAt: serverTimestamp() });
      return nextOrder;
    });
    return order;
  }

  // 방송이 이미 진행 중일 때 도착한 사연은 이번 방송 큐에 섞이지 않으므로,
  // 관리 화면에서 기본적으로 '보류(체크 해제)' 상태로 보이게 한다.
  async function isBroadcastLive() {
    try {
      const snap = await getDoc(doc(db, 'status', 'broadcast'));
      return snap.exists() && snap.data().isPlaying === true;
    } catch (e) {
      return false;
    }
  }

  window.submitStory = async function() {
    const name = document.getElementById('name').value.trim();
    const story = document.getElementById('story').value.trim();
    const songTitle = document.getElementById('songTitle').value.trim();
    const artist = document.getElementById('artist').value.trim();
    const ytUrl = document.getElementById('ytUrl').value.trim();

    if (!name || !story || !songTitle || !artist || !ytUrl) {
      showError('모든 항목을 입력해주세요.');
      return;
    }
    if (story.length < MIN_STORY_LENGTH) {
      showError(`사연은 ${MIN_STORY_LENGTH}자 이상 써주세요. 지금은 ${story.length}자예요.`);
      document.getElementById('story').focus();
      return;
    }
    if (!ytUrl.includes('youtube.com') && !ytUrl.includes('youtu.be')) {
      showError('유튜브 링크를 올바르게 입력해주세요.');
      return;
    }

    if (!navigator.onLine) { showError('인터넷 연결이 없어요. 연결을 확인하고 다시 시도해주세요.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>보내는 중...';

    // 1. YouTube Data API v3를 활용한 퍼가기 가능 여부 사전 검증
    const cfg = JSON.parse(localStorage.getItem('radioFirebaseConfig') || '{}');
    const vid = ytVideoId(ytUrl);
    if (cfg.apiKey && vid) {
      btn.innerHTML = '<span class="spinner"></span>영상 검증 중...';
      try {
        const controller = new AbortController();
        const checkTimeoutId = setTimeout(() => controller.abort(), 5000); // 5 seconds timeout
        const checkRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=status&id=${vid}&key=${cfg.apiKey}`, {
          signal: controller.signal
        });
        clearTimeout(checkTimeoutId);
        if (checkRes.ok) {
          const checkData = await checkRes.json();
          if (checkData && checkData.items && checkData.items.length > 0) {
            const status = checkData.items[0].status;
            if (status && status.embeddable === false) {
              showError('이 영상은 업로더가 외부 퍼가기(재생)를 제한한 영상입니다. 다른 영상을 선택해 주세요.');
              btn.disabled = false;
              btn.textContent = '📮 사연 보내기';
              return;
            }
          }
        }
      } catch (e) {
        console.warn('퍼가기 검증 실패(우회 처리함):', e);
      }
    }

    btn.innerHTML = '<span class="spinner"></span>보내는 중...';

    // 무한로딩 방지: 15초 안에 응답이 없으면 안내 메시지 표시
    const withTimeout = (p, ms) => Promise.race([
      p,
      new Promise((_, rej) => setTimeout(() => rej(new Error(
        '시간 초과 — Firebase에 연결하지 못했어요. 광고차단 확장프로그램·시크릿(인비고)창·방화벽이 firestore.googleapis.com을 막고 있는지, Firestore가 테스트 모드인지 확인해주세요.'
      )), ms))
    ]);

    try {
      const live = await withTimeout(isBroadcastLive(), 15000);
      const order = await withTimeout(addStoryAtomic({
        name, story, songTitle, artist, ytUrl,
        played: false, hidden: live
      }), 15000);

      document.getElementById('mainForm').style.display = 'none';
      document.getElementById('successScreen').style.display = 'flex';
      document.getElementById('successDetail').innerHTML = `
        <div class="row"><span class="key">신청자</span><span class="val">${name}</span></div>
        <div class="row"><span class="key">신청곡</span><span class="val">${artist} — ${songTitle}</span></div>
        <div class="row"><span class="key">순서</span><span class="val">${order}번째</span></div>
      `;
    } catch(e) {
      showError('전송 실패: ' + e.message);
      btn.disabled = false;
      btn.textContent = '📮 사연 보내기';
    }
  };

  window.resetForm = function() {
    document.getElementById('mainForm').style.display = 'flex';
    document.getElementById('successScreen').style.display = 'none';
    document.getElementById('name').value = '';
    document.getElementById('story').value = '';
    document.getElementById('songTitle').value = '';
    document.getElementById('artist').value = '';
    document.getElementById('ytUrl').value = '';
    document.getElementById('ytSearchQuery').value = '';
    document.getElementById('searchSuggestions').style.display = 'none';
    document.getElementById('charCount').textContent = '0 / 300 · 최소 30자';
    document.getElementById('charCount').className = 'char-count warn';
    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.textContent = '📮 사연 보내기';
  };

  function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = '⚠️ ' + msg;
    b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 4000);
  }

  document.getElementById('story').addEventListener('input', function() {
    const len = this.value.length;
    const trimmedLen = this.value.trim().length;
    const el = document.getElementById('charCount');
    const remain = Math.max(0, MIN_STORY_LENGTH - trimmedLen);
    el.textContent = remain ? `${len} / 300 · ${remain}자 더 써주세요` : `${len} / 300`;
    el.className = 'char-count' + (len > 250 || remain ? ' warn' : '');
  });

  initFirebase();
</script>
