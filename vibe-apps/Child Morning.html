<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<title>아침 준비</title>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "inverse-primary": "#ffb59c",
        "outline-variant": "#dec0b6",
        "primary-container": "#ff7f50",
        "surface": "#fff9ee",
        "on-tertiary-fixed-variant": "#034c6c",
        "error-container": "#ffdad6",
        "on-surface": "#1f1b0e",
        "surface-container-lowest": "#ffffff",
        "surface-container": "#f6edd8",
        "on-surface-variant": "#57423b",
        "error": "#ba1a1a",
        "secondary-fixed": "#ffddb6",
        "on-tertiary": "#ffffff",
        "inverse-surface": "#343022",
        "on-secondary-container": "#6f4600",
        "primary-fixed": "#ffdbcf",
        "background": "#fff9ee",
        "surface-container-highest": "#eae2cc",
        "surface-bright": "#fff9ee",
        "outline": "#8b7169",
        "secondary-fixed-dim": "#ffb95a",
        "primary": "#a43c12",
        "on-secondary": "#ffffff",
        "on-error-container": "#93000a",
        "tertiary-container": "#74aacf",
        "on-primary": "#ffffff",
        "on-primary-fixed": "#380c00",
        "tertiary": "#2a6485",
        "secondary": "#845400",
        "on-tertiary-fixed": "#001e2e",
        "on-secondary-fixed": "#2a1800",
        "surface-container-low": "#fcf3dd",
        "surface-container-high": "#f0e8d2",
        "on-tertiary-container": "#003e5a",
        "primary-fixed-dim": "#ffb59c",
        "on-primary-fixed-variant": "#822800",
        "on-error": "#ffffff",
        "surface-variant": "#eae2cc",
        "tertiary-fixed": "#c7e7ff",
        "on-primary-container": "#6c2000",
        "surface-dim": "#e2d9c4",
        "secondary-container": "#feb246",
        "surface-tint": "#a43c12",
        "on-secondary-fixed-variant": "#643f00",
        "tertiary-fixed-dim": "#97cdf3",
        "inverse-on-surface": "#f9f0da",
        "on-background": "#1f1b0e"
      },
      borderRadius: {
        DEFAULT: "1rem",
        lg: "2rem",
        xl: "3rem",
        full: "9999px"
      },
      spacing: {
        "margin-mobile": "20px",
        "gutter": "20px",
        "margin-desktop": "40px",
        "component-padding": "12px"
      },
      fontFamily: {
        "label-lg": ["Quicksand"],
        "headline-lg": ["Quicksand"],
        "body-lg": ["Quicksand"],
        "headline-lg-mobile": ["Quicksand"],
        "body-md": ["Quicksand"],
        "headline-md": ["Quicksand"]
      },
      fontSize: {
        "label-lg": ["16px", { lineHeight: "22px", fontWeight: "700" }],
        "headline-lg": ["40px", { lineHeight: "48px", letterSpacing: "-0.02em", fontWeight: "700" }],
        "body-lg": ["20px", { lineHeight: "28px", fontWeight: "700" }],
        "headline-lg-mobile": ["28px", { lineHeight: "34px", fontWeight: "700" }],
        "body-md": ["18px", { lineHeight: "24px", fontWeight: "500" }],
        "headline-md": ["28px", { lineHeight: "34px", fontWeight: "700" }]
      }
    }
  }
};
</script>
<style>
body {
  font-family: 'Quicksand', sans-serif;
  overflow: hidden;
  background: linear-gradient(180deg, #ffdbcf 0%, #fff9ee 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.45s ease, filter 0.35s ease;
}
body.phase-switching {
  filter: brightness(0.85);
}
.stage {
  --ui-scale: 1;
  --mission-density: 1;
  --chrome-density: 1;
  --content-density: 1;
  --media-scale: 1;
  --header-h-px: 86px;
  --nav-h-px: 74px;
  --main-top-pad: 0.45rem;
  --main-bottom-pad: 0.22rem;
  --main-grid-gap: 1.5rem;
  --nav-h: 5rem;
  --nav-icon-size: 1.9rem;
  --nav-label-display: block;
  --main-content-scale: 1;
  width: min(var(--debug-vw, 100vw), calc(var(--debug-vh, 100vh) * 16 / 9));
  height: min(var(--debug-vh, 100vh), calc(var(--debug-vw, 100vw) * 9 / 16));
  margin: 0;
  position: relative;
  overflow: hidden;
  border-left: 6px solid #f0e8d2;
  border-right: 6px solid #f0e8d2;
}
.parallax-track {
  position: absolute;
  left: 0;
  width: 200%;
  pointer-events: none;
  will-change: transform;
}
.hill-back {
  bottom: 0;
  height: 30%;
  background: radial-gradient(70% 100% at 10% 100%, #f6edd8 0%, transparent 60%),
              radial-gradient(60% 100% at 35% 100%, #f6edd8 0%, transparent 62%),
              radial-gradient(70% 100% at 60% 100%, #f6edd8 0%, transparent 60%),
              radial-gradient(65% 100% at 85% 100%, #f6edd8 0%, transparent 62%);
  animation: driftSlow 60s linear infinite;
  opacity: 0.9;
}
.hill-front {
  bottom: -2%;
  height: 26%;
  background: radial-gradient(70% 100% at 8% 100%, #fcf3dd 0%, transparent 60%),
              radial-gradient(58% 100% at 30% 100%, #fcf3dd 0%, transparent 62%),
              radial-gradient(72% 100% at 55% 100%, #fcf3dd 0%, transparent 60%),
              radial-gradient(62% 100% at 78% 100%, #fcf3dd 0%, transparent 62%),
              radial-gradient(66% 100% at 96% 100%, #fcf3dd 0%, transparent 62%);
  animation: driftFast 30s linear infinite;
  opacity: 1;
}
.neomorph-btn {
  box-shadow: 6px 6px 0 0 rgba(164, 60, 18, 0.3), -2px -2px 10px 0 rgba(255, 255, 255, 0.8);
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.neomorph-btn:active {
  transform: translateY(4px);
  box-shadow: 0 0 0 0 rgba(164, 60, 18, 0.3);
}
.cat-bounce {
  animation: bounce 2s infinite;
}
.cat-loop-mirrored {
  transform: scaleX(-1);
}
.cat-happy-offset {
  object-position: 50% var(--cat-y,50%) !important;
  height: var(--cat-scale,100%) !important;
  width: 100% !important;
  left: 0;
  top: 0;
  position: absolute;
  transition: object-position 0.2s, height 0.2s;
}
.cat-cheer-bubble {
  position: absolute;
  right: -1.08rem;
  top: -0.92rem;
  z-index: 20;
  pointer-events: none;
  background: linear-gradient(180deg, #ff8f67 0%, #ff7f50 100%);
  color: #ffffff;
  border-radius: 9999px;
  padding: 0.56rem 1.46rem 0.78rem;
  font-size: 1.58rem;
  font-weight: 700;
  line-height: 1.05;
  isolation: isolate;
  box-shadow: 0 8px 18px rgba(164, 60, 18, 0.25);
}
.cat-cheer-bubble span {
  position: relative;
  z-index: 2;
  display: inline-block;
}
.cat-cheer-bubble::after {
  content: '';
  position: absolute;
  right: 1.66rem;
  bottom: -0.55rem;
  width: 1.1rem;
  height: 1.1rem;
  background: #ff7f50;
  transform: rotate(45deg);
  border-radius: 0 0 0.25rem 0;
  z-index: 0;
}
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 48;
}
.countdown-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  min-width: clamp(9ch, calc(22ch * var(--ui-scale)), 28ch);
  max-width: min(62vw, 43rem);
  justify-content: space-between;
}
#top-header {
  padding-top: calc(0.75rem * var(--chrome-density));
}
#top-header h1 {
  font-size: clamp(1.02rem, calc(1.72rem * var(--ui-scale) * var(--chrome-density)), 2.1rem) !important;
}
#countdown {
  border-width: clamp(2px, calc(4px * var(--chrome-density)), 4px);
  padding: calc(0.36rem * var(--chrome-density)) calc(0.7rem * var(--chrome-density));
  font-size: clamp(0.95rem, calc(1.36rem * var(--ui-scale) * var(--chrome-density)), 1.72rem) !important;
}
.countdown-date {
  color: #ff7f50;
  flex: 1 1 auto;
  min-width: 0;
  text-align: left;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.countdown-time {
  color: #1f1b0e;
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0;
  font-weight: 700;
}
.countdown-time-part {
  display: inline-block;
  text-align: right;
}
.countdown-hour,
.countdown-minute {
  width: 3.1ch;
}
.countdown-second {
  width: 4ch;
}
.arrival-card {
  min-height: calc(8.5rem * var(--content-density));
}
.arrival-timer {
  font-size: clamp(2.3rem, calc(4.6rem * var(--ui-scale) * var(--content-density)), 5.4rem);
  line-height: 0.9;
  letter-spacing: -0.04em;
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  min-width: 0;
  flex: 1 1 auto;
  white-space: nowrap;
}
.arrival-time-part {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  min-width: 2.2ch;
  text-align: right;
}
.arrival-time-colon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 0.7ch;
  transform: translateX(calc(3px * var(--ui-scale)));
}
.arrival-inline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 100%;
}
.arrival-copy {
  display: flex;
  align-items: center;
  gap: clamp(0.45rem, 1.2vw, 1rem);
  flex: 1 1 auto;
  min-width: 0;
}
.arrival-label {
  flex: 0 0 auto;
  white-space: normal;
  display: flex;
  align-items: center;
  align-self: stretch;
  font-size: clamp(1.05rem, calc(1.8rem * var(--ui-scale) * var(--content-density)), 2.15rem);
  line-height: 0.95;
  text-align: left;
}
.arrival-label-break {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  line-height: 0.93;
}
.arrival-toggle {
  flex: 0 0 auto;
  width: clamp(2.6rem, calc(4.1rem * var(--ui-scale) * var(--content-density)), 4.9rem);
  height: clamp(2.6rem, calc(4.1rem * var(--ui-scale) * var(--content-density)), 4.9rem);
  border-radius: 9999px;
}
.mission-card {
  display: flex;
  align-items: center;
  height: 100%;
  background: #ffffff;
  border: clamp(2px, calc(4px * var(--mission-density)), 4px) solid #dec0b6;
  border-radius: clamp(1rem, calc(2rem * var(--mission-density)), 2rem);
  box-shadow: calc(6px * var(--mission-density)) calc(6px * var(--mission-density)) 0 0 rgba(222, 192, 182, 0.3);
  transition: box-shadow 0.2s ease, border-color 0.2s ease;
}
.mission-card:hover {
  border-color: #c9aca2;
  box-shadow: calc(8px * var(--mission-density)) calc(8px * var(--mission-density)) 0 0 rgba(222, 192, 182, 0.34);
}
.mission-card-empty {
  height: 100%;
  border-radius: clamp(1rem, calc(2rem * var(--mission-density)), 2rem);
  border: clamp(2px, calc(4px * var(--mission-density)), 4px) dashed rgba(222, 192, 182, 0.75);
  background: rgba(255, 255, 255, 0.3);
}
.main-tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: 1rem;
  transition: all 0.2s ease;
}
.main-tab-btn.active {
  background: #ff7f50;
  color: #ffffff;
  padding: 0.5rem 2rem;
}
.main-tab-btn:not(.active) {
  color: #57423b;
  padding: 0.75rem;
}
.main-tab-btn:not(.active):hover {
  background: #eae2cc;
}
.panel-hidden {
  display: none;
}
.cat-house-wrap {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  height: 100%;
  min-height: 0;
}
.cat-house-head {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.5rem;
}
.cat-house-headline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.7rem;
  font-size: 1.9rem;
  color: #845400;
  font-weight: 700;
}
.cat-house-count {
  background: #ffffff;
  border: 3px solid #dec0b6;
  border-radius: 9999px;
  padding: 0.4rem 0.95rem;
  font-size: 1.12rem;
  color: #57423b;
  font-weight: 700;
}
.cat-house-note {
  color: #6f4600;
  font-size: 1.05rem;
  font-weight: 700;
}
.cat-house-mat {
  position: relative;
  flex: 1;
  min-height: 16rem;
  border-radius: 2rem;
  border: 5px solid #c9aca2;
  overflow: hidden;
  background:
    radial-gradient(circle at 14% 20%, rgba(255, 255, 255, 0.26) 0%, rgba(255, 255, 255, 0) 34%),
    radial-gradient(circle at 82% 72%, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0) 38%),
    repeating-linear-gradient(45deg, #e8d4be 0, #e8d4be 14px, #e2ccb3 14px, #e2ccb3 28px),
    repeating-linear-gradient(-45deg, rgba(175, 130, 95, 0.08) 0, rgba(175, 130, 95, 0.08) 9px, rgba(175, 130, 95, 0) 9px, rgba(175, 130, 95, 0) 18px);
}
.house-cat {
  position: absolute;
  width: 3.4rem;
  height: 3.4rem;
  border-radius: 9999px;
  border: 3px solid rgba(255, 255, 255, 0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 14px rgba(87, 66, 59, 0.22);
  font-size: 1.85rem;
  user-select: none;
  cursor: grab;
  touch-action: none;
  transition: transform 0.12s ease;
}
.house-cat.dragging {
  cursor: grabbing;
  transform: scale(1.08);
  z-index: 20;
}
.house-cat.merge-pop {
  animation: pop 0.22s ease;
}
.house-cat.level-0 { background: #ffd66a; }
.house-cat.level-1 { background: #ffb95a; }
.house-cat.level-2 { background: #ff9cb1; }
.house-cat.level-3 { background: #a7d8ff; }
.house-cat.level-4 { background: #c9b0ff; }
.house-cat.level-5 { background: #a7e5b4; }
.house-cat.level-6 { background: #ffd29e; }
#mission-list[data-size="large"] .mission-card {
  padding: calc(0.85rem * var(--mission-density)) calc(0.95rem * var(--mission-density));
  gap: calc(0.5rem * var(--mission-density));
}
#mission-list[data-size="large"] .mission-icon-wrap {
  width: clamp(3.7rem, calc(7.2vh * var(--mission-density)), 6.1rem);
  height: clamp(3.7rem, calc(7.2vh * var(--mission-density)), 6.1rem);
}
#mission-list[data-size="large"] .mission-icon {
  font-size: clamp(2.7rem, calc(5.8vh * var(--mission-density)), 4.8rem);
}
#mission-list[data-size="large"] .mission-label {
  font-size: clamp(1.1rem, calc(1.95rem * var(--ui-scale) * var(--mission-density)), 2.55rem);
  line-height: 1;
}
#mission-list[data-size="large"] .mission-score-badge {
  width: clamp(2.5rem, calc(5.2vh * var(--mission-density)), 4.3rem);
  height: clamp(2.5rem, calc(5.2vh * var(--mission-density)), 4.3rem);
}
#mission-list[data-size="large"] .mission-score-text {
  font-size: clamp(0.95rem, calc(2.2vh * var(--mission-density)), 1.85rem);
}
#mission-list[data-size="compact"] .mission-card {
  padding: calc(0.82rem * var(--mission-density)) calc(0.92rem * var(--mission-density));
  gap: calc(0.55rem * var(--mission-density));
}
#mission-list[data-size="compact"] .mission-icon-wrap {
  width: clamp(3.3rem, calc(5.3rem * var(--mission-density)), 5.4rem);
  height: clamp(3.3rem, calc(5.3rem * var(--mission-density)), 5.4rem);
}
#mission-list[data-size="compact"] .mission-icon {
  font-size: clamp(2.5rem, calc(4.3rem * var(--mission-density)), 4.4rem);
}
#mission-list[data-size="compact"] .mission-label {
  font-size: clamp(0.95rem, calc(1.58rem * var(--ui-scale) * var(--mission-density)), 2.25rem);
  line-height: 1;
}
.mission-label {
  display: block;
  white-space: normal;
  overflow: visible;
  text-overflow: clip;
  text-align: center;
  line-height: 1.08;
  overflow-wrap: normal;
  word-break: keep-all;
}
#mission-list[data-size="compact"] .mission-score-badge {
  width: clamp(2.6rem, calc(5.3rem * var(--mission-density)), 5.4rem);
  height: clamp(2.6rem, calc(5.3rem * var(--mission-density)), 5.4rem);
}
#mission-list[data-size="compact"] .mission-score-text {
  font-size: clamp(0.95rem, calc(2.2rem * var(--mission-density)), 2.24rem);
}
#bottom-nav {
  height: var(--nav-h);
}
#bottom-nav .material-symbols-outlined {
  font-size: var(--nav-icon-size) !important;
}
.nav-label {
  display: var(--nav-label-display);
}
.stage.compact-ui #mission-title {
  margin-bottom: 0.65rem;
}
.stage.compact-ui .mission-panel {
  padding: 1rem;
}
.stage.compact-ui #bottom-nav a {
  padding-top: 0.3rem !important;
  padding-bottom: 0.3rem !important;
}
#main-content {
  top: var(--header-h-px);
  bottom: var(--nav-h-px);
  left: 0;
  right: 0;
  overflow: hidden;
}
#main-layout {
  height: 100%;
  transform-origin: top center;
  transform: scale(var(--main-content-scale));
  will-change: transform;
}
.main-col {
  min-height: 0;
}
.main-left-stack {
  min-height: 0;
}
.main-right-stack {
  min-height: 0;
}
#main-content-inner {
  height: 100%;
  padding-top: var(--main-top-pad);
  padding-bottom: var(--main-bottom-pad);
  min-height: 0;
}
.stage.compact-ui #main-content-inner {
  padding-top: 0.32rem;
  padding-bottom: 0.16rem;
}
.stage.ultra-compact #main-content-inner {
  padding-top: 0.18rem;
  padding-bottom: 0.08rem;
}
.cat-panel {
  min-height: calc(240px * var(--content-density) * var(--media-scale)) !important;
}
#cat-character {
  width: clamp(8.2rem, calc(26rem * var(--content-density) * var(--media-scale)), 26rem) !important;
  height: clamp(7rem, calc(22.1rem * var(--content-density) * var(--media-scale)), 22.1rem) !important;
}
.stage.ultra-compact .score-panel {
  padding: 0.45rem 0.45rem !important;
}
.stage.ultra-compact #mission-list {
  gap: 0.4rem !important;
}
.stage.ultra-compact #mission-title {
  margin-bottom: 0.35rem !important;
}
@keyframes driftSlow {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
@keyframes driftFast {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}
@keyframes bounce {
  0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
  40% { transform: translateY(-16px); }
  60% { transform: translateY(-8px); }
}
@keyframes pop {
  0% { transform: scale(0.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
</style>
</head>
<body>
<div class="stage">
  <div class="parallax-track hill-back"></div>
  <div class="parallax-track hill-front"></div>

  <header id="top-header" class="bg-surface w-full px-margin-mobile md:px-margin-desktop absolute top-0 left-0 z-40" style="font-size:clamp(0.92rem,calc(1.1rem * var(--ui-scale) * var(--chrome-density)),1.35rem);">
    <div class="flex justify-between items-center w-full max-w-7xl mx-auto">
      <h1 id="planner-title" class="flex items-center gap-2 text-primary font-bold leading-tight whitespace-nowrap" style="font-size:clamp(1.25rem,calc(1.72rem * var(--ui-scale)),2.1rem);">
        <span>🐾</span>
        <span>아침 준비</span>
      </h1>
      <div class="flex gap-1 md:gap-2 items-center min-w-0">
        <div class="bg-surface-container-low border-4 border-outline-variant rounded-full px-3 py-2 md:px-6 md:py-3 text-primary-container font-bold leading-tight whitespace-nowrap tabular-nums countdown-chip" id="countdown" style="font-size:clamp(1.12rem,calc(1.36rem * var(--ui-scale)),1.72rem);">
          <span class="countdown-date" id="countdown-date">0000년 0월 0일 0요일 오전</span>
          <span class="countdown-time" id="countdown-time">
            <span class="countdown-time-part countdown-hour" id="countdown-hour">0시</span>
            <span class="countdown-time-part countdown-minute" id="countdown-minute">0분</span>
            <span class="countdown-time-part countdown-second" id="countdown-second">00초</span>
          </span>
        </div>
        <button class="text-outline hover:scale-110 transition-transform active:translate-y-1" onclick="switchPhaseManually()" aria-label="페이즈 전환" type="button" id="phase-toggle-btn" title="저녁 페이즈로 전환">

<script>
const STORAGE_KEY = 'childMorningDataV2';
const CURRENT_PHASE = 'morning';
const PHASE_FILES = {
  morning: 'Child Morning.html',
  evening: 'Child Evening.html'
};
const PHASE_TITLES = {
  morning: '아침 준비 플래너',
  evening: '저녁 루틴 플래너'
};
const PHASE_VIDEO = {
  morning: {
    loop: './assets/child-morning/cat-loop.mp4',
    happy: './assets/child-morning/cat-happy.mp4'
  },
  evening: {
    loop: './assets/child-evening/cat-night-loop.mp4',
    happy: './assets/child-evening/cat-night-happy.mp4'
  }
};
const defaultMissions = ['옷입기', '가방싸기', '물통 채우기', '양치하기', '양말신기'];
const eveningDefaultMissions = ['저녁 식사', '가방 정리', '샤워하기', '양치하기', '책 읽기'];
const LOOP_SEGMENT_END_SEC = 7.55;
const NIGHT_HAPPY_SEGMENT_ONE_END_SEC = 4;
const NIGHT_HAPPY_SEGMENT_TWO_START_SEC = 4.2;
const CHEER_TEXTS = ['야호!', '최고야!', '짝짝짝!', '잘했어!', '멋져!', '대단해!'];
const REWARD_STEP_COUNT = 10;
const CAT_LEVEL_EMOJIS = ['😺', '😸', '😻', '😼', '🐱', '🐈', '🐈‍⬛'];
const CAT_SIZE_PX = 54;
const AUDIO_MASTER_GAIN = 0.05;
const MIN_MISSION_EDITOR_ROWS = 8;
const FULLSCREEN_RESTORE_KEY = 'childPhaseFullscreenRestore';
const DEBUG_VIEWPORT_MODES = {
  auto: null,
  mobile: { width: 375, height: 667 },
  tablet: { width: 768, height: 1024 },
  desktop: { width: 1366, height: 768 }
};

let happyPlaybackTimeoutId = null;
let isHappyPlaying = false;
let countdownIntervalId = null;
let countdownRunning = false;
let countdownRemainingSeconds = 0;
let settingsFileHandle = null;
let missionFitRafId = null;
let catAnimRafId = null;
let responsiveLayoutRafId = null;
let responsiveResizeObserver = null;
let draggingCatId = null;
let dragOffsetX = 0;
let dragOffsetY = 0;
let audioContext = null;
let audioMasterGain = null;
let lastUiSoundAt = 0;
let currentPhaseMissionItems = [];
let debugViewportMode = 'auto';

let state = {
  childName: '하린',
  leaveTime: '08:30',
  missions: defaultMissions,
  phaseOverride: 'auto',
  phaseSettings: {},
  todayScore: 0,
  totalScore: 0,
  rewardTargetScore: 100,
  rewardBaseScore: 0,
  completed: {},
  dayStamp: '',
  catRewardStampByPhase: {
    morning: '',
    evening: ''
  },
  lastCatRewardDate: '',
  catIdSeed: 1,
  cats: []
};

function clonePhaseSettings(source) {
  return {
    childName: source.childName,
    leaveTime: source.leaveTime,
    missions: [...source.missions],
    missionItems: Array.isArray(source.missionItems) ? source.missionItems.map((item) => ({
      text: String(item.text || '').trim(),
      enabled: !!item.enabled
    })) : undefined,
    completed: { ...(source.completed || {}) }
  };
}

function normalizeMissionItems(items, fallbackMissions = []) {
  const rawItems = Array.isArray(items) ? items : [];
  const normalized = rawItems
    .map((item) => {
      if (typeof item === 'string') {
        return { text: item.trim(), enabled: true };
      }
      if (!item || typeof item !== 'object') return null;
      const text = String(item.text || '').trim();
      return {
        text,
        enabled: item.enabled !== false
      };
    })
    .filter((item) => item && item.text.length > 0);

  if (normalized.length > 0) {
    return normalized;
  }

  return (Array.isArray(fallbackMissions) ? fallbackMissions : [])
    .map((text) => String(text || '').trim())
    .filter(Boolean)
    .map((text) => ({ text, enabled: true }));
}

function getEnabledMissionTexts(items) {
  return normalizeMissionItems(items)
    .filter((item) => item.enabled)
    .map((item) => item.text);
}

function defaultPhaseSettings(phase) {
  if (phase === 'evening') {
    return clonePhaseSettings({
      childName: '하린',
      leaveTime: '21:00',
      missions: eveningDefaultMissions,
      missionItems: eveningDefaultMissions.map((text) => ({ text, enabled: true })),
      completed: {}
    });
  }

  return clonePhaseSettings({
    childName: '하린',
    leaveTime: '08:30',
    missions: defaultMissions,
    missionItems: defaultMissions.map((text) => ({ text, enabled: true })),
    completed: {}
  });
}

function ensurePhaseSettings() {
  if (!state.phaseSettings || typeof state.phaseSettings !== 'object') {
    state.phaseSettings = {};
  }

  if (!state.phaseSettings.morning) {
    state.phaseSettings.morning = clonePhaseSettings({
      childName: state.childName || '하린',
      leaveTime: state.leaveTime || '08:30',
      missions: Array.isArray(state.missions) && state.missions.length > 0 ? state.missions : defaultMissions,
      missionItems: Array.isArray(state.missions) ? state.missions.map((text) => ({ text, enabled: true })) : defaultMissions.map((text) => ({ text, enabled: true })),
      completed: state.completed || {}
    });
  }

  if (!state.phaseSettings.evening) {
    state.phaseSettings.evening = defaultPhaseSettings('evening');
  }

  syncChildNameAcrossPhases();
}

function resolveUnifiedChildName() {
  const stateName = typeof state.childName === 'string' ? state.childName.trim() : '';
  const morningName = state.phaseSettings && state.phaseSettings.morning && typeof state.phaseSettings.morning.childName === 'string'
    ? state.phaseSettings.morning.childName.trim()
    : '';
  const eveningName = state.phaseSettings && state.phaseSettings.evening && typeof state.phaseSettings.evening.childName === 'string'
    ? state.phaseSettings.evening.childName.trim()
    : '';
  return stateName || morningName || eveningName || '하린';
}

function syncChildNameAcrossPhases() {
  const unifiedName = resolveUnifiedChildName();
  state.childName = unifiedName;

  if (state.phaseSettings && state.phaseSettings.morning) {
    state.phaseSettings.morning.childName = unifiedName;
  }
  if (state.phaseSettings && state.phaseSettings.evening) {
    state.phaseSettings.evening.childName = unifiedName;
  }
}

function applyCurrentPhaseSettingsToState() {
  syncChildNameAcrossPhases();
  const phaseSettings = state.phaseSettings && state.phaseSettings[CURRENT_PHASE]
    ? state.phaseSettings[CURRENT_PHASE]
    : defaultPhaseSettings(CURRENT_PHASE);

  const normalizedMissionItems = normalizeMissionItems(phaseSettings.missionItems, phaseSettings.missions);
  currentPhaseMissionItems = normalizedMissionItems.map((item) => ({ ...item }));

  state.childName = resolveUnifiedChildName();
  state.leaveTime = phaseSettings.leaveTime || (CURRENT_PHASE === 'morning' ? '08:30' : '21:00');
  state.missions = getEnabledMissionTexts(normalizedMissionItems);
  state.completed = phaseSettings.completed && typeof phaseSettings.completed === 'object'
    ? { ...phaseSettings.completed }
    : {};
}

function persistCurrentPhaseSettings() {
  ensurePhaseSettings();
  const missionItemsToSave = normalizeMissionItems(currentPhaseMissionItems, state.missions);
  const enabledMissions = getEnabledMissionTexts(missionItemsToSave);
  state.phaseSettings[CURRENT_PHASE] = {
    childName: state.childName,
    leaveTime: state.leaveTime,
    missions: [...enabledMissions],
    missionItems: missionItemsToSave.map((item) => ({ ...item })),
    completed: { ...state.completed }
  };
  syncChildNameAcrossPhases();
}

function applyDebugViewportMode(mode = 'auto') {
  const root = document.documentElement;
  const normalizedMode = Object.prototype.hasOwnProperty.call(DEBUG_VIEWPORT_MODES, mode) ? mode : 'auto';
  debugViewportMode = normalizedMode;

  const target = DEBUG_VIEWPORT_MODES[normalizedMode];
  if (!target) {
    root.style.setProperty('--debug-vw', '100vw');
    root.style.setProperty('--debug-vh', '100vh');
  } else {
    root.style.setProperty('--debug-vw', `${target.width}px`);
    root.style.setProperty('--debug-vh', `${target.height}px`);
  }

  const select = document.getElementById('debug-viewport-mode');
  if (select) {
    select.value = normalizedMode;
  }

  updateUiScale();
  if (typeof scheduleResponsiveLayout === 'function') {
    scheduleResponsiveLayout();
  }
  if (typeof scheduleMissionLabelFit === 'function') {
    scheduleMissionLabelFit();
  }
}

function setDebugViewportModeFromSettings() {
  const select = document.getElementById('debug-viewport-mode');
  if (!select) return;
  applyDebugViewportMode(select.value || 'auto');
}

function getAutoPhaseByTime(now = new Date()) {
  const hour = now.getHours();
  return (hour >= 18 || hour < 6) ? 'evening' : 'morning';
}

function normalizePhaseOverride() {
  const allowed = ['auto', 'morning', 'evening'];
  if (!allowed.includes(state.phaseOverride)) {
    state.phaseOverride = 'auto';
  }
}

function getPreferredPhase(now = new Date()) {
  normalizePhaseOverride();
  if (state.phaseOverride === 'morning' || state.phaseOverride === 'evening') {
    return state.phaseOverride;
  }
  return getAutoPhaseByTime(now);
}

function redirectToPhase(phase) {
  const target = PHASE_FILES[phase];
  if (!target) return;

  const currentPath = window.location.pathname.split('/').pop() || '';
  if (currentPath.toLowerCase() === target.toLowerCase()) return;

  if (document.fullscreenElement) {
    try {
      sessionStorage.setItem(FULLSCREEN_RESTORE_KEY, '1');
    } catch (_) {
      // ignore storage errors
    }
  }

function getTodayStamp() {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  return `${yyyy}-${mm}-${dd}`;
}

function ensureDailyState() {

  if (state.dayStamp === today) return false;

  state.completed = {};

  ensurePhaseSettings();
  Object.keys(state.phaseSettings).forEach((phase) => {
    state.phaseSettings[phase].completed = {};
  });
  return true;
}

function ensureAudioReady() {
  const AudioContextCtor = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextCtor) return null;

  if (!audioContext) {
    audioContext = new AudioContextCtor();
    audioMasterGain = audioContext.createGain();
    audioMasterGain.gain.value = AUDIO_MASTER_GAIN;
    audioMasterGain.connect(audioContext.destination);
  }

  if (audioContext.state === 'suspended') {
    audioContext.resume().catch(() => {});
  }

  return audioContext;
}

function playSynthTone({
  frequency,
  type = 'sine',
  duration = 0.08,
  volume = 0.7,
  attack = 0.005,
  decay = 0.08,
  frequencyEnd = frequency,
  detune = 0
}) {
  const ctx = ensureAudioReady();
  if (!ctx || !audioMasterGain) return;

  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  const now = ctx.currentTime;
  const safeAttack = Math.max(0.001, attack);
  const safeDuration = Math.max(safeAttack + 0.01, duration);

  osc.type = type;
  osc.frequency.setValueAtTime(frequency, now);
  osc.frequency.exponentialRampToValueAtTime(Math.max(30, frequencyEnd), now + safeDuration);
  osc.detune.setValueAtTime(detune, now);

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, volume), now + safeAttack);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + Math.max(safeAttack + 0.01, decay));

  osc.connect(gain);
  gain.connect(audioMasterGain);
  osc.start(now);
  osc.stop(now + safeDuration);
}

function playUiTapSound() {
  const now = performance.now();
  if (now - lastUiSoundAt < 45) return;
  lastUiSoundAt = now;

  playSynthTone({
    frequency: 620,
    frequencyEnd: 880,
    type: 'sine',
    duration: 0.06,
    volume: 0.26,
    attack: 0.003,
    decay: 0.055,
    detune: -3
  });
  window.setTimeout(() => {
    playSynthTone({
      frequency: 880,
      frequencyEnd: 1180,
      type: 'triangle',
      duration: 0.055,
      volume: 0.18,
      attack: 0.002,
      decay: 0.05,
      detune: 7
    });
  }, 24);
}

function playMergeSound(level = 0) {
  const clampedLevel = Math.max(0, Math.min(CAT_LEVEL_EMOJIS.length - 1, Number(level) || 0));
  const levelBoost = clampedLevel * 46;

  playSynthTone({
    frequency: 420 + levelBoost,
    frequencyEnd: 620 + levelBoost,
    type: 'triangle',
    duration: 0.14,
    volume: 0.5,
    attack: 0.004,
    decay: 0.12
  });
  playSynthTone({
    frequency: 640 + levelBoost,
    frequencyEnd: 960 + levelBoost,
    type: 'sine',
    duration: 0.16,
    volume: 0.28,
    attack: 0.002,
    decay: 0.14,
    detune: 8
  });
  window.setTimeout(() => {
    playSynthTone({
      frequency: 880 + levelBoost,
      frequencyEnd: 1260 + levelBoost,
      type: 'sine',
      duration: 0.12,
      volume: 0.16,
      attack: 0.002,
      decay: 0.1,
      detune: 5
    });
  }, 42);
}

function normalizeRewardState() {
  const rawTarget = Number(state.rewardTargetScore);
  const roundedTarget = Number.isFinite(rawTarget) ? Math.round(rawTarget / 10) * 10 : 100;
  state.rewardTargetScore = Math.min(500, Math.max(10, roundedTarget));

  const rawBase = Number(state.rewardBaseScore);
  state.rewardBaseScore = Number.isFinite(rawBase) ? Math.max(0, rawBase) : 0;
  if (state.rewardBaseScore > state.totalScore) {
    state.rewardBaseScore = state.totalScore;
  }
}

function normalizeCatHouseState() {
  const rawSeed = Number(state.catIdSeed);
  state.catIdSeed = Number.isFinite(rawSeed) ? Math.max(1, Math.floor(rawSeed)) : 1;
  state.dayStamp = typeof state.dayStamp === 'string' ? state.dayStamp : '';
  state.lastCatRewardDate = typeof state.lastCatRewardDate === 'string' ? state.lastCatRewardDate : '';
  const rewardByPhase = state.catRewardStampByPhase && typeof state.catRewardStampByPhase === 'object'
    ? state.catRewardStampByPhase
    : {};
  state.catRewardStampByPhase = {
    morning: typeof rewardByPhase.morning === 'string' ? rewardByPhase.morning : '',
    evening: typeof rewardByPhase.evening === 'string' ? rewardByPhase.evening : ''
  };

  // Legacy migration: older saves had one shared date field only.
  if (!state.catRewardStampByPhase.morning && !state.catRewardStampByPhase.evening && state.lastCatRewardDate) {
    state.catRewardStampByPhase.morning = state.lastCatRewardDate;
  }

  if (!Array.isArray(state.cats)) {
    state.cats = [];
    return;
  }

  state.cats = state.cats
    .map((cat) => ({
      id: Number(cat.id),
      level: Number(cat.level) || 0,
      x: Number(cat.x),
      y: Number(cat.y),
      vx: Number(cat.vx),
      vy: Number(cat.vy)
    }))
    .filter((cat) => Number.isFinite(cat.id) && Number.isFinite(cat.x) && Number.isFinite(cat.y))
    .map((cat) => ({
      ...cat,
      level: Math.min(CAT_LEVEL_EMOJIS.length - 1, Math.max(0, Math.floor(cat.level))),
      vx: Number.isFinite(cat.vx) ? cat.vx : (Math.random() * 0.6 + 0.2) * (Math.random() > 0.5 ? 1 : -1),
      vy: Number.isFinite(cat.vy) ? cat.vy : (Math.random() * 0.6 + 0.2) * (Math.random() > 0.5 ? 1 : -1)
    }));

  const maxId = state.cats.reduce((acc, cat) => Math.max(acc, cat.id), 0);
  if (maxId >= state.catIdSeed) {
    state.catIdSeed = maxId + 1;
  }
}

function areAllMissionsCompleted() {
  if (!Array.isArray(state.missions) || state.missions.length === 0) return false;
  return state.missions.every((_, idx) => !!state.completed[idx]);

}

function getMissionEditorRows(includeEmptyRows = false) {
  const list = document.getElementById('mission-editor-list');
  if (!list) return [];

  const rows = Array.from(list.querySelectorAll('[data-mission-row]')).map((row) => {
    const textInput = row.querySelector('.mission-text');
    const enabledInput = row.querySelector('.mission-enabled');
    const text = textInput ? textInput.value.trim() : '';
    return {
      text,
      enabled: !!(enabledInput && enabledInput.checked)
    };
  });

  if (includeEmptyRows) {
    return rows;
  }
  return rows.filter((row) => row.text.length > 0);
}

function renderMissionEditor() {
  const list = document.getElementById('mission-editor-list');
  if (!list) return;

  const baseRows = Array.isArray(currentPhaseMissionItems)
    ? currentPhaseMissionItems.map((item) => ({
      text: String(item.text || ''),
      enabled: !!item.enabled
    }))
    : [];

  while (baseRows.length < MIN_MISSION_EDITOR_ROWS) {
    baseRows.push({ text: '', enabled: true });
  }

  list.innerHTML = baseRows.map((item, idx) => {
    const escapedText = item.text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
    return `
      <div class="grid grid-cols-[auto_auto_1fr] items-center gap-3 bg-surface-container-low rounded-2xl px-3 py-2" data-mission-row="${idx}">
        <input type="checkbox" class="mission-enabled w-5 h-5 accent-primary-container" ${item.enabled ? 'checked' : ''} aria-label="${idx + 1}번 미션 표시 여부">
        <span class="w-px h-7 bg-slate-300"></span>
        <input type="text" data-index="${idx}" class="mission-text bg-transparent outline-none text-lg font-body-md text-on-surface w-full" placeholder="미션 입력" value="${escapedText}" onkeydown="handleMissionEditorEnter(event, ${idx})">
      </div>
    `;
  }).join('');
}

function handleMissionEditorEnter(event, idx) {
  if (event.key !== 'Enter') return;
  event.preventDefault();

  const rows = getMissionEditorRows(true);
  if (idx >= rows.length - 1) {
    rows.push({ text: '', enabled: true });
  }

  currentPhaseMissionItems = rows;
  renderMissionEditor();

  const nextInput = document.querySelector(`#mission-editor-list .mission-text[data-index="${idx + 1}"]`);
  if (nextInput) {
    nextInput.focus();
    nextInput.select();
  }
}

function downloadSettingsJson() {
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = 'Planner_Setting.json';
  anchor.click();
  URL.revokeObjectURL(url);
}

async function saveSettingsToPickedFile() {
  const dataStr = JSON.stringify(state, null, 2);
  const pickerSupported = typeof window.showSaveFilePicker === 'function';

  if (!pickerSupported) {
    downloadSettingsJson();
    return true;
  }

  try {
    if (!settingsFileHandle) {
      settingsFileHandle = await window.showSaveFilePicker({
        suggestedName: 'Planner_Setting.json',
        types: [{
          description: 'JSON Files',
          accept: { 'application/json': ['.json'] }
        }]
      });
    }

    const writable = await settingsFileHandle.createWritable();
    await writable.write(dataStr);
    await writable.close();
    return true;
  } catch (error) {
    if (error && error.name === 'AbortError') {
      return false;
    }
    settingsFileHandle = null;
    downloadSettingsJson();
    return true;
  }
}

async function saveSettingsAsJson() {
  applySettingsFromInputs();
  refreshAfterStateChange();
  const saved = await saveSettingsToPickedFile();
  if (saved) {
    toggleSettings();
  }
}

function loadSettingsFromInput(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (loadEvent) => {
    try {
      const loadedState = JSON.parse(loadEvent.target.result);
      state = {
        ...state,
        ...loadedState,
        missions: Array.isArray(loadedState.missions) ? loadedState.missions : state.missions,
        completed: loadedState.completed && typeof loadedState.completed === 'object' ? loadedState.completed : {}
      };
      normalizePhaseOverride();
      ensurePhaseSettings();
      applyCurrentPhaseSettingsToState();
      normalizeRewardState();
      refreshAfterStateChange();
      toggleSettings();
      alert('JSON 설정을 불러왔어요.');
    } catch (_) {
      alert('JSON 파일 형식을 확인해주세요.');
    } finally {
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

function getRewardProgressInfo() {
  const target = Math.max(10, Number(state.rewardTargetScore) || 100);
  const current = Math.max(0, state.totalScore - state.rewardBaseScore);
  const ratio = Math.min(1, current / target);
  const filledSteps = Math.floor(ratio * REWARD_STEP_COUNT);
  const unlocked = ratio >= 1;
  return { target, current, ratio, filledSteps, unlocked };
}

function buildRewardTrackMarkup(filledSteps, unlocked) {
  const nodes = [];
  for (let i = 0; i < REWARD_STEP_COUNT; i += 1) {
    const isFilled = i < filledSteps;
    nodes.push(`
      <span class="rounded-full border-2 border-outline flex items-center justify-center shrink-0 transition-all" style="width:clamp(1.55rem,4.6vw,2.35rem); height:clamp(1.55rem,4.6vw,2.35rem); background:${isFilled ? '#ffb95a' : '#d7d7d7'}; color:${isFilled ? '#6f4600' : '#7a7a7a'};">
        <span class="material-symbols-outlined" style="font-size:clamp(0.95rem,2.8vw,1.35rem); font-variation-settings: 'FILL' 1, 'wght' 600;">pets</span>
      </span>
    `);
    if (i < REWARD_STEP_COUNT - 1) {
      nodes.push(`<span class="h-1 rounded-full flex-1 min-w-0" style="background:${isFilled ? '#ffb95a' : '#d7d7d7'};"></span>`);
    }
  }

  nodes.push(`
    <span class="h-8 w-0.5 mx-0.5 rounded-full shrink-0" style="background:${unlocked ? '#ff7f50' : '#d7d7d7'};"></span>
    <button class="rounded-full border-2 border-outline flex items-center justify-center shrink-0 transition-all" style="width:clamp(1.9rem,5.2vw,2.55rem); height:clamp(1.9rem,5.2vw,2.55rem); background:${unlocked ? '#74aacf' : '#d7d7d7'}; color:${unlocked ? '#003e5a' : '#7a7a7a'};" type="button" onclick="claimReward()" ${unlocked ? '' : 'disabled'} aria-label="깃발 보상 받기">
      <span class="material-symbols-outlined" style="font-size:clamp(1.05rem,3vw,1.5rem); font-variation-settings: 'FILL' 1, 'wght' 600;">flag</span>
    </button>
  `);

  return nodes.join('');
}

function renderRewardProgress() {
  const label = document.getElementById('reward-progress-label');
  const track = document.getElementById('reward-track');
  const claimButton = document.getElementById('reward-claim-btn');
  if (!label || !track || !claimButton) return;

  const { target, current, filledSteps, unlocked } = getRewardProgressInfo();
  label.textContent = `${Math.min(current, target)} / ${target}점`;
  track.innerHTML = buildRewardTrackMarkup(filledSteps, unlocked);

  claimButton.disabled = !unlocked;
  claimButton.textContent = unlocked ? '깃발 보상 받기' : '깃발 잠금 중';
  claimButton.style.background = unlocked ? '#74aacf' : '#e5e5e5';

}

function getKoreanSubjectParticle(name) {
  const value = (name || '').trim();
  if (!value) return '의';
  const lastChar = value[value.length - 1];
  const code = lastChar.charCodeAt(0) - 44032;
  if (code < 0 || code > 11171) return '의';
  const jongseong = code % 28;
  return jongseong === 0 ? '의' : '이';
}

function fitMissionLabels() {
  const list = document.getElementById('mission-list');
  if (!list) return;

  const isLarge = list.dataset.size === 'large';
  const labels = list.querySelectorAll('.mission-label');

  labels.forEach((label) => {
    const wrap = label.parentElement;
    if (!wrap) return;

    const card = label.closest('.mission-card');
    const icon = card ? card.querySelector('.mission-icon') : null;
    const iconFontPx = icon ? parseFloat(getComputedStyle(icon).fontSize) || (isLarge ? 60 : 44) : (isLarge ? 60 : 44);

    const wrapWidth = Math.max(1, wrap.clientWidth);
    const wrapHeight = Math.max(1, wrap.clientHeight);
    const preferredPx = Math.round(iconFontPx * 0.9);
    const maxPx = Math.floor(Math.min(
      preferredPx * 1.05,
      wrapHeight * (isLarge ? 0.94 : 0.96),
      wrapWidth * (isLarge ? 0.98 : 1)
    ));
    const minPx = Math.max(isLarge ? 18 : 14, Math.round(iconFontPx * 0.72));

    if (isLarge) {
      label.style.fontSize = `${preferredPx}px`;
      const directFitsWidth = label.scrollWidth <= wrap.clientWidth + 8;
      const directFitsHeight = label.scrollHeight <= Math.floor(wrap.clientHeight * 0.95);
      if (directFitsWidth && directFitsHeight) {
        return;
      }
    }

    let low = minPx;
    let high = Math.max(minPx, maxPx);
    let best = minPx;

    while (low <= high) {
      const mid = Math.floor((low + high) / 2);
      label.style.fontSize = `${mid}px`;

      const fitsWidth = label.scrollWidth <= wrap.clientWidth + 8;
      const fitsHeight = label.scrollHeight <= Math.floor(wrap.clientHeight * 0.95);

      if (fitsWidth && fitsHeight) {
        best = mid;
        low = mid + 1;
      } else {
        high = mid - 1;
      }
    }

    label.style.fontSize = `${Math.max(minPx, best)}px`;

    // 4글자 초과 + 띄어쓰기 있을 때만 줄바꿈, 그 외엔 한 줄 유지
    const text = label.textContent;
    const hasSpace = text.includes(' ');
    if (text.length > 4 && hasSpace) {
      label.style.whiteSpace = 'normal';
      label.style.wordBreak = 'keep-all';
      label.style.overflowWrap = 'normal';
    } else {
      label.style.whiteSpace = 'nowrap';
      label.style.wordBreak = '';
      label.style.overflowWrap = '';
    }
  });
}

function randomCatVelocity() {
  const speed = Math.random() * 0.55 + 0.2;
  const angle = Math.random() * Math.PI * 2;
  return {
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed
  };
}

function getCatMatBounds() {
  const mat = document.getElementById('cat-house-mat');
  if (!mat) return { width: 0, height: 0 };
  if (mat.clientWidth === 0 || mat.clientHeight === 0) {
    return { width: 640, height: 420 };
  }
  return {
    width: mat.clientWidth,
    height: mat.clientHeight
  };
}

function clampCatToMat(cat) {
  const { width, height } = getCatMatBounds();
  const maxX = Math.max(0, width - CAT_SIZE_PX);
  const maxY = Math.max(0, height - CAT_SIZE_PX);
  cat.x = Math.min(maxX, Math.max(0, cat.x));
  cat.y = Math.min(maxY, Math.max(0, cat.y));
}

function createCat(level = 0, x = null, y = null) {
  const { width, height } = getCatMatBounds();
  const maxX = Math.max(0, width - CAT_SIZE_PX);
  const maxY = Math.max(0, height - CAT_SIZE_PX);
  const velocity = randomCatVelocity();
  const next = {
    id: state.catIdSeed,
    level: Math.min(CAT_LEVEL_EMOJIS.length - 1, Math.max(0, level)),
    x: x === null ? Math.random() * maxX : x,
    y: y === null ? Math.random() * maxY : y,
    vx: velocity.vx,
    vy: velocity.vy
  };

  state.catIdSeed += 1;
  clampCatToMat(next);
  state.cats.push(next);
  return next;
}

function renderCatHouse() {
  const mat = document.getElementById('cat-house-mat');
  const count = document.getElementById('cat-house-count');
  if (!mat || !count) return;

  count.textContent = `고양이 ${state.cats.length}마리`;
  mat.innerHTML = state.cats.map((cat) => {
    const emoji = CAT_LEVEL_EMOJIS[cat.level] || CAT_LEVEL_EMOJIS[CAT_LEVEL_EMOJIS.length - 1];
    return `
      <button
        class="house-cat level-${Math.min(cat.level, CAT_LEVEL_EMOJIS.length - 1)}"
        data-cat-id="${cat.id}"
        onpointerdown="startDragCat(event, ${cat.id})"
        aria-label="${cat.level + 1}레벨 고양이"
        type="button"
        style="left:${cat.x}px; top:${cat.y}px;"
      >${emoji}</button>
    `;
  }).join('');
}

function updateCatDomPosition(catId) {
  const node = document.querySelector(`.house-cat[data-cat-id="${catId}"]`);
  const cat = state.cats.find((item) => item.id === catId);
  if (!node || !cat) return;
  node.style.left = `${cat.x}px`;
  node.style.top = `${cat.y}px`;
}

function startDragCat(event, catId) {
  event.preventDefault();

  const node = document.querySelector(`.house-cat[data-cat-id="${catId}"]`);
  const cat = state.cats.find((item) => item.id === catId);
  const mat = document.getElementById('cat-house-mat');
  if (!node || !cat || !mat) return;

  const matRect = mat.getBoundingClientRect();
  draggingCatId = catId;
  dragOffsetX = event.clientX - (matRect.left + cat.x);
  dragOffsetY = event.clientY - (matRect.top + cat.y);
  node.classList.add('dragging');

  if (event.pointerId !== undefined && node.setPointerCapture) {
    node.setPointerCapture(event.pointerId);
  }
}

function moveDraggingCat(clientX, clientY) {
  if (draggingCatId === null) return;

  const cat = state.cats.find((item) => item.id === draggingCatId);
  const mat = document.getElementById('cat-house-mat');
  if (!cat || !mat) return;

  const rect = mat.getBoundingClientRect();
  cat.x = clientX - rect.left - dragOffsetX;
  cat.y = clientY - rect.top - dragOffsetY;
  clampCatToMat(cat);
  updateCatDomPosition(cat.id);
}

function tryMergeCats(baseCat) {
  const other = state.cats.find((cat) => {
    if (cat.id === baseCat.id) return false;
    if (cat.level !== baseCat.level) return false;

    const dx = (cat.x + CAT_SIZE_PX / 2) - (baseCat.x + CAT_SIZE_PX / 2);
    const dy = (cat.y + CAT_SIZE_PX / 2) - (baseCat.y + CAT_SIZE_PX / 2);
    return Math.hypot(dx, dy) < CAT_SIZE_PX * 0.72;
  });

  if (!other) return false;

  const nextLevel = Math.min(CAT_LEVEL_EMOJIS.length - 1, baseCat.level + 1);
  const mergedX = (baseCat.x + other.x) / 2;
  const mergedY = (baseCat.y + other.y) / 2;

  state.cats = state.cats.filter((cat) => cat.id !== baseCat.id && cat.id !== other.id);
  const newCat = createCat(nextLevel, mergedX, mergedY);
  persistState();
  renderCatHouse();
  playMergeSound(nextLevel);

  const mergedNode = document.querySelector(`.house-cat[data-cat-id="${newCat.id}"]`);
  if (mergedNode) {
    mergedNode.classList.add('merge-pop');
    setTimeout(() => mergedNode.classList.remove('merge-pop'), 260);
  }

  return true;
}

function endDragCat() {
  if (draggingCatId === null) return;

  const cat = state.cats.find((item) => item.id === draggingCatId);
  const node = document.querySelector(`.house-cat[data-cat-id="${draggingCatId}"]`);
  if (node) {
    node.classList.remove('dragging');
  }

  if (cat) {
    const merged = tryMergeCats(cat);
    if (!merged) {
      persistState();
    }
  }

  draggingCatId = null;
}

function animateCats() {
  const { width, height } = getCatMatBounds();

  state.cats.forEach((cat) => {
    if (draggingCatId === cat.id) return;

    cat.x += cat.vx;
    cat.y += cat.vy;

    const maxX = Math.max(0, width - CAT_SIZE_PX);
    const maxY = Math.max(0, height - CAT_SIZE_PX);

    if (cat.x <= 0 || cat.x >= maxX) {
      cat.vx *= -1;
      cat.x = Math.max(0, Math.min(maxX, cat.x));
    }
    if (cat.y <= 0 || cat.y >= maxY) {
      cat.vy *= -1;
      cat.y = Math.max(0, Math.min(maxY, cat.y));
    }

    updateCatDomPosition(cat.id);
  });

  catAnimRafId = requestAnimationFrame(animateCats);
}

function ensureCatAnimation() {
  if (catAnimRafId) return;
  catAnimRafId = requestAnimationFrame(animateCats);
}

function safeVideoPlay(video) {
  const p = video.play();
  if (p && typeof p.catch === 'function') {
    p.catch(() => {});
  }
}

function playLoopVideo() {
  const video = document.getElementById('cat-video');
  if (!video) return;
  const loopVideoSrc = getLoopVideoSrc();

  if (happyPlaybackTimeoutId) {
    clearTimeout(happyPlaybackTimeoutId);
    happyPlaybackTimeoutId = null;
  }

  isHappyPlaying = false;
  video.loop = false;
  const isNightPhase = CURRENT_PHASE === 'evening';
  if (isNightPhase) {
    video.classList.remove('cat-loop-mirrored');
  } else {
    video.classList.add('cat-loop-mirrored');
  }
  video.classList.remove('cat-happy-offset');

  const duration = Number.isFinite(video.duration) ? video.duration : 8;
  const loopStartSec = 0;
  const loopEndSec = isNightPhase
    ? duration
    : Math.min(LOOP_SEGMENT_END_SEC, duration);

  if (video._loopSegmentHandler) {
    video.removeEventListener('timeupdate', video._loopSegmentHandler);
  }

  video._loopSegmentHandler = () => {
    if (isHappyPlaying || video.currentTime < loopEndSec) return;
    video.currentTime = loopStartSec;
    safeVideoPlay(video);
  };
  video.addEventListener('timeupdate', video._loopSegmentHandler);
  video.onended = null;

  if (video.getAttribute('src') !== loopVideoSrc) {
    video.setAttribute('src', loopVideoSrc);
    video.load();
  }

  video.currentTime = loopStartSec;
  safeVideoPlay(video);
}

function playHappyScene() {
  const video = document.getElementById('cat-video');
  if (!video) return;
  const happyVideoSrc = getHappyVideoSrc();

  if (happyPlaybackTimeoutId) {
    clearTimeout(happyPlaybackTimeoutId);
    happyPlaybackTimeoutId = null;
  }

  isHappyPlaying = true;
  video.loop = false;
  video.classList.remove('cat-loop-mirrored');
  video.classList.add('cat-happy-offset');

  const runSegment = () => {
    const duration = Number.isFinite(video.duration) ? video.duration : 8;
    const isNightPhase = CURRENT_PHASE === 'evening';

    let startSec = Math.min(2, Math.max(0, duration - 0.1));
    let endSec = Math.min(8, duration);

    if (isNightPhase) {
      const safeDuration = Math.max(0.3, duration);
      const segmentOptions = [
        {
          start: 0,
          end: Math.min(NIGHT_HAPPY_SEGMENT_ONE_END_SEC, safeDuration)
        },
        {
          start: Math.min(NIGHT_HAPPY_SEGMENT_TWO_START_SEC, Math.max(0, safeDuration - 0.1)),
          end: safeDuration
        }
      ].filter((segment) => segment.end - segment.start >= 0.18);

      const picked = segmentOptions[Math.floor(Math.random() * segmentOptions.length)] || { start: 0, end: safeDuration };
      startSec = picked.start;
      endSec = picked.end;
    }

    const segmentMs = Math.max(300, (endSec - startSec) * 1000);

    video.currentTime = startSec;
    safeVideoPlay(video);

    happyPlaybackTimeoutId = setTimeout(() => {
      isHappyPlaying = false;
      playLoopVideo();
    }, segmentMs);
  };

  if (video.getAttribute('src') !== happyVideoSrc) {
    video.setAttribute('src', happyVideoSrc);
    video.load();
  }

  if (video.readyState >= 1) {
    runSegment();
  } else {
    video.addEventListener('loadedmetadata', runSegment, { once: true });
  }

  video.onended = () => {
    if (isHappyPlaying) {
      isHappyPlaying = false;
      playLoopVideo();
    }
  };
}

function parseTimeToday(timeStr) {
  const [h, m] = (timeStr || '08:30').split(':').map(Number);
  const dt = new Date();
  dt.setHours(h || 0, m || 0, 0, 0);
  if (dt.getTime() <= Date.now()) {
    dt.setDate(dt.getDate() + 1);
  }
  return dt;
}

function updateArrivalLabelByTarget(target) {
  const label = document.getElementById('arrival-label');
  if (!label || !(target instanceof Date)) return;

  const now = new Date();
  const isSameDay =
    target.getFullYear() === now.getFullYear() &&
    target.getMonth() === now.getMonth() &&
    target.getDate() === now.getDate();

  if (isSameDay) {
    label.textContent = CURRENT_PHASE === 'morning' ? '등교까지' : '취침까지';
    return;
  }

  const nextLabel = CURRENT_PHASE === 'morning' ? '등교까지' : '취침까지';
  label.innerHTML = `<span class="arrival-label-break"><span>내일</span><span>${nextLabel}</span></span>`;
}

function fitArrivalTimer() {
  const stage = document.querySelector('.stage');
  const wrap = document.querySelector('.arrival-copy');
  const label = document.getElementById('arrival-label');
  const timer = document.getElementById('countdown-large');
  if (!stage || !wrap || !label || !timer) return;

  const uiScale = Number(getComputedStyle(stage).getPropertyValue('--ui-scale')) || 1;
  const contentDensity = Number(getComputedStyle(stage).getPropertyValue('--content-density')) || 1;
  const wrapRect = wrap.getBoundingClientRect();
  const labelRect = label.getBoundingClientRect();
  const gap = parseFloat(getComputedStyle(wrap).columnGap || getComputedStyle(wrap).gap || '0') || 0;
  const availableWidth = Math.max(48, wrapRect.width - labelRect.width - gap - 2);
  const availableHeight = Math.max(28, wrapRect.height * 0.96);

  const preferredPx = Math.round(126 * uiScale * Math.max(0.9, contentDensity));
  const minPx = Math.max(36, Math.round(56 * uiScale * Math.min(1.06, contentDensity + 0.2)));

  let low = minPx;
  let high = Math.max(minPx, preferredPx);
  let best = minPx;

  while (low <= high) {
    const mid = Math.floor((low + high) / 2);
    timer.style.fontSize = `${mid}px`;

    const fitsWidth = timer.scrollWidth <= availableWidth + 2;
    const fitsHeight = timer.scrollHeight <= availableHeight;

    if (fitsWidth && fitsHeight) {
      best = mid;
      low = mid + 1;
    } else {
      high = mid - 1;
    }
  }

  timer.style.fontSize = `${best}px`;
}

function updateHeaderClock() {

  const ampm = now.getHours() < 12 ? '오전' : '오후';

  document.getElementById('countdown-date').textContent = dateText;
  document.getElementById('countdown-hour').textContent = `${hour12}시`;
  document.getElementById('countdown-minute').textContent = `${now.getMinutes()}분`;
  document.getElementById('countdown-second').textContent = `${String(now.getSeconds()).padStart(2, '0')}초`;
}

function updateCountdownTimer() {

function syncCountdownDisplay() {
  const target = parseTimeToday(state.leaveTime);
  updateArrivalLabelByTarget(target);
  const diff = Math.max(0, Math.floor((target.getTime() - Date.now()) / 1000));
  countdownRemainingSeconds = diff;
  const mm = String(Math.floor(diff / 60)).padStart(2, '0');
  const ss = String(diff % 60).padStart(2, '0');
  document.getElementById('countdown-large-minutes').textContent = mm;
  document.getElementById('countdown-large-seconds').textContent = ss;
  fitArrivalTimer();
}

function renderFullscreenToggle() {

async function toggleFullscreenMode() {
  try {
    if (document.fullscreenElement) {
      await document.exitFullscreen();
    } else {
      await document.documentElement.requestFullscreen();
    }
  } catch (_) {
    // ignore unsupported fullscreen requests
  } finally {
    renderFullscreenToggle();
  }
}

function restoreFullscreenAfterPhaseSwitch() {
  let shouldRestore = false;
  try {
    shouldRestore = sessionStorage.getItem(FULLSCREEN_RESTORE_KEY) === '1';
    sessionStorage.removeItem(FULLSCREEN_RESTORE_KEY);
  } catch (_) {
    shouldRestore = false;
  }

  if (!shouldRestore || document.fullscreenElement) return;

  const tryEnterFullscreen = async () => {
    try {
      await document.documentElement.requestFullscreen();
    } catch (_) {
      // Some browsers require a fresh user gesture after navigation.
    } finally {
      renderFullscreenToggle();
    }
  };

  const retryOnGesture = async () => {
    window.removeEventListener('pointerdown', retryOnGesture, true);
    window.removeEventListener('keydown', retryOnGesture, true);
    await tryEnterFullscreen();
  };

  tryEnterFullscreen().then(() => {
    if (!document.fullscreenElement) {
      window.addEventListener('pointerdown', retryOnGesture, { capture: true, once: true });
      window.addEventListener('keydown', retryOnGesture, { capture: true, once: true });
    }
  });
}

function updateUiScale() {
  const stage = document.querySelector('.stage');
  if (!stage) return;

  const baseWidth = 1366;
  const baseHeight = 768;
  const widthScale = stage.clientWidth / baseWidth;
  const heightScale = stage.clientHeight / baseHeight;
  const nextScale = Math.min(1.12, Math.max(0.34, Math.min(widthScale, heightScale)));
  stage.style.setProperty('--ui-scale', String(nextScale));
}

function updateResponsiveLayout() {
  const stage = document.querySelector('.stage');
  if (!stage) return;

  const height = stage.clientHeight;
  const width = stage.clientWidth;
  const compactMode = height < 730 || (height < 790 && width < 1300);
  const pressure = compactMode ? Math.min(1, Math.max(0, (790 - height) / 170)) : 0;
  const ultraCompactMode = height < 670 || pressure > 0.72;

  stage.classList.toggle('compact-ui', compactMode);
  stage.classList.toggle('ultra-compact', ultraCompactMode);
  stage.style.setProperty('--chrome-density', (1 - (pressure * 0.24)).toFixed(3));
  stage.style.setProperty('--content-density', (1 - (pressure * 0.12)).toFixed(3));
  stage.style.setProperty('--mission-density', (1 - (pressure * 0.14)).toFixed(3));
  stage.style.setProperty('--nav-h', `${(4.7 - (pressure * 1.25)).toFixed(3)}rem`);
  stage.style.setProperty('--nav-icon-size', `${(1.75 - (pressure * 0.32)).toFixed(3)}rem`);
  stage.style.setProperty('--main-grid-gap', `${(1.35 - (pressure * 0.55)).toFixed(3)}rem`);
  stage.style.setProperty('--main-top-pad', `${(0.45 - (pressure * 0.26)).toFixed(3)}rem`);
  stage.style.setProperty('--main-bottom-pad', `${(0.22 - (pressure * 0.14)).toFixed(3)}rem`);

  const hideNavLabels = height < 740 || pressure > 0.34;
  stage.style.setProperty('--nav-label-display', hideNavLabels ? 'none' : 'block');

  const topHeader = document.getElementById('top-header');
  const bottomNav = document.getElementById('bottom-nav');
  const main = document.getElementById('main-content');
  const mainLayout = document.getElementById('main-layout');
  if (!topHeader || !bottomNav || !main || !mainLayout) return;

  stage.style.setProperty('--main-content-scale', '1');

  requestAnimationFrame(() => {
    const headerHeightPx = Math.ceil(topHeader.offsetHeight);
    const navHeightPx = Math.ceil(bottomNav.offsetHeight);
    stage.style.setProperty('--header-h-px', `${headerHeightPx}px`);
    stage.style.setProperty('--nav-h-px', `${navHeightPx}px`);

    const availableWidth = Math.max(1, main.clientWidth);
    const contentWidth = Math.max(1, mainLayout.scrollWidth);
    const availableHeight = Math.max(1, main.clientHeight);
    const contentHeight = Math.max(1, mainLayout.scrollHeight);

    const widthFitScale = Math.min(1, (availableWidth / contentWidth) * 0.995);
    const heightFitScale = Math.min(1, (availableHeight / contentHeight) * 0.995);
    const fitScale = Math.min(widthFitScale, Math.max(0.84, heightFitScale));
    const mediaScale = Math.max(0.46, Math.min(1, 1 - ((1 - heightFitScale) * 1.5)));
    stage.style.setProperty('--media-scale', mediaScale.toFixed(3));

    if (fitScale >= 0.999) {
      stage.style.setProperty('--main-content-scale', '1');
      fitArrivalTimer();
      return;
    }

    stage.style.setProperty('--main-content-scale', Math.max(0.82, fitScale).toFixed(3));
    fitArrivalTimer();
  });
}

function initResponsiveObserver() {
  if (typeof ResizeObserver !== 'function' || responsiveResizeObserver) return;

  const targets = [
    document.querySelector('.stage'),
    document.getElementById('top-header'),
    document.getElementById('bottom-nav'),
    document.getElementById('main-content'),
    document.getElementById('main-layout'),
    document.getElementById('mission-list'),
    document.getElementById('countdown')
  ].filter(Boolean);

  if (targets.length === 0) return;

  responsiveResizeObserver = new ResizeObserver(() => {
    scheduleResponsiveLayout();
  });

  targets.forEach((target) => {
    responsiveResizeObserver.observe(target);
  });
}

loadState();
normalizePhaseOverride();
ensurePhaseSettings();
applyCurrentPhaseSettingsToState();
normalizeRewardState();
normalizeCatHouseState();
refreshForNewDay();
updateUiScale();
updateResponsiveLayout();
renderMissions();
renderScores();
renderRewardProgress();
renderHeaderTitle();
renderCatHouse();
playLoopVideo();
updateHeaderClock();
syncCountdownDisplay();
renderFullscreenToggle();
renderCountdownToggle();
renderPhaseToggleIcon();
restoreFullscreenAfterPhaseSwitch();
applyDebugViewportMode('auto');
grantDailyCatRewardIfNeeded();
ensureCatAnimation();
initResponsiveObserver();
scheduleResponsiveLayout();
maybeAutoSwitchPhase();

if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(() => {
    scheduleResponsiveLayout();
  });
}

window.addEventListener('load', () => {
  scheduleResponsiveLayout();
});

window.addEventListener('pointerdown', handleInteractivePointerDown, { passive: true });
window.addEventListener('pointermove', (event) => {
  moveDraggingCat(event.clientX, event.clientY);
});
window.addEventListener('pointerup', () => {
  endDragCat();
});
window.addEventListener('pointercancel', () => {
  endDragCat();
});

setInterval(updateHeaderClock, 1000);
setInterval(refreshForNewDay, 1000);
setInterval(fitArrivalTimer, 1000);
setInterval(maybeAutoSwitchPhase, 30000);
document.addEventListener('fullscreenchange', renderFullscreenToggle);
window.addEventListener('resize', () => {
  updateUiScale();
  scheduleResponsiveLayout();
  scheduleMissionLabelFit();
  state.cats.forEach(clampCatToMat);
  renderCatHouse();
});
</script>
