﻿﻿﻿﻿﻿<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커스텀 보드게임 제작기 모음집</title>
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --ink:#1f2430; --muted:#6b7280;
  --line:#e3e7ef; --brand:#5b6cff; --brand2:#8a5bff; --accent:#ff7a59;
  --ok:#16a34a; --shadow:0 6px 24px rgba(40,50,90,.08);
  /* theme (게임 색) */
  --t1:#5b6cff; --t2:#8a5bff; --t3:#fef3c7; --t-ink:#1f2430; --t-soft:#eef1ff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit;font-size:14px}

/* ---------- App chrome ---------- */
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(100deg,var(--brand),var(--brand2));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow)}
.topbar h1{font-size:18px;margin:0;font-weight:800;letter-spacing:0}
.topbar .sub{font-size:12px;opacity:.85;font-weight:500}
.topbar .spacer{flex:1}
.topbar button{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:9px;padding:8px 13px;font-weight:600;font-size:13px}
.topbar button:hover{background:rgba(255,255,255,.28)}

.wrap{max-width:1280px;margin:0 auto;padding:18px}

/* ---------- Home grid ---------- */
.home-intro{text-align:center;margin:18px 0 26px}
.home-intro h2{font-size:24px;margin:0 0 6px}
.home-intro p{color:var(--muted);margin:0;font-size:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.card-game{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.card-game:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--brand)}
.card-game .emoji{font-size:34px;display:block;margin-bottom:8px}
.card-game h3{margin:0 0 4px;font-size:16px}
.card-game p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.45}
.card-game .tag{position:absolute;top:12px;right:12px;font-size:10px;background:var(--t-soft);color:var(--brand);padding:3px 8px;border-radius:20px;font-weight:700}

/* ---------- Editor layout ---------- */
.editor{display:none;grid-template-columns:380px 1fr;gap:18px;align-items:start}
.editor.active{display:grid}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
.panel-stack{display:flex;flex-direction:column;gap:14px;position:sticky;top:74px;max-height:calc(100vh - 90px);overflow:auto}
.sec-title{font-size:12px;font-weight:800;color:var(--brand);text-transform:uppercase;letter-spacing:.5px;margin:0 0 10px;display:flex;align-items:center;gap:6px}
.field{margin-bottom:12px}
.field>label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
.field .hint{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.4}
textarea,input[type=text],input[type=number],select{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fbfcfe}
textarea{min-height:120px;resize:vertical;line-height:1.55}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);background:#fff}

.btn{border:none;border-radius:10px;padding:10px 14px;font-weight:700;font-size:14px}
.btn.primary{background:var(--brand);color:#fff}
.btn.primary:hover{filter:brightness(1.05)}
.btn.ghost{background:#eef1f8;color:var(--ink)}
.btn.ghost:hover{background:#e3e7f3}
.btn.full{width:100%}
.btn-row{display:flex;gap:8px}

/* theme swatches */
.themes{display:flex;flex-wrap:wrap;gap:8px}
.swatch{width:38px;height:38px;border-radius:10px;border:3px solid transparent;cursor:pointer;position:relative}
.swatch.sel{border-color:var(--ink);box-shadow:0 0 0 2px #fff inset}

.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{border:1px solid var(--line);background:#fbfcfe;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600}
.chip.sel{background:var(--brand);color:#fff;border-color:var(--brand)}

/* item list */
.items{display:flex;flex-direction:column;gap:7px;margin-top:8px;max-height:300px;overflow:auto;padding-right:2px}
.item{display:flex;gap:6px;align-items:center;background:#fbfcfe;border:1px solid var(--line);border-radius:9px;padding:5px 6px}
.item .num{font-size:11px;color:var(--muted);min-width:18px;text-align:center;font-weight:700}
.item input{border:none;background:transparent;flex:1;padding:4px}
.item input:focus{background:#fff;border-radius:6px}
.item .thumb{width:30px;height:30px;border-radius:6px;object-fit:cover;border:1px solid var(--line);flex-shrink:0;background:#eef}
.item .iconbtn{border:none;background:#eef1f8;border-radius:6px;width:26px;height:26px;font-size:13px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.item .iconbtn:hover{background:#dde3f3}
.item .iconbtn.del:hover{background:#ffe1e1;color:#c00}

/* ---------- Preview / Stage ---------- */
.stage-wrap{background:#e8ebf3;border-radius:16px;padding:22px;overflow:auto;min-height:60vh}
.stage-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.stage-bar .title{font-weight:800;font-size:15px}
.stage-bar .spacer{flex:1}
#stage{display:flex;flex-direction:column;align-items:center;gap:20px}

.page{background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.18);position:relative;overflow:hidden}
.page-pad{padding:12mm}
.page-title{text-align:center;font-weight:800;font-size:20px;margin:0 0 8px;color:var(--t-ink)}
.page-foot{position:absolute;bottom:5mm;right:8mm;font-size:9px;color:#aab}

/* cut lines */
.cut{outline:1px dashed #99a; }
.cutgrid{display:grid;gap:0}
.cutgrid>*{border:1px dashed #aab;margin:-0.5px}
.scissor{position:relative}
.scissor::before{content:"✂";position:absolute;left:-4px;top:-11px;font-size:11px;color:#bbc}

/* generic board */
.empty-note{color:var(--muted);text-align:center;padding:40px 20px;font-size:14px}

/* ===== game components ===== */
.gtitle{text-align:center;font-weight:800;font-size:22px;margin:0 0 3mm;color:var(--t-ink)}
.gsub{text-align:center;font-size:11px;color:#889;margin:-2mm 0 3mm}
.media{display:block;max-width:100%;max-height:100%;object-fit:contain}

/* snake & ladder */
.snake-grid{display:grid;width:100%;border:3px solid var(--t2);border-radius:6px;overflow:hidden}
.snake-cell{border:1px solid var(--t3);padding:3px;position:relative;display:flex;flex-direction:column;font-size:10px;line-height:1.2;min-height:0;overflow:hidden}
.snake-cell .n{position:absolute;top:2px;left:3px;font-size:9px;font-weight:800;color:var(--t2);opacity:.8}
.snake-cell .q{margin-top:11px;font-weight:600;color:var(--t-ink);word-break:keep-all}
.snake-cell .pic{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;margin-top:2px}
.snake-cell .pic img{max-height:100%;max-width:100%;object-fit:contain}
.snake-cell.start{background:var(--t3)}
.snake-cell.finish{background:var(--t1);color:#fff}
.snake-cell .badge{position:absolute;bottom:2px;right:3px;font-size:11px}

/* bingo */
.bingo{display:grid;gap:2px;background:var(--t2);border:4px solid var(--t2);border-radius:10px;aspect-ratio:1/1}
.bingo-cell{background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px;font-size:12px;font-weight:600;color:var(--t-ink);word-break:keep-all;overflow:hidden}
.bingo-cell.free{background:var(--t3);font-weight:800}
.bingo-cell img{max-width:90%;max-height:60%;object-fit:contain;margin-bottom:2px}
.bingo-head{display:grid;margin-bottom:3px}
.bingo-head div{text-align:center;font-weight:900;color:#fff;background:var(--t1);font-size:20px;padding:4px 0;border-radius:6px;margin:0 1px}

/* monopoly */
.mono-board{display:grid;width:100%;aspect-ratio:1/1;background:var(--t-soft);border:3px solid var(--t2)}
.mono-cell{border:1px solid var(--t2);background:#fff;display:flex;flex-direction:column;font-size:8.5px;line-height:1.15;overflow:hidden;position:relative}
.mono-cell .bar{height:8px;background:var(--t1)}
.mono-cell .nm{padding:2px 3px;font-weight:700;word-break:keep-all;color:var(--t-ink)}
.mono-cell .pic{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.mono-cell .pic img{max-width:96%;max-height:96%;object-fit:contain}
.mono-cell.corner{background:var(--t3);font-size:11px;font-weight:800;align-items:center;justify-content:center;text-align:center}
.mono-center{display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;color:var(--t2)}
.mono-center .big{font-size:34px;font-weight:900;letter-spacing:0}
.ledger{width:100%;border-collapse:collapse;font-size:12px}
.ledger th,.ledger td{border:1px solid var(--t2);padding:6px 8px;text-align:center}
.ledger th{background:var(--t1);color:#fff}
.ledger td.l{text-align:left}

/* track loop */
.track{display:grid;gap:0;width:100%;aspect-ratio:1.3/1}
.track-cell{border:2px solid #fff;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px;font-size:10px;font-weight:700;color:#fff;word-break:keep-all;overflow:hidden}
.track-cell img{max-width:80%;max-height:46%;object-fit:contain;margin-bottom:2px}
.track-mid{display:flex;align-items:center;justify-content:center;text-align:center;color:var(--t2);font-weight:900;font-size:26px}

/* ghost leg */
.ladder svg{width:100%;height:auto;display:block}
.ladder .lbl{font-size:11px;font-weight:700}

/* dobble */
.dobble-card{border-radius:50%;aspect-ratio:1/1;position:relative;background:#fff;overflow:hidden}
.dobble-card .s{position:absolute;transform-origin:center;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1;border-radius:50%;overflow:hidden}
.dobble-card .s img{width:100%;height:100%;object-fit:contain}

/* halli galli */
.halli-card{border:2px solid var(--t2);border-radius:10px;aspect-ratio:2/3;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:4%;padding:6%;background:#fff}
.halli-card .f{font-size:26px;display:flex;align-items:center;justify-content:center}
.halli-card .f img{max-width:46px;max-height:46px;object-fit:contain}

/* memory */
.mem-card{border:2px solid var(--t2);border-radius:10px;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;text-align:center;padding:6px;background:#fff;font-weight:700;color:var(--t-ink);word-break:keep-all;overflow:hidden;font-size:13px}
.mem-card img{max-width:84%;max-height:84%;object-fit:contain}
.mem-back{background:var(--t1);color:#fff;font-size:24px;font-weight:900}

/* wheel */
.wheel-wrap{display:flex;flex-direction:column;align-items:center}
.wheel{position:relative;width:88%;aspect-ratio:1/1}
.wheel svg{width:100%;height:100%}
.wheel .wt{font-size:11px;font-weight:700}
.pointer-cut{margin-top:6mm;text-align:center}

/* cards: money / mission / flash */
.gcard{border:1px dashed #99a;border-radius:8px;padding:8px;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden}
.money{border:2px solid var(--t2);border-radius:10px;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:8px 10px;background:linear-gradient(135deg,var(--t-soft),#fff)}
.money .val{font-size:30px;font-weight:900;color:var(--t2);text-align:center}
.money .top{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--t2)}
.money .ttl{text-align:center;font-size:11px;font-weight:700;color:var(--t-ink)}
.miss{border:2px solid var(--t2);border-radius:10px;height:100%;display:flex;flex-direction:column;background:#fff;overflow:hidden}
.miss .h{background:var(--t1);color:#fff;text-align:center;font-weight:800;font-size:13px;padding:5px}
.miss .b{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;font-weight:600;color:var(--t-ink);word-break:keep-all;font-size:13px}
.miss .b img{max-width:80%;max-height:70%;object-fit:contain}
.flash{border:2px solid var(--t2);border-radius:10px;height:100%;display:flex;flex-direction:column;background:#fff;overflow:hidden}
.flash .q{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px;font-weight:700;font-size:15px;color:var(--t-ink);word-break:keep-all}
.flash .a{border-top:1px dashed var(--t2);background:var(--t-soft);text-align:center;font-size:11px;padding:5px;color:var(--t2);font-weight:700}
.flash .q img{max-width:80%;max-height:80%;object-fit:contain}

@media (max-width:980px){
  .editor.active{grid-template-columns:1fr}
  .panel-stack{position:static;max-height:none}
}

/* ---------- PRINT ---------- */
@media print{
  body{background:#fff}
  .topbar,.wrap-controls,.stage-bar,.no-print{display:none !important}
  .stage-wrap{background:#fff;padding:0;border-radius:0}
  .wrap{max-width:none;padding:0;margin:0}
  #stage{gap:0}
  .page{box-shadow:none;margin:0 !important;transform:none !important;page-break-after:always;break-inside:avoid;page-break-inside:avoid}
  .page:last-child{page-break-after:auto}
}
</style>
<style>
/* ===== 귀여운 캐주얼 오버라이드 ===== */
.gtitle{font-weight:900;color:var(--t2);text-shadow:0 1px 0 #fff}

/* 사다리와 뱀 보드 */
.snake-board{position:relative;margin:0 auto;border-radius:20px;background:var(--t-soft);padding:6px;box-shadow:0 4px 14px rgba(0,0,0,.12)}
.snake-grid{position:relative;z-index:1;width:100%;height:100%;border:none;border-radius:15px;overflow:hidden;display:grid;gap:3px;background:transparent}
.snake-overlay{position:absolute;left:6px;top:6px;width:calc(100% - 12px);height:calc(100% - 12px);z-index:3;pointer-events:none}
.snake-cell{border:2px solid #fff;border-radius:12px;background:var(--t3);position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:3px;overflow:hidden;color:var(--t-ink);min-height:0}
.snake-cell.alt{background:#ffffff}
.snake-cell.start{background:#bbf7d0}
.snake-cell.finish{background:#fde68a}
.snake-cell .n{position:absolute;top:1px;left:4px;font-size:.82em;font-weight:900;color:var(--t2);opacity:.7}
.snake-cell .q{font-weight:700;line-height:1.12;word-break:keep-all;max-height:100%;overflow:hidden}
.snake-cell .big{font-weight:900;font-size:1.15em;line-height:1.05}
.snake-cell .pic{width:90%;flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
.snake-cell .pic img{max-width:100%;max-height:100%;object-fit:contain}
.snake-cell .badge{position:absolute;bottom:0;right:3px;font-size:.82em;font-weight:800;background:rgba(255,255,255,.7);border-radius:6px;padding:0 2px}
.snake-cell .badge.up{color:#b45309}.snake-cell .badge.dn{color:#15803d}

/* 도블 — 그림 최대 크기 (컨테이너 쿼리) */
.dobble-card{container-type:size;border:none;box-shadow:0 3px 9px rgba(0,0,0,.14);background:#fff;border-radius:50%}
.dobble-card .s{display:flex;align-items:center;justify-content:center;text-align:center;line-height:1;border-radius:50%;overflow:hidden}
.dobble-card .s .media{width:100%;height:100%;object-fit:cover}
.dobble-card .dtxt{font-size:.62em;line-height:1.05;word-break:keep-all;color:var(--t-ink);font-weight:800}
.dobble-card .demoji{line-height:1}

/* 도블 그림칸 도안 */
.tpl-note{border:2px dashed var(--t2);background:var(--t-soft);border-radius:12px;padding:8px 12px;font-size:11.5px;line-height:1.7;color:var(--t-ink);margin-bottom:5mm}
.tpl-frame{border:4px solid #111;border-radius:6px;padding:4mm}
.tpl-grid{display:grid;gap:4mm}
.tpl-box{aspect-ratio:1/1;border:2px solid #111;border-radius:6px;position:relative;background:#fff}
.tpl-box.off{border-style:dashed;opacity:.25}
.tpl-box .tpl-n{position:absolute;top:2px;left:5px;font-size:10px;font-weight:800;color:#888}

/* 빙고 / 부루마블 / 트랙 / 카드류 둥글둥글 */
.bingo{border-radius:18px}
.bingo-cell{border-radius:9px}
.mono-cell{border-radius:7px;border:1.5px solid #fff;background:var(--t-soft)}
.mono-cell .bar{height:7px;border-radius:7px 7px 0 0}
.mono-cell.corner{border-radius:11px}
.track-cell{border-radius:15px;box-shadow:0 2px 0 rgba(0,0,0,.13)}
.halli-card{border-radius:16px;box-shadow:0 3px 8px rgba(0,0,0,.1)}
.halli-card .fz{font-size:24px;font-weight:900}
.mem-card{border-radius:15px;box-shadow:0 2px 7px rgba(0,0,0,.1)}

/* 게임 화폐 — 귀엽고 캐주얼 */
.money{border-width:2.5px;border-radius:16px;box-shadow:0 3px 8px rgba(0,0,0,.1)}
.money .top{align-items:center;font-weight:800}
.money .mas{font-size:20px}
.money .val{font-weight:900;text-shadow:0 1px 0 #fff}
.money .ttl{color:var(--t-ink);opacity:.8}
.miss,.flash{border-radius:15px;box-shadow:0 3px 8px rgba(0,0,0,.1)}
.miss .h{border-radius:12px 12px 0 0}
</style>
<style>
/* ===== 초등학생 친화 UX 리프레시 ===== */
@font-face{
  font-family:'Pretendard Variable';
  font-weight:45 920;
  font-style:normal;
  font-display:swap;
  src:url('./assets/fonts/PretendardVariable.woff2') format('woff2-variations');
}
:root{
  --bg:#f7fbf4;
  --panel:#ffffff;
  --ink:#172033;
  --muted:#5d6878;
  --line:#dbe5ee;
  --brand:#2563eb;
  --brand2:#f97316;
  --accent:#16a34a;
  --ok:#16a34a;
  --shadow:0 10px 26px rgba(23,32,51,.10);
  --snake-page:#fff8f2;
  --snake-cell:#ffe5d8;
  --snake-cell-alt:#fff2eb;
  --snake-border:#f5ad95;
  --snake-num:#bf5f46;
  --snake-start:#dff2cf;
  --snake-finish:#ffe7a6;
  --snake-ladder:#b9845b;
  --snake-body:#6cae75;
}
body{
  font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
  background:linear-gradient(180deg,#fffdf7 0,#f0f9ff 48%,#f7fbf4 100%);
  color:var(--ink);
  font-size:16px;
}
button,input,textarea,select{font:inherit}
.topbar{
  background:rgba(255,255,255,.94);
  color:var(--ink);
  border-bottom:1px solid rgba(37,99,235,.16);
  padding:12px 22px;
  box-shadow:0 4px 18px rgba(23,32,51,.08);
  backdrop-filter:blur(10px);
}
.topbar h1{font-size:20px;font-weight:900;letter-spacing:0}
.topbar .sub{font-size:13px;color:var(--muted);opacity:1}
.topbar button{
  min-height:40px;
  background:#f8fafc;
  color:var(--ink);
  border:1px solid var(--line);
  border-radius:8px;
  padding:9px 13px;
  font-weight:800;
}
.topbar button:hover{background:#eef6ff;border-color:#9cc8ff}
.wrap{max-width:1320px;padding:22px}
.home-intro{
  text-align:left;
  background:#fff;
  border:1px solid var(--line);
  border-left:6px solid var(--brand2);
  border-radius:8px;
  padding:18px 20px;
  margin:6px 0 18px;
  box-shadow:var(--shadow);
}
.home-intro h2{font-size:28px;line-height:1.22;margin:0 0 6px;font-weight:900;letter-spacing:0}
.home-intro p{font-size:15px;color:var(--muted)}
.grid{grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:12px}
.card-game{
  border-radius:8px;
  padding:17px;
  min-height:164px;
  border:1px solid #dce7f2;
  box-shadow:0 3px 12px rgba(23,32,51,.06);
  background:#fff;
}
.card-game:hover,.card-game:focus-visible{
  transform:translateY(-2px);
  box-shadow:0 12px 24px rgba(37,99,235,.14);
  border-color:#75b7ff;
  outline:none;
}
.card-game .emoji{
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;

/* 사다리와 뱀: 그림은 흐리게, 칸 내용은 또렷하게 */
.snake-board{
  border-radius:8px;
  background:var(--snake-page);
  padding:5px;
  border:2.4px solid var(--snake-border);
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.55);
}
.snake-grid{
  gap:3px;
  border-radius:6px;
  z-index:1;
}
.snake-overlay{
  left:5px;
  top:5px;
  width:calc(100% - 10px);
  height:calc(100% - 10px);
  z-index:4;
  opacity:.42;
  mix-blend-mode:multiply;
}
.snake-overlay *{vector-effect:non-scaling-stroke}
.snake-decal-layer{
  position:absolute;
  left:5px;
  top:5px;
  width:calc(100% - 10px);
  height:calc(100% - 10px);
  z-index:5;
  pointer-events:auto;
}
.snake-decal{
  position:absolute;
  transform-origin:center;
  opacity:.70;
  mix-blend-mode:normal;
  pointer-events:none;
  touch-action:none;
  cursor:grab;
  user-select:none;
}
.snake-decal:active{cursor:grabbing}
.snake-decal img{
  width:100%;
  height:100%;
  display:block;
  object-fit:contain;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}
.snake-decal.sel{
  opacity:.82;
  outline:1.5px dashed rgba(15,23,42,.45);
  outline-offset:4px;
  mix-blend-mode:normal;
}
.decal-handle{
  display:none;
  position:absolute;
  left:50%;
  width:14px;
  height:14px;
  border-radius:50%;
  border:2px solid #fff;
  background:#172033;
  box-shadow:0 1px 4px rgba(15,23,42,.35);
  pointer-events:auto;
  cursor:nwse-resize;
}
.snake-decal.sel .decal-handle{display:block}
.decal-handle.tail{top:-10px;transform:translate(-50%,-50%)}
.decal-handle.head{bottom:-10px;transform:translate(-50%,50%)}
.decal-handle::after{
  content:attr(data-label);
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  font-size:10px;
  color:#172033;
  background:#fff;
  border:1px solid #d4dee8;
  border-radius:5px;
  padding:1px 4px;
  white-space:nowrap;
}
.snake-cell{
  border-radius:8px;
  border:1.4px solid rgba(255,255,255,.82);
  background:var(--snake-cell);
  padding:5px 4px 4px;
}
.snake-cell.alt{background:var(--snake-cell-alt)}
.snake-cell.start{background:var(--snake-start)}
.snake-cell.finish{background:var(--snake-finish)}
.snake-cell .n,
.snake-cell .q,
.snake-cell .pic,
.snake-cell .big,
.snake-cell .badge{position:relative;z-index:6}
.snake-cell .n{
  position:absolute;
  top:3px;
  left:3px;
  width:20px;
  height:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  background:#fff;
  color:var(--snake-num);
  border:1.5px solid var(--snake-border);
  box-shadow:0 1px 2px rgba(15,23,42,.10);
  font-size:10px;
  font-weight:950;
  line-height:1;
  opacity:1;
}
.snake-cell .q{
  width:100%;
  min-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(255,255,255,.38);
  border:1px solid rgba(255,255,255,.45);
  border-radius:6px;
  padding:18px 5px 5px;
  font-weight:900;
  line-height:1.12;
  overflow-wrap:anywhere;
  word-break:keep-all;
  text-align:center;
}
.snake-cell .badge{
  position:absolute;
  bottom:2px;
  right:3px;
  background:rgba(255,255,255,.9);
  border:1px solid rgba(148,163,184,.35);
}
.snake-cell .big{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  font-weight:950;
  font-size:1.35em;
}
.answer-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:3mm}
.answer-card{border:1px solid var(--snake-border);border-radius:8px;background:#fff;padding:3mm;min-height:23mm}
.answer-card .ans-top{display:flex;align-items:center;gap:2mm;margin-bottom:1.5mm}
.answer-card .ans-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--snake-cell);color:var(--snake-num);font-weight:950;font-size:11px}
.answer-card .ans-q{font-size:10.5px;color:#64748b;font-weight:800;line-height:1.25}

@media (max-width:980px){

  .page:last-child{break-after:auto;page-break-after:auto}
  .snake-overlay{opacity:.30}
  .snake-decal.sel{outline:none}

}
/* 교체 모달 */

</style>

<body>

<div class="topbar">
  <h1>🎲 보드게임 메이커</h1>
  <span class="sub">쉬운 선택, 큰 글자, 바로 인쇄</span>

</div>

<div class="wrap">
  <!-- HOME -->
  <div id="home">
    <div class="home-intro">
      <h2>오늘 만들 게임을 골라요</h2>

  <!-- EDITOR -->
  <div id="editor" class="editor">
    <div class="panel-stack wrap-controls">
      <div class="panel">
        <p class="sec-title">🎨 1. 모양 고르기</p>

          <label>용지 크기</label>

<script>
/* =========================================================
   커스텀 보드게임 제작기 — 코어 엔진 (v2)
   ========================================================= */
const PAPER = {
  A4:{w:210,h:297}, A3:{w:297,h:420}, B4:{w:257,h:364}
};
const THEMES = [
  {id:'peach', name:'피치', t1:'#f2a38b',t2:'#c96f5a',t3:'#ffe3d5',ink:'#4b2c27',soft:'#fff7f1',

  {id:'rose', name:'로즈', t1:'#e8a5b5',t2:'#b96c82',t3:'#f9dce5',ink:'#4c2731',soft:'#fff5f8',

  {id:'serenity', name:'스카이', t1:'#9eb8e8',t2:'#6787bf',t3:'#dbe8ff',ink:'#23344f',soft:'#f5f9ff',
    snake:{page:'#f7fbff',cell:'#dbe8ff',alt:'#edf4ff',border:'#9eb8e8',num:'#5578b4',start:'#dcefd8',finish:'#fff0b9',ladder:'#9b8668',body:'#78a989'}},
  {id:'sage', name:'세이지', t1:'#a8c8a2',t2:'#71996f',t3:'#e0efd9',ink:'#253d2b',soft:'#f7fbf4',
    snake:{page:'#fbfdf6',cell:'#e0efd9',alt:'#f1f7ec',border:'#a8c8a2',num:'#5d8a5d',start:'#d6ead2',finish:'#fff0bb',ladder:'#a58a62',body:'#5fa47d'}},
  {id:'butter', name:'버터', t1:'#e9cc72',t2:'#b99236',t3:'#fff0b8',ink:'#493b18',soft:'#fffbed',
    snake:{page:'#fffdf2',cell:'#fff0b8',alt:'#fff8dd',border:'#e9cc72',num:'#a57f28',start:'#d9edd4',finish:'#ffe1a8',ladder:'#ab8450',body:'#70a46f'}},
  {id:'lilac', name:'라일락', t1:'#c6b4e9',t2:'#8b74be',t3:'#ece4ff',ink:'#332a4b',soft:'#faf7ff',
    snake:{page:'#fbf8ff',cell:'#ece4ff',alt:'#f5efff',border:'#c6b4e9',num:'#7b65b2',start:'#ddedd7',finish:'#ffedba',ladder:'#9a8264',body:'#79a985'}},
];

const state = {
  gameId:null, theme:'peach', paper:'A4',
  items:[],          // {text, img}
  opts:{},           // per-game options
  seed:1
};

const $ = s=>document.querySelector(s);

const esc = s=>(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
function newSeed(){ return Math.floor(Date.now()%1000000000); }
function hashString(s){
  let h=2166136261;
  for(let i=0;i<String(s).length;i++){ h^=String(s).charCodeAt(i); h=Math.imul(h,16777619); }
  return h>>>0;
}
function mulberry32(a){
  return function(){
    a|=0; a=(a+0x6D2B79F5)|0;
    let t=Math.imul(a^a>>>15,1|a);
    t=(t+Math.imul(t^t>>>7,61|t))^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
let renderSalt=0;
function rngFor(label){
  const base=(state.seed||1) ^ hashString(`${state.gameId||'home'}:${label}:${renderSalt++}`);
  return mulberry32(base>>>0);
}

/* 기본 맞춤법/공백 정리 (브라우저 내장, 인터넷 불필요) */
function cleanText(raw){
  let s = String(raw);
  s = s.replace(/ /g,' ');                 // nbsp
  s = s.replace(/[ \t]+/g,' ');                 // 다중 공백
  s = s.replace(/\s+/g,' ');                     // 모든 공백 1칸
  s = s.replace(/\s*([?!.,])/g,'$1');            // 부호 앞 공백 제거
  s = s.replace(/([?!.,])\1+/g,'$1');            // 중복 부호 ??? -> ?
  s = s.replace(/([?!.,])(?=[^\s?!.,])/g,'$1 '); // 부호 뒤 한 칸
  s = s.trim();
  // 흔한 띄어쓰기/오타 보정
  const fix = {
    '되요':'돼요','안되':'안 돼','뭐에요':'뭐예요','이에요':'이에요',
    '몇일':'며칠','왠지':'웬지','금새':'금세','어떻해':'어떡해',
    '구지':'굳이','바램':'바람','설겆이':'설거지','희안':'희한'
  };
  for(const k in fix) s = s.split(k).join(fix[k]);
  // 첫 글자 대문자(영문)
  return s;
}

/* 붙여넣기 → 항목 배열 */
function parseBulk(raw){
  if(!raw.trim()) return [];
  let parts;
  if(raw.includes('\n')) parts = raw.split(/\r?\n/);
  else if(raw.includes(',')) parts = raw.split(',');
  else parts = raw.split(/\r?\n/);
  return parts
    .map(p=>p.replace(/^\s*\d+[).\.]\s*/,''))   // 앞 번호 제거 "1. " "2) "
    .map(p=>p.replace(/^\s*[-•*]\s*/,''))        // 불릿 제거
    .map(cleanText)
    .filter(p=>p.length>0)
    .map(t=>state.gameId==='snake'?snakeQAItem(t):({text:t,img:null}));
}

/* 미리보기 스케일: 컨테이너 폭에 맞춤 */
function scalePages(){
  const stage=$('#stage');
  const wrapW = $('.stage-wrap').clientWidth - 44;
  const pw = PAPER[state.paper].w * 3.78; // mm->px approx at 96dpi
  let scale = Math.min(1, wrapW/pw);
  stage.querySelectorAll('.page').forEach(pg=>{
    pg.style.transformOrigin='top center';
    pg.style.transform = scale<1?`scale(${scale})`:'none';
    if(scale<1){
      const h=pg.getBoundingClientRect().height;
      pg.style.marginBottom = (h*(scale-1))+'px';
    } else {
      pg.style.marginBottom = '0';
    }
  });
}

function shortText(s,max){
  const str=String(s||'').trim();
  return str.length>max ? str.slice(0,Math.max(1,max-1))+'…' : str;
}
function balancedLines(text,maxLines){
  const words=String(text||'').trim().split(/\s+/).filter(Boolean);
  if(words.length<=1) return [String(text||'').trim()].filter(Boolean);
  const total=words.join('').length + words.length - 1;
  const target=Math.ceil(total/maxLines);
  const lines=[];
  let line='';
  words.forEach(word=>{
    if(line && line.length + 1 + word.length > target && lines.length < maxLines-1){
      lines.push(line);
      line=word;
    }else{
      line=line?`${line} ${word}`:word;
    }
  });
  if(line) lines.push(line);
  return lines;
}
function snakeQuestionHtml(text){
  const raw=String(text||'').trim();
  if(!raw) return '';
  if(raw.includes('\n')) return raw.split(/\n+/).map(esc).join('<br>');
  let lines;
  if(raw.includes(': ')){
    const [head,...rest]=raw.split(': ');
    const body=rest.join(': ');
    lines=[`${head}:`].concat(balancedLines(body,2));
  }else if(/[=]/.test(raw) && raw.length>12){
    lines=raw.replace(/\s*=\s*/,' = ').split(/(?=\s=\s)|(?<=려면)\s/).filter(Boolean);
    if(lines.length>3) lines=balancedLines(raw,3);
  }else{
    const compact=raw.replace(/\s/g,'');
    const maxLines=compact.length>18?3:2;
    lines=balancedLines(raw,maxLines);
    if(lines.length===1 && compact.length>10){
      const mid=Math.ceil(raw.length/2);
      let cut=raw.indexOf(' ',Math.max(0,mid-4));
      if(cut<0||cut>mid+4) cut=mid;
      lines=[raw.slice(0,cut).trim(),raw.slice(cut).trim()].filter(Boolean);
    }
  }
  return lines.slice(0,3).map(esc).join('<br>');
}
function snakeFontSize(text,total){
  const len=String(text||'').replace(/\s/g,'').length;
  const max=total>=56?16.5:(total>=42?18.5:21);
  const min=total>=56?10.5:(total>=42?11.5:12.5);
  if(len<=5) return max;
  if(len<=9) return max-1;
  if(len<=14) return max-2.6;
  if(len<=22) return max-4.4;
  return min;
}

function shuffle(a){
  const rng=rngFor('shuffle');
  a=a.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(rng()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function snakeQAItem(line){

  const parts=String(line||'').split('|');
  const text=cleanText(parts[0]||'');
  const answer=parts.length>1?cleanText(parts.slice(1).join('|')):'';
  return {text,answer,img:null};
}

function presetField(gameId){
  const list=PRESETS[gameId]||[];
  if(!list.length) return '';
  return `<div class="field preset-field">
    <label>바로 넣기 프리셋</label>
    <div class="preset-row">
      <select id="presetSelect">
        <option value="">프리셋 선택</option>
        ${list.map((p,i)=>`<option value="${i}">${esc(p.label)}</option>`).join('')}
      </select>
      <button class="btn ghost" id="btnPresetApply" type="button">적용</button>
    </div>
    <div class="hint">학년과 난이도에 맞는 예시를 바로 넣고, 필요한 부분만 고쳐 쓰세요.</div>
  </div>`;
}
function applyPreset(index){
  const list=PRESETS[state.gameId]||[];
  const p=list[+index];
  if(!p) return;
  state.opts=Object.assign({},state.opts,p.opts||{});
  if(p.title) state.opts.title=p.title;
  state.items=presetItems(p.items,state.gameId);
  state.seed=newSeed();
  $('#bulk').value=p.items.map(presetLine).join('\n');
  buildOpts();
  buildItems();
  renderStage();
}
function gameUsesImages(){
  const g=GAMES[state.gameId];
  return !!(g&&g.images);
}

/* 목업 샘플 — 내용이 없어도 미리보기가 가득 차게 */
const MOCK_WORDS=['사과','강아지','별','달','자동차','꽃','로켓','거북이','무지개','케이크','풍선','물고기','기차','나비','우산','공룡','연필','피아노','토끼','드럼','고래','당근','연','무당벌레','쿠키','우주선','여우','수박','꿀벌','사탕','오리','버섯','고양이','튤립','요트','북','펭귄','포도','개구리','종이비행기'];
function mockItems(n){
  const out=[];
  for(let i=0;i<n;i++) out.push({text:MOCK_WORDS[i%MOCK_WORDS.length],img:null,_mock:true});
  return out;
}
function withMock(items,n){ // 부족하면 목업으로 채움
  if(items.length>=n) return items;
  return items.concat(mockItems(n-items.length));
}

/* 용지 높이에 맞춰 카드들을 여러 페이지로 자동 분절 */
function cardPages(cards,o){
  // o:{cols, aspect(w/h), title, subtitle, foot, gap(mm)}
  const p=PAPER[state.paper], padmm=12, headmm=20, gap=o.gap!=null?o.gap:3;
  const usableW=p.w-padmm*2;
  const cellW=(usableW-(o.cols-1)*gap)/o.cols;
  const cellH=cellW/o.aspect;
  const usableH=p.h-padmm*2-headmm;
  const rows=Math.max(1,Math.floor((usableH+gap)/(cellH+gap)));
  const perPage=rows*o.cols, totalPages=Math.max(1,Math.ceil(cards.length/perPage));
  let html='';
  for(let pg=0;pg<totalPages;pg++){
    const slice=cards.slice(pg*perPage,(pg+1)*perPage);
    html+=pageOpen()+`<div class="page-pad">
      <h2 class="gtitle">${esc(o.title)}</h2>
      <div class="gsub">${o.subtitle||''}${totalPages>1?` · ${pg+1}/${totalPages}쪽`:''}</div>
      <div style="display:grid;grid-template-columns:repeat(${o.cols},1fr);gap:${gap}mm;align-content:start">${slice.join('')}</div>
    </div>${foot(o.foot)}</div>`;
  }
  return html;
}

function dobbleLayout(k){
  if(k<=4){ // 4개: 가운데 없이 꽉 차게
    return [0,1,2,3].map(i=>{const a=i*Math.PI/2-Math.PI/2+0.35;return{x:50+28*Math.cos(a),y:50+28*Math.sin(a),s:40};});
  }
  const m=k-1;
  const cfg = k<=6? {rr:31,ds:33,dc:30} : {rr:33,ds:29,dc:27};
  const arr=[{x:50,y:50,s:cfg.dc}];
  for(let i=0;i<m;i++){const a=i/m*2*Math.PI-Math.PI/2;arr.push({x:50+cfg.rr*Math.cos(a),y:50+cfg.rr*Math.sin(a),s:cfg.ds});}
  return arr;
}

function snakeDims(v){
  const map={
    '30':{cols:5,rows:6,total:30,label:'5×6'},
    '42':{cols:6,rows:7,total:42,label:'6×7'},
    '56':{cols:7,rows:8,total:56,label:'7×8'}
  };
  return map[String(v)]||map['42'];
}
function snakeAnswerPages(title,entries){
  const rows=entries.filter(e=>e.answer);
  if(!rows.length) return '';
  const perPage=24;
  let html='';
  for(let pg=0; pg<Math.ceil(rows.length/perPage); pg++){
    const slice=rows.slice(pg*perPage,(pg+1)*perPage);
    html+=pageOpen()+`<div class="page-pad">
      <h2 class="gtitle">${esc(title)} 정답</h2>
      <div class="gsub">문제판 칸 번호와 맞춰 확인하세요${rows.length>perPage?` · ${pg+1}/${Math.ceil(rows.length/perPage)}쪽`:''}</div>
      <div class="answer-grid">${slice.map(e=>`<div class="answer-card">
        <div class="ans-top"><span class="ans-num">${e.num}</span><div class="ans-q">${snakeQuestionHtml(e.question)}</div></div>

    </div>${foot('사다리와 뱀 정답')}</div>`;

}

function snakeDecalFromPoints(kind,top,bottom,boardRatio){
  const asset=DECAL_ASSETS[kind]||DECAL_ASSETS.snakeGreen;
  const dx=bottom.x-top.x, dy=bottom.y-top.y;
  const dist=Math.max(18,Math.hypot(dx,dy)*1.14);
  const h=Math.min(72,dist);
  const w=Math.min(86,Math.max(7,h*boardRatio*asset.aspect));
  return {
    kind,
    x:+((top.x+bottom.x)/2).toFixed(2),
    y:+((top.y+bottom.y)/2).toFixed(2),
    w:+w.toFixed(2),
    h:+h.toFixed(2),
    r:+(Math.atan2(dx,dy)*180/Math.PI).toFixed(1)
  };
}
function defaultSnakeDecals(links,pos,boardRatio){
  const snakes=['snakeGreen','snakeYellow','snakeBlue','snakePurple','snakeRed'];
  const ladders=['ladderBrown','ladderGold','ladderPurple','ladderOlive','ladderBlue'];
  let si=0, li=0, out=[];
  Object.keys(links).forEach(k=>{
    const lk=links[k], a=pos(+k), b=pos(lk.to);
    if(lk.type==='snake') out.push(snakeDecalFromPoints(snakes[si++%snakes.length],b,a,boardRatio));
    else out.push(snakeDecalFromPoints(ladders[li++%ladders.length],b,a,boardRatio));
  });
  return out;
}
function ensureSnakeDecals(c,links,pos,boardRatio){
  if(!Array.isArray(c.opts.decals)){
    c.opts.decals=defaultSnakeDecals(links,pos,boardRatio);
    c.opts.selectedDecal=0;
  }
  c.opts.decals=c.opts.decals.filter(d=>d&&(d.src||DECAL_ASSETS[d.kind]));
  if(c.opts.selectedDecal===undefined || c.opts.selectedDecal>=c.opts.decals.length) c.opts.selectedDecal=c.opts.decals.length?0:null;
}
function snakeDecalLayer(c){
  const selected=c.opts.selectedDecal==null?-1:+c.opts.selectedDecal;
  const decals=Array.isArray(c.opts.decals)?c.opts.decals:[];
  return `<div class="snake-decal-layer">${decals.map((d,i)=>{
    const src=decalSrc(d);
    return `<div class="snake-decal ${i===selected?'sel':''}" data-decal="${i}" style="left:${d.x}%;top:${d.y}%;width:${d.w}%;height:${d.h}%;transform:translate(-50%,-50%) rotate(${d.r||0}deg)">
      <img src="${src}" alt="" draggable="false">
      ${i===selected?`<span class="decal-handle tail" data-handle="tail" data-label="꼬리"></span><span class="decal-handle head" data-handle="head" data-label="머리"></span>`:''}
    </div>`;
  }).join('')}</div>`;
}

function dobbleDeck(nPrime){
  const n=nPrime, cards=[];
  for(let i=0;i<=n;i++){ const card=[0]; for(let j=0;j<n;j++) card.push(1+i*n+j); cards.push(card); }
  for(let i=0;i<n;i++) for(let j=0;j<n;j++){
    const card=[1+i];
    for(let k=0;k<n;k++) card.push((n+1)+n*k+((i*k+j)%n));
    cards.push(card);
  }
  return cards; // each n+1 symbols, total n^2+n+1
}

function dobbleN(c){ const o=c.opts||{}; if(o.order&&o.order!=='auto') return +o.order||3; const len=(c.items||[]).length; return len>=57?7:(len>=31?5:3); }
function dobbleGrid(sym){ const cols = sym<=16?4 : (sym<=36?6:8); return {cols, rows:Math.ceil(sym/cols)}; }
function dobbleTemplate(c,n,sym){
  const g=dobbleGrid(sym);

  for(let i=0;i<g.cols*g.rows;i++){const used=i<sym;

  const gridH=+(frameH - padMm*2 - 4/96*25.4*2).toFixed(2);

    }
    return cardPages(cards,{cols,aspect,title,subtitle});
  }
});

/* 이미지에 랜덤 프레임(원/하트/별/삼각/둥근사각) 적용 */
function applyDobbleFrame(img){
  const cv=document.createElement('canvas');
  cv.width=400;cv.height=400;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,400,400);
  const shapes=['circle','heart','star','triangle','squircle'];
  const shape=shapes[Math.floor(Math.random()*shapes.length)];
  ctx.translate(200,200);
  ctx.beginPath();
  if(shape==='circle'){
    ctx.arc(0,0,170,0,Math.PI*2);
  }else if(shape==='heart'){
    ctx.translate(0,-30);
    ctx.moveTo(0,-60);
    ctx.bezierCurveTo(0,-60,-40,-150,-120,-150);
    ctx.bezierCurveTo(-220,-150,-220,-30,-220,-30);
    ctx.bezierCurveTo(-220,70,-80,170,0,230);
    ctx.bezierCurveTo(80,170,220,70,220,-30);
    ctx.bezierCurveTo(220,-30,220,-150,120,-150);
    ctx.bezierCurveTo(40,-150,0,-60,0,-60);
  }else if(shape==='star'){
    for(let i=0;i<10;i++){
      const r=i%2?80:180,a=(i*Math.PI)/5-Math.PI/2;
      ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
  }else if(shape==='triangle'){
    ctx.translate(0,30);
    for(let i=0;i<3;i++){const a=(i*2*Math.PI)/3-Math.PI/2;ctx.lineTo(Math.cos(a)*190,Math.sin(a)*190);}
  }else{
    const r=60,s=160;
    ctx.moveTo(-s+r,-s);ctx.arcTo(s,-s,s,s,r);ctx.arcTo(s,s,-s,s,r);ctx.arcTo(-s,s,-s,-s,r);ctx.arcTo(-s,-s,s,-s,r);
  }
  ctx.closePath();
  ctx.save();ctx.clip();
  ctx.fillStyle='#fff';ctx.fill();
  const sc=Math.max(400/img.width,400/img.height);
  ctx.drawImage(img,-(img.width*sc)/2,-(img.height*sc)/2,img.width*sc,img.height*sc);
  ctx.restore();
  ctx.lineWidth=16;
  ctx.strokeStyle='hsl('+Math.floor(Math.random()*360)+',80%,60%)';
  ctx.lineJoin='round';ctx.stroke();
  return cv.toDataURL('image/png');
}

/* 기존 이미지를 회전/반전/색조 변형으로 변종 생성 */
function dobbleVariant(src){
  return new Promise(function(resolve){
    const img=new Image();
    img.onload=function(){
      const cv=document.createElement('canvas');cv.width=400;cv.height=400;
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,400,400);
      ctx.translate(200,200);
      ctx.rotate((Math.random()-.5)*.5);
      if(Math.random()>.5) ctx.scale(-1,1);
      ctx.translate(-200,-200);
      ctx.drawImage(img,0,0,400,400);
      ctx.setTransform(1,0,0,1,0,0);
      ctx.globalCompositeOperation='source-atop';
      ctx.fillStyle='hsla('+Math.floor(Math.random()*360)+',80%,60%,.45)';
      ctx.fillRect(0,0,400,400);
      ctx.globalCompositeOperation='source-over';
      const cols=['#ef4444','#3b82f6','#10b981','#f59e0b','#8b5cf6'];
      ctx.strokeStyle=cols[Math.floor(Math.random()*cols.length)];
      ctx.lineWidth=10;ctx.beginPath();
      ctx.moveTo(Math.random()*400,Math.random()*400);
      ctx.lineTo(Math.random()*400,Math.random()*400);
      ctx.stroke();
      resolve(cv.toDataURL('image/png'));
    };
    img.src=src;
  });
}

/* 여러 이미지를 도블 심볼로 추가 (자동 프레임 적용) */
function addDobbleImages(files){
  function doAdd(replace){
    if(replace) state.items=[];
    let loaded=0;
    Array.from(files).forEach(function(f){
      const r=new FileReader();
      r.onload=function(e){
        const img=new Image();
        img.onload=function(){
          const framed=applyDobbleFrame(img);
          state.items.push({text:null,img:framed});
          loaded++;
          if(loaded===files.length){buildItems();buildOpts();renderStage();}
        };
        img.src=e.target.result;
      };
      r.readAsDataURL(f);
    });
  }
  if(state.items.length>0){
    showReplaceModal(
      '기존 항목 '+state.items.length+'개가 있어요.\n새 이미지 '+files.length+'장을 어떻게 넣을까요?',
      function(){ doAdd(true); },
      function(){ doAdd(false); }
    );
  }else{
    doAdd(false);
  }
}

/* 도블 나머지 심볼 자동 채우기 (기존 이미지를 변형 복제) */
async function generateDobbleMissing(){
  const n=dobbleN({opts:state.opts,items:state.items});
  const sym=n*n+n+1;
  const needed=sym-state.items.length;
  if(needed<=0||state.items.length<3) return;
  const btn=document.getElementById('dobbleAutoFillBtn');
  if(btn){btn.disabled=true;btn.textContent='생성 중...';}
  const base=state.items.filter(function(it){return it.img;}).map(function(it){return it.img;});
  if(!base.length){
    alert('먼저 이미지를 3장 이상 넣어주세요.');
    if(btn){btn.disabled=false;}
    buildOpts();return;
  }
  for(let i=0;i<needed;i++){
    const src=base[Math.floor(Math.random()*base.length)];
    const v=await dobbleVariant(src);
    state.items.push({text:null,img:v});
    if(i%5===0) await new Promise(function(r){setTimeout(r,10);});
  }
  buildItems();buildOpts();renderStage();
}

function clamp(n,min,max){ return Math.max(min,Math.min(max,n)); }
const DECAL_HIT_CACHE = new Map();
function prepareDecalHit(src){
  if(!src) return null;
  if(DECAL_HIT_CACHE.has(src)) return DECAL_HIT_CACHE.get(src);
  const rec={ready:false,ok:false,canvas:null,ctx:null};
  DECAL_HIT_CACHE.set(src,rec);
  const img=new Image();
  img.onload=()=>{
    try{
      const max=720;
      const scale=Math.min(1,max/Math.max(img.naturalWidth||img.width,img.naturalHeight||img.height));
      const canvas=document.createElement('canvas');
      canvas.width=Math.max(1,Math.round((img.naturalWidth||img.width)*scale));
      canvas.height=Math.max(1,Math.round((img.naturalHeight||img.height)*scale));
      const ctx=canvas.getContext('2d',{willReadFrequently:true});
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      rec.canvas=canvas; rec.ctx=ctx; rec.ok=true;
    }catch(err){
      rec.ok=false;
    }
    rec.ready=true;
  };
  img.onerror=()=>{rec.ready=true;rec.ok=false;};
  img.src=src;
  return rec;
}
function decalAlphaHit(d,u,v){
  const rec=prepareDecalHit(decalSrc(d));
  if(!rec||!rec.ready||!rec.ok||!rec.ctx) return true;
  const w=rec.canvas.width, h=rec.canvas.height;
  const px=clamp(Math.round(u*(w-1)),0,w-1);
  const py=clamp(Math.round(v*(h-1)),0,h-1);
  const radius=2;
  try{
    for(let y=Math.max(0,py-radius);y<=Math.min(h-1,py+radius);y++){
      for(let x=Math.max(0,px-radius);x<=Math.min(w-1,px+radius);x++){
        if(rec.ctx.getImageData(x,y,1,1).data[3]>18) return true;
      }
    }
  }catch(err){
    return true;
  }
  return false;
}
function decalLocalPoint(d,rect,clientX,clientY){
  const wpx=(+(d.w)||10)/100*rect.width;
  const hpx=(+(d.h)||10)/100*rect.height;
  if(wpx<1||hpx<1) return null;
  const cx=(+(d.x)||50)/100*rect.width;
  const cy=(+(d.y)||50)/100*rect.height;
  const dx=clientX-rect.left-cx;
  const dy=clientY-rect.top-cy;
  const r=(+(d.r)||0)*Math.PI/180;
  const cos=Math.cos(r), sin=Math.sin(r);
  const localX=dx*cos+dy*sin;
  const localY=-dx*sin+dy*cos;
  const u=localX/wpx+.5;
  const v=localY/hpx+.5;
  if(u<0||u>1||v<0||v>1) return null;
  return {u,v};
}
function findSnakeDecalAt(board,clientX,clientY){
  const list=Array.isArray(state.opts.decals)?state.opts.decals:[];
  const rect=board.getBoundingClientRect();
  for(let i=list.length-1;i>=0;i--){
    const d=list[i];
    const local=decalLocalPoint(d,rect,clientX,clientY);
    if(local&&decalAlphaHit(d,local.u,local.v)) return {idx:i,decal:d,rect};
  }
  return null;
}
function addSnakeDecal(kind){
  const asset=DECAL_ASSETS[kind]||DECAL_ASSETS.snakeGreen;
  if(!Array.isArray(state.opts.decals)) state.opts.decals=[];
  const h=asset.type==='snake'?52:(asset.aspect>1?18:48);
  const boardRatio=(PAPER[state.paper].h-53)/(PAPER[state.paper].w-22);
  const w=Math.min(86,Math.max(7,h*boardRatio*asset.aspect));
  state.opts.decals.push({kind,x:50,y:50,w:+w.toFixed(2),h,r:asset.type==='ladder'?-16:0});
  state.opts.selectedDecal=state.opts.decals.length-1;
  renderStage();
}
function addSnakePngDecal(file){
  if(!file) return;
  const name=file.name||'';
  if(file.type&&file.type!=='image/png'){alert('PNG 파일만 그대로 넣을 수 있어요.');return;}
  if(!file.type&&!/\.png$/i.test(name)){alert('PNG 파일을 선택해 주세요.');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const src=e.target.result;
    const img=new Image();
    img.onload=()=>{
      if(!Array.isArray(state.opts.decals)) state.opts.decals=[];
      const aspect=(img.naturalWidth||img.width)/(img.naturalHeight||img.height)||.2;
      const boardRatio=(PAPER[state.paper].h-53)/(PAPER[state.paper].w-22);
      const h=aspect>1?20:54;
      const w=Math.min(92,Math.max(5,h*boardRatio*aspect));
      state.opts.decals.push({
        kind:'customPng',
        type:'custom',
        name:name||'PNG 그림',
        src,
        aspect:+aspect.toFixed(4),
        x:50,
        y:50,
        w:+w.toFixed(2),
        h:+h.toFixed(2),
        r:0
      });
      state.opts.selectedDecal=state.opts.decals.length-1;
      prepareDecalHit(src);
      renderStage();
    };
    img.onerror=()=>alert('PNG 이미지를 읽지 못했어요.');
    img.src=src;
  };
  reader.readAsDataURL(file);
}
function selectedSnakeDecal(){
  const list=Array.isArray(state.opts.decals)?state.opts.decals:[];
  const idx=state.opts.selectedDecal==null?-1:+state.opts.selectedDecal;
  return {list,idx,decal:list[idx]};
}
function snakeDecalAction(act){
  const {list,idx,decal}=selectedSnakeDecal();
  if(act==='reset'){
    delete state.opts.decals;
    delete state.opts.selectedDecal;
    renderStage();
    return;
  }
  if(!decal) return;
  if(act==='delete'){
    list.splice(idx,1);
    state.opts.selectedDecal=list.length?Math.min(idx,list.length-1):null;
  }else if(act==='bigger'){
    decal.w=clamp(decal.w*1.14,3,120); decal.h=clamp(decal.h*1.14,5,120);
  }else if(act==='smaller'){
    decal.w=clamp(decal.w*.88,3,120); decal.h=clamp(decal.h*.88,5,120);
  }else if(act==='rotL'){
    decal.r=(decal.r||0)-15;
  }else if(act==='rotR'){
    decal.r=(decal.r||0)+15;
  }
  renderStage();
}
function wireSnakeDecalControls(){

function applyDecalElStyle(el,d){
  el.style.left=d.x+'%';
  el.style.top=d.y+'%';
  el.style.width=d.w+'%';
  el.style.height=d.h+'%';
  el.style.transform=`translate(-50%,-50%) rotate(${d.r||0}deg)`;
}
function decalEndpointsPx(d,rect){
  const cx=d.x/100*rect.width, cy=d.y/100*rect.height;
  const h=d.h/100*rect.height;
  const r=(d.r||0)*Math.PI/180;
  const ux=Math.sin(r), uy=Math.cos(r);
  return {
    tail:{x:cx-ux*h/2,y:cy-uy*h/2},
    head:{x:cx+ux*h/2,y:cy+uy*h/2}
  };
}
function bindSnakeDecals(){
  const board=document.querySelector('.snake-board');
  if(!board||state.gameId!=='snake') return;
  const layer=board.querySelector('.snake-decal-layer');
  if(!layer) return;
  (state.opts.decals||[]).forEach(d=>prepareDecalHit(decalSrc(d)));
  layer.onpointerdown=e=>{
    const handle=e.target&&e.target.dataset?e.target.dataset.handle:null;
    const list=Array.isArray(state.opts.decals)?state.opts.decals:[];
    let idx=null, d=null, el=null, rect=board.getBoundingClientRect();
    if(handle){
      el=e.target.closest('.snake-decal');
      idx=el?+el.dataset.decal:null;
      d=list[idx];
    }else{
      const hit=findSnakeDecalAt(board,e.clientX,e.clientY);
      if(!hit){
        if(state.opts.selectedDecal!=null){
          state.opts.selectedDecal=null;
          renderStage();
        }
        return;
      }
      idx=hit.idx; d=hit.decal; rect=hit.rect;
      el=board.querySelector(`.snake-decal[data-decal="${idx}"]`);
    }
    if(!d||!el) return;
    const selectionChanged=+state.opts.selectedDecal!==idx;
    state.opts.selectedDecal=idx;
    board.querySelectorAll('.snake-decal.sel').forEach(x=>x.classList.remove('sel'));
    el.classList.add('sel');
    e.preventDefault();
    layer.setPointerCapture&&layer.setPointerCapture(e.pointerId);
    if(handle){
      const endpoints=decalEndpointsPx(d,rect);
      const fixed=handle==='head'?endpoints.tail:endpoints.head;
      const move=ev=>{
        const moving={x:clamp(ev.clientX-rect.left,0,rect.width),y:clamp(ev.clientY-rect.top,0,rect.height)};
        const tail=handle==='head'?fixed:moving;
        const head=handle==='head'?moving:fixed;
        const dx=head.x-tail.x, dy=head.y-tail.y;
        const hpx=Math.max(36,Math.hypot(dx,dy));
        const wpx=Math.max(16,hpx*decalAspect(d));
        d.x=clamp(((tail.x+head.x)/2)/rect.width*100,-8,108);
        d.y=clamp(((tail.y+head.y)/2)/rect.height*100,-8,108);
        d.h=clamp(hpx/rect.height*100,5,120);
        d.w=clamp(wpx/rect.width*100,3,120);
        d.r=Math.atan2(dx,dy)*180/Math.PI;
        applyDecalElStyle(el,d);
      };
      const up=ev=>{
        window.removeEventListener('pointermove',move);
        window.removeEventListener('pointerup',up);
      };
      window.addEventListener('pointermove',move);
      window.addEventListener('pointerup',up);
      return;
    }
    const start={x:e.clientX,y:e.clientY,dx:d.x,dy:d.y};
    const move=ev=>{
      d.x=clamp(start.dx+(ev.clientX-start.x)/rect.width*100,-8,108);
      d.y=clamp(start.dy+(ev.clientY-start.y)/rect.height*100,-8,108);
      applyDecalElStyle(el,d);
    };
    const up=ev=>{
      window.removeEventListener('pointermove',move);
      window.removeEventListener('pointerup',up);
      if(selectionChanged) renderStage();
    };
    window.addEventListener('pointermove',move);
    window.addEventListener('pointerup',up);
  };
}

  html+=`<div class="field"><label>제목</label><input type="text" data-opt="title" value="${esc(state.opts.title||'')}" placeholder="${esc(g.name)}"></div>`;
  html+=presetField(state.gameId);
  html+= g.opts? g.opts(state.opts):'';
  box.innerHTML=html;
  // wire inputs
  box.querySelectorAll('input[data-opt]').forEach(inp=>{
    inp.oninput=()=>{state.opts[inp.dataset.opt]=inp.value;renderStage();};
  });
  box.querySelectorAll('.chips[data-opt]').forEach(ch=>{
    ch.querySelectorAll('.chip').forEach(chip=>{
      chip.onclick=()=>{
        state.opts[ch.dataset.opt]=chip.dataset.v;
        ch.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
        chip.classList.add('sel');
        buildOpts();          // 일부 옵션은 다른 옵션 UI를 바꿈(예: 카드 종류)
        renderStage();
      };
    });
  });
  const presetBtn=document.getElementById('btnPresetApply');
  const presetSelect=document.getElementById('presetSelect');
  if(presetBtn&&presetSelect){
    presetBtn.onclick=()=>applyPreset(presetSelect.value);
  }
  // 게임별 특수 도구 연결
  if(state.gameId==='dobble'){
    const sb=document.getElementById('dobbleScanBtn'), si=document.getElementById('dobbleScanInput');
    if(sb&&si){ sb.onclick=()=>si.click(); si.onchange=function(){ if(this.files&&this.files[0]) importDobbleScan(this.files[0]); this.value=''; }; }
    const mb=document.getElementById('dobbleMultiImgBtn'), mi=document.getElementById('dobbleMultiImgInput');
    if(mb&&mi){ mb.onclick=()=>mi.click(); mi.onchange=function(){ if(this.files&&this.files.length) addDobbleImages(Array.from(this.files)); this.value=''; }; }
    const afb=document.getElementById('dobbleAutoFillBtn');
    if(afb) afb.onclick=()=>generateDobbleMissing();
  }
  if(state.gameId==='snake') wireSnakeDecalControls();
}

/* 스캔 이미지에서 그리드 외곽 경계 감지 + 프레임 내부 여백 제거 */
function detectGridBounds(img,padMm){
  const W=img.width, H=img.height;
  const sc=Math.min(1,600/W);
  const AW=Math.round(W*sc), AH=Math.round(H*sc);
  const ac=document.createElement('canvas');
  ac.width=AW; ac.height=AH;
  const actx=ac.getContext('2d');
  actx.drawImage(img,0,0,AW,AH);
  const px=actx.getImageData(0,0,AW,AH).data;
  function rowDark(y){
    let n=0;
    for(let x=0;x<AW;x++){const i=(~~y*AW+x)*4;if(px[i]+px[i+1]+px[i+2]<450)n++;}
    return n/AW;
  }
  function colDark(x){
    let n=0;
    for(let y=0;y<AH;y++){const i=(y*AW+~~x)*4;if(px[i]+px[i+1]+px[i+2]<450)n++;}
    return n/AH;
  }
  const THR=0.55;
  let top=~~(AH*0.10),bottom=~~(AH*0.90),left=~~(AW*0.02),right=~~(AW*0.98);
  for(let y=~~(AH*0.05);y<~~(AH*0.80);y++){if(rowDark(y)>THR){top=y;break;}}
  for(let y=AH-2;y>~~(AH*0.30);y--){if(rowDark(y)>THR){bottom=y;break;}}
  for(let x=~~(AW*0.01);x<~~(AW*0.45);x++){if(colDark(x)>THR){left=x;break;}}
  for(let x=AW-2;x>~~(AW*0.55);x--){if(colDark(x)>THR){right=x;break;}}
  top+=3;bottom-=3;left+=3;right-=3;
  const s=1/sc;
  // 프레임 내부 여백(mm)을 스캔 픽셀로 변환해 제거 (A4 기준: W/210 px/mm)
  const padPx=Math.round(padMm*W/210);
  return {
    top:~~(top*s)+padPx,
    bottom:~~(bottom*s)-padPx,
    left:~~(left*s)+padPx,
    right:~~(right*s)-padPx
  };
}

/* 도블 그림칸 스캔 -> 각 칸 그림 잘라서 카드에 넣기 */
function importDobbleScan(file){
  function runScan(n,replace){
    const sym=n*n+n+1,g=dobbleGrid(sym);
    // 템플릿 CSS 값 (sym>16 이면 2mm, 아니면 3mm)
    const padMm=sym>16?2:3, gapMm=sym>16?2:3;
    const r=new FileReader();
    r.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const W=img.width;
        // CSS px -> 스캔 px 변환: A4=793.7 CSS px, W 스캔 px => 1 CSS px = W/793.7 scan px
        const c2p=W/793.7;
        const bd=detectGridBounds(img,padMm);
        const gW=bd.right-bd.left, gH=bd.bottom-bd.top;
        // CSS gap을 스캔 px로: gapMm * W/210
        const gapPx=gapMm*W/210;
        // 정확한 셀 크기 (gap 고려)
        const cellW=(gW-(g.cols-1)*gapPx)/g.cols;
        const cellH=(gH-(g.rows-1)*gapPx)/g.rows;
        // 인셋 계산 (CSS 값 기반 정밀 계산):
        // 셀 border: 2px, 번호 left:5px, 번호 width~12px CSS, 여유:5px
        const iL=(2+5+12+5)*c2p;   // 24px CSS
        // 셀 border: 2px, 번호 top:2px, 번호 height~12px CSS, 여유:5px
        const iT=(2+2+12+5)*c2p;   // 21px CSS
        const iR=(2+4)*c2p;        // 6px CSS (border + 여유)
        const iB=(2+4)*c2p;        // 6px CSS
        const newItems=[];
        for(let idx=0;idx<sym;idx++){
          const row=~~(idx/g.cols),col=idx%g.cols;
          // CSS grid 정확한 셀 위치
          const cellX=bd.left+col*(cellW+gapPx);
          const cellY=bd.top+row*(cellH+gapPx);
          const sx=cellX+iL, sy=cellY+iT;
          const sw=cellW-iL-iR, sh=cellH-iT-iB;
          const side=Math.min(sw,sh);
          const ox=sx+(sw-side)/2, oy=sy+(sh-side)/2;
          const cv=document.createElement('canvas');cv.width=cv.height=300;
          const cx=cv.getContext('2d');cx.fillStyle='#fff';cx.fillRect(0,0,300,300);
          cx.drawImage(img,ox,oy,side,side,0,0,300,300);
          newItems.push({text:null,img:cv.toDataURL('image/jpeg',0.85)});
        }
        if(replace)state.items=newItems;
        else state.items=state.items.concat(newItems);
        state.opts.order=String(n);
        state.opts.view='cards';
        buildOpts();buildItems();renderStage();
        alert(sym+'개 칸 그림을 불러왔어요!');
      };
      img.onerror=function(){alert('이미지를 읽지 못했어요. 다른 파일로 시도해 주세요.');};
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  }
  function afterSizeSelect(n){
    if(state.items.length>0){
      showReplaceModal(
        '기존 항목 '+state.items.length+'개가 있어요.\n스캔 그림을 어떻게 넣을까요?',
        function(){runScan(n,true);},
        function(){runScan(n,false);}
      );
    }else{runScan(n,true);}
  }
  // 항상 크기 선택 모달 표시 (현재 설정과 무관하게 사용자가 확인)
  showScanSizeModal(afterSizeSelect);
}


/* 스캔 템플릿 크기 선택 모달 */
function showScanSizeModal(onSelect){
  const modal=document.getElementById('scanSizeModal');
  modal.style.display='';
  const close=()=>{modal.style.display='none';};
  document.getElementById('scanBtn13').onclick=function(){close();onSelect(3);};
  document.getElementById('scanBtn31').onclick=function(){close();onSelect(5);};
  document.getElementById('scanBtn57').onclick=function(){close();onSelect(7);};
  modal.querySelector('.modal-overlay').onclick=function(e){if(e.target===this)close();};
}
/* 교체/추가 모달 */
function showReplaceModal(msg, onReplace, onAppend){
  const modal=document.getElementById('replaceModal');
  document.getElementById('modalMsg').textContent=msg;
  modal.style.display='';
  const close=()=>{ modal.style.display='none'; };
  document.getElementById('modalBtnReplace').onclick=()=>{ close(); onReplace(); };
  document.getElementById('modalBtnAppend').onclick=()=>{ close(); onAppend(); };
  document.getElementById('modalBtnCancel').onclick=close;
  modal.querySelector('.modal-overlay').onclick=function(e){ if(e.target===this) close(); };
}

/* 항목 리스트 */
let imgTargetIndex=null;
let selectMode=false;
const selectedItems=new Set();

function updateItemBar(){
  const bar=document.getElementById('itemBar');
  if(!state.items.length){ bar.style.display='none'; selectMode=false; selectedItems.clear(); return; }
  bar.style.display='';
  const selModeBtn=document.getElementById('btnSelMode');
  const selDelBtn=document.getElementById('btnSelDel');
  if(selectMode){
    selModeBtn.textContent='취소';
    selModeBtn.classList.add('on');
    selDelBtn.style.display='';
    selDelBtn.textContent='선택 삭제 ('+selectedItems.size+')';
    selDelBtn.disabled=selectedItems.size===0;
  }else{
    selModeBtn.textContent='선택';
    selModeBtn.classList.remove('on');
    selDelBtn.style.display='none';
  }
}

function buildItems(){
  const list=$('#itemList'); list.innerHTML='';
  const useImages=gameUsesImages();
  state.items.forEach((it,i)=>{
    const isSel=selectMode&&selectedItems.has(i);
    const row=el('div','item'+(useImages?'':' no-image')+(isSel?' sel-selected':''));
    const chkHtml=selectMode?`<input type="checkbox" class="sel-check"${isSel?' checked':''}>`:'' ;
    row.innerHTML=chkHtml+`<span class="num">${i+1}</span>
      ${useImages?(it.img?`<img class="thumb" src="${it.img}">`:`<button class="iconbtn" data-act="img" title="사진 넣기">🖼️</button>`):''}
      <input type="text" value="${esc(it.text||'')}" placeholder="${useImages?'내용 또는 그림 이름':'내용'}">
      ${useImages&&it.img?`<button class="iconbtn" data-act="imgdel" title="사진 삭제">↺</button>`:''}
      ${selectMode?'':`<button class="iconbtn del" data-act="del" title="삭제">✕</button>`}`;
    if(selectMode){
      row.querySelector('.sel-check').onchange=function(){
        if(this.checked) selectedItems.add(i); else selectedItems.delete(i);
        row.classList.toggle('sel-selected',this.checked);
        updateItemBar();
      };
    }
    row.querySelector('input').oninput=e=>{state.items[i].text=e.target.value;renderStage();};
    row.querySelectorAll('[data-act]').forEach(b=>{
      b.onclick=()=>{
        const a=b.dataset.act;
        if(a==='del'){state.items.splice(i,1);buildItems();renderStage();}
        else if(a==='imgdel'){state.items[i].img=null;buildItems();renderStage();}
        else if(a==='img'){imgTargetIndex=i;$('#imgPicker').click();}
      };
    });
    if(useImages&&it.img){ row.querySelector('.thumb').onclick=()=>{imgTargetIndex=i;$('#imgPicker').click();}; }
    list.appendChild(row);
  });
  $('#itemCount').textContent=`총 ${state.items.length}개 항목${useImages?' · 사진 넣기 가능':' · 이 게임은 글자만 사용'}`;
  updateItemBar();
}

/* 이미지 업로드 (base64, 리사이즈) */
$('#imgPicker').onchange=function(){
  const f=this.files[0]; if(!f||imgTargetIndex==null){this.value='';return;}
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const max=900, sc=Math.min(1,max/Math.max(img.width,img.height));
      const cv=document.createElement('canvas');
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      state.items[imgTargetIndex].img=cv.toDataURL('image/jpeg',0.82);
      buildItems();renderStage();
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(f); this.value='';
};

/* 붙여넣기 분석 */
$('#btnParse').onclick=()=>{
  const raw=$('#bulk').value;
  const parsed=parseBulk(raw);
  if(!parsed.length){alert('붙여넣은 내용이 없습니다.');return;}
  // 기존 이미지가 있으면 텍스트만 교체하지 않고, 새 목록으로 대체할지 묻기
  if(state.items.some(it=>it.img) && !confirm('새로 분석한 내용으로 목록을 바꿀까요? (넣어둔 사진은 사라집니다)')) return;
  state.items=parsed;
  buildItems(); renderStage();
};
$('#btnAddItem').onclick=()=>{state.items.push({text:'',img:null});buildItems();};

/* 항목 관리 바 */
document.getElementById('btnSelMode').onclick=function(){
  selectMode=!selectMode;
  if(!selectMode) selectedItems.clear();
  buildItems();
};
document.getElementById('btnSelDel').onclick=function(){
  if(!selectedItems.size) return;
  const count=selectedItems.size;
  if(!confirm(count+'개 항목을 삭제할까요?')) return;
  state.items=state.items.filter((_,i)=>!selectedItems.has(i));
  selectMode=false; selectedItems.clear();
  buildItems(); renderStage();
};
document.getElementById('btnDelAll').onclick=function(){
  if(!state.items.length) return;
  if(!confirm('항목 '+state.items.length+'개를 모두 삭제할까요?')) return;
  state.items=[]; selectMode=false; selectedItems.clear();
  buildItems(); renderStage();
};

/* 렌더 */
function renderStage(){
  const g=GAMES[state.gameId]; if(!g)return;
  applyTheme();
  renderSalt=0;
  const ctx={items:state.items,theme:state.theme,paper:state.paper,opts:state.opts};
  let html;
  try{ html=g.render(ctx); }catch(e){ html=`<div class="empty-note">미리보기 오류: ${esc(e.message)}</div>`; }
  $('#stage').innerHTML=html;
  requestAnimationFrame(()=>{scalePages(); if(state.gameId==='snake') bindSnakeDecals();});
}
$('#btnRefresh').onclick=()=>{state.seed=newSeed();renderStage();};
window.addEventListener('resize',()=>scalePages());

/* 인쇄 */
$('#btnPrint').onclick=()=>{
  const p=PAPER[state.paper];
  let st=document.getElementById('printSize');
  if(!st){st=document.createElement('style');st.id='printSize';document.head.appendChild(st);}
  st.textContent=`@media print{@page{size:${p.w}mm ${p.h}mm;margin:0}}`;
  // scalePages()가 인라인으로 적용한 transform/marginBottom을 인쇄 전 초기화
  document.querySelectorAll('#stage .page').forEach(pg=>{
    pg.style.transform='none';
    pg.style.marginBottom='0';
  });
  const oldTitle=document.title;
  document.title=getPrintTitle();
  window.print();
  document.title=oldTitle;
  // 인쇄 후 다시 스케일 복원
  scalePages();
};

function getPrintTitle(){
  const g=GAMES[state.gameId];
  if(!g) return document.title;
  if(state.gameId==='dobble'){
    const n=dobbleN(state), sym=n*n+n+1;
    if((state.opts.view||'cards')==='template') return '도블 그림칸 도안 · '+sym+'칸';
    return '도블 · '+sym+'장';
  }
  return (g.name||document.title);
}

/* 게임 열기 / 홈 */
function openGame(id){
  state.gameId=id;
  state.opts=Object.assign({},GAMES[id].defOpts||{});
  state.seed=newSeed();
  $('#home').style.display='none';
  $('#editor').classList.add('active');
  $('#stageTitle').textContent=GAMES[id].emoji+' '+GAMES[id].name;
  buildThemeRow();buildPaperRow();buildOpts();buildItems();renderStage();
  window.scrollTo(0,0);
}
$('#btnHome').onclick=()=>{
  $('#editor').classList.remove('active');
  $('#home').style.display='block';
};

/* 저장 / 불러오기 (JSON 파일) */
$('#btnSave').onclick=()=>{
  if(!state.gameId){alert('먼저 게임을 선택하세요.');return;}
  const data=JSON.stringify({gameId:state.gameId,theme:state.theme,paper:state.paper,opts:state.opts,items:state.items});
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`보드게임_${GAMES[state.gameId].name}.json`;
  a.click();
};
$('#btnLoad').onclick=()=>$('#loadPicker').click();
$('#loadPicker').onchange=function(){
  const f=this.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!GAMES[d.gameId])throw new Error('알 수 없는 게임');
      state.gameId=d.gameId;state.theme=THEMES.some(t=>t.id===d.theme)?d.theme:'peach';state.paper=d.paper||'A4';
      state.opts=d.opts||{};state.items=d.items||[];state.seed=newSeed();
      $('#home').style.display='none';$('#editor').classList.add('active');
      $('#stageTitle').textContent=GAMES[d.gameId].emoji+' '+GAMES[d.gameId].name;
      buildThemeRow();buildPaperRow();buildOpts();buildItems();renderStage();
    }catch(err){alert('불러오기 실패: '+err.message);}
  };
  r.readAsText(f); this.value='';
};

/* init */
buildHome();
</script>

  <div class="modal-overlay">

      <p>몇 칸 도안을 스캔하셨나요?</p>
      <div class="modal-btns">
        <button class="mbtn-replace" id="scanBtn57">57칸 (어려움)</button>
        <button class="mbtn-append" id="scanBtn31">31칸 (보통)</button>
        <button class="mbtn-cancel" id="scanBtn13">13칸 (쉬움)</button>
      </div>
    </div>
  </div>
</div>

  <div class="modal-overlay">
    <div class="modal-box">
      <p id="modalMsg"></p>
      <div class="modal-btns">
        <button class="mbtn-replace" id="modalBtnReplace">덮어쓰기</button>
        <button class="mbtn-append" id="modalBtnAppend">추가하기</button>

</div>
