<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="screen-orientation" content="landscape" />
    <meta name="x5-orientation" content="landscape" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>감자키우기</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // 진단용: 부팅 중 치명적 오류가 나면 빈 화면 대신 오류 내용을 화면에 표시 (ES5 문법만 사용)
      (function () {
        var shown = false;
        function showError(msg) {
          if (shown) return; shown = true;
          var el = document.createElement('div');
          el.setAttribute('style', 'position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#b71c1c;color:#fff;font:13px/1.5 monospace;padding:10px;max-height:45%;overflow:auto;white-space:pre-wrap;');
          el.textContent = '[앱 오류] ' + msg + '\n(이 화면을 캡처해서 보내주세요)';
          document.body.appendChild(el);
        }
        window.addEventListener('error', function (e) {
          showError((e.message || 'script error') + (e.filename ? '\n' + e.filename + ':' + e.lineno : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason; showError('Promise: ' + (r && r.message ? r.message : String(r)));
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
