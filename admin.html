<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>관리자 패널</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F1117;
  --surface: #1A1D27;
  --surface2: #22263A;
  --accent: #FF6B35;
  --teal: #4ECDC4;
  --green: #22C55E;
  --yellow: #FFE66D;
  --purple: #A855F7;
  --red: #EF4444;
  --text: #F0F0FF;
  --text-dim: #8888AA;
  --border: rgba(255,255,255,0.08);
  --radius: 18px;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow-x: hidden;
}

/* ── PIN 화면 ── */
.pin-screen {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; text-align: center;
  background: radial-gradient(ellipse at top, rgba(255,107,53,0.12) 0%, transparent 60%);
}
.pin-screen .icon { font-size: 64px; margin-bottom: 16px; animation: swing 2s ease-in-out infinite; }
@keyframes swing { 0%,100%{transform:rotate(-8deg)} 50%{transform:rotate(8deg)} }
.pin-screen h1 {
  font-family: 'Gaegu', cursive; font-size: 32px; font-weight: 700;
  color: var(--text); margin-bottom: 8px;
}
.pin-screen p { font-size: 14px; color: var(--text-dim); margin-bottom: 36px; }

/* PIN 디스플레이 */
.pin-display {
  display: flex; gap: 14px; justify-content: center; margin-bottom: 28px;
}
.pin-dot {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--surface2); border: 2px solid rgba(255,255,255,0.15);
  transition: all 0.15s;
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); transform: scale(1.15); }

/* 키패드 */
.keypad {
  display: grid; grid-template-columns: repeat(3, 72px); gap: 12px;
  justify-content: center; margin-bottom: 24px;
}
.key {
  width: 72px; height: 72px; background: var(--surface);
  border: 2px solid var(--border); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; color: var(--text);
  font-family: 'Gaegu', cursive;
}
.key:hover { background: var(--surface2); border-color: rgba(255,107,53,0.4); }
.key:active { transform: scale(0.9); background: rgba(255,107,53,0.15); border-color: var(--accent); }
.key.del { font-size: 20px; color: var(--text-dim); }
.key.empty { cursor: default; background: transparent; border-color: transparent; }

.pin-error {
  color: var(--red); font-size: 14px; font-weight: 700;
  animation: shake 0.35s ease;
}
@keyframes shake { 0%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} 100%{transform:translateX(0)} }

/* ── 관리자 패널 ── */
.admin-wrap { max-width: 480px; margin: 0 auto; padding: 0 14px 80px; }

.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(15,17,23,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 14px; display: flex; align-items: center; gap: 10px;
}
.back-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; color: var(--text); flex-shrink: 0;
}
.back-btn:active { background: var(--surface2); }
.tb-title { font-size: 17px; font-weight: 800; flex: 1; }
.logout-btn {
  background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 12px; font-size: 12px; color: var(--text-dim);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.logout-btn:active { background: var(--surface); }

/* 섹션 */
.section { margin-top: 22px; }
.sec-hd {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.card-row {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.card-row:last-child { border-bottom: none; }
.row-left { flex: 1; min-width: 0; }
.row-title { font-size: 14px; font-weight: 700; }
.row-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

/* 잠금 토글 */
.lock-toggle {
  display: flex; align-items: center; gap: 8px;
}
.lock-status {
  font-size: 12px; font-weight: 700; padding: 4px 10px;
  border-radius: 6px;
}
.lock-status.open { background: rgba(34,197,94,0.15); color: var(--green); }
.lock-status.locked { background: rgba(239,68,68,0.15); color: var(--red); }
.toggle-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 7px 12px;
  font-size: 12px; font-weight: 700; color: var(--text);
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: all 0.15s;
}
.toggle-btn:active { transform: scale(0.95); }
.toggle-btn.lock-now { background: rgba(239,68,68,0.15); color: var(--red); border-color: rgba(239,68,68,0.3); }
.toggle-btn.unlock-now { background: rgba(34,197,94,0.15); color: var(--green); border-color: rgba(34,197,94,0.3); }

/* 점수 테이블 */
.score-table { width: 100%; border-collapse: collapse; }
.score-table th {
  font-size: 11px; color: var(--text-dim); font-weight: 700;
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border);
}
.score-table td {
  font-size: 13px; padding: 12px 14px;
  border-bottom: 1px solid var(--border);
}
.score-table tr:last-child td { border-bottom: none; }
.score-table .total-cell {
  font-weight: 700; color: var(--accent);
  font-family: 'Gaegu', cursive; font-size: 18px;
}
.score-table .mission-cells { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  font-size: 10px; padding: 3px 7px; border-radius: 5px; font-weight: 700;
}
.chip.done { background: rgba(34,197,94,0.15); color: var(--green); }
.chip.undone { background: var(--surface2); color: var(--text-dim); }

/* 전체 초기화 버튼 */
.danger-btn {
  width: 100%; background: rgba(239,68,68,0.1);
  border: 1.5px solid rgba(239,68,68,0.3); border-radius: 12px;
  padding: 14px; color: var(--red); font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.15s;
  margin-top: 10px;
}
.danger-btn:hover { background: rgba(239,68,68,0.18); }
.danger-btn:active { transform: scale(0.98); }

/* 동기화 버튼 */
.sync-btn {
  width: 100%; background: linear-gradient(135deg, var(--teal), #2BB5AC);
  border: none; border-radius: 12px; padding: 14px;
  color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  box-shadow: 0 4px 16px rgba(78,205,196,0.3); transition: all 0.15s;
  margin-bottom: 8px;
}
.sync-btn:active { transform: scale(0.97); }
.sync-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* PIN 설정 */
.pin-change-wrap { display: flex; gap: 8px; }
.pin-input {
  flex: 1; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; color: var(--text);
  font-size: 16px; letter-spacing: 8px; font-family: monospace;
  outline: none; text-align: center;
}
.pin-input:focus { border-color: var(--accent); }
.save-btn {
  background: var(--accent); border: none; border-radius: 10px;
  padding: 12px 16px; color: white; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
.save-btn:active { transform: scale(0.95); }

/* 토스트 */
.toast {
  position: fixed; bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface2); color: var(--text);
  border-radius: 100px; padding: 10px 20px; font-size: 14px; font-weight: 700;
  z-index: 999; opacity: 0; transition: all 0.25s; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok { background: rgba(34,197,94,0.25); color: var(--green); }
.toast.err { background: rgba(239,68,68,0.25); color: var(--red); }

/* 로딩 */
.loading { display:flex; align-items:center; justify-content:center; padding:40px; gap:12px; color:var(--text-dim); }
.spin { width:28px;height:28px;border:2.5px solid var(--surface2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite; }
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ── PIN 로그인 화면 ── -->
<div id="pinScreen" class="pin-screen">
  <div class="icon">🔐</div>
  <h1>관리자 모드</h1>
  <p>PIN 코드를 입력하세요</p>

  <div class="pin-display" id="pinDisplay">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>

  <div class="keypad">
    <div class="key" onclick="pressKey('1')">1</div>
    <div class="key" onclick="pressKey('2')">2</div>
    <div class="key" onclick="pressKey('3')">3</div>
    <div class="key" onclick="pressKey('4')">4</div>
    <div class="key" onclick="pressKey('5')">5</div>
    <div class="key" onclick="pressKey('6')">6</div>
    <div class="key" onclick="pressKey('7')">7</div>
    <div class="key" onclick="pressKey('8')">8</div>
    <div class="key" onclick="pressKey('9')">9</div>
    <div class="key empty"></div>
    <div class="key" onclick="pressKey('0')">0</div>
    <div class="key del" onclick="delKey()">⌫</div>
  </div>

  <div class="pin-error" id="pinErr" style="display:none;">❌ PIN이 틀렸어요</div>
</div>

<!-- ── 관리자 패널 ── -->
<div id="adminPanel" style="display:none;">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div class="tb-title">⚙️ 관리자 패널</div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>

  <div class="admin-wrap">

    <!-- 동기화 -->
    <div class="section">
      <div class="sec-hd">🔄 Google Sheets 동기화</div>
      <button class="sync-btn" id="syncBtn" onclick="syncSheets()">📋 시트에서 미션/학생 불러오기</button>
      <div style="font-size:12px;color:var(--text-dim);text-align:center;" id="lastSyncTime">-</div>
    </div>

    <!-- 미션 잠금 관리 -->
    <div class="section">
      <div class="sec-hd">🔒 미션 잠금 관리</div>
      <div class="card" id="lockList">
        <div class="loading"><div class="spin"></div></div>
      </div>
    </div>

    <!-- 점수 현황 -->
    <div class="section">
      <div class="sec-hd">📊 점수 현황</div>
      <div class="card" style="overflow-x:auto;">
        <table class="score-table" id="scoreTable">
          <tr><td style="padding:24px;text-align:center;color:var(--text-dim);">로딩 중...</td></tr>
        </table>
      </div>
    </div>

    <!-- 점수 초기화 -->
    <div class="section">
      <div class="sec-hd">⚠️ 위험 구역</div>
      <button class="danger-btn" onclick="resetAllScores()">🗑️ 전체 점수 초기화</button>
    </div>

    <!-- PIN 변경 -->
    <div class="section">
      <div class="sec-hd">🔑 관리자 PIN 변경</div>
      <div class="card">
        <div class="card-row">
          <div class="row-left">
            <div class="row-title">새 PIN 설정</div>
            <div class="row-sub">4자리 숫자</div>
          </div>
        </div>
        <div class="card-row">
          <div class="pin-change-wrap" style="width:100%">
            <input type="number" class="pin-input" id="newPin" placeholder="1234" maxlength="4">
            <button class="save-btn" onclick="changePin()">저장</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ── 설정 ─────────────────────────────────────────────────────
const P = new URLSearchParams(location.search);
const PID  = P.get('pid')  || (()=>{ try{return JSON.parse(localStorage.getItem('tracker_cfg')||'{}').projectId||''}catch{return ''} })();
const AKEY = P.get('akey') || (()=>{ try{return JSON.parse(localStorage.getItem('tracker_cfg')||'{}').apiKey||''}catch{return ''} })();

let db, missions = [], students = [], allScores = {};
let PIN = localStorage.getItem('admin_pin') || '1234';

function normalizeSheetsId(value) {
  const raw = (value || '').trim();
  if (!raw) return '';
  const match = raw.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return match ? match[1] : raw.replace(/[#?].*$/, '').trim();
}

function pickNameCell(row) {
  if (!Array.isArray(row)) return '';
  const cleaned = row.map(v => (v || '').toString().trim()).filter(Boolean);
  if (!cleaned.length) return '';
  if (cleaned.length >= 2 && /^\d+$/.test(cleaned[0])) return cleaned[1];
  return cleaned[0];
}

// ── Firebase 초기화 ─────────────────────────────────────────
if (PID && AKEY) {
  const fbCfg = { apiKey:AKEY, projectId:PID, authDomain:`${PID}.firebaseapp.com`, storageBucket:`${PID}.appspot.com`, messagingSenderId:'0', appId:'1:0:web:0' };
  const apps = getApps();
  const app  = apps.length ? apps[0] : initializeApp(fbCfg);
  db = getFirestore(app);
  window._db = db;
}

// ── PIN 키패드 ───────────────────────────────────────────────
let pinInput = '';
window.pressKey = function(k) {
  if (pinInput.length >= 4) return;
  pinInput += k;
  updatePinDisplay();
  if (pinInput.length === 4) setTimeout(checkPin, 150);
};
window.delKey = function() {
  pinInput = pinInput.slice(0, -1);
  updatePinDisplay();
};
function updatePinDisplay() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`pd${i}`).className = 'pin-dot' + (i < pinInput.length ? ' filled' : '');
  }
}
function checkPin() {
  if (pinInput === PIN) {
    document.getElementById('pinScreen').style.display  = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadAdminData();
  } else {
    document.getElementById('pinErr').style.display = 'block';
    document.getElementById('pinDisplay').style.animation = 'none';
    setTimeout(()=>{
      document.getElementById('pinErr').style.display = 'none';
      pinInput = ''; updatePinDisplay();
    }, 1200);
  }
}

// ── 관리자 데이터 로드 ────────────────────────────────────────
async function loadAdminData() {
  if (!db) { showToast('Firebase 연결 없음', 'err'); return; }
  try {
    const [mSnap, sSnap] = await Promise.all([
      getDoc(doc(db,'config','missions')),
      getDoc(doc(db,'config','students'))
    ]);
    missions  = mSnap.exists() ? (mSnap.data().list || []) : [];
    students  = sSnap.exists() ? (sSnap.data().list || []) : [];

    const lastSync = mSnap.exists() ? mSnap.data().updatedAt : null;
    document.getElementById('lastSyncTime').textContent = lastSync
      ? '마지막 동기화: ' + new Date(lastSync).toLocaleString('ko-KR')
      : '아직 동기화 안 됨';

    renderLockList();

    // 실시간 점수 구독
    onSnapshot(doc(db,'scores','current'), snap => {
      allScores = snap.exists() ? snap.data() : {};
      renderScoreTable();
    });
  } catch(e) { showToast('데이터 로드 실패: '+e.message,'err'); }
}

// ── 미션 잠금 리스트 ─────────────────────────────────────────
function renderLockList() {
  const list = document.getElementById('lockList');
  if (!missions.length) {
    list.innerHTML = '<div class="card-row"><span style="color:var(--text-dim);font-size:13px;">미션 없음 — 동기화 먼저</span></div>';
    return;
  }
  list.innerHTML = '';
  const now = new Date();
  missions.forEach(m => {
    const isLocked = m.lockTime && new Date(m.lockTime) < now;
    const hasTime  = !!m.lockTime;

    const row = document.createElement('div');
    row.className = 'card-row';
    row.id = 'lrow_' + m.id;
    row.innerHTML = `
      <div class="row-left">
        <div class="row-title">${m.name}</div>
        <div class="row-sub" id="lt_${m.id}">${hasTime ? '⏰ ' + fmtKor(m.lockTime) : '잠금 시간 없음'}</div>
      </div>
      <div class="lock-toggle">
        <span class="lock-status ${isLocked?'locked':'open'}" id="ls_${m.id}">
          ${isLocked ? '🔒 마감' : '🟢 진행중'}
        </span>
        <button class="toggle-btn ${isLocked?'unlock-now':'lock-now'}"
          id="tb_${m.id}" onclick="toggleLock('${m.id}')">
          ${isLocked ? '잠금 해제' : '지금 잠금'}
        </button>
      </div>`;
    list.appendChild(row);
  });
}

window.toggleLock = async function(mid) {
  const m = missions.find(x=>x.id===mid);
  if (!m) return;
  const now = new Date();
  const isLocked = m.lockTime && new Date(m.lockTime) < now;

  if (isLocked) {
    // 잠금 해제: lockTime을 미래(1년 뒤)로
    const future = new Date(now.getFullYear()+1, 0, 1).toISOString();
    m.lockTime = future;
  } else {
    // 지금 잠금: lockTime을 현재로
    m.lockTime = now.toISOString();
  }

  try {
    await updateDoc(doc(db,'config','missions'), { list: missions });
    renderLockList();
    showToast(isLocked ? '🔓 잠금 해제됨' : '🔒 잠금 처리됨', 'ok');
  } catch(e) { showToast('실패: '+e.message,'err'); }
};

// ── 점수 테이블 ──────────────────────────────────────────────
function renderScoreTable() {
  const tbl = document.getElementById('scoreTable');
  if (!students.length || !missions.length) {
    tbl.innerHTML = '<tr><td style="padding:20px;text-align:center;color:var(--text-dim);">데이터 없음</td></tr>';
    return;
  }

  const thead = `<thead><tr>
    <th>학생</th>
    ${missions.map(m=>`<th style="max-width:60px;word-break:keep-all;font-size:10px;">${m.name}</th>`).join('')}
    <th>합계</th>
  </tr></thead>`;

  const tbody = '<tbody>' + students.map(s => {
    const sc = allScores[s.id] || {};
    const total = Object.values(sc).reduce((a,b)=>a+(Number(b)||0),0);
    const cells = missions.map(m => {
      const v = sc[m.id]||0;
      return `<td style="text-align:center;"><span class="chip ${v>0?'done':'undone'}">${v>0?'✓':'-'}</span></td>`;
    }).join('');
    return `<tr><td style="font-weight:700;white-space:nowrap;">${s.name}</td>${cells}<td class="total-cell" style="text-align:center;">${total}</td></tr>`;
  }).join('') + '</tbody>';

  tbl.innerHTML = thead + tbody;
}

function migrateScoresByMissionName(oldMissions, newMissions, allScores) {
  const oldIdToName = {};
  (oldMissions || []).forEach(m => {
    if (!m || !m.id) return;
    oldIdToName[m.id] = (m.name || '').toString().trim();
  });

  const newNameToId = {};
  (newMissions || []).forEach(m => {
    const key = (m.name || '').toString().trim();
    if (!key || newNameToId[key]) return;
    newNameToId[key] = m.id;
  });

  const migrated = {};

  Object.entries(allScores || {}).forEach(([sid, scoreObj]) => {
    const src = scoreObj || {};
    const dst = {};

    Object.entries(src).forEach(([mid, value]) => {
      const n = Number(value) || 0;
      if (!n) return;

      let targetId = null;
      const oldName = oldIdToName[mid];
      if (oldName && newNameToId[oldName]) {
        targetId = newNameToId[oldName];
      }

      if (targetId) dst[targetId] = Math.max(Number(dst[targetId]) || 0, n);
    });

    migrated[sid] = dst;
  });

  return migrated;
}

function migrateInspectionByMissionName(oldMissions, newMissions, allInspection) {
  const oldIdToName = {};
  (oldMissions || []).forEach(m => {
    if (!m || !m.id) return;
    oldIdToName[m.id] = (m.name || '').toString().trim();
  });

  const newNameToId = {};
  (newMissions || []).forEach(m => {
    const key = (m.name || '').toString().trim();
    if (!key || newNameToId[key]) return;
    newNameToId[key] = m.id;
  });

  const migrated = {};
  Object.entries(allInspection || {}).forEach(([sid, row]) => {
    const src = row || {};
    const dst = {};
    Object.entries(src).forEach(([mid, value]) => {
      if (!value) return;
      const oldName = oldIdToName[mid];
      const newId = oldName ? newNameToId[oldName] : null;
      if (newId) dst[newId] = true;
    });
    migrated[sid] = dst;
  });
  return migrated;
}

function missionNameList(missions) {
  return (missions || [])
    .map(function(m) { return (m && m.name ? m.name : '').toString().trim(); })
    .filter(Boolean);
}

function isBooleanLikeMissionName(name) {
  const n = (name || '').toString().trim().toLowerCase();
  return n === 'true' || n === 'false';
}

// ── Sheets 동기화 ────────────────────────────────────────────
window.syncSheets = async function() {
  const cfg = JSON.parse(localStorage.getItem('tracker_cfg')||'{}');
  if (!cfg.sheetsId) { showToast('Sheets ID 없음 — 홈에서 설정하세요', 'err'); return; }

  const btn = document.getElementById('syncBtn');
  btn.disabled = true; btn.textContent = '⏳ 동기화 중...';

  try {
    const [mRows, sRows] = await Promise.all([
      fetchCSV(cfg.sheetsId, 'missions'),
      fetchCSV(cfg.sheetsId, 'students')
    ]);

    const usesCheckboxColumn = (mRows || []).some(r => {
      const c0 = (r[0] || '').toString().trim().toLowerCase();
      const c1 = (r[1] || '').toString().trim();
      return c1 || c0 === 'true' || c0 === 'false' || c0 === '1' || c0 === '0' || c0 === '완료' || c0 === 'x';
    });

    const mList = [];
    mRows.forEach(r => {
      const col0 = (r[0] || '').toString().trim();
      const col1 = (r[1] || '').toString().trim();
      const name = usesCheckboxColumn ? col1 : col0;
      if (!name) return;
      if (isBooleanLikeMissionName(name)) return;

      const completed = usesCheckboxColumn && (col0.toLowerCase() === 'true' || col0 === '1' || col0 === '완료' || col0.toLowerCase() === 'x');
      const lockRaw = usesCheckboxColumn ? r[2] : r[1];
      const descRaw = usesCheckboxColumn ? r[3] : r[2];

      mList.push({
        id:`m${mList.length + 1}`,
        name,
        completed,
        lockTime: lockRaw ? new Date(String(lockRaw).replace(' ','T')).toISOString() : null,
        description: descRaw || '',
        order:mList.length + 1
      });
    });

    const missionMetaByName = new Map(mList.map(m => [m.name, m]));
    const seenMissionNames = new Set();
    const sourceNames = mList.map(m => (m.name || '').toString().trim()).filter(Boolean);

    seenMissionNames.clear();
    const normalizedMList = [];
    sourceNames.forEach((name) => {
      const n = (name || '').toString().trim();
      if (!n || seenMissionNames.has(n)) return;
      seenMissionNames.add(n);
      const prev = missionMetaByName.get(n);
      normalizedMList.push({
        id: `m${normalizedMList.length + 1}`,
        name: n,
        completed: prev ? !!prev.completed : false,
        lockTime: prev ? prev.lockTime : null,
        description: prev ? (prev.description || '') : '',
        order: normalizedMList.length + 1
      });
    });

    // missions 시트가 비어 있으면 트래커에서도 미션이 없도록 그대로 반영

    const sList = sRows.map(pickNameCell).filter(Boolean).map((name,i)=>({id:`s${i+1}`,name,order:i+1}));

    const [oldMissionSnap, scoreSnap, inspectionSnap] = await Promise.all([
      getDoc(doc(db,'config','missions')),
      getDoc(doc(db,'scores','current')),
      getDoc(doc(db,'scores','inspection'))
    ]);
    const oldMissions = oldMissionSnap.exists() ? (oldMissionSnap.data().list || []) : [];
    const oldScores = scoreSnap.exists() ? scoreSnap.data() : {};
    const oldInspection = inspectionSnap.exists() ? (inspectionSnap.data() || {}) : {};

    const beforeNames = missionNameList(oldMissions);
    const afterNames = missionNameList(normalizedMList);
    const missionChanged = JSON.stringify(beforeNames) !== JSON.stringify(afterNames);
    const hasScoreData = Object.keys(oldScores || {}).length > 0;

    if (missionChanged && hasScoreData) {
      const archiveId = 'sync_' + Date.now();
      await setDoc(doc(db,'backups', archiveId), {
        type: 'mission_sync_archive',
        createdAt: new Date().toISOString(),
        fromMissions: beforeNames,
        toMissions: afterNames,
        missions: oldMissions,
        scores: oldScores
      });
    }

    const migratedScores = migrateScoresByMissionName(oldMissions, normalizedMList, oldScores);
    const migratedInspection = migrateInspectionByMissionName(oldMissions, normalizedMList, oldInspection);

    const now = new Date().toISOString();
    await Promise.all([
      setDoc(doc(db,'config','missions'),{list:normalizedMList,updatedAt:now}),
      setDoc(doc(db,'config','students'),{list:sList,updatedAt:now}),
      setDoc(doc(db,'scores','current'), migratedScores),
      setDoc(doc(db,'scores','inspection'), migratedInspection)
    ]);

    missions = normalizedMList; students = sList;
    renderLockList(); renderScoreTable();
    document.getElementById('lastSyncTime').textContent = '마지막 동기화: ' + new Date().toLocaleString('ko-KR');
    showToast(`✅ 동기화 완료! 미션 ${normalizedMList.length}개, 학생 ${sList.length}명`, 'ok');

  } catch(e) { showToast('동기화 실패: '+e.message, 'err'); }
  finally { btn.disabled=false; btn.textContent='📋 시트에서 미션/학생 불러오기'; }
};

async function fetchCSV(id, sheet) {
  const normalizedId = normalizeSheetsId(id);
  const url = `https://docs.google.com/spreadsheets/d/${normalizedId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheet)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`시트 로드 실패: ${sheet}`);
  const txt = await res.text();
  if (/<!doctype html|<html/i.test(txt)) throw new Error(`시트 ID 또는 공유 설정을 확인하세요: ${sheet}`);
  const rows = txt.trim().split('\n').map(line => {
    const cols=[]; let cur='',inQ=false;
    for(let c of line){if(c==='"'){inQ=!inQ;continue}if(c===','&&!inQ){cols.push(cur.trim());cur=''}else cur+=c}
    cols.push(cur.trim()); return cols;
  }).filter(r=>r.some(cell => (cell || '').trim()));

  if (!rows.length) return [];

  const firstRow = rows[0].map(cell => (cell || '').toString().trim().toLowerCase());
  const hasHeader = firstRow.some(cell =>
    cell.includes('학생') || cell.includes('이름') || cell.includes('미션') ||
    cell.includes('과제') || cell.includes('lock') || cell.includes('description') ||
    cell.includes('완료') || cell.includes('체크')
  );

  return hasHeader ? rows.slice(1) : rows;
}

function parseCSVLine(line) {
  const cols = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
    cur += ch;
  }
  cols.push(cur.trim());
  return cols;
}

async function fetchScoreMissionNames(id) {
  try {
    const normalizedId = normalizeSheetsId(id);
    const url = `https://docs.google.com/spreadsheets/d/${normalizedId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent('scores')}`;
    const res = await fetch(url);
    if (!res.ok) return [];
    const text = await res.text();
    if (/<!doctype html|<html/i.test(text)) return [];
    const firstLine = (text || '').split('\n')[0] || '';
    const headers = parseCSVLine(firstLine).map(v => (v || '').toString().trim());
    const reserved = new Set(['학생이름', '합계', '마지막 업데이트']);
    return headers.filter(h => h && !reserved.has(h));
  } catch {
    return [];
  }
}

}

let _tt;
function showToast(msg,type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast${type?' '+type:''} show`;
  clearTimeout(_tt);
  _tt = setTimeout(()=>{ t.className=`toast${type?' '+type:''}`; }, 3000);
}
