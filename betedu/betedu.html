      if (SPORTS[tab]) pool = SPORTS[tab].db.map(m=>({ ...m, sport:tab }));
      else { pool = allDB(); if (tab === "proto_record") n = 6; }
      return pickN(pool, n).map((m,i)=>({ ...m, id:i }));
    }

    function parseScore(s) { const [h,a] = String(s).split("-").map(Number); return { h, a, total:h+a }; }

    function recordOptions(m) {
      const cfg = RECORD_CFG[m.sport] || RECORD_CFG.soccer;
      const { h, a, total } = parseScore(m.score);
      return [
        { key:"hc_home", short:`핸디 -${cfg.hcap} 홈`,   label:`핸디 -${cfg.hcap} ${m.home}`, odds:1.95, win:(h-cfg.hcap)>a },
        { key:"hc_away", short:`핸디 +${cfg.hcap} 원정`, label:`핸디 +${cfg.hcap} ${m.away}`, odds:1.85, win:(a+cfg.hcap)>h },
        { key:"under",   short:`언더 ${cfg.total}`,       label:`언더 ${cfg.total}${cfg.unit}`, odds:1.90, win: total<cfg.total },
        { key:"over",    short:`오버 ${cfg.total}`,       label:`오버 ${cfg.total}${cfg.unit}`, odds:1.90, win: total>cfg.total },
      ];
    }
    function winOptions(m, hasDraw) {
      const base = [{ key:"home", short:"홈 승", label:`${m.home} 승`, sub:m.home, odds:m.oddsHome, color:"#3b82f6" }];
      if (hasDraw) base.push({ key:"draw", short:"무승부", label:"무승부", sub:"Draw", odds:m.oddsDraw, color:"#a855f7" });
      base.push({ key:"away", short:"원정 승", label:`${m.away} 승`, sub:m.away, odds:m.oddsAway, color:"#f87171" });
      return base;
    }
    function getOpts(m, betMode) { return betMode === "record" ? recordOptions(m) : winOptions(m, SPORTS[m.sport]?.hasDraw); }

    function FireworksCanvas({ active }) {
      const cvRef=useRef(null); const animRef=useRef(null); const pts=useRef([]);
      useEffect(()=>{
        if(!active) return;
        const cv=cvRef.current; if(!cv) return;
        const ctx=cv.getContext("2d"); cv.width=cv.offsetWidth; cv.height=cv.offsetHeight;
        let t=0;
        function burst(x,y){const cols=["#f59e0b","#ef4444","#4ade80","#3b82f6","#a855f7","#ec4899","#fff"];for(let i=0;i<24;i++){const a=(Math.PI*2/24)*i,sp=3+Math.random()*4;pts.current.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,color:randFrom(cols),life:1,decay:0.018+Math.random()*0.012,size:3+Math.random()*3});}}
        function loop(){ctx.clearRect(0,0,cv.width,cv.height);t++;if(t%18===0)burst(cv.width*0.2+Math.random()*cv.width*0.6,cv.height*0.1+Math.random()*cv.height*0.5);pts.current=pts.current.filter(p=>p.life>0);pts.current.forEach(p=>{ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore();p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.decay;});animRef.current=requestAnimationFrame(loop);}
        loop(); return()=>{cancelAnimationFrame(animRef.current);pts.current=[];};
      },[active]);
      if(!active) return null;
      return <canvas ref={cvRef} style={{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none",borderRadius:20}}/>;
    }

        const allWin=folds.every(f=>f.win);
        const profit=allWin?Math.floor(betAmount*totalOdds)-betAmount:-betAmount;

            <div style={{position:"fixed",left:0,right:0,bottom:0,zIndex:60,display:"flex",justifyContent:"center",pointerEvents:"none"}}>
              <div style={{width:"100%",maxWidth:480,background:"#0c1726",borderTop:"2px solid #1b4f9c",boxShadow:"0 -10px 28px rgba(0,0,0,0.6)",padding:"12px 16px 16px",pointerEvents:"auto"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <span style={{fontSize:12,color:"#93c5fd"}}>{betMode==="record"?"기록식":"승부식"} <strong style={{color:"#fff"}}>{foldCount}</strong>폴 · 합산배당 <span style={{color:"#f59e0b",fontWeight:800}}>{totalOdds.toFixed(2)}배</span></span>
                  <span style={{fontSize:12,color:"#64748b"}}>적중 시 <span style={{color:"#4ade80",fontWeight:700}}>{fmt(Math.floor(betAmount*totalOdds))}</span></span>
                </div>
                <div style={{display:"flex",gap:6,marginBottom:8}}>
                  {[0.1,0.25,0.5,1.0].map(r=>(<button key={r} onClick={()=>setBetAmount(Math.floor(money*r))} style={{flex:1,padding:"6px 0",fontSize:11,fontWeight:600,background:"rgba(255,255,255,0.05)",color:"#94a3b8",border:"1px solid rgba(255,255,255,0.09)",borderRadius:7,cursor:"pointer"}}>{r*100}%</button>))}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <input type="number" value={betAmount} onChange={e=>setBetAmount(Math.min(money,Math.max(1000,parseInt(e.target.value)||0)))} style={{flex:1,minWidth:0,padding:"12px 14px",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.14)",borderRadius:8,color:"#fff",fontSize:18,fontWeight:700,boxSizing:"border-box"}}/>
                  <button onClick={placeBet} style={{flex:"0 0 46%",padding:"14px 0",fontSize:15,fontWeight:900,background:"linear-gradient(135deg,#1b4f9c,#2563eb)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer",boxShadow:"0 4px 16px rgba(37,99,235,0.45)"}}>
                    {foldCount===1?"단폴 베팅":`${foldCount}폴더 베팅`}
                  </button>
                </div>
              </div>
            </div>
          )}

          {showResult&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
              <div style={{position:"relative",background:"#0f1923",borderRadius:20,padding:28,width:"100%",maxWidth:400,textAlign:"center",border:`2px solid ${showResult.profit>=0?"rgba(74,222,128,0.4)":"rgba(239,68,68,0.4)"}`,overflow:"hidden"}}>
                <FireworksCanvas active={showResult.profit>=0}/>
                <SoccerAnim win={showResult.profit>=0}/>
                <div style={{position:"relative",zIndex:1}}>
                  <h3 style={{fontSize:26,fontWeight:900,color:showResult.profit>=0?"#4ade80":"#ef4444",marginBottom:6}}>{showResult.profit>=0?"🎉 적중!":"💸 낙첨"}</h3>
                  <div style={{marginBottom:10}}>{showResult.folds.map((f,i)=>(<div key={i} style={{padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:f.win?"#4ade80":"#ef4444"}}><span style={{color:"#475569"}}>{f.ic} {f.match.slice(0,15)}</span><span>{f.win?"✅":"❌"} {f.bet} ({f.odds.toFixed(2)})</span></div><div style={{textAlign:"right",fontSize:9.5,color:"#64748b",marginTop:1}}>실제 {f.realScore} · {f.actualLabel}</div></div>))}</div>
                  {showResult.folds.length>1&&<div style={{fontSize:12,color:"#94a3b8",marginBottom:8}}>합산 {showResult.totalOdds.toFixed(2)}배</div>}
                  <div style={{fontSize:32,fontWeight:900,color:"#fff",marginBottom:4}}>{showResult.profit>=0?"+":""}{fmt(showResult.profit)}</div>
                  <div style={{fontSize:13,color:"#64748b",marginBottom:14}}>잔액: {fmt(showResult.newMoney)}</div>
                  {temptMsg&&<div style={{background:showResult.profit>=0?"rgba(74,222,128,0.08)":"rgba(245,158,11,0.08)",border:`1px solid ${showResult.profit>=0?"rgba(74,222,128,0.2)":"rgba(245,158,11,0.2)"}`,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:12,color:showResult.profit>=0?"#86efac":"#fde68a",lineHeight:1.7,textAlign:"left"}}>{temptMsg}</div>}
                  <button onClick={closeResult} style={{width:"100%",padding:"13px 0",fontSize:14,fontWeight:700,background:showResult.profit>=0?"rgba(74,222,128,0.18)":"rgba(239,68,68,0.18)",color:"#fff",border:`1px solid ${showResult.profit>=0?"rgba(74,222,128,0.3)":"rgba(239,68,68,0.3)"}`,borderRadius:10,cursor:"pointer"}}>
                    {showResult.newMoney<=0?"💀 충전 미션으로 →":"계속하기"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {cashoutMsg&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20,overflowY:"auto"}}>
              <div style={{background:"#0f1923",borderRadius:20,padding:28,width:"100%",maxWidth:400,textAlign:"center",border:"2px solid rgba(245,158,11,0.4)"}}>
                <div style={{fontSize:44,marginBottom:12}}>🏧</div>
                <h3 style={{fontSize:18,fontWeight:900,color:"#f59e0b",marginBottom:16}}>인출하기</h3>
                <div style={{background:"rgba(245,158,11,0.07)",border:"1px solid rgba(245,158,11,0.18)",borderRadius:12,padding:18,marginBottom:12,textAlign:"left"}}>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:6}}>현재 잔액 {currentProfit>=0?<span style={{color:"#4ade80"}}>(수익 +{fmt(currentProfit)})</span>:<span style={{color:"#ef4444"}}>(손실 {fmt(currentProfit)})</span>}</div>
                  <div style={{fontSize:26,fontWeight:900,color:money>totalCharged?"#4ade80":money===totalCharged?"#fff":"#ef4444",marginBottom:12}}>{fmt(money)}</div>
                  <div style={{fontSize:13,color:"#94a3b8",lineHeight:1.9,whiteSpace:"pre-line"}}>{cashoutMsg.msg}</div>
                </div>
                <div style={{background:"rgba(59,130,246,0.1)",border:"1px solid rgba(59,130,246,0.25)",borderRadius:12,padding:"14px 16px",marginBottom:10,textAlign:"left"}}>
                  <div style={{fontSize:11,color:"#93c5fd",fontWeight:800,marginBottom:6,letterSpacing:1}}>💡 오늘의 교훈</div>
                  <div style={{fontSize:12.5,color:"#dbeafe",lineHeight:1.85}}>{cashoutMsg.lesson}</div>
                </div>
                <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px 16px",marginBottom:20,textAlign:"left"}}>
                  <div style={{fontSize:10,color:"#64748b",fontWeight:700,marginBottom:5,letterSpacing:1}}>📊 알아두면 좋은 통계</div>
                  <div style={{fontSize:11.5,color:"#94a3b8",lineHeight:1.8}}>{cashoutMsg.stat}</div>
                </div>
                <div style={{display:"flex",gap:10}}>
                  <button onClick={()=>setCashoutMsg(null)} style={{flex:1,padding:"12px 0",fontSize:13,fontWeight:700,background:"rgba(255,255,255,0.06)",color:"#94a3b8",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,cursor:"pointer"}}>계속하기</button>
                  <button onClick={confirmCashout} style={{flex:1,padding:"12px 0",fontSize:13,fontWeight:700,background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#000",border:"none",borderRadius:10,cursor:"pointer"}}>인출 (결과보기)</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
