name: Android Release AAB

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/android-release.yml'

jobs:
  build-release-aab:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: android-app/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Materialize release keystore
        working-directory: android-app
        run: |
          if ([string]::IsNullOrWhiteSpace('${{ secrets.ANDROID_KEYSTORE_BASE64 }}')) {
            throw 'Missing secret: ANDROID_KEYSTORE_BASE64'
          }
          $bytes = [System.Convert]::FromBase64String('${{ secrets.ANDROID_KEYSTORE_BASE64 }}')
          [System.IO.File]::WriteAllBytes('android/app/release.keystore', $bytes)

      - name: Build release AAB
        working-directory: android-app
        env:
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_STORE_FILE: release.keystore
          ANDROID_VERSION_CODE: ${{ github.run_number }}
          ANDROID_VERSION_NAME: 1.0.${{ github.run_number }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ANDROID_STORE_PASSWORD)) { throw 'Missing secret: ANDROID_STORE_PASSWORD' }
          if ([string]::IsNullOrWhiteSpace($env:ANDROID_KEY_PASSWORD)) { $env:ANDROID_KEY_PASSWORD = $env:ANDROID_STORE_PASSWORD }
          if ([string]::IsNullOrWhiteSpace($env:ANDROID_KEY_ALIAS)) { $env:ANDROID_KEY_ALIAS = 'release_key' }
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\build-android.ps1 -ReleaseOnly -SkipSdkSetup

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android-app/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
